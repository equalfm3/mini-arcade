<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <radialGradient id="dotGlowCtrl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Desktop section -->
  <text fill="#44aaff" font-size="14" font-weight="bold" x="130" y="28" text-anchor="middle">DESKTOP</text>

  <!-- Mouse with drag indicator -->
  <g transform="translate(50, 45)">
    <!-- Mouse body -->
    <rect x="15" y="10" width="50" height="70" fill="#1a1a2e" stroke="#44aaff" stroke-width="2" rx="10"/>
    <line x1="40" y1="10" x2="40" y2="40" stroke="#44aaff" stroke-width="1"/>
    <!-- Left button highlighted -->
    <rect x="15" y="10" width="25" height="30" fill="#44aaff" opacity="0.3" rx="10"/>

    <!-- Drag arrow -->
    <text fill="#44aaff" font-size="9" x="75" y="25">Click dot</text>
    <text fill="#888" font-size="9" x="75" y="37">+ drag to</text>
    <text fill="#888" font-size="9" x="75" y="49">draw path</text>
  </g>

  <!-- Mini grid showing drag -->
  <g transform="translate(60, 120)">
    <rect x="0" y="0" width="24" height="24" fill="#161625" rx="3"/>
    <rect x="0" y="0" width="24" height="24" fill="#ff4444" opacity="0.12" rx="3"/>
    <rect x="27" y="0" width="24" height="24" fill="#161625" rx="3"/>
    <rect x="27" y="0" width="24" height="24" fill="#ff4444" opacity="0.12" rx="3"/>
    <rect x="54" y="0" width="24" height="24" fill="#161625" rx="3"/>
    <rect x="54" y="0" width="24" height="24" fill="#ff4444" opacity="0.12" rx="3"/>
    <!-- Path line -->
    <polyline points="12,12 39,12 66,12" fill="none" stroke="#ff4444" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <!-- Dot -->
    <circle cx="12" cy="12" r="7" fill="#ff4444"/>
    <circle cx="10" cy="9" r="3" fill="rgba(255,255,255,0.3)"/>
    <!-- Arrow showing drag direction -->
    <line x1="72" y1="12" x2="90" y2="12" stroke="#ffd700" stroke-width="1.5"/>
    <polygon points="90,8 98,12 90,16" fill="#ffd700"/>
  </g>

  <!-- Pause keys -->
  <g transform="translate(50, 165)">
    <rect x="0" y="0" width="36" height="22" fill="#1a1a2e" stroke="#44aaff" stroke-width="1.5" rx="3"/>
    <text fill="#44aaff" font-size="10" x="18" y="15" text-anchor="middle">Esc</text>
    <text fill="#888" font-size="9" x="44" y="10">or</text>
    <rect x="58" y="0" width="22" height="22" fill="#1a1a2e" stroke="#44aaff" stroke-width="1.5" rx="3"/>
    <text fill="#44aaff" font-size="10" x="69" y="15" text-anchor="middle">P</text>
    <text fill="#888" font-size="9" x="88" y="15">Pause</text>
  </g>

  <!-- Divider -->
  <line x1="300" y1="15" x2="300" y2="185" stroke="#2a2a40" stroke-width="1"/>

  <!-- Mobile section -->
  <text fill="#44ff66" font-size="14" font-weight="bold" x="450" y="28" text-anchor="middle">MOBILE</text>

  <!-- Phone outline with touch drag -->
  <g transform="translate(380, 42)">
    <rect x="0" y="0" width="80" height="120" fill="#1a1a2e" stroke="#44ff66" stroke-width="2" rx="8"/>
    <!-- Screen -->
    <rect x="5" y="10" width="70" height="95" fill="#0a0a16" rx="2"/>

    <!-- Mini grid on screen -->
    <rect x="12" y="20" width="16" height="16" fill="#161625" rx="2"/>
    <rect x="12" y="20" width="16" height="16" fill="#ff4444" opacity="0.12" rx="2"/>
    <rect x="30" y="20" width="16" height="16" fill="#161625" rx="2"/>
    <rect x="30" y="20" width="16" height="16" fill="#ff4444" opacity="0.12" rx="2"/>
    <rect x="48" y="20" width="16" height="16" fill="#161625" rx="2"/>
    <rect x="12" y="38" width="16" height="16" fill="#161625" rx="2"/>
    <rect x="30" y="38" width="16" height="16" fill="#161625" rx="2"/>
    <rect x="48" y="38" width="16" height="16" fill="#161625" rx="2"/>
    <rect x="12" y="56" width="16" height="16" fill="#161625" rx="2"/>
    <rect x="30" y="56" width="16" height="16" fill="#161625" rx="2"/>
    <rect x="48" y="56" width="16" height="16" fill="#161625" rx="2"/>

    <!-- Path being drawn -->
    <polyline points="20,28 38,28" fill="none" stroke="#ff4444" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <!-- Dot -->
    <circle cx="20" cy="28" r="5" fill="#ff4444"/>

    <!-- Finger touch indicator -->
    <circle cx="38" cy="28" r="8" fill="#44ff66" opacity="0.25"/>
    <circle cx="38" cy="28" r="4" fill="#44ff66" opacity="0.4"/>

    <text fill="#888" font-size="9" x="90" y="35">Touch dot</text>
    <text fill="#888" font-size="9" x="90" y="47">+ drag to</text>
    <text fill="#888" font-size="9" x="90" y="59">draw path</text>
  </g>

  <!-- Tap to clear -->
  <g transform="translate(380, 155)">
    <text fill="#888" font-size="9" x="0" y="12">Tap existing path to clear &amp; redraw</text>
  </g>

  <!-- Border -->
  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
