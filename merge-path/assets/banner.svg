    <rect x="22.5" y="19.5" width="1.5" height="1.5" fill="#44aaff"/>
  </g>

  <!-- Title -->
  <text class="title" x="320" y="90">MERGE PATH</text>
  <text class="sub" x="320" y="115">Connect · Fill · Solve</text>

  <!-- HUD mock -->
  <g transform="translate(320, 135)">
    <rect width="260" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">LEVEL</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">3</text>
    <text font-family="monospace" font-size="9" fill="#666" x="90" y="19">MOVES</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="140" y="19">12</text>
    <text font-family="monospace" font-size="9" fill="#666" x="180" y="19">FILL</text>
    <text font-family="monospace" font-size="9" fill="#44ff66" x="210" y="19">25/25</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
