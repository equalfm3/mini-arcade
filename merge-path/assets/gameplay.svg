<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 440" width="380" height="440">
  <defs>
    <radialGradient id="gR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44aaff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#44aaff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gG2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44ff66" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#44ff66" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gY2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="380" height="440" fill="#0a0a16" rx="6"/>

  <!-- Progress bar -->
  <rect x="20" y="12" width="340" height="4" fill="#1a1a2e" rx="2"/>
  <rect x="20" y="12" width="238" height="4" fill="#ffd700" rx="2"/>
  <text font-family="monospace" font-size="10" fill="#666" text-anchor="end" x="360" y="10">18/25</text>

  <!-- 5x5 Grid — mid-game state with partial paths drawn -->
  <!-- Cell size: 60px, gap: 4px, offset: 26,30 -->
  <g transform="translate(26, 30)">
    <!-- Row 0 -->
    <rect x="0" y="0" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="0" y="0" width="60" height="60" fill="#ff4444" opacity="0.12" rx="5"/>
    <rect x="64" y="0" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="64" y="0" width="60" height="60" fill="#ff4444" opacity="0.12" rx="5"/>
    <rect x="128" y="0" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="192" y="0" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="192" y="0" width="60" height="60" fill="#44aaff" opacity="0.12" rx="5"/>
    <rect x="256" y="0" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="256" y="0" width="60" height="60" fill="#44aaff" opacity="0.12" rx="5"/>

    <!-- Row 1 -->
    <rect x="0" y="64" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="0" y="64" width="60" height="60" fill="#ff4444" opacity="0.12" rx="5"/>
    <rect x="64" y="64" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="64" y="64" width="60" height="60" fill="#44ff66" opacity="0.12" rx="5"/>
    <rect x="128" y="64" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="128" y="64" width="60" height="60" fill="#44ff66" opacity="0.12" rx="5"/>
    <rect x="192" y="64" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="192" y="64" width="60" height="60" fill="#44aaff" opacity="0.12" rx="5"/>
    <rect x="256" y="64" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="256" y="64" width="60" height="60" fill="#44aaff" opacity="0.12" rx="5"/>

    <!-- Row 2 -->
    <rect x="0" y="128" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="0" y="128" width="60" height="60" fill="#ff4444" opacity="0.12" rx="5"/>
    <rect x="64" y="128" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="64" y="128" width="60" height="60" fill="#44ff66" opacity="0.12" rx="5"/>
    <rect x="128" y="128" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="192" y="128" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="256" y="128" width="60" height="60" fill="#161625" rx="5"/>

    <!-- Row 3 -->
    <rect x="0" y="192" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="0" y="192" width="60" height="60" fill="#ff4444" opacity="0.12" rx="5"/>
    <rect x="64" y="192" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="128" y="192" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="192" y="192" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="256" y="192" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="256" y="192" width="60" height="60" fill="#ffd700" opacity="0.12" rx="5"/>

    <!-- Row 4 -->
    <rect x="0" y="256" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="64" y="256" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="128" y="256" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="192" y="256" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="192" y="256" width="60" height="60" fill="#ffd700" opacity="0.12" rx="5"/>
    <rect x="256" y="256" width="60" height="60" fill="#161625" rx="5"/>
    <rect x="256" y="256" width="60" height="60" fill="#ffd700" opacity="0.12" rx="5"/>

    <!-- Red path: (0,0)→(0,1)→(1,0)→(2,0)→(3,0) -->
    <polyline points="30,30 94,30 30,30 30,94 30,158 30,222"
      fill="none" stroke="#ff4444" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

    <!-- Blue path: (0,3)→(0,4)→(1,4)→(1,3) -->
    <polyline points="222,30 286,30 286,94 222,94"
      fill="none" stroke="#44aaff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

    <!-- Green path: (1,1)→(1,2)→(2,1) — partial, being drawn -->
    <polyline points="94,94 158,94 94,158"
      fill="none" stroke="#44ff66" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

    <!-- Gold path: (3,4)→(4,4)→(4,3) -->
    <polyline points="286,222 286,286 222,286"
      fill="none" stroke="#ffd700" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

    <!-- Red dots at (0,0) and (3,4) — wait, level 1 has red at (0,0) and (4,4) -->
    <!-- Red dot 1 -->
    <circle cx="30" cy="30" r="14" fill="url(#gR)"/>
    <circle cx="30" cy="30" r="10" fill="#ff4444"/>
    <circle cx="27" cy="26" r="4" fill="rgba(255,255,255,0.3)"/>

    <!-- Red dot 2 (target, not yet reached) -->
    <circle cx="286" cy="286" r="14" fill="url(#gR)"/>
    <circle cx="286" cy="286" r="10" fill="#ff4444"/>
    <circle cx="283" cy="282" r="4" fill="rgba(255,255,255,0.3)"/>

    <!-- Blue dot 1 -->
    <circle cx="222" cy="30" r="14" fill="url(#gB)"/>
    <circle cx="222" cy="30" r="10" fill="#44aaff"/>
    <circle cx="219" cy="26" r="4" fill="rgba(255,255,255,0.3)"/>

    <!-- Blue dot 2 -->
    <circle cx="222" cy="94" r="14" fill="url(#gB)"/>
    <circle cx="222" cy="94" r="10" fill="#44aaff"/>
    <circle cx="219" cy="90" r="4" fill="rgba(255,255,255,0.3)"/>

    <!-- Green dot 1 -->
    <circle cx="94" cy="94" r="14" fill="url(#gG2)"/>
    <circle cx="94" cy="94" r="10" fill="#44ff66"/>
    <circle cx="91" cy="90" r="4" fill="rgba(255,255,255,0.3)"/>

    <!-- Green dot 2 -->
    <circle cx="94" cy="158" r="14" fill="url(#gG2)"/>
    <circle cx="94" cy="158" r="10" fill="#44ff66"/>
    <circle cx="91" cy="154" r="4" fill="rgba(255,255,255,0.3)"/>

    <!-- Gold dot 1 -->
    <circle cx="286" cy="222" r="14" fill="url(#gY2)"/>
    <circle cx="286" cy="222" r="10" fill="#ffd700"/>
    <circle cx="283" cy="218" r="4" fill="rgba(255,255,255,0.3)"/>

    <!-- Gold dot 2 -->
    <circle cx="222" cy="286" r="14" fill="url(#gY2)"/>
    <circle cx="222" cy="286" r="10" fill="#ffd700"/>
    <circle cx="219" cy="282" r="4" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Drag indicator (finger drawing green path) -->
  <g transform="translate(26, 30)">
    <circle cx="94" cy="158" r="20" fill="#44ff66" opacity="0.15"/>
  </g>

  <!-- Level label -->
  <text font-family="monospace" font-size="12" fill="#888" text-anchor="center" x="20" y="410">Level 3 · 4 pairs</text>

  <!-- Border -->
  <rect width="380" height="440" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
