<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>text { font-family: monospace; }</style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="200" fill="#050510" rx="6"/>

  <!-- Desktop section -->
  <text fill="#00ffcc" font-size="14" x="80" y="30" font-weight="bold">DESKTOP</text>

  <!-- Space bar key -->
  <rect x="40" y="50" width="120" height="36" fill="#12121f" stroke="#00aaff" stroke-width="2" rx="4"/>
  <text fill="#00aaff" font-size="11" x="72" y="73">SPACE</text>
  <text fill="#666" font-size="10" x="40" y="106">Flip gravity</text>

  <!-- Arrow keys -->
  <rect x="200" y="50" width="36" height="36" fill="#12121f" stroke="#00aaff" stroke-width="2" rx="4"/>
  <text fill="#00aaff" font-size="14" x="211" y="73">↑</text>
  <rect x="200" y="90" width="36" height="36" fill="#12121f" stroke="#00aaff" stroke-width="2" rx="4"/>
  <text fill="#00aaff" font-size="14" x="211" y="113">↓</text>
  <text fill="#666" font-size="10" x="200" y="145">Also flip</text>

  <!-- Esc key -->
  <rect x="40" y="140" width="50" height="30" fill="#12121f" stroke="#666" stroke-width="1" rx="4"/>
  <text fill="#888" font-size="10" x="50" y="160">ESC</text>
  <text fill="#666" font-size="10" x="100" y="160">Pause</text>

  <!-- Divider -->
  <line x1="300" y1="20" x2="300" y2="180" stroke="#1a1a40" stroke-width="1"/>

  <!-- Mobile section -->
  <text fill="#ff00ff" font-size="14" x="410" y="30" font-weight="bold">MOBILE</text>

  <!-- Tap button -->
  <rect x="370" y="50" width="120" height="50" fill="#12121f" stroke="#ff00ff" stroke-width="2" rx="8"/>
  <text fill="#ff00ff" font-size="14" x="404" y="80" font-weight="bold">FLIP</text>
  <text fill="#666" font-size="10" x="370" y="120">Tap button to flip gravity</text>

  <!-- Tap anywhere -->
  <rect x="370" y="135" width="120" height="30" fill="#12121f" stroke="#666" stroke-width="1" rx="4"/>
  <text fill="#888" font-size="10" x="390" y="155">Tap screen</text>
  <text fill="#666" font-size="10" x="370" y="180">Also flips gravity</text>

  <!-- Border -->
  <rect width="600" height="200" fill="none" stroke="#1a1a40" stroke-width="2" rx="6"/>
</svg>
