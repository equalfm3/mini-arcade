<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" width="620" height="280">
  <defs>
    <style>
      text { font-family: monospace; font-size: 11px; }
      .folder { fill: #00ffcc; }
      .file { fill: #00aaff; }
      .desc { fill: #666666; font-size: 10px; }
      .line { stroke: #1a1a40; stroke-width: 1; }
    </style>
  </defs>

  <rect width="620" height="280" fill="#050510" rx="6"/>

  <!-- Title -->
  <text fill="#666" font-size="12" x="20" y="25">FILE STRUCTURE</text>

  <!-- gravity-flip/ -->
  <text class="folder" x="20" y="55">gravity-flip/</text>

  <!-- index.html -->
  <line x1="30" y1="60" x2="30" y2="75" class="line"/>
  <line x1="30" y1="75" x2="40" y2="75" class="line"/>
  <text class="file" x="45" y="78">index.html</text>
  <text class="desc" x="200" y="78">Entry point — GAME config + arcade.js loader</text>

  <!-- style.css -->
  <line x1="30" y1="75" x2="30" y2="95" class="line"/>
  <line x1="30" y1="95" x2="40" y2="95" class="line"/>
  <text class="file" x="45" y="98">style.css</text>
  <text class="desc" x="200" y="98">Neon accent color (#00ffcc)</text>

  <!-- game.js -->
  <line x1="30" y1="95" x2="30" y2="115" class="line"/>
  <line x1="30" y1="115" x2="40" y2="115" class="line"/>
  <text class="file" x="45" y="118">game.js</text>
  <text class="desc" x="200" y="118">Orchestrator — input, flip, collision, scoring</text>

  <!-- src/ -->
  <line x1="30" y1="115" x2="30" y2="135" class="line"/>
  <line x1="30" y1="135" x2="40" y2="135" class="line"/>
  <text class="folder" x="45" y="138">src/</text>

  <!-- src/config.js -->
  <line x1="55" y1="142" x2="55" y2="158" class="line"/>
  <line x1="55" y1="158" x2="65" y2="158" class="line"/>
  <text class="file" x="70" y="161">config.js</text>
  <text class="desc" x="200" y="161">Gravity, speed, gap sizes, neon colors, trail</text>

  <!-- src/player.js -->
  <line x1="55" y1="158" x2="55" y2="178" class="line"/>
  <line x1="55" y1="178" x2="65" y2="178" class="line"/>
  <text class="file" x="70" y="181">player.js</text>
  <text class="desc" x="200" y="181">Gravity physics, flip, trail, squish, glow</text>

  <!-- src/corridors.js -->
  <line x1="55" y1="178" x2="55" y2="198" class="line"/>
  <line x1="55" y1="198" x2="65" y2="198" class="line"/>
  <text class="file" x="70" y="201">corridors.js</text>
  <text class="desc" x="200" y="201">Wall generation, gaps, scrolling, orbs, collision</text>

  <!-- src/renderer.js -->
  <line x1="55" y1="198" x2="55" y2="218" class="line"/>
  <line x1="55" y1="218" x2="65" y2="218" class="line"/>
  <text class="file" x="70" y="221">renderer.js</text>
  <text class="desc" x="200" y="221">Neon glow, trail, speed lines, walls, particles</text>

  <!-- assets/ -->
  <line x1="30" y1="135" x2="30" y2="240" class="line"/>
  <line x1="30" y1="240" x2="40" y2="240" class="line"/>
  <text class="folder" x="45" y="243">assets/</text>
  <text class="desc" x="200" y="243">SVG images for README documentation</text>

  <!-- README.md -->
  <line x1="30" y1="240" x2="30" y2="260" class="line"/>
  <line x1="30" y1="260" x2="40" y2="260" class="line"/>
  <text class="file" x="45" y="263">README.md</text>
  <text class="desc" x="200" y="263">Full documentation with embedded SVGs</text>

  <!-- Border -->
  <rect width="620" height="280" fill="none" stroke="#1a1a40" stroke-width="2" rx="6"/>
</svg>
