<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#050510" rx="6"/>

  <!-- Subtle grid -->
  <g stroke="#0a0a20" stroke-width="0.5" fill="none" opacity="0.4">
    <line x1="0" y1="30" x2="400" y2="30"/><line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="90" x2="400" y2="90"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="210" x2="400" y2="210"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="270" x2="400" y2="270"/>
    <line x1="30" y1="0" x2="30" y2="300"/><line x1="60" y1="0" x2="60" y2="300"/>
    <line x1="90" y1="0" x2="90" y2="300"/><line x1="120" y1="0" x2="120" y2="300"/>
  </g>

  <!-- Speed lines -->
  <line x1="5" y1="80" x2="50" y2="80" stroke="#fff" stroke-width="1" opacity="0.05"/>
  <line x1="20" y1="140" x2="80" y2="140" stroke="#fff" stroke-width="1" opacity="0.04"/>
  <line x1="10" y1="200" x2="65" y2="200" stroke="#fff" stroke-width="1" opacity="0.06"/>
  <line x1="30" y1="250" x2="75" y2="250" stroke="#fff" stroke-width="1" opacity="0.04"/>

  <!-- Top wall (continuous) -->
  <rect x="0" y="0" width="140" height="42" fill="#0044aa" opacity="0.8"/>
  <line x1="0" y1="42" x2="140" y2="42" stroke="#00aaff" stroke-width="2" filter="url(#glow)"/>
  <!-- Gap in top wall -->
  <line x1="140" y1="0" x2="140" y2="42" stroke="#00aaff" stroke-width="2" filter="url(#glow)"/>
  <line x1="210" y1="0" x2="210" y2="42" stroke="#00aaff" stroke-width="2" filter="url(#glow)"/>
  <!-- Top wall continues -->
  <rect x="210" y="0" width="190" height="42" fill="#0044aa" opacity="0.8"/>
  <line x1="210" y1="42" x2="400" y2="42" stroke="#00aaff" stroke-width="2" filter="url(#glow)"/>

  <!-- Bottom wall (continuous) -->
  <rect x="0" y="258" width="260" height="42" fill="#0044aa" opacity="0.8"/>
  <line x1="0" y1="258" x2="260" y2="258" stroke="#00aaff" stroke-width="2" filter="url(#glow)"/>
  <!-- Gap in bottom wall -->
  <line x1="260" y1="258" x2="260" y2="300" stroke="#00aaff" stroke-width="2" filter="url(#glow)"/>
  <line x1="330" y1="258" x2="330" y2="300" stroke="#00aaff" stroke-width="2" filter="url(#glow)"/>
  <!-- Bottom wall continues -->
  <rect x="330" y="258" width="70" height="42" fill="#0044aa" opacity="0.8"/>
  <line x1="330" y1="258" x2="400" y2="258" stroke="#00aaff" stroke-width="2" filter="url(#glow)"/>

  <!-- Collectible orb in top gap -->
  <circle cx="175" cy="21" r="5" fill="#ffff00" filter="url(#glow)"/>
  <circle cx="175" cy="21" r="2" fill="#fff" opacity="0.7"/>

  <!-- Collectible orb in bottom gap -->
  <circle cx="295" cy="279" r="5" fill="#ffff00" filter="url(#glow)"/>
  <circle cx="295" cy="279" r="2" fill="#fff" opacity="0.7"/>

  <!-- Player trail (heading toward top gap) -->
  <rect x="42" y="200" width="7" height="7" fill="#00ffcc" opacity="0.1"/>
  <rect x="48" y="185" width="8" height="8" fill="#00ffcc" opacity="0.15"/>
  <rect x="54" y="168" width="9" height="9" fill="#00ffcc" opacity="0.2"/>
  <rect x="60" y="148" width="10" height="10" fill="#00ffcc" opacity="0.3"/>
  <rect x="66" y="126" width="11" height="11" fill="#00ffcc" opacity="0.4"/>
  <rect x="72" y="102" width="12" height="12" fill="#00ffcc" opacity="0.5"/>

  <!-- Player (glowing square, heading up toward top gap) -->
  <rect x="76" y="76" width="16" height="16" fill="#00ffcc" filter="url(#glow)"/>
  <rect x="78" y="78" width="6" height="6" fill="#fff" opacity="0.35"/>

  <!-- Gravity arrow (pointing up) -->
  <polygon points="84,68 80,74 88,74" fill="#fff" opacity="0.3"/>

  <!-- Flip particles (small colored dots around player) -->
  <circle cx="70" cy="80" r="2" fill="#ff00ff" opacity="0.6"/>
  <circle cx="95" cy="72" r="1.5" fill="#00ccff" opacity="0.5"/>
  <circle cx="68" cy="90" r="1.5" fill="#ffff00" opacity="0.4"/>
  <circle cx="96" cy="88" r="2" fill="#ff6600" opacity="0.5"/>
  <circle cx="74" cy="70" r="1" fill="#cc00ff" opacity="0.6"/>

  <!-- Score display -->
  <g transform="translate(300, 8)">
    <text font-family="monospace" font-size="11" fill="#666">SCORE</text>
    <text font-family="monospace" font-size="14" fill="#00ffcc" x="0" y="18" font-weight="bold">1420</text>
  </g>

  <!-- Border -->
  <rect width="400" height="300" fill="none" stroke="#1a1a40" stroke-width="2" rx="6"/>
</svg>
