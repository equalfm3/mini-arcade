<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #44ff66; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>
  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Pixel art: Platforms and player jumping -->
  <g shape-rendering="crispEdges">
    <!-- Platform 1 (bottom, green/normal) -->
    <rect x="40" y="160" width="58" height="12" fill="#44ff66"/>
    <rect x="40" y="160" width="58" height="2" fill="#88ffaa" opacity="0.4"/>
    <rect x="40" y="169" width="58" height="3" fill="#22aa44"/>

    <!-- Platform 2 (middle, blue/moving) -->
    <rect x="130" y="115" width="58" height="12" fill="#44aaff"/>
    <rect x="130" y="115" width="58" height="2" fill="#88ccff" opacity="0.4"/>
    <rect x="130" y="124" width="58" height="3" fill="#2266cc"/>
    <!-- Movement arrows -->
    <text font-family="monospace" font-size="8" fill="#44aaff" opacity="0.5" x="120" y="123">◄</text>
    <text font-family="monospace" font-size="8" fill="#44aaff" opacity="0.5" x="192" y="123">►</text>

    <!-- Platform 3 (upper, orange/breaking) -->
    <rect x="60" y="70" width="58" height="12" fill="#ff8844"/>
    <rect x="60" y="70" width="58" height="2" fill="#ffaa66" opacity="0.4"/>
    <rect x="60" y="79" width="58" height="3" fill="#cc6622"/>
    <!-- Crack lines -->
    <line x1="75" y1="72" x2="85" y2="80" stroke="#cc6622" stroke-width="1"/>
    <line x1="100" y1="73" x2="95" y2="79" stroke="#cc6622" stroke-width="1"/>

    <!-- Platform 4 (top, green with spring) -->
    <rect x="160" y="30" width="58" height="12" fill="#44ff66"/>
    <rect x="160" y="30" width="58" height="2" fill="#88ffaa" opacity="0.4"/>
    <rect x="160" y="39" width="58" height="3" fill="#22aa44"/>
    <!-- Spring coil -->
    <rect x="183" y="20" width="12" height="10" fill="#ffd700"/>
    <rect x="182" y="18" width="14" height="3" fill="#ffd700"/>
    <rect x="184" y="23" width="10" height="2" fill="#b89a00"/>
    <rect x="185" y="26" width="8" height="2" fill="#b89a00"/>

    <!-- Player (doodler) jumping between platforms 1 and 2 -->
    <g transform="translate(90, 135)">
      <!-- Body -->
      <rect x="-12" y="-28" width="24" height="28" rx="4" fill="#44ff66"/>
      <!-- Belly -->
      <rect x="-8" y="-12" width="16" height="8" fill="#22aa44"/>
      <!-- Left eye -->
      <circle cx="-2" cy="-18" r="4" fill="#ffffff"/>
      <circle cx="-0.5" cy="-18" r="2" fill="#0a0a16"/>
      <!-- Right eye -->
      <circle cx="8" cy="-18" r="4" fill="#ffffff"/>
      <circle cx="9.5" cy="-18" r="2" fill="#0a0a16"/>
      <!-- Nose -->
      <rect x="5" y="-12" width="3" height="2" fill="#88ffaa"/>
      <!-- Feet -->
      <rect x="-8" y="-3" width="6" height="3" fill="#22aa44"/>
      <rect x="2" y="-3" width="6" height="3" fill="#22aa44"/>
    </g>

    <!-- Jump trail (dots showing trajectory) -->
    <circle cx="70" cy="155" r="1.5" fill="#44ff66" opacity="0.3"/>
    <circle cx="78" cy="148" r="1.5" fill="#44ff66" opacity="0.25"/>
    <circle cx="84" cy="142" r="1.5" fill="#44ff66" opacity="0.2"/>

    <!-- Stars -->
    <rect x="20" y="15" width="2" height="2" fill="#ffffff" opacity="0.3"/>
    <rect x="230" y="45" width="2" height="2" fill="#ffffff" opacity="0.4"/>
    <rect x="200" y="90" width="2" height="2" fill="#ffffff" opacity="0.25"/>
    <rect x="110" y="25" width="2" height="2" fill="#ffffff" opacity="0.35"/>
    <rect x="250" y="150" width="2" height="2" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- Pixel icon (doodle-jump from icons.js) -->
  <g transform="translate(280, 30)" shape-rendering="crispEdges">
    <rect x="9" y="1.5" width="3" height="1.5" fill="#44ff66"/>
    <rect x="7.5" y="3" width="6" height="1.5" fill="#44ff66"/>
    <rect x="6" y="4.5" width="3" height="1.5" fill="#44ff66"/>
    <rect x="10.5" y="4.5" width="3" height="1.5" fill="#ffffff"/>
    <rect x="6" y="6" width="9" height="1.5" fill="#44ff66"/>
    <rect x="7.5" y="7.5" width="6" height="1.5" fill="#44ff66"/>
    <rect x="4.5" y="9" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="9" y="9" width="3" height="1.5" fill="#44ff66"/>
    <rect x="15" y="9" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="9" y="10.5" width="3" height="1.5" fill="#44ff66"/>
    <rect x="9" y="12" width="3" height="1.5" fill="#44ff66"/>
    <rect x="9" y="13.5" width="3" height="1.5" fill="#44ff66"/>
    <rect x="3" y="16.5" width="15" height="1.5" fill="#88cc44"/>
    <rect x="12" y="21" width="9" height="1.5" fill="#88cc44"/>
    <rect x="3" y="22.5" width="9" height="1.5" fill="#88cc44"/>
  </g>

  <!-- Title -->
  <text class="title" x="340" y="90">DOODLE JUMP</text>
  <text class="sub" x="340" y="118">Bounce · Climb · Survive</text>

  <!-- Score HUD mock -->
  <g transform="translate(340, 140)">
    <rect width="260" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">4280</text>
    <text font-family="monospace" font-size="9" fill="#666" x="120" y="19">BEST</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="160" y="19">12450</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
