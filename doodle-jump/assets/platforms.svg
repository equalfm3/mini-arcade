<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="600" height="280" fill="#0a0a16" rx="6"/>

  <!-- Title -->
  <text fill="#e0e0e0" font-size="14" font-weight="bold" x="20" y="25">PLATFORM GENERATION</text>

  <!-- Left: Platform types -->
  <g transform="translate(20, 45)">
    <text fill="#44aaff" font-size="11" font-weight="bold" y="0">Platform Types</text>

    <!-- Normal -->
    <rect x="0" y="15" width="58" height="12" fill="#44ff66"/>
    <rect x="0" y="24" width="58" height="3" fill="#22aa44"/>
    <text fill="#e0e0e0" font-size="9" x="70" y="25">Normal (green) — static, always safe</text>

    <!-- Moving -->
    <rect x="0" y="45" width="58" height="12" fill="#44aaff"/>
    <rect x="0" y="54" width="58" height="3" fill="#2266cc"/>
    <text fill="#e0e0e0" font-size="9" x="70" y="55">Moving (blue) — slides left/right</text>

    <!-- Breaking -->
    <rect x="0" y="75" width="58" height="12" fill="#ff8844"/>
    <rect x="0" y="84" width="58" height="3" fill="#cc6622"/>
    <text fill="#e0e0e0" font-size="9" x="70" y="85">Breaking (orange) — crumbles on land</text>

    <!-- Spring -->
    <rect x="0" y="105" width="58" height="12" fill="#44ff66"/>
    <rect x="0" y="114" width="58" height="3" fill="#22aa44"/>
    <rect x="23" y="95" width="12" height="10" fill="#ffd700"/>
    <rect x="22" y="93" width="14" height="3" fill="#ffd700"/>
    <text fill="#e0e0e0" font-size="9" x="70" y="115">Spring (yellow coil) — extra bounce</text>
  </g>

  <!-- Right: Spawn chances -->
  <g transform="translate(320, 45)">
    <text fill="#44aaff" font-size="11" font-weight="bold" y="0">Spawn Chances (height &gt; 500px)</text>

    <!-- Bar chart -->
    <rect x="0" y="20" width="195" height="18" fill="#44ff66" opacity="0.8"/>
    <text fill="#0a0a16" font-size="9" x="5" y="33">Normal — 65%</text>

    <rect x="0" y="42" width="60" height="18" fill="#44aaff" opacity="0.8"/>
    <text fill="#0a0a16" font-size="9" x="5" y="55">Moving — 20%</text>

    <rect x="0" y="64" width="30" height="18" fill="#ff8844" opacity="0.8"/>
    <text fill="#e0e0e0" font-size="9" x="35" y="77">Breaking — 10%</text>

    <rect x="0" y="86" width="15" height="18" fill="#ffd700" opacity="0.8"/>
    <text fill="#e0e0e0" font-size="9" x="20" y="99">Spring — 5%</text>

    <text fill="#666" font-size="8" x="0" y="120">Below 500px height: 100% normal</text>
  </g>

  <!-- Bottom: Gap formula -->
  <g transform="translate(20, 195)">
    <text fill="#44aaff" font-size="11" font-weight="bold" y="0">Difficulty Ramp</text>

    <text fill="#e0e0e0" font-size="10" y="22">Platform gap increases with height:</text>
    <text fill="#ffd700" font-size="10" y="40">gap = baseGap + height × difficultyRate</text>
    <text fill="#ffd700" font-size="10" y="56">gap = 60 + height × 0.0003</text>
    <text fill="#e0e0e0" font-size="10" y="74">Capped at maxGap = 110px</text>
  </g>

  <!-- Gap visualization -->
  <g transform="translate(380, 195)">
    <text fill="#888" font-size="9" y="0">Height 0</text>
    <rect x="70" y="-8" width="40" height="8" fill="#44ff66"/>
    <text fill="#888" font-size="8" x="115" y="0">60px gap</text>

    <text fill="#888" font-size="9" y="30">Height 5000</text>
    <rect x="70" y="22" width="40" height="8" fill="#44ff66"/>
    <text fill="#888" font-size="8" x="115" y="30">62px gap</text>

    <text fill="#888" font-size="9" y="60">Height 100k</text>
    <rect x="70" y="52" width="40" height="8" fill="#44ff66"/>
    <text fill="#888" font-size="8" x="115" y="60">90px gap</text>

    <text fill="#888" font-size="9" y="80">Height 166k+</text>
    <rect x="70" y="72" width="40" height="8" fill="#ff4444"/>
    <text fill="#888" font-size="8" x="115" y="80">110px (max)</text>
  </g>

  <rect width="600" height="280" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
