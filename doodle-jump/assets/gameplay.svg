<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 520" width="380" height="520">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <!-- Background -->
  <rect width="380" height="520" fill="#0a0a16" rx="6"/>

  <!-- Game area border -->
  <rect x="20" y="20" width="340" height="480" fill="#0e0e1a" stroke="#2a2a40" stroke-width="1" rx="2"/>

  <!-- Subtle grid lines -->
  <g stroke="#161625" stroke-width="0.5" fill="none">
    <line x1="20" y1="60" x2="360" y2="60"/>
    <line x1="20" y1="100" x2="360" y2="100"/>
    <line x1="20" y1="140" x2="360" y2="140"/>
    <line x1="20" y1="180" x2="360" y2="180"/>
    <line x1="20" y1="220" x2="360" y2="220"/>
    <line x1="20" y1="260" x2="360" y2="260"/>
    <line x1="20" y1="300" x2="360" y2="300"/>
    <line x1="20" y1="340" x2="360" y2="340"/>
    <line x1="20" y1="380" x2="360" y2="380"/>
    <line x1="20" y1="420" x2="360" y2="420"/>
    <line x1="20" y1="460" x2="360" y2="460"/>
  </g>

  <!-- Stars -->
  <g fill="#ffffff" shape-rendering="crispEdges">
    <rect x="45" y="35" width="2" height="2" opacity="0.3"/>
    <rect x="120" y="55" width="2" height="2" opacity="0.4"/>
    <rect x="280" y="30" width="2" height="2" opacity="0.25"/>
    <rect x="310" y="80" width="2" height="2" opacity="0.35"/>
    <rect x="60" y="120" width="2" height="2" opacity="0.3"/>
    <rect x="200" y="150" width="2" height="2" opacity="0.2"/>
    <rect x="340" y="200" width="2" height="2" opacity="0.3"/>
    <rect x="50" y="250" width="2" height="2" opacity="0.25"/>
    <rect x="330" y="310" width="2" height="2" opacity="0.35"/>
  </g>

  <!-- Platforms (bottom to top, realistic gameplay state) -->
  <g shape-rendering="crispEdges">
    <!-- Platform 1: Normal (bottom) -->
    <rect x="100" y="460" width="58" height="12" fill="#44ff66"/>
    <rect x="100" y="460" width="58" height="2" fill="#88ffaa" opacity="0.4"/>
    <rect x="100" y="469" width="58" height="3" fill="#22aa44"/>

    <!-- Platform 2: Normal -->
    <rect x="220" y="405" width="58" height="12" fill="#44ff66"/>
    <rect x="220" y="405" width="58" height="2" fill="#88ffaa" opacity="0.4"/>
    <rect x="220" y="414" width="58" height="3" fill="#22aa44"/>

    <!-- Platform 3: Moving (blue) -->
    <rect x="60" y="345" width="58" height="12" fill="#44aaff"/>
    <rect x="60" y="345" width="58" height="2" fill="#88ccff" opacity="0.4"/>
    <rect x="60" y="354" width="58" height="3" fill="#2266cc"/>

    <!-- Platform 4: Normal -->
    <rect x="250" y="285" width="58" height="12" fill="#44ff66"/>
    <rect x="250" y="285" width="58" height="2" fill="#88ffaa" opacity="0.4"/>
    <rect x="250" y="294" width="58" height="3" fill="#22aa44"/>

    <!-- Platform 5: Breaking (orange) — cracked -->
    <rect x="140" y="225" width="58" height="12" fill="#ff8844"/>
    <rect x="140" y="225" width="58" height="2" fill="#ffaa66" opacity="0.4"/>
    <rect x="140" y="234" width="58" height="3" fill="#cc6622"/>
    <line x1="155" y1="227" x2="165" y2="235" stroke="#cc6622" stroke-width="1"/>

    <!-- Platform 6: Normal -->
    <rect x="50" y="165" width="58" height="12" fill="#44ff66"/>
    <rect x="50" y="165" width="58" height="2" fill="#88ffaa" opacity="0.4"/>
    <rect x="50" y="174" width="58" height="3" fill="#22aa44"/>

    <!-- Platform 7: Spring (green + spring coil) -->
    <rect x="230" y="105" width="58" height="12" fill="#44ff66"/>
    <rect x="230" y="105" width="58" height="2" fill="#88ffaa" opacity="0.4"/>
    <rect x="230" y="114" width="58" height="3" fill="#22aa44"/>
    <!-- Spring coil -->
    <rect x="253" y="95" width="12" height="10" fill="#ffd700"/>
    <rect x="252" y="93" width="14" height="3" fill="#ffd700"/>
    <rect x="254" y="98" width="10" height="2" fill="#b89a00"/>
    <rect x="255" y="101" width="8" height="2" fill="#b89a00"/>

    <!-- Platform 8: Normal -->
    <rect x="100" y="50" width="58" height="12" fill="#44ff66"/>
    <rect x="100" y="50" width="58" height="2" fill="#88ffaa" opacity="0.4"/>
    <rect x="100" y="59" width="58" height="3" fill="#22aa44"/>

    <!-- Player (on platform 4, jumping upward) -->
    <g transform="translate(280, 280)">
      <rect x="-12" y="-28" width="24" height="28" rx="4" fill="#44ff66"/>
      <rect x="-8" y="-12" width="16" height="8" fill="#22aa44"/>
      <circle cx="-2" cy="-18" r="4" fill="#ffffff"/>
      <circle cx="-0.5" cy="-18" r="2" fill="#0a0a16"/>
      <circle cx="8" cy="-18" r="4" fill="#ffffff"/>
      <circle cx="9.5" cy="-18" r="2" fill="#0a0a16"/>
      <rect x="5" y="-12" width="3" height="2" fill="#88ffaa"/>
      <rect x="-8" y="-3" width="6" height="3" fill="#22aa44"/>
      <rect x="2" y="-3" width="6" height="3" fill="#22aa44"/>
    </g>
  </g>

  <!-- Height markers -->
  <text fill="#333344" font-size="8" text-anchor="end" x="355" y="463">0m</text>
  <text fill="#333344" font-size="8" text-anchor="end" x="355" y="263">50m</text>
  <text fill="#333344" font-size="8" text-anchor="end" x="355" y="63">100m</text>

  <!-- HUD overlay -->
  <rect x="20" y="20" width="340" height="24" fill="#0a0a16" opacity="0.8"/>
  <text fill="#666" font-size="10" x="30" y="36">SCORE</text>
  <text fill="#ffd700" font-size="10" x="75" y="36">4280</text>
  <text fill="#666" font-size="10" x="260" y="36">BEST</text>
  <text fill="#ffd700" font-size="10" x="295" y="36">12450</text>

  <!-- Border -->
  <rect width="380" height="520" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
