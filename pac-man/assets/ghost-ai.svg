<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#0a0a16" rx="6"/>
  <defs>
    <marker id="ai-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>

  <text font-family="monospace" font-size="14" fill="#ffd700" font-weight="bold" text-anchor="middle" x="300" y="25">Ghost AI — Chase Mode Targeting</text>

  <!-- Blinky -->
  <g transform="translate(30, 50)">
    <rect width="260" height="140" fill="#12121f" stroke="#ff0000" stroke-width="1.5" rx="4"/>
    <text font-family="monospace" font-size="11" fill="#ff0000" font-weight="bold" x="10" y="20">Blinky (Red) — Shadow</text>
    <text font-family="monospace" font-size="9" fill="#e0e0e0" x="10" y="40">Target: Pac-Man's current tile</text>
    <text font-family="monospace" font-size="9" fill="#888" x="10" y="58">Direct pursuit — always chases</text>
    <text font-family="monospace" font-size="9" fill="#888" x="10" y="73">the player's exact position.</text>
    <!-- Mini diagram -->
    <g transform="translate(30, 85)">
      <circle cx="0" cy="0" r="6" fill="#ffff00"/>
      <text font-family="monospace" font-size="6" fill="#ffff00" x="-2" y="3">P</text>
      <line x1="80" y1="0" x2="8" y2="0" stroke="#ff0000" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ai-arrow)"/>
      <path d="M 80 -6 A 6 6 0 0 1 86 0 L 86 4 L 84 2 L 82 4 L 80 2 L 78 4 L 76 2 L 74 4 Z" fill="#ff0000" transform="translate(0,-1)"/>
    </g>
  </g>

  <!-- Pinky -->
  <g transform="translate(310, 50)">
    <rect width="260" height="140" fill="#12121f" stroke="#ffb8ff" stroke-width="1.5" rx="4"/>
    <text font-family="monospace" font-size="11" fill="#ffb8ff" font-weight="bold" x="10" y="20">Pinky (Pink) — Speedy</text>
    <text font-family="monospace" font-size="9" fill="#e0e0e0" x="10" y="40">Target: 4 tiles ahead of Pac-Man</text>
    <text font-family="monospace" font-size="9" fill="#888" x="10" y="58">Ambush strategy — tries to get</text>
    <text font-family="monospace" font-size="9" fill="#888" x="10" y="73">in front of the player.</text>
    <!-- Mini diagram -->
    <g transform="translate(30, 85)">
      <circle cx="0" cy="0" r="6" fill="#ffff00"/>
      <text font-family="monospace" font-size="6" fill="#ffff00" x="-2" y="3">P</text>
      <line x1="0" y1="0" x2="60" y2="0" stroke="#ffff00" stroke-width="0.5" stroke-dasharray="2,2"/>
      <circle cx="60" cy="0" r="4" fill="none" stroke="#ffb8ff" stroke-width="1" stroke-dasharray="2,1"/>
      <text font-family="monospace" font-size="6" fill="#ffb8ff" x="50" y="-8">+4</text>
      <line x1="140" y1="0" x2="66" y2="0" stroke="#ffb8ff" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ai-arrow)"/>
      <path d="M 140 -6 A 6 6 0 0 1 146 0 L 146 4 L 144 2 L 142 4 L 140 2 L 138 4 L 136 2 L 134 4 Z" fill="#ffb8ff" transform="translate(0,-1)"/>
    </g>
  </g>

  <!-- Inky -->
  <g transform="translate(30, 210)">
    <rect width="260" height="160" fill="#12121f" stroke="#00ffff" stroke-width="1.5" rx="4"/>
    <text font-family="monospace" font-size="11" fill="#00ffff" font-weight="bold" x="10" y="20">Inky (Cyan) — Bashful</text>
    <text font-family="monospace" font-size="9" fill="#e0e0e0" x="10" y="40">Target: 2× vector from Blinky</text>
    <text font-family="monospace" font-size="9" fill="#e0e0e0" x="10" y="55">through 2 tiles ahead of Pac-Man</text>
    <text font-family="monospace" font-size="9" fill="#888" x="10" y="73">Unpredictable — depends on both</text>
    <text font-family="monospace" font-size="9" fill="#888" x="10" y="88">Blinky and Pac-Man positions.</text>
    <!-- Mini diagram -->
    <g transform="translate(30, 100)">
      <circle cx="0" cy="0" r="6" fill="#ffff00"/>
      <text font-family="monospace" font-size="6" fill="#ffff00" x="-2" y="3">P</text>
      <circle cx="30" cy="0" r="3" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="1,1"/>
      <text font-family="monospace" font-size="5" fill="#888" x="22" y="-6">+2</text>
      <path d="M 80 20 A 6 6 0 0 1 86 26 L 86 30 L 84 28 L 82 30 L 80 28 L 78 30 L 76 28 L 74 30 Z" fill="#ff0000" transform="translate(-6,-27)"/>
      <text font-family="monospace" font-size="5" fill="#ff0000" x="68" y="-2">B</text>
      <line x1="74" y1="0" x2="32" y2="0" stroke="#888" stroke-width="0.5" stroke-dasharray="2,1"/>
      <line x1="30" y1="0" x2="-14" y2="0" stroke="#00ffff" stroke-width="0.5" stroke-dasharray="2,1"/>
      <circle cx="-14" cy="0" r="4" fill="none" stroke="#00ffff" stroke-width="1" stroke-dasharray="2,1"/>
      <text font-family="monospace" font-size="5" fill="#00ffff" x="-22" y="-8">T</text>
    </g>
  </g>

  <!-- Clyde -->
  <g transform="translate(310, 210)">
    <rect width="260" height="160" fill="#12121f" stroke="#ffb852" stroke-width="1.5" rx="4"/>
    <text font-family="monospace" font-size="11" fill="#ffb852" font-weight="bold" x="10" y="20">Clyde (Orange) — Pokey</text>
    <text font-family="monospace" font-size="9" fill="#e0e0e0" x="10" y="40">Target: Pac-Man if &gt;8 tiles away</text>
    <text font-family="monospace" font-size="9" fill="#e0e0e0" x="10" y="55">Scatter corner if ≤8 tiles away</text>
    <text font-family="monospace" font-size="9" fill="#888" x="10" y="73">Shy — chases from afar but</text>
    <text font-family="monospace" font-size="9" fill="#888" x="10" y="88">retreats when getting close.</text>
    <!-- Mini diagram -->
    <g transform="translate(30, 100)">
      <circle cx="0" cy="0" r="6" fill="#ffff00"/>
      <text font-family="monospace" font-size="6" fill="#ffff00" x="-2" y="3">P</text>
      <!-- Distance circle -->
      <circle cx="0" cy="0" r="40" fill="none" stroke="#ffb852" stroke-width="0.5" stroke-dasharray="3,2"/>
      <text font-family="monospace" font-size="5" fill="#ffb852" x="28" y="-30">8 tiles</text>
      <!-- Ghost far away (chasing) -->
      <path d="M 80 -20 A 6 6 0 0 1 86 -14 L 86 -10 L 84 -12 L 82 -10 L 80 -12 L 78 -10 L 76 -12 L 74 -10 Z" fill="#ffb852" transform="translate(-6,0)"/>
      <line x1="74" y1="-14" x2="8" y2="-2" stroke="#ffb852" stroke-width="0.5" stroke-dasharray="2,1"/>
      <text font-family="monospace" font-size="5" fill="#ffb852" x="80" y="-16">far→chase</text>
      <!-- Ghost close (scattering) -->
      <path d="M 20 30 A 6 6 0 0 1 26 36 L 26 40 L 24 38 L 22 40 L 20 38 L 18 40 L 16 38 L 14 40 Z" fill="#ffb852" transform="translate(-6,0)" opacity="0.5"/>
      <text font-family="monospace" font-size="5" fill="#ffb852" x="30" y="38">close→scatter</text>
    </g>
  </g>

  <rect width="600" height="400" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
