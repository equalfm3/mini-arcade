<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #000000; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #ffff00; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Maze grid lines (subtle) -->
  <g stroke="#0a0a3a" stroke-width="0.5" fill="none">
    <line x1="0" y1="14" x2="240" y2="14"/><line x1="0" y1="28" x2="240" y2="28"/>
    <line x1="0" y1="42" x2="240" y2="42"/><line x1="0" y1="56" x2="240" y2="56"/>
    <line x1="0" y1="70" x2="240" y2="70"/><line x1="0" y1="84" x2="240" y2="84"/>
    <line x1="0" y1="98" x2="240" y2="98"/><line x1="0" y1="112" x2="240" y2="112"/>
    <line x1="0" y1="126" x2="240" y2="126"/><line x1="0" y1="140" x2="240" y2="140"/>
    <line x1="0" y1="154" x2="240" y2="154"/><line x1="0" y1="168" x2="240" y2="168"/>
    <line x1="0" y1="182" x2="240" y2="182"/>
    <line x1="14" y1="0" x2="14" y2="200"/><line x1="28" y1="0" x2="28" y2="200"/>
    <line x1="42" y1="0" x2="42" y2="200"/><line x1="56" y1="0" x2="56" y2="200"/>
    <line x1="70" y1="0" x2="70" y2="200"/><line x1="84" y1="0" x2="84" y2="200"/>
    <line x1="98" y1="0" x2="98" y2="200"/><line x1="112" y1="0" x2="112" y2="200"/>
    <line x1="126" y1="0" x2="126" y2="200"/><line x1="140" y1="0" x2="140" y2="200"/>
    <line x1="154" y1="0" x2="154" y2="200"/><line x1="168" y1="0" x2="168" y2="200"/>
    <line x1="182" y1="0" x2="182" y2="200"/><line x1="196" y1="0" x2="196" y2="200"/>
    <line x1="210" y1="0" x2="210" y2="200"/><line x1="224" y1="0" x2="224" y2="200"/>
  </g>

  <!-- Maze walls (left side decoration) -->
  <g stroke="#2121de" stroke-width="2" fill="none">
    <!-- Top wall -->
    <path d="M 14 14 L 224 14 L 224 56 L 182 56 L 182 42 L 154 42 L 154 56 L 84 56 L 84 42 L 56 42 L 56 56 L 14 56 Z"/>
    <!-- Middle section -->
    <rect x="56" y="70" width="42" height="28" rx="2"/>
    <rect x="140" y="70" width="42" height="28" rx="2"/>
    <!-- Bottom wall -->
    <path d="M 14 112 L 56 112 L 56 126 L 84 126 L 84 112 L 154 112 L 154 126 L 182 126 L 182 112 L 224 112 L 224 182 L 14 182 Z"/>
    <!-- Ghost house -->
    <rect x="84" y="126" width="70" height="28" rx="2"/>
    <line x1="112" y1="126" x2="126" y2="126" stroke="#ffb8ff" stroke-width="2"/>
  </g>

  <!-- Pellets -->
  <g fill="#ffb8ae">
    <circle cx="35" cy="63" r="2"/><circle cx="49" cy="63" r="2"/>
    <circle cx="35" cy="77" r="2"/><circle cx="35" cy="91" r="2"/>
    <circle cx="35" cy="105" r="2"/>
    <circle cx="119" cy="63" r="2"/><circle cx="133" cy="63" r="2"/>
    <circle cx="203" cy="63" r="2"/><circle cx="203" cy="77" r="2"/>
    <circle cx="203" cy="91" r="2"/><circle cx="203" cy="105" r="2"/>
  </g>

  <!-- Power pellets -->
  <g fill="#ffb8ae">
    <circle cx="21" cy="49" r="4"/><circle cx="217" cy="49" r="4"/>
  </g>

  <!-- Pac-Man -->
  <g transform="translate(119, 105)">
    <path d="M 0 0 L 8 -6 A 8 8 0 1 1 8 6 Z" fill="#ffff00"/>
  </g>

  <!-- Ghosts -->
  <!-- Blinky (red) -->
  <g transform="translate(147, 91)">
    <path d="M -6 0 A 6 6 0 0 1 6 0 L 6 5 L 4 3 L 2 5 L 0 3 L -2 5 L -4 3 L -6 5 Z" fill="#ff0000"/>
    <circle cx="-2" cy="-1" r="2" fill="white"/><circle cx="2" cy="-1" r="2" fill="white"/>
    <circle cx="-1" cy="-1" r="1" fill="#2121de"/><circle cx="3" cy="-1" r="1" fill="#2121de"/>
  </g>
  <!-- Pinky (pink) -->
  <g transform="translate(161, 91)">
    <path d="M -6 0 A 6 6 0 0 1 6 0 L 6 5 L 4 3 L 2 5 L 0 3 L -2 5 L -4 3 L -6 5 Z" fill="#ffb8ff"/>
    <circle cx="-2" cy="-1" r="2" fill="white"/><circle cx="2" cy="-1" r="2" fill="white"/>
    <circle cx="-1" cy="-1" r="1" fill="#2121de"/><circle cx="3" cy="-1" r="1" fill="#2121de"/>
  </g>
  <!-- Inky (cyan) -->
  <g transform="translate(175, 91)">
    <path d="M -6 0 A 6 6 0 0 1 6 0 L 6 5 L 4 3 L 2 5 L 0 3 L -2 5 L -4 3 L -6 5 Z" fill="#00ffff"/>
    <circle cx="-2" cy="-1" r="2" fill="white"/><circle cx="2" cy="-1" r="2" fill="white"/>
    <circle cx="-1" cy="-1" r="1" fill="#2121de"/><circle cx="3" cy="-1" r="1" fill="#2121de"/>
  </g>
  <!-- Clyde (orange) -->
  <g transform="translate(189, 91)">
    <path d="M -6 0 A 6 6 0 0 1 6 0 L 6 5 L 4 3 L 2 5 L 0 3 L -2 5 L -4 3 L -6 5 Z" fill="#ffb852"/>
    <circle cx="-2" cy="-1" r="2" fill="white"/><circle cx="2" cy="-1" r="2" fill="white"/>
    <circle cx="-1" cy="-1" r="1" fill="#2121de"/><circle cx="3" cy="-1" r="1" fill="#2121de"/>
  </g>

  <!-- Pixel icon (pac-man from icons.js) -->
  <g transform="translate(280, 30)" shape-rendering="crispEdges">
    <!-- Pac-Man pixel icon approximation -->
    <rect x="6" y="1.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="7.5" y="1.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="9" y="1.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="4.5" y="3" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="6" y="3" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="7.5" y="3" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="9" y="3" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="10.5" y="3" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="3" y="4.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="4.5" y="4.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="6" y="4.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="7.5" y="4.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="3" y="6" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="4.5" y="6" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="6" y="6" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="3" y="7.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="4.5" y="7.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="6" y="7.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="7.5" y="7.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="3" y="9" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="4.5" y="9" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="6" y="9" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="7.5" y="9" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="9" y="9" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="10.5" y="9" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="4.5" y="10.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="6" y="10.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="7.5" y="10.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="9" y="10.5" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="6" y="12" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="7.5" y="12" width="1.5" height="1.5" fill="#ffff00"/>
    <rect x="9" y="12" width="1.5" height="1.5" fill="#ffff00"/>
  </g>

  <!-- Title -->
  <text class="title" x="340" y="95">PAC-MAN</text>
  <text class="sub" x="340" y="125">Navigate · Eat · Survive</text>

  <!-- Score HUD mock -->
  <g transform="translate(340, 145)">
    <rect width="280" height="30" fill="#0a0a16" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">3280</text>
    <text font-family="monospace" font-size="9" fill="#666" x="120" y="19">LIVES</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="165" y="19">3</text>
    <text font-family="monospace" font-size="9" fill="#666" x="200" y="19">LVL</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="230" y="19">1</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
