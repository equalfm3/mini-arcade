<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160" width="700" height="160">
  <rect width="700" height="160" fill="#0a0a16" rx="6"/>

  <g>
    <!-- Background -->
    <rect x="20" y="30" width="45" height="45" fill="#000000" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="7" fill="#666" text-anchor="middle" x="42" y="95">Background</text>
    <text font-family="monospace" font-size="6" fill="#888" text-anchor="middle" x="42" y="107">#000000</text>

    <!-- Pac-Man yellow -->
    <rect x="85" y="30" width="45" height="45" fill="#ffff00" rx="3"/>
    <text font-family="monospace" font-size="7" fill="#e0e0e0" text-anchor="middle" x="107" y="95">Pac-Man</text>
    <text font-family="monospace" font-size="6" fill="#888" text-anchor="middle" x="107" y="107">#ffff00</text>

    <!-- Maze blue -->
    <rect x="150" y="30" width="45" height="45" fill="#2121de" rx="3"/>
    <text font-family="monospace" font-size="7" fill="#e0e0e0" text-anchor="middle" x="172" y="95">Maze</text>
    <text font-family="monospace" font-size="6" fill="#888" text-anchor="middle" x="172" y="107">#2121de</text>

    <!-- Pellet -->
    <rect x="215" y="30" width="45" height="45" fill="#ffb8ae" rx="3"/>
    <text font-family="monospace" font-size="7" fill="#e0e0e0" text-anchor="middle" x="237" y="95">Pellet</text>
    <text font-family="monospace" font-size="6" fill="#888" text-anchor="middle" x="237" y="107">#ffb8ae</text>

    <!-- Blinky red -->
    <rect x="280" y="30" width="45" height="45" fill="#ff0000" rx="3"/>
    <text font-family="monospace" font-size="7" fill="#e0e0e0" text-anchor="middle" x="302" y="95">Blinky</text>
    <text font-family="monospace" font-size="6" fill="#888" text-anchor="middle" x="302" y="107">#ff0000</text>

    <!-- Pinky pink -->
    <rect x="345" y="30" width="45" height="45" fill="#ffb8ff" rx="3"/>
    <text font-family="monospace" font-size="7" fill="#e0e0e0" text-anchor="middle" x="367" y="95">Pinky</text>
    <text font-family="monospace" font-size="6" fill="#888" text-anchor="middle" x="367" y="107">#ffb8ff</text>

    <!-- Inky cyan -->
    <rect x="410" y="30" width="45" height="45" fill="#00ffff" rx="3"/>
    <text font-family="monospace" font-size="7" fill="#e0e0e0" text-anchor="middle" x="432" y="95">Inky</text>
    <text font-family="monospace" font-size="6" fill="#888" text-anchor="middle" x="432" y="107">#00ffff</text>

    <!-- Clyde orange -->
    <rect x="475" y="30" width="45" height="45" fill="#ffb852" rx="3"/>
    <text font-family="monospace" font-size="7" fill="#e0e0e0" text-anchor="middle" x="497" y="95">Clyde</text>
    <text font-family="monospace" font-size="6" fill="#888" text-anchor="middle" x="497" y="107">#ffb852</text>

    <!-- Frightened blue -->
    <rect x="540" y="30" width="45" height="45" fill="#2121ff" rx="3"/>
    <text font-family="monospace" font-size="7" fill="#e0e0e0" text-anchor="middle" x="562" y="95">Scared</text>
    <text font-family="monospace" font-size="6" fill="#888" text-anchor="middle" x="562" y="107">#2121ff</text>

    <!-- HUD gold -->
    <rect x="605" y="30" width="45" height="45" fill="#ffd700" rx="3"/>
    <text font-family="monospace" font-size="7" fill="#e0e0e0" text-anchor="middle" x="627" y="95">HUD</text>
    <text font-family="monospace" font-size="6" fill="#888" text-anchor="middle" x="627" y="107">#ffd700</text>
  </g>

  <text font-family="monospace" font-size="9" fill="#444" text-anchor="middle" x="350" y="145">All colors defined in src/config.js</text>

  <rect width="700" height="160" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
