<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 320" width="620" height="320">
  <rect width="620" height="320" fill="#0a0a16" rx="6"/>

  <text font-family="monospace" font-size="13" fill="#ffff00" font-weight="bold" x="30" y="30">pac-man/</text>

  <g font-family="monospace" font-size="11">
    <text fill="#e0e0e0" x="30" y="55">├── index.html</text>
    <text fill="#666" x="250" y="55">Entry point — GAME config + loader</text>

    <text fill="#e0e0e0" x="30" y="75">├── style.css</text>
    <text fill="#666" x="250" y="75">Accent color override (--c-game)</text>

    <text fill="#e0e0e0" x="30" y="95">├── game.js</text>
    <text fill="#666" x="250" y="95">Orchestrator — input, scoring, lives</text>

    <text fill="#ffff00" x="30" y="120">├── src/</text>

    <text fill="#e0e0e0" x="30" y="140">│   ├── config.js</text>
    <text fill="#666" x="250" y="140">All constants — speeds, sizes, colors</text>

    <text fill="#e0e0e0" x="30" y="160">│   ├── maze.js</text>
    <text fill="#666" x="250" y="160">28×31 tile layout + BFS pathfinding</text>

    <text fill="#e0e0e0" x="30" y="180">│   ├── pellets.js</text>
    <text fill="#666" x="250" y="180">Pellet state, eating, blink animation</text>

    <text fill="#e0e0e0" x="30" y="200">│   ├── player.js</text>
    <text fill="#666" x="250" y="200">Pac-Man movement + mouth animation</text>

    <text fill="#e0e0e0" x="30" y="220">│   ├── ghosts.js</text>
    <text fill="#666" x="250" y="220">4 ghost AI — scatter/chase/frightened</text>

    <text fill="#e0e0e0" x="30" y="240">│   └── renderer.js</text>
    <text fill="#666" x="250" y="240">Maze walls, HUD, ready text</text>

    <text fill="#ffff00" x="30" y="265">├── assets/</text>
    <text fill="#666" x="250" y="265">SVG images for README</text>

    <text fill="#e0e0e0" x="30" y="285">└── README.md</text>
    <text fill="#666" x="250" y="285">Full documentation</text>
  </g>

  <rect width="620" height="320" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
