<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 42px; font-weight: bold; fill: #c084fc; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid-line { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>
  <!-- Subtle grid -->
  <g class="grid-line" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- 8×8 pixel art heart on the left -->
  <g transform="translate(30, 15)" shape-rendering="crispEdges">
    <!-- Row 0: empty -->
    <!-- Row 1: heart shape in red -->
    <rect x="22" y="22" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="44" y="22" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="88" y="22" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="110" y="22" width="20" height="20" fill="#ff4444" rx="2"/>
    <!-- Row 2 -->
    <rect x="0" y="44" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="22" y="44" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="44" y="44" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="66" y="44" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="88" y="44" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="110" y="44" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="132" y="44" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="154" y="44" width="20" height="20" fill="#ff4444" rx="2"/>
    <!-- Row 3 -->
    <rect x="0" y="66" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="22" y="66" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="44" y="66" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="66" y="66" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="88" y="66" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="110" y="66" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="132" y="66" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="154" y="66" width="20" height="20" fill="#ff4444" rx="2"/>
    <!-- Row 4 -->
    <rect x="22" y="88" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="44" y="88" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="66" y="88" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="88" y="88" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="110" y="88" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="132" y="88" width="20" height="20" fill="#ff4444" rx="2"/>
    <!-- Row 5 -->
    <rect x="44" y="110" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="66" y="110" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="88" y="110" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="110" y="110" width="20" height="20" fill="#ff4444" rx="2"/>
    <!-- Row 6 -->
    <rect x="66" y="132" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="88" y="132" width="20" height="20" fill="#ff4444" rx="2"/>
    <!-- Empty cells as dark squares -->
    <rect x="0" y="0" width="20" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="22" y="0" width="20" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="44" y="0" width="20" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="66" y="0" width="20" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="88" y="0" width="20" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="110" y="0" width="20" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="132" y="0" width="20" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="154" y="0" width="20" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="0" y="22" width="20" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="66" y="22" width="20" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="132" y="22" width="20" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="154" y="22" width="20" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
  </g>

  <!-- Color palette dots -->
  <g transform="translate(30, 172)">
    <rect x="0" y="0" width="16" height="16" fill="#ff4444" rx="3"/>
    <rect x="20" y="0" width="16" height="16" fill="#ff8844" rx="3"/>
    <rect x="40" y="0" width="16" height="16" fill="#ffd700" rx="3"/>
    <rect x="60" y="0" width="16" height="16" fill="#44ff66" rx="3"/>
    <rect x="80" y="0" width="16" height="16" fill="#44aaff" rx="3"/>
    <rect x="100" y="0" width="16" height="16" fill="#c084fc" rx="3"/>
  </g>

  <!-- Pixel icon from icons.js -->
  <g transform="translate(240, 30)" shape-rendering="crispEdges">
    <rect x="0" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="1.5" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="4.5" y="0" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="6" y="0" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="9" y="0" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="10.5" y="0" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="13.5" y="0" width="1.5" height="1.5" fill="#44aaff"/>
    <rect x="15" y="0" width="1.5" height="1.5" fill="#44aaff"/>
    <rect x="18" y="0" width="1.5" height="1.5" fill="#c084fc"/>
    <rect x="19.5" y="0" width="1.5" height="1.5" fill="#c084fc"/>
  </g>

  <!-- Title -->
  <text class="title" x="300" y="95">PIXEL PAINTER</text>
  <text class="sub" x="300" y="120">Memorize · Paint · Score</text>

  <!-- HUD mock -->
  <g transform="translate(300, 138)">
    <rect width="280" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">ACCURACY</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="75" y="19">92%</text>
    <text font-family="monospace" font-size="9" fill="#666" x="130" y="19">LEVEL</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="175" y="19">3</text>
    <text font-family="monospace" font-size="9" fill="#666" x="210" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="255" y="19">2400</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
