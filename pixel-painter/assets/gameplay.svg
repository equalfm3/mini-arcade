<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="400" height="500" fill="#0a0a16" rx="6"/>

  <!-- Phase label -->
  <text fill="#e0e0e0" font-size="14" font-weight="bold" x="200" y="24" text-anchor="middle">PAINT IT!</text>
  <text fill="#666" font-size="10" x="200" y="38" text-anchor="middle">Smiley</text>

  <!-- 8×8 grid — player is mid-painting a smiley face -->
  <!-- Grid background -->
  <rect x="48" y="48" width="304" height="304" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="6"/>

  <g transform="translate(52, 52)" shape-rendering="crispEdges">
    <!-- Row 0: partially painted yellow border -->
    <rect x="0" y="0" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>
    <rect x="38" y="0" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>
    <rect x="76" y="0" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="114" y="0" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="152" y="0" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="190" y="0" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="228" y="0" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>
    <rect x="266" y="0" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>

    <!-- Row 1 -->
    <rect x="0" y="38" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>
    <rect x="38" y="38" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="76" y="38" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="114" y="38" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="152" y="38" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="190" y="38" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="228" y="38" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="266" y="38" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>

    <!-- Row 2: eyes (blue) -->
    <rect x="0" y="76" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="38" y="76" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="76" y="76" width="36" height="36" fill="#44aaff" rx="3"/>
    <rect x="114" y="76" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="152" y="76" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="190" y="76" width="36" height="36" fill="#44aaff" rx="3"/>
    <rect x="228" y="76" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="266" y="76" width="36" height="36" fill="#ffd700" rx="3"/>

    <!-- Row 3: eyes continued -->
    <rect x="0" y="114" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="38" y="114" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="76" y="114" width="36" height="36" fill="#44aaff" rx="3"/>
    <rect x="114" y="114" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="152" y="114" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="190" y="114" width="36" height="36" fill="#44aaff" rx="3"/>
    <rect x="228" y="114" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="266" y="114" width="36" height="36" fill="#ffd700" rx="3"/>

    <!-- Row 4: all yellow -->
    <rect x="0" y="152" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="38" y="152" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="76" y="152" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="114" y="152" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="152" y="152" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="190" y="152" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="228" y="152" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="266" y="152" width="36" height="36" fill="#ffd700" rx="3"/>

    <!-- Row 5: mouth (red) -->
    <rect x="0" y="190" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="38" y="190" width="36" height="36" fill="#ff4444" rx="3"/>
    <rect x="76" y="190" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="114" y="190" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="152" y="190" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="190" y="190" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="228" y="190" width="36" height="36" fill="#ff4444" rx="3"/>
    <rect x="266" y="190" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>

    <!-- Row 6: mouth bottom — player hasn't finished this row -->
    <rect x="0" y="228" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>
    <rect x="38" y="228" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="76" y="228" width="36" height="36" fill="#ff4444" rx="3"/>
    <rect x="114" y="228" width="36" height="36" fill="#ff4444" rx="3"/>
    <rect x="152" y="228" width="36" height="36" fill="#ff4444" rx="3"/>
    <rect x="190" y="228" width="36" height="36" fill="#ff4444" rx="3"/>
    <rect x="228" y="228" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="266" y="228" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>

    <!-- Row 7: bottom -->
    <rect x="0" y="266" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>
    <rect x="38" y="266" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>
    <rect x="76" y="266" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="114" y="266" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="152" y="266" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="190" y="266" width="36" height="36" fill="#ffd700" rx="3"/>
    <rect x="228" y="266" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>
    <rect x="266" y="266" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5" rx="3"/>
  </g>

  <!-- Color palette -->
  <g transform="translate(56, 370)">
    <rect x="0" y="0" width="40" height="40" fill="#ff4444" rx="6"/>
    <rect x="48" y="0" width="40" height="40" fill="#ff8844" rx="6"/>
    <rect x="96" y="0" width="40" height="40" fill="#ffd700" rx="6" stroke="#fff" stroke-width="3"/>
    <rect x="144" y="0" width="40" height="40" fill="#44ff66" rx="6"/>
    <rect x="192" y="0" width="40" height="40" fill="#44aaff" rx="6"/>
    <rect x="240" y="0" width="40" height="40" fill="#c084fc" rx="6"/>
  </g>

  <!-- Submit button -->
  <rect x="140" y="430" width="120" height="36" fill="#c084fc" rx="6"/>
  <text fill="#0a0a16" font-size="14" font-weight="bold" x="200" y="453" text-anchor="middle">SUBMIT</text>

  <!-- Annotation -->
  <text fill="#666" font-size="8" x="200" y="480" text-anchor="middle">Selected: Yellow · Click cells to paint</text>

  <rect width="400" height="500" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
