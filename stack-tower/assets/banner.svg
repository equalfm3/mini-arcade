<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0a0a16; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #ff8844; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Isometric block tower (left side) -->
  <g shape-rendering="crispEdges">
    <!-- Block 1 (bottom, widest) — red hue -->
    <rect x="50" y="155" width="180" height="20" fill="hsl(0,70%,55%)"/>
    <polygon points="50,155 60,145 240,145 230,155" fill="hsl(0,70%,70%)"/>
    <polygon points="230,155 240,145 240,165 230,175" fill="hsl(0,70%,43%)"/>

    <!-- Block 2 — orange hue -->
    <rect x="60" y="135" width="160" height="20" fill="hsl(12,70%,55%)"/>
    <polygon points="60,135 70,125 230,125 220,135" fill="hsl(12,70%,70%)"/>
    <polygon points="220,135 230,125 230,145 220,155" fill="hsl(12,70%,43%)"/>

    <!-- Block 3 — yellow hue -->
    <rect x="55" y="115" width="165" height="20" fill="hsl(24,70%,55%)"/>
    <polygon points="55,115 65,105 230,105 220,115" fill="hsl(24,70%,70%)"/>
    <polygon points="220,115 230,105 230,125 220,135" fill="hsl(24,70%,43%)"/>

    <!-- Block 4 — green hue -->
    <rect x="70" y="95" width="140" height="20" fill="hsl(36,70%,55%)"/>
    <polygon points="70,95 80,85 220,85 210,95" fill="hsl(36,70%,70%)"/>
    <polygon points="210,95 220,85 220,105 210,115" fill="hsl(36,70%,43%)"/>

    <!-- Block 5 — teal hue -->
    <rect x="80" y="75" width="120" height="20" fill="hsl(48,70%,55%)"/>
    <polygon points="80,75 90,65 210,65 200,75" fill="hsl(48,70%,70%)"/>
    <polygon points="200,75 210,65 210,85 200,95" fill="hsl(48,70%,43%)"/>

    <!-- Block 6 — blue hue (sliding) -->
    <rect x="100" y="55" width="100" height="20" fill="hsl(60,70%,55%)"/>
    <polygon points="100,55 110,45 210,45 200,55" fill="hsl(60,70%,70%)"/>
    <polygon points="200,55 210,45 210,65 200,75" fill="hsl(60,70%,43%)"/>

    <!-- Sliding arrow indicator -->
    <line x1="115" y1="50" x2="185" y2="50" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
    <polygon points="185,47 192,50 185,53" fill="#ffd700" opacity="0.6"/>
  </g>

  <!-- Pixel icon (stack-tower from icons.js) -->
  <g transform="translate(260, 30)" shape-rendering="crispEdges">
    <rect x="6" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="7.5" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="9" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="10.5" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="12" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="13.5" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="6" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="7.5" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="9" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="10.5" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="12" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="13.5" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="3" y="3" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="4.5" y="3" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="6" y="3" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="7.5" y="3" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="9" y="3" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="10.5" y="3" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="12" y="3" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="13.5" y="3" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="15" y="3" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="16.5" y="3" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="3" y="4.5" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="4.5" y="4.5" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="6" y="4.5" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="7.5" y="4.5" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="9" y="4.5" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="10.5" y="4.5" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="12" y="4.5" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="13.5" y="4.5" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="15" y="4.5" width="1.5" height="1.5" fill="#ff8844"/>
    <rect x="16.5" y="4.5" width="1.5" height="1.5" fill="#ff8844"/>
  </g>

  <!-- Title -->
  <text class="title" x="340" y="90">STACK TOWER</text>
  <text class="sub" x="340" y="118">Stack · Align · Climb</text>

  <!-- Score HUD mock -->
  <g transform="translate(340, 140)">
    <rect width="240" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">18</text>
    <text font-family="monospace" font-size="9" fill="#666" x="110" y="19">BEST</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="150" y="19">32</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
