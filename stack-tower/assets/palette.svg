<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="600" height="160" fill="#0a0a16" rx="6"/>

  <!-- Color gradient blocks showing hue progression -->
  <!-- Hue 0 -->
  <rect x="25" y="25" width="55" height="50" fill="hsl(0,70%,55%)" rx="4"/>
  <rect x="25" y="25" width="55" height="12" fill="hsl(0,70%,70%)" rx="4"/>
  <text fill="#e0e0e0" font-size="9" x="30" y="95">Block 1</text>
  <text fill="#888" font-size="8" x="28" y="108">hue: 0°</text>

  <!-- Hue 36 -->
  <rect x="95" y="25" width="55" height="50" fill="hsl(36,70%,55%)" rx="4"/>
  <rect x="95" y="25" width="55" height="12" fill="hsl(36,70%,70%)" rx="4"/>
  <text fill="#e0e0e0" font-size="9" x="100" y="95">Block 4</text>
  <text fill="#888" font-size="8" x="98" y="108">hue: 36°</text>

  <!-- Hue 72 -->
  <rect x="165" y="25" width="55" height="50" fill="hsl(72,70%,55%)" rx="4"/>
  <rect x="165" y="25" width="55" height="12" fill="hsl(72,70%,70%)" rx="4"/>
  <text fill="#e0e0e0" font-size="9" x="170" y="95">Block 7</text>
  <text fill="#888" font-size="8" x="168" y="108">hue: 72°</text>

  <!-- Hue 120 -->
  <rect x="235" y="25" width="55" height="50" fill="hsl(120,70%,55%)" rx="4"/>
  <rect x="235" y="25" width="55" height="12" fill="hsl(120,70%,70%)" rx="4"/>
  <text fill="#e0e0e0" font-size="9" x="237" y="95">Block 11</text>
  <text fill="#888" font-size="8" x="235" y="108">hue: 120°</text>

  <!-- Hue 180 -->
  <rect x="305" y="25" width="55" height="50" fill="hsl(180,70%,55%)" rx="4"/>
  <rect x="305" y="25" width="55" height="12" fill="hsl(180,70%,70%)" rx="4"/>
  <text fill="#e0e0e0" font-size="9" x="307" y="95">Block 16</text>
  <text fill="#888" font-size="8" x="305" y="108">hue: 180°</text>

  <!-- Hue 240 -->
  <rect x="375" y="25" width="55" height="50" fill="hsl(240,70%,55%)" rx="4"/>
  <rect x="375" y="25" width="55" height="12" fill="hsl(240,70%,70%)" rx="4"/>
  <text fill="#e0e0e0" font-size="9" x="377" y="95">Block 21</text>
  <text fill="#888" font-size="8" x="375" y="108">hue: 240°</text>

  <!-- Hue 300 -->
  <rect x="445" y="25" width="55" height="50" fill="hsl(300,70%,55%)" rx="4"/>
  <rect x="445" y="25" width="55" height="12" fill="hsl(300,70%,70%)" rx="4"/>
  <text fill="#e0e0e0" font-size="9" x="447" y="95">Block 26</text>
  <text fill="#888" font-size="8" x="445" y="108">hue: 300°</text>

  <!-- Background swatch -->
  <rect x="530" y="25" width="50" height="50" fill="#0a0a16" stroke="#2a2a40" stroke-width="1" rx="4"/>
  <text fill="#e0e0e0" font-size="9" x="538" y="95">BG</text>
  <text fill="#888" font-size="8" x="530" y="108">#0a0a16</text>

  <!-- Label -->
  <text fill="#666" font-size="9" x="25" y="145">Colors cycle through HSL hue (12° per block) · Saturation 70% · Lightness 55%/70%/43%</text>

  <!-- Border -->
  <rect width="600" height="160" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
