<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0a0a16; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #44ff66; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <rect class="bg" width="800" height="200" rx="8"/>
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Card illustrations -->
  <g shape-rendering="crispEdges">
    <!-- Ace of Spades -->
    <rect x="30" y="30" width="60" height="84" fill="#1a1a2e" rx="4"/>
    <rect x="30" y="30" width="60" height="84" fill="none" stroke="#3a3a5a" stroke-width="1" rx="4"/>
    <text font-family="monospace" font-size="12" font-weight="bold" fill="#e0e0e0" x="36" y="44">A</text>
    <text font-family="monospace" font-size="10" fill="#e0e0e0" x="36" y="56">♠</text>
    <text font-family="monospace" font-size="24" fill="#e0e0e0" text-anchor="middle" x="60" y="80">♠</text>

    <!-- 2 of Hearts -->
    <rect x="100" y="40" width="60" height="84" fill="#1a1a2e" rx="4"/>
    <rect x="100" y="40" width="60" height="84" fill="none" stroke="#3a3a5a" stroke-width="1" rx="4"/>
    <text font-family="monospace" font-size="12" font-weight="bold" fill="#ff4444" x="106" y="54">2</text>
    <text font-family="monospace" font-size="10" fill="#ff4444" x="106" y="66">♥</text>
    <text font-family="monospace" font-size="24" fill="#ff4444" text-anchor="middle" x="130" y="90">♥</text>

    <!-- King of Diamonds -->
    <rect x="170" y="50" width="60" height="84" fill="#1a1a2e" rx="4"/>
    <rect x="170" y="50" width="60" height="84" fill="none" stroke="#3a3a5a" stroke-width="1" rx="4"/>
    <text font-family="monospace" font-size="12" font-weight="bold" fill="#ff4444" x="176" y="64">K</text>
    <text font-family="monospace" font-size="10" fill="#ff4444" x="176" y="76">♦</text>
    <text font-family="monospace" font-size="24" fill="#ff4444" text-anchor="middle" x="200" y="100">♦</text>

    <!-- Face-down cards (stacked) -->
    <rect x="250" y="60" width="60" height="84" fill="#2a4a6a" rx="4"/>
    <rect x="250" y="60" width="60" height="84" fill="none" stroke="#3a3a5a" stroke-width="1" rx="4"/>
    <rect x="253" y="63" width="54" height="78" fill="none" stroke="#1a3a5a" stroke-width="1" rx="2"/>

    <rect x="256" y="55" width="60" height="84" fill="#2a4a6a" rx="4"/>
    <rect x="256" y="55" width="60" height="84" fill="none" stroke="#3a3a5a" stroke-width="1" rx="4"/>
    <rect x="259" y="58" width="54" height="78" fill="none" stroke="#1a3a5a" stroke-width="1" rx="2"/>
  </g>

  <!-- Pixel icon -->
  <g transform="translate(350, 30)" shape-rendering="crispEdges">
    <rect x="3" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="4.5" y="0" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="6" y="0" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="7.5" y="0" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="9" y="0" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="12" y="0" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="13.5" y="0" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="15" y="0" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="16.5" y="0" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="3" y="1.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="4.5" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="6" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="7.5" y="1.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="9" y="1.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="12" y="1.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="13.5" y="1.5" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="15" y="1.5" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="16.5" y="1.5" width="1.5" height="1.5" fill="#e0e0e0"/>
  </g>

  <!-- Title -->
  <text class="title" x="380" y="95">SOLITAIRE</text>
  <text class="sub" x="380" y="120">Klondike · Stack · Win</text>

  <!-- HUD mock -->
  <g transform="translate(380, 140)">
    <rect width="260" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">MOVES</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="60" y="19">42</text>
    <text font-family="monospace" font-size="9" fill="#666" x="120" y="19">TIME</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="160" y="19">3:27</text>
  </g>

  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
