<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" width="560" height="280">
  <rect width="560" height="280" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>

  <!-- IDLE box -->
  <rect x="20" y="110" width="80" height="40" fill="#12121f" stroke="#44aaff" stroke-width="2" rx="4"/>
  <text fill="#44aaff" font-size="10" x="38" y="135" font-weight="bold">IDLE</text>

  <!-- PLAYING box (contains sub-states) -->
  <rect x="140" y="20" width="280" height="240" fill="#0e0e1a" stroke="#44ff66" stroke-width="2" rx="4" stroke-dasharray="6,3"/>
  <text fill="#44ff66" font-size="10" x="150" y="38" font-weight="bold">PLAYING</text>

  <!-- Sub-states inside PLAYING -->
  <!-- TIMING -->
  <rect x="160" y="55" width="90" height="35" fill="#12121f" stroke="#ffd700" stroke-width="1.5" rx="3"/>
  <text fill="#ffd700" font-size="9" x="175" y="77" font-weight="bold">TIMING</text>

  <!-- RESOLVING -->
  <rect x="300" y="55" width="100" height="35" fill="#12121f" stroke="#ff8844" stroke-width="1.5" rx="3"/>
  <text fill="#ff8844" font-size="9" x="312" y="77" font-weight="bold">RESOLVING</text>

  <!-- RESULT -->
  <rect x="300" y="120" width="100" height="35" fill="#12121f" stroke="#c084fc" stroke-width="1.5" rx="3"/>
  <text fill="#c084fc" font-size="9" x="320" y="142" font-weight="bold">RESULT</text>

  <!-- ROUND END -->
  <rect x="160" y="120" width="100" height="35" fill="#12121f" stroke="#44aaff" stroke-width="1.5" rx="3"/>
  <text fill="#44aaff" font-size="8" x="168" y="142" font-weight="bold">ROUND END</text>

  <!-- MATCH END -->
  <rect x="220" y="190" width="110" height="35" fill="#12121f" stroke="#ff4444" stroke-width="1.5" rx="3"/>
  <text fill="#ff4444" font-size="8" x="230" y="212" font-weight="bold">MATCH END</text>

  <!-- PAUSED box -->
  <rect x="20" y="30" width="80" height="40" fill="#12121f" stroke="#ffd700" stroke-width="2" rx="4"/>
  <text fill="#ffd700" font-size="10" x="28" y="55" font-weight="bold">PAUSED</text>

  <!-- OVER box -->
  <rect x="460" y="110" width="80" height="40" fill="#12121f" stroke="#ff4444" stroke-width="2" rx="4"/>
  <text fill="#ff4444" font-size="10" x="478" y="135" font-weight="bold">OVER</text>

  <!-- Arrows -->
  <!-- idle → playing (timing) -->
  <line x1="100" y1="130" x2="138" y2="130" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="102" y="125">Start</text>

  <!-- playing ↔ paused -->
  <line x1="60" y1="110" x2="60" y2="72" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="66" y="95">Esc</text>
  <line x1="80" y1="70" x2="80" y2="108" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="84" y="95">Resume</text>

  <!-- timing → resolving (both locked) -->
  <line x1="250" y1="72" x2="298" y2="72" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="6" x="254" y="66">Both lock</text>

  <!-- resolving → result -->
  <line x1="350" y1="90" x2="350" y2="118" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="6" x="354" y="108">Resolve</text>

  <!-- result → timing (next exchange) -->
  <path d="M 300 137 Q 230 137 230 100 Q 230 72 252 72" fill="none" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="6" x="232" y="108">Next</text>

  <!-- result → round end (HP=0) -->
  <line x1="300" y1="140" x2="262" y2="140" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="6" x="264" y="135">HP=0</text>

  <!-- round end → timing (next round) -->
  <path d="M 180 120 Q 180 90 195 80" fill="none" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="6" x="155" y="100">Next rnd</text>

  <!-- round end → match end (3 wins) -->
  <line x1="230" y1="155" x2="260" y2="188" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="6" x="220" y="175">3 wins</text>

  <!-- match end → over -->
  <line x1="330" y1="207" x2="458" y2="135" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- over → idle (play again) -->
  <path d="M 500 150 Q 500 260 275 260 Q 50 260 50 152" fill="none" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="240" y="272">Play Again</text>

  <rect width="560" height="280" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
