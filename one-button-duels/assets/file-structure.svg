<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" width="620" height="220">
  <defs>
    <style>text{font-family:monospace;font-size:11px;}</style>
  </defs>
  <rect width="620" height="220" fill="#0a0a16" rx="6"/>

  <!-- Tree lines -->
  <g stroke="#2a2a40" stroke-width="1" fill="none">
    <line x1="30" y1="30" x2="30" y2="195"/>
    <line x1="30" y1="40" x2="45" y2="40"/>
    <line x1="30" y1="60" x2="45" y2="60"/>
    <line x1="30" y1="80" x2="45" y2="80"/>
    <line x1="30" y1="100" x2="45" y2="100"/>
    <line x1="60" y1="100" x2="60" y2="160"/>
    <line x1="60" y1="110" x2="75" y2="110"/>
    <line x1="60" y1="130" x2="75" y2="130"/>
    <line x1="60" y1="150" x2="75" y2="150"/>
    <line x1="30" y1="170" x2="45" y2="170"/>
    <line x1="30" y1="190" x2="45" y2="190"/>
  </g>

  <!-- Files -->
  <text fill="#44aaff" x="48" y="44">index.html</text>
  <text fill="#666" x="200" y="44">Entry point — GAME config + arcade.js loader</text>

  <text fill="#c084fc" x="48" y="64">style.css</text>
  <text fill="#666" x="200" y="64">Accent color override (--c-game: #ff4444)</text>

  <text fill="#44ff66" x="48" y="84">game.js</text>
  <text fill="#666" x="200" y="84">Orchestrator — wires combat + renderer, runs Engine</text>

  <text fill="#ffd700" x="48" y="104">src/</text>

  <text fill="#ff8844" x="78" y="114">config.js</text>
  <text fill="#666" x="200" y="114">All constants — timing, combat, colors, layout</text>

  <text fill="#ff8844" x="78" y="134">combat.js</text>
  <text fill="#666" x="200" y="134">Timing bars, action lock, resolution, rounds, AI</text>

  <text fill="#ff8844" x="78" y="154">renderer.js</text>
  <text fill="#666" x="200" y="154">Fighters, health bars, timing bars, effects</text>

  <text fill="#ffd700" x="48" y="174">assets/</text>
  <text fill="#666" x="200" y="174">SVG images for README documentation</text>

  <text fill="#44aaff" x="48" y="194">README.md</text>
  <text fill="#666" x="200" y="194">Full documentation with embedded SVGs</text>

  <rect width="620" height="220" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
