<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a16" rx="6"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.1">
    <rect x="45" y="30" width="1" height="1"/><rect x="120" y="55" width="2" height="2"/>
    <rect x="280" y="20" width="1" height="1"/><rect x="350" y="70" width="2" height="2"/>
    <rect x="60" y="300" width="1" height="1"/><rect x="330" y="280" width="2" height="2"/>
  </g>

  <!-- Round info -->
  <text fill="#666" font-size="11" text-anchor="middle" x="200" y="25">ROUND 3</text>
  <text fill="#333" font-size="14" font-weight="bold" text-anchor="middle" x="200" y="42">VS</text>

  <!-- P1 win pips -->
  <g>
    <rect x="112" y="32" width="8" height="8" fill="#ff4444" stroke="#2a2a40" stroke-width="0.5"/>
    <rect x="124" y="32" width="8" height="8" fill="#ff4444" stroke="#2a2a40" stroke-width="0.5"/>
    <rect x="136" y="32" width="8" height="8" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5"/>
  </g>
  <!-- P2 win pips -->
  <g>
    <rect x="256" y="32" width="8" height="8" fill="#44aaff" stroke="#2a2a40" stroke-width="0.5"/>
    <rect x="268" y="32" width="8" height="8" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5"/>
    <rect x="280" y="32" width="8" height="8" fill="#1a1a2e" stroke="#2a2a40" stroke-width="0.5"/>
  </g>

  <!-- P1 label + health bar -->
  <text fill="#ff4444" font-size="10" font-weight="bold" text-anchor="middle" x="100" y="134">P1</text>
  <rect x="60" y="140" width="80" height="8" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1"/>
  <rect x="61" y="141" width="52" height="6" fill="#ff4444"/>
  <rect x="86.7" y="140" width="1" height="8" fill="#0a0a16"/>
  <rect x="113.3" y="140" width="1" height="8" fill="#0a0a16"/>

  <!-- P2 label + health bar -->
  <text fill="#44aaff" font-size="10" font-weight="bold" text-anchor="middle" x="300" y="134">P2</text>
  <rect x="260" y="140" width="80" height="8" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1"/>
  <rect x="261" y="141" width="78" height="6" fill="#44aaff"/>
  <rect x="286.7" y="140" width="1" height="8" fill="#0a0a16"/>
  <rect x="313.3" y="140" width="1" height="8" fill="#0a0a16"/>

  <!-- Ground line -->
  <line x1="30" y1="260" x2="370" y2="260" stroke="#2a2a40" stroke-width="2"/>
  <!-- VS divider -->
  <rect x="199" y="180" width="2" height="80" fill="#1a1a2e"/>

  <!-- P1 Fighter (idle stance) -->
  <g transform="translate(100, 200)" shape-rendering="crispEdges">
    <rect x="-8" y="-24" width="16" height="16" fill="#ff4444"/>
    <rect x="-2" y="-20" width="3" height="3" fill="#fff"/>
    <rect x="4" y="-20" width="3" height="3" fill="#fff"/>
    <rect x="-1" y="-19" width="2" height="2" fill="#000"/>
    <rect x="5" y="-19" width="2" height="2" fill="#000"/>
    <rect x="-10" y="-6" width="20" height="16" fill="#aa2222"/>
    <rect x="-14" y="-6" width="5" height="12" fill="#ff4444"/>
    <rect x="9" y="-6" width="5" height="12" fill="#ff4444"/>
    <rect x="-8" y="10" width="6" height="14" fill="#aa2222"/>
    <rect x="2" y="10" width="6" height="14" fill="#aa2222"/>
  </g>

  <!-- P2 Fighter (idle stance) -->
  <g transform="translate(300, 200)" shape-rendering="crispEdges">
    <rect x="-8" y="-24" width="16" height="16" fill="#44aaff"/>
    <rect x="-6" y="-20" width="3" height="3" fill="#fff"/>
    <rect x="0" y="-20" width="3" height="3" fill="#fff"/>
    <rect x="-5" y="-19" width="2" height="2" fill="#000"/>
    <rect x="1" y="-19" width="2" height="2" fill="#000"/>
    <rect x="-10" y="-6" width="20" height="16" fill="#2266aa"/>
    <rect x="-14" y="-6" width="5" height="12" fill="#44aaff"/>
    <rect x="9" y="-6" width="5" height="12" fill="#44aaff"/>
    <rect x="-8" y="10" width="6" height="14" fill="#2266aa"/>
    <rect x="2" y="10" width="6" height="14" fill="#2266aa"/>
  </g>

  <!-- P1 Timing bar -->
  <g transform="translate(30, 320)">
    <!-- Zones -->
    <rect x="0" y="0" width="47.6" height="12" fill="#ff4444" opacity="0.7"/>
    <rect x="47.6" y="0" width="46.2" height="12" fill="#44aaff" opacity="0.7"/>
    <rect x="93.8" y="0" width="46.2" height="12" fill="#44ff66" opacity="0.7"/>
    <rect x="0" y="0" width="140" height="12" fill="none" stroke="#888" stroke-width="1"/>
    <!-- Zone labels -->
    <text fill="#fff" font-size="7" text-anchor="middle" x="23.8" y="9" opacity="0.8">S</text>
    <text fill="#fff" font-size="7" text-anchor="middle" x="70.7" y="9" opacity="0.8">P</text>
    <text fill="#fff" font-size="7" text-anchor="middle" x="116.9" y="9" opacity="0.8">D</text>
    <!-- Cursor -->
    <rect x="38" y="-3" width="3" height="18" fill="#fff"/>
    <rect x="39" y="-2" width="1" height="16" fill="#ffd700"/>
    <!-- Label -->
    <text fill="#ff4444" font-size="9" font-weight="bold" text-anchor="middle" x="70" y="26">P1 [Q]</text>
  </g>

  <!-- P2 Timing bar -->
  <g transform="translate(230, 320)">
    <rect x="0" y="0" width="47.6" height="12" fill="#ff4444" opacity="0.7"/>
    <rect x="47.6" y="0" width="46.2" height="12" fill="#44aaff" opacity="0.7"/>
    <rect x="93.8" y="0" width="46.2" height="12" fill="#44ff66" opacity="0.7"/>
    <rect x="0" y="0" width="140" height="12" fill="none" stroke="#888" stroke-width="1"/>
    <text fill="#fff" font-size="7" text-anchor="middle" x="23.8" y="9" opacity="0.8">S</text>
    <text fill="#fff" font-size="7" text-anchor="middle" x="70.7" y="9" opacity="0.8">P</text>
    <text fill="#fff" font-size="7" text-anchor="middle" x="116.9" y="9" opacity="0.8">D</text>
    <!-- Cursor at different position -->
    <rect x="85" y="-3" width="3" height="18" fill="#fff"/>
    <rect x="86" y="-2" width="1" height="16" fill="#ffd700"/>
    <text fill="#44aaff" font-size="9" font-weight="bold" text-anchor="middle" x="70" y="26">P2 [P]</text>
  </g>

  <!-- Speed indicator -->
  <text fill="#666" font-size="8" text-anchor="end" x="390" y="312">SPD 2.6x</text>

  <!-- Touch zone hints -->
  <line x1="200" y1="370" x2="200" y2="395" stroke="#fff" stroke-width="1" opacity="0.05" stroke-dasharray="4,4"/>
  <text fill="#ff4444" font-size="8" text-anchor="middle" x="100" y="390" opacity="0.15">TAP P1</text>
  <text fill="#44aaff" font-size="8" text-anchor="middle" x="300" y="390" opacity="0.15">TAP P2</text>

  <!-- Border -->
  <rect width="400" height="400" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
