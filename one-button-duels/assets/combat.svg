<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>
  <rect width="500" height="300" fill="#0a0a16" rx="6"/>

  <text fill="#888" font-size="14" font-weight="bold" text-anchor="middle" x="250" y="28">COMBAT RESOLUTION</text>

  <!-- Triangle of actions -->
  <!-- STRIKE (top) -->
  <rect x="210" y="50" width="80" height="35" fill="#ff4444" opacity="0.8" rx="4"/>
  <text fill="#fff" font-size="12" font-weight="bold" text-anchor="middle" x="250" y="73">STRIKE</text>

  <!-- PARRY (bottom-left) -->
  <rect x="80" y="170" width="80" height="35" fill="#44aaff" opacity="0.8" rx="4"/>
  <text fill="#fff" font-size="12" font-weight="bold" text-anchor="middle" x="120" y="193">PARRY</text>

  <!-- DODGE (bottom-right) -->
  <rect x="340" y="170" width="80" height="35" fill="#44ff66" opacity="0.8" rx="4"/>
  <text fill="#fff" font-size="12" font-weight="bold" text-anchor="middle" x="380" y="193">DODGE</text>

  <!-- Arrows showing "beats" relationships -->
  <!-- Strike → Dodge (strike beats dodge) -->
  <line x1="280" y1="80" x2="345" y2="170" stroke="#ffd700" stroke-width="2" marker-end="url(#arr)"/>
  <text fill="#ffd700" font-size="9" x="320" y="120" transform="rotate(30, 320, 120)">beats</text>

  <!-- Parry → Strike (parry beats strike) -->
  <line x1="145" y1="170" x2="218" y2="85" stroke="#ffd700" stroke-width="2" marker-end="url(#arr)"/>
  <text fill="#ffd700" font-size="9" x="150" y="120" transform="rotate(-30, 150, 120)">beats</text>

  <!-- Dodge → Parry (dodge beats parry) -->
  <line x1="340" y1="190" x2="162" y2="190" stroke="#ffd700" stroke-width="2" marker-end="url(#arr)"/>
  <text fill="#ffd700" font-size="9" text-anchor="middle" x="250" y="185">beats</text>

  <!-- Same action = draw -->
  <text fill="#666" font-size="10" text-anchor="middle" x="250" y="240">Same action = DRAW (no damage)</text>

  <!-- Resolution table -->
  <g transform="translate(60, 255)">
    <text fill="#ff4444" font-size="9" x="0" y="0">STRIKE &gt; DODGE</text>
    <text fill="#666" font-size="9" x="0" y="14">Attacker hits the dodger</text>
  </g>
  <g transform="translate(190, 255)">
    <text fill="#44aaff" font-size="9" x="0" y="0">PARRY &gt; STRIKE</text>
    <text fill="#666" font-size="9" x="0" y="14">Defender counters</text>
  </g>
  <g transform="translate(330, 255)">
    <text fill="#44ff66" font-size="9" x="0" y="0">DODGE &gt; PARRY</text>
    <text fill="#666" font-size="9" x="0" y="14">Dodger repositions</text>
  </g>

  <rect width="500" height="300" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
