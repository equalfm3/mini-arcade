<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 400" width="380" height="400">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="380" height="400" fill="#0e0e1a" rx="6"/>

  <!-- HUD bar -->
  <rect x="10" y="10" width="360" height="28" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
  <text font-size="10" fill="#888" x="20" y="28">Whack-a-Mole</text>
  <text font-size="9" fill="#666" x="180" y="28">Score</text>
  <text font-size="9" fill="#ffd700" x="215" y="28">150</text>
  <text font-size="9" fill="#666" x="280" y="28">Time</text>
  <text font-size="9" fill="#ffd700" x="310" y="28">22</text>

  <!-- 3x3 grid of holes -->
  <!-- Row 1 -->
  <g transform="translate(50, 70)">
    <!-- Hole with normal mole -->
    <ellipse cx="40" cy="70" rx="38" ry="14" fill="#3a2a1a"/>
    <ellipse cx="40" cy="68" rx="28" ry="9" fill="#1a1020"/>
    <rect x="12" y="25" width="56" height="43" fill="#0e0e1a"/>
    <rect x="12" y="25" width="56" height="35" rx="28" fill="#aa6633"/>
    <circle cx="28" cy="38" r="4" fill="#fff"/>
    <circle cx="52" cy="38" r="4" fill="#fff"/>
    <circle cx="29" cy="39" r="2" fill="#1a1020"/>
    <circle cx="53" cy="39" r="2" fill="#1a1020"/>
    <ellipse cx="40" cy="48" rx="5" ry="3" fill="#774422"/>
  </g>

  <g transform="translate(160, 70)">
    <!-- Empty hole -->
    <ellipse cx="40" cy="70" rx="38" ry="14" fill="#3a2a1a"/>
    <ellipse cx="40" cy="68" rx="28" ry="9" fill="#1a1020"/>
  </g>

  <g transform="translate(270, 70)">
    <!-- Empty hole -->
    <ellipse cx="40" cy="70" rx="38" ry="14" fill="#3a2a1a"/>
    <ellipse cx="40" cy="68" rx="28" ry="9" fill="#1a1020"/>
  </g>

  <!-- Row 2 -->
  <g transform="translate(50, 170)">
    <!-- Empty hole -->
    <ellipse cx="40" cy="70" rx="38" ry="14" fill="#3a2a1a"/>
    <ellipse cx="40" cy="68" rx="28" ry="9" fill="#1a1020"/>
  </g>

  <g transform="translate(160, 170)">
    <!-- Golden mole -->
    <ellipse cx="40" cy="70" rx="38" ry="14" fill="#3a2a1a"/>
    <ellipse cx="40" cy="68" rx="28" ry="9" fill="#1a1020"/>
    <rect x="12" y="30" width="56" height="38" fill="#0e0e1a"/>
    <rect x="12" y="30" width="56" height="30" rx="28" fill="#ffd700"/>
    <circle cx="28" cy="40" r="4" fill="#fff"/>
    <circle cx="52" cy="40" r="4" fill="#fff"/>
    <circle cx="29" cy="41" r="2" fill="#1a1020"/>
    <circle cx="53" cy="41" r="2" fill="#1a1020"/>
    <ellipse cx="40" cy="50" rx="5" ry="3" fill="#b89a00"/>
    <!-- Glow -->
    <ellipse cx="40" cy="42" rx="32" ry="18" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
    <!-- Score popup -->
    <text font-size="14" fill="#ffd700" font-weight="bold" x="25" y="20">+30</text>
  </g>

  <g transform="translate(270, 170)">
    <!-- Empty hole -->
    <ellipse cx="40" cy="70" rx="38" ry="14" fill="#3a2a1a"/>
    <ellipse cx="40" cy="68" rx="28" ry="9" fill="#1a1020"/>
  </g>

  <!-- Row 3 -->
  <g transform="translate(50, 270)">
    <!-- Empty hole -->
    <ellipse cx="40" cy="70" rx="38" ry="14" fill="#3a2a1a"/>
    <ellipse cx="40" cy="68" rx="28" ry="9" fill="#1a1020"/>
  </g>

  <g transform="translate(160, 270)">
    <!-- Empty hole -->
    <ellipse cx="40" cy="70" rx="38" ry="14" fill="#3a2a1a"/>
    <ellipse cx="40" cy="68" rx="28" ry="9" fill="#1a1020"/>
  </g>

  <g transform="translate(270, 270)">
    <!-- Bomb mole -->
    <ellipse cx="40" cy="70" rx="38" ry="14" fill="#3a2a1a"/>
    <ellipse cx="40" cy="68" rx="28" ry="9" fill="#1a1020"/>
    <rect x="12" y="35" width="56" height="33" fill="#0e0e1a"/>
    <rect x="12" y="35" width="56" height="25" rx="28" fill="#444"/>
    <circle cx="28" cy="44" r="4" fill="#ff4444"/>
    <circle cx="52" cy="44" r="4" fill="#ff4444"/>
    <circle cx="29" cy="45" r="2" fill="#ff0000"/>
    <circle cx="53" cy="45" r="2" fill="#ff0000"/>
    <ellipse cx="40" cy="52" rx="5" ry="3" fill="#666"/>
  </g>

  <!-- Combo text -->
  <text font-size="11" fill="#ffd700" x="155" y="385" text-anchor="middle">3x Combo!</text>

  <rect width="380" height="400" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
