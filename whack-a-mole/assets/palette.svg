<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="600" height="120" fill="#0a0a16" rx="6"/>

  <!-- Normal mole -->
  <rect x="30" y="20" width="60" height="60" fill="#aa6633" rx="4"/>
  <text fill="#aa6633" font-size="9" x="35" y="100">Normal</text>
  <text fill="#666" font-size="8" x="32" y="112">#aa6633</text>

  <!-- Golden mole -->
  <rect x="120" y="20" width="60" height="60" fill="#ffd700" rx="4"/>
  <text fill="#ffd700" font-size="9" x="125" y="100">Golden</text>
  <text fill="#666" font-size="8" x="122" y="112">#ffd700</text>

  <!-- Bomb -->
  <rect x="210" y="20" width="60" height="60" fill="#444444" rx="4"/>
  <text fill="#ff4444" font-size="9" x="220" y="100">Bomb</text>
  <text fill="#666" font-size="8" x="212" y="112">#444444</text>

  <!-- Hole -->
  <rect x="300" y="20" width="60" height="60" fill="#1a1020" rx="4"/>
  <text fill="#888" font-size="9" x="315" y="100">Hole</text>
  <text fill="#666" font-size="8" x="302" y="112">#1a1020</text>

  <!-- Mound -->
  <rect x="390" y="20" width="60" height="60" fill="#3a2a1a" rx="4"/>
  <text fill="#888" font-size="9" x="398" y="100">Mound</text>
  <text fill="#666" font-size="8" x="392" y="112">#3a2a1a</text>

  <!-- Background -->
  <rect x="480" y="20" width="60" height="60" fill="#0e0e1a" rx="4" stroke="#2a2a40" stroke-width="1"/>
  <text fill="#888" font-size="9" x="500" y="100">BG</text>
  <text fill="#666" font-size="8" x="482" y="112">#0e0e1a</text>

  <rect width="600" height="120" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
