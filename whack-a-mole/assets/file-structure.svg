<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" width="620" height="280">
  <defs>
    <style>text{font-family:monospace;font-size:11px;}</style>
  </defs>
  <rect width="620" height="280" fill="#0a0a16" rx="6"/>

  <text fill="#ffd700" font-size="13" font-weight="bold" x="20" y="25">whack-a-mole/</text>

  <!-- Files -->
  <text fill="#44aaff" x="30" y="50">├── index.html</text>
  <text fill="#666" x="260" y="50">GAME config + arcade.js loader</text>

  <text fill="#44aaff" x="30" y="70">├── style.css</text>
  <text fill="#666" x="260" y="70">Mole grid, hole, animation styles</text>

  <text fill="#44aaff" x="30" y="90">├── game.js</text>
  <text fill="#666" x="260" y="90">Orchestrator: timer, scoring, whack logic</text>

  <text fill="#ffd700" x="30" y="115">├── src/</text>

  <text fill="#44ff66" x="50" y="135">├── config.js</text>
  <text fill="#666" x="260" y="135">Grid 3×3, timing, mole types, scoring</text>

  <text fill="#44ff66" x="50" y="155">├── moles.js</text>
  <text fill="#666" x="260" y="155">Spawn logic, random holes, whack detection</text>

  <text fill="#44ff66" x="50" y="175">└── renderer.js</text>
  <text fill="#666" x="260" y="175">DOM hole grid, mole pop-up animation</text>

  <text fill="#ffd700" x="30" y="200">├── assets/</text>

  <text fill="#888" x="50" y="220">├── banner.svg</text>
  <text fill="#666" x="260" y="220">Hero banner with mole pixel art</text>

  <text fill="#888" x="50" y="240">├── gameplay.svg, controls.svg</text>
  <text fill="#666" x="260" y="240">Screenshots and control diagrams</text>

  <text fill="#888" x="50" y="260">└── palette.svg, state-machine.svg</text>
  <text fill="#666" x="260" y="260">Color palette and state diagram</text>

  <rect width="620" height="280" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
