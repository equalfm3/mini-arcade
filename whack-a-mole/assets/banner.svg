<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 44px; font-weight: bold; fill: #ffd700; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Pixel art: 3 holes with moles -->
  <g shape-rendering="crispEdges">
    <!-- Hole 1 — normal mole popping up -->
    <ellipse cx="80" cy="150" rx="40" ry="14" fill="#1a1020"/>
    <rect x="55" y="90" width="50" height="60" fill="#0e0e1a"/>
    <rect x="55" y="90" width="50" height="45" rx="25" fill="#aa6633"/>
    <!-- Eyes -->
    <circle cx="68" cy="105" r="4" fill="#fff"/>
    <circle cx="92" cy="105" r="4" fill="#fff"/>
    <circle cx="69" cy="106" r="2" fill="#1a1020"/>
    <circle cx="93" cy="106" r="2" fill="#1a1020"/>
    <!-- Nose -->
    <ellipse cx="80" cy="115" rx="5" ry="3" fill="#774422"/>
    <!-- Mound -->
    <ellipse cx="80" cy="150" rx="42" ry="16" fill="#3a2a1a"/>
    <ellipse cx="80" cy="148" rx="32" ry="10" fill="#1a1020"/>

    <!-- Hole 2 — golden mole -->
    <ellipse cx="190" cy="150" rx="40" ry="14" fill="#1a1020"/>
    <rect x="165" y="100" width="50" height="50" fill="#0e0e1a"/>
    <rect x="165" y="100" width="50" height="38" rx="25" fill="#ffd700"/>
    <!-- Eyes -->
    <circle cx="178" cy="112" r="4" fill="#fff"/>
    <circle cx="202" cy="112" r="4" fill="#fff"/>
    <circle cx="179" cy="113" r="2" fill="#1a1020"/>
    <circle cx="203" cy="113" r="2" fill="#1a1020"/>
    <!-- Nose -->
    <ellipse cx="190" cy="122" rx="5" ry="3" fill="#b89a00"/>
    <!-- Glow -->
    <ellipse cx="190" cy="115" rx="30" ry="22" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.3"/>
    <!-- Mound -->
    <ellipse cx="190" cy="150" rx="42" ry="16" fill="#3a2a1a"/>
    <ellipse cx="190" cy="148" rx="32" ry="10" fill="#1a1020"/>

    <!-- Hole 3 — empty hole -->
    <ellipse cx="300" cy="150" rx="42" ry="16" fill="#3a2a1a"/>
    <ellipse cx="300" cy="148" rx="32" ry="10" fill="#1a1020"/>

    <!-- Whack stars near hole 1 -->
    <text font-family="monospace" font-size="16" fill="#ffd700" x="105" y="95">★</text>
    <text font-family="monospace" font-size="12" fill="#ffd700" x="45" y="90">✦</text>
  </g>

  <!-- Title -->
  <text class="title" x="380" y="85">WHACK-A-MOLE</text>
  <text class="sub" x="380" y="112">Whack · Score · Survive</text>

  <!-- Score HUD mock -->
  <g transform="translate(380, 130)">
    <rect width="260" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <!-- Pixel icon -->
    <g transform="translate(6, 3)" shape-rendering="crispEdges">
      <rect x="7.5" y="1.5" width="6" height="1.5" fill="#aa6633"/>
      <rect x="6" y="3" width="9" height="1.5" fill="#aa6633"/>
      <rect x="4.5" y="4.5" width="3" height="1.5" fill="#aa6633"/>
      <rect x="7.5" y="4.5" width="1.5" height="1.5" fill="#fff"/>
      <rect x="12" y="4.5" width="1.5" height="1.5" fill="#fff"/>
      <rect x="4.5" y="6" width="12" height="1.5" fill="#aa6633"/>
      <rect x="6" y="7.5" width="9" height="1.5" fill="#ddbb88"/>
      <rect x="3" y="13.5" width="15" height="1.5" fill="#774422"/>
      <rect x="3" y="15" width="15" height="3" fill="#774422"/>
    </g>
    <text font-family="monospace" font-size="9" fill="#666" x="35" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="75" y="19">240</text>
    <text font-family="monospace" font-size="9" fill="#666" x="140" y="19">TIME</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="175" y="19">18s</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
