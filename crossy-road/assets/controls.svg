<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>

  <!-- Desktop section -->
  <text fill="#44ff66" font-size="14" font-weight="bold" x="80" y="25">Desktop</text>

  <!-- Arrow keys cluster -->
  <g transform="translate(40, 40)">
    <!-- Up -->
    <rect x="40" y="0" width="36" height="32" fill="#1a1a2e" stroke="#44ff66" stroke-width="1.5" rx="3"/>
    <text fill="#44ff66" font-size="16" text-anchor="middle" x="58" y="22">↑</text>
    <!-- Left -->
    <rect x="0" y="36" width="36" height="32" fill="#1a1a2e" stroke="#44ff66" stroke-width="1.5" rx="3"/>
    <text fill="#44ff66" font-size="16" text-anchor="middle" x="18" y="58">←</text>
    <!-- Down -->
    <rect x="40" y="36" width="36" height="32" fill="#1a1a2e" stroke="#44ff66" stroke-width="1.5" rx="3"/>
    <text fill="#44ff66" font-size="16" text-anchor="middle" x="58" y="58">↓</text>
    <!-- Right -->
    <rect x="80" y="36" width="36" height="32" fill="#1a1a2e" stroke="#44ff66" stroke-width="1.5" rx="3"/>
    <text fill="#44ff66" font-size="16" text-anchor="middle" x="98" y="58">→</text>
  </g>

  <!-- Labels -->
  <text fill="#888" font-size="9" x="40" y="155">↑ Hop forward</text>
  <text fill="#888" font-size="9" x="40" y="168">← → Move sideways</text>
  <text fill="#888" font-size="9" x="40" y="181">↓ Hop backward</text>

  <!-- Esc key -->
  <rect x="180" y="50" width="50" height="28" fill="#1a1a2e" stroke="#ffd700" stroke-width="1.5" rx="3"/>
  <text fill="#ffd700" font-size="10" text-anchor="middle" x="205" y="68">Esc</text>
  <text fill="#888" font-size="9" x="180" y="96">Pause / Resume</text>

  <!-- Divider -->
  <line x1="300" y1="15" x2="300" y2="185" stroke="#2a2a40" stroke-width="1"/>

  <!-- Mobile section -->
  <text fill="#44ff66" font-size="14" font-weight="bold" x="400" y="25">Mobile</text>

  <!-- D-pad -->
  <g transform="translate(360, 45)">
    <rect x="35" y="0" width="30" height="28" fill="#1a1a2e" stroke="#44ff66" stroke-width="1.5" rx="3"/>
    <text fill="#44ff66" font-size="14" text-anchor="middle" x="50" y="20">▲</text>

    <rect x="0" y="32" width="30" height="28" fill="#1a1a2e" stroke="#44ff66" stroke-width="1.5" rx="3"/>
    <text fill="#44ff66" font-size="14" text-anchor="middle" x="15" y="52">◄</text>

    <rect x="35" y="32" width="30" height="28" fill="#1a1a2e" stroke="#44ff66" stroke-width="1.5" rx="3"/>
    <text fill="#44ff66" font-size="14" text-anchor="middle" x="50" y="52">▼</text>

    <rect x="70" y="32" width="30" height="28" fill="#1a1a2e" stroke="#44ff66" stroke-width="1.5" rx="3"/>
    <text fill="#44ff66" font-size="14" text-anchor="middle" x="85" y="52">►</text>
  </g>

  <text fill="#888" font-size="9" x="360" y="145">D-pad for 4-directional hopping</text>
  <text fill="#888" font-size="9" x="360" y="160">Swipe also works</text>

  <!-- Border -->
  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
