<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #44ff66; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Grass lanes -->
  <g shape-rendering="crispEdges">
    <rect x="0" y="0" width="260" height="32" fill="#4a8c3f"/>
    <rect x="0" y="32" width="260" height="32" fill="#3d7534"/>
    <!-- Road lane -->
    <rect x="0" y="64" width="260" height="32" fill="#444455"/>
    <rect x="10" y="79" width="12" height="2" fill="#555566"/>
    <rect x="34" y="79" width="12" height="2" fill="#555566"/>
    <rect x="58" y="79" width="12" height="2" fill="#555566"/>
    <rect x="82" y="79" width="12" height="2" fill="#555566"/>
    <rect x="106" y="79" width="12" height="2" fill="#555566"/>
    <rect x="130" y="79" width="12" height="2" fill="#555566"/>
    <rect x="154" y="79" width="12" height="2" fill="#555566"/>
    <rect x="178" y="79" width="12" height="2" fill="#555566"/>
    <rect x="202" y="79" width="12" height="2" fill="#555566"/>
    <rect x="226" y="79" width="12" height="2" fill="#555566"/>
    <!-- Car on road -->
    <rect x="40" y="68" width="48" height="24" fill="#ff4444"/>
    <rect x="40" y="68" width="48" height="4" fill="rgba(255,255,255,0.2)"/>
    <rect x="74" y="71" width="10" height="18" fill="#88ccff"/>
    <rect x="44" y="66" width="8" height="4" fill="#222"/>
    <rect x="76" y="66" width="8" height="4" fill="#222"/>
    <!-- Car 2 -->
    <rect x="170" y="68" width="48" height="24" fill="#44aaff"/>
    <rect x="170" y="68" width="48" height="4" fill="rgba(255,255,255,0.2)"/>
    <rect x="204" y="71" width="10" height="18" fill="#88ccff"/>

    <!-- River lane -->
    <rect x="0" y="96" width="260" height="32" fill="#2266aa"/>
    <rect x="5" y="111" width="8" height="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="25" y="111" width="8" height="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="45" y="111" width="8" height="2" fill="rgba(255,255,255,0.1)"/>
    <!-- Log -->
    <rect x="20" y="100" width="80" height="28" fill="#8b6914"/>
    <rect x="20" y="113" width="80" height="2" fill="#6b4f10"/>
    <rect x="20" y="100" width="80" height="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="20" y="100" width="3" height="28" fill="#6b4f10"/>
    <rect x="97" y="100" width="3" height="28" fill="#6b4f10"/>
    <!-- Log 2 -->
    <rect x="150" y="100" width="64" height="28" fill="#8b6914"/>
    <rect x="150" y="113" width="64" height="2" fill="#6b4f10"/>
    <rect x="150" y="100" width="64" height="3" fill="rgba(255,255,255,0.15)"/>

    <!-- Grass lane -->
    <rect x="0" y="128" width="260" height="32" fill="#4a8c3f"/>
    <!-- Trees -->
    <rect x="27" y="140" width="6" height="10" fill="#6b4226"/>
    <rect x="18" y="132" width="24" height="14" fill="#2d6b2d"/>
    <rect x="20" y="132" width="20" height="5" fill="#3d8b3d"/>

    <rect x="187" y="140" width="6" height="10" fill="#6b4226"/>
    <rect x="178" y="132" width="24" height="14" fill="#2d6b2d"/>

    <!-- Grass lane -->
    <rect x="0" y="160" width="260" height="40" fill="#3d7534"/>

    <!-- Player (chicken) on grass -->
    <rect x="118" y="38" width="24" height="24" fill="#e0e0e0"/>
    <rect x="118" y="58" width="24" height="4" fill="rgba(0,0,0,0.15)"/>
    <rect x="123" y="44" width="4" height="4" fill="#222"/>
    <rect x="133" y="44" width="4" height="4" fill="#222"/>
    <rect x="127" y="36" width="6" height="4" fill="#ffa500"/>
    <!-- Shadow -->
    <rect x="120" y="60" width="20" height="4" fill="rgba(0,0,0,0.2)"/>
  </g>

  <!-- Pixel icon -->
  <g transform="translate(280, 30)" shape-rendering="crispEdges">
    <rect x="9" y="1.5" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="7.5" y="3" width="6" height="1.5" fill="#e0e0e0"/>
    <rect x="6" y="4.5" width="9" height="1.5" fill="#e0e0e0"/>
    <rect x="6" y="6" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="7.5" y="6" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="9" y="6" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="10.5" y="6" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="6" y="7.5" width="9" height="1.5" fill="#e0e0e0"/>
    <rect x="7.5" y="9" width="6" height="1.5" fill="#e0e0e0"/>
    <rect x="6" y="10.5" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="12" y="10.5" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="3" y="13.5" width="21" height="1.5" fill="#444455"/>
    <rect x="3" y="15" width="21" height="1.5" fill="#444455"/>
    <rect x="4.5" y="18" width="3" height="3" fill="#ff8844"/>
    <rect x="7.5" y="18" width="4.5" height="3" fill="#ff8844"/>
    <rect x="15" y="18" width="3" height="3" fill="#ff8844"/>
    <rect x="18" y="18" width="4.5" height="3" fill="#ff8844"/>
  </g>

  <!-- Title -->
  <text class="title" x="340" y="90">CROSSY ROAD</text>
  <text class="sub" x="340" y="118">Hop · Dodge · Cross</text>

  <!-- Score HUD mock -->
  <g transform="translate(340, 140)">
    <rect width="240" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">42</text>
    <text font-family="monospace" font-size="9" fill="#666" x="110" y="19">BEST</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="150" y="19">87</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
