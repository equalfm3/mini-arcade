  <!-- Player (on row 8 grass, col 5) -->
  <g shape-rendering="crispEdges">
    <!-- Shadow -->
    <rect x="150" y="212" width="20" height="4" fill="rgba(0,0,0,0.2)"/>
    <!-- Body -->
    <rect x="148" y="196" width="24" height="24" fill="#e0e0e0"/>
    <rect x="148" y="216" width="24" height="4" fill="rgba(0,0,0,0.15)"/>
    <!-- Eyes -->
    <rect x="153" y="202" width="4" height="4" fill="#222"/>
    <rect x="163" y="202" width="4" height="4" fill="#222"/>
    <!-- Beak (facing up) -->
    <rect x="157" y="194" width="6" height="4" fill="#ffa500"/>
  </g>

  <!-- Border -->
  <rect width="320" height="480" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
