<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #ffd700; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- 4 colored buttons (2×2 grid) -->
  <g shape-rendering="crispEdges">
    <!-- Green (top-left) -->
    <rect x="40" y="30" width="70" height="60" fill="#44ff66" rx="6" opacity="0.7"/>
    <rect x="40" y="30" width="70" height="8" fill="#88ffaa" rx="6" opacity="0.3"/>
    <!-- Red (top-right) -->
    <rect x="120" y="30" width="70" height="60" fill="#ff4444" rx="6" opacity="0.7"/>
    <rect x="120" y="30" width="70" height="8" fill="#ff8888" rx="6" opacity="0.3"/>
    <!-- Yellow (bottom-left) — lit up -->
    <rect x="40" y="100" width="70" height="60" fill="#ffd700" rx="6"/>
    <rect x="40" y="100" width="70" height="8" fill="#ffec66" rx="6" opacity="0.5"/>
    <!-- Glow effect on yellow -->
    <rect x="36" y="96" width="78" height="68" fill="none" stroke="#ffd700" stroke-width="2" rx="8" opacity="0.4"/>
    <!-- Blue (bottom-right) -->
    <rect x="120" y="100" width="70" height="60" fill="#44aaff" rx="6" opacity="0.7"/>
    <rect x="120" y="100" width="70" height="8" fill="#88ccff" rx="6" opacity="0.3"/>
  </g>

  <!-- Sequence indicator dots -->
  <g>
    <circle cx="55" cy="180" r="4" fill="#44ff66" opacity="0.5"/>
    <circle cx="70" cy="180" r="4" fill="#ff4444" opacity="0.5"/>
    <circle cx="85" cy="180" r="4" fill="#ffd700"/>
    <circle cx="100" cy="180" r="4" fill="#44aaff" opacity="0.3"/>
    <circle cx="115" cy="180" r="4" fill="#666" opacity="0.3"/>
    <circle cx="130" cy="180" r="4" fill="#666" opacity="0.3"/>
  </g>

  <!-- Pixel icon (simon-says from icons.js) -->
  <g transform="translate(240, 60)" shape-rendering="crispEdges">
    <rect x="3" y="1.5" width="9" height="9" fill="#ff4444" opacity="0.8"/>
    <rect x="12" y="1.5" width="9" height="9" fill="#44ff66" opacity="0.8"/>
    <rect x="3" y="10.5" width="9" height="9" fill="#ffd700" opacity="0.8"/>
    <rect x="12" y="10.5" width="9" height="9" fill="#44aaff" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text class="title" x="320" y="90">SIMON SAYS</text>
  <text class="sub" x="320" y="118">Watch · Remember · Repeat</text>

  <!-- Score HUD mock -->
  <g transform="translate(320, 140)">
    <rect width="240" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">ROUND</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">7</text>
    <text font-family="monospace" font-size="9" fill="#666" x="110" y="19">BEST</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="150" y="19">12</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
