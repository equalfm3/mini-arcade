<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>

  <!-- Desktop section -->
  <text font-size="12" fill="#ffd700" x="30" y="30" font-weight="bold">DESKTOP</text>

  <!-- Mouse click icon -->
  <rect x="30" y="45" width="50" height="65" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="20"/>
  <line x1="55" y1="45" x2="55" y2="75" stroke="#2a2a40" stroke-width="1"/>
  <circle cx="55" cy="60" r="4" fill="#44ff66"/>
  <text font-size="9" fill="#888" x="90" y="70">Click colored buttons</text>
  <text font-size="9" fill="#666" x="90" y="85">to repeat the sequence</text>

  <!-- Keyboard -->
  <rect x="30" y="120" width="40" height="28" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
  <text font-size="9" fill="#e0e0e0" text-anchor="middle" x="50" y="139">Esc</text>
  <text font-size="9" fill="#888" x="80" y="139">Pause / Resume</text>

  <rect x="30" y="155" width="28" height="28" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
  <text font-size="11" fill="#e0e0e0" text-anchor="middle" x="44" y="174">P</text>
  <text font-size="9" fill="#888" x="68" y="174">Pause (alternate)</text>

  <!-- Divider -->
  <line x1="300" y1="20" x2="300" y2="180" stroke="#2a2a40" stroke-width="1"/>

  <!-- Mobile section -->
  <text font-size="12" fill="#ffd700" x="330" y="30" font-weight="bold">MOBILE</text>

  <!-- Tap icon -->
  <circle cx="355" cy="75" r="20" fill="none" stroke="#2a2a40" stroke-width="1.5"/>
  <circle cx="355" cy="75" r="4" fill="#44ff66"/>
  <!-- Finger -->
  <rect x="350" y="90" width="10" height="20" fill="#2a2a40" rx="5"/>
  <text font-size="9" fill="#888" x="390" y="70">Tap colored buttons</text>
  <text font-size="9" fill="#666" x="390" y="85">to repeat the sequence</text>

  <text font-size="9" fill="#666" x="330" y="140">Watch the pattern carefully,</text>
  <text font-size="9" fill="#666" x="330" y="155">then tap buttons in the</text>
  <text font-size="9" fill="#666" x="330" y="170">same order.</text>

  <!-- Border -->
  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
