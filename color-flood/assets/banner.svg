<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 44px; font-weight: bold; fill: #44aaff; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid-line { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>
  <!-- Subtle grid -->
  <g class="grid-line" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Flood fill illustration on the left -->
  <g transform="translate(30, 20)" shape-rendering="crispEdges">
    <!-- 8x8 mini grid showing a flood in progress -->
    <!-- Territory (red, flooding from top-left) -->
    <rect x="0" y="0" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="22" y="0" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="44" y="0" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="66" y="0" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="88" y="0" width="20" height="20" fill="#44ff66" rx="2"/>
    <rect x="110" y="0" width="20" height="20" fill="#44ff66" rx="2"/>
    <rect x="132" y="0" width="20" height="20" fill="#c084fc" rx="2"/>
    <rect x="154" y="0" width="20" height="20" fill="#44aaff" rx="2"/>

    <rect x="0" y="22" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="22" y="22" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="44" y="22" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="66" y="22" width="20" height="20" fill="#ff8844" rx="2"/>
    <rect x="88" y="22" width="20" height="20" fill="#44ff66" rx="2"/>
    <rect x="110" y="22" width="20" height="20" fill="#ffd700" rx="2"/>
    <rect x="132" y="22" width="20" height="20" fill="#c084fc" rx="2"/>
    <rect x="154" y="22" width="20" height="20" fill="#44aaff" rx="2"/>

    <rect x="0" y="44" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="22" y="44" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="44" y="44" width="20" height="20" fill="#ff8844" rx="2"/>
    <rect x="66" y="44" width="20" height="20" fill="#ff8844" rx="2"/>
    <rect x="88" y="44" width="20" height="20" fill="#ffd700" rx="2"/>
    <rect x="110" y="44" width="20" height="20" fill="#ffd700" rx="2"/>
    <rect x="132" y="44" width="20" height="20" fill="#44aaff" rx="2"/>
    <rect x="154" y="44" width="20" height="20" fill="#44aaff" rx="2"/>

    <rect x="0" y="66" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="22" y="66" width="20" height="20" fill="#c084fc" rx="2"/>
    <rect x="44" y="66" width="20" height="20" fill="#c084fc" rx="2"/>
    <rect x="66" y="66" width="20" height="20" fill="#44ff66" rx="2"/>
    <rect x="88" y="66" width="20" height="20" fill="#ffd700" rx="2"/>
    <rect x="110" y="66" width="20" height="20" fill="#ff8844" rx="2"/>
    <rect x="132" y="66" width="20" height="20" fill="#ff8844" rx="2"/>
    <rect x="154" y="66" width="20" height="20" fill="#c084fc" rx="2"/>

    <rect x="0" y="88" width="20" height="20" fill="#c084fc" rx="2"/>
    <rect x="22" y="88" width="20" height="20" fill="#c084fc" rx="2"/>
    <rect x="44" y="88" width="20" height="20" fill="#44aaff" rx="2"/>
    <rect x="66" y="88" width="20" height="20" fill="#44ff66" rx="2"/>
    <rect x="88" y="88" width="20" height="20" fill="#44ff66" rx="2"/>
    <rect x="110" y="88" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="132" y="88" width="20" height="20" fill="#ff4444" rx="2"/>
    <rect x="154" y="88" width="20" height="20" fill="#ffd700" rx="2"/>

    <rect x="0" y="110" width="20" height="20" fill="#ffd700" rx="2"/>
    <rect x="22" y="110" width="20" height="20" fill="#ffd700" rx="2"/>
    <rect x="44" y="110" width="20" height="20" fill="#44ff66" rx="2"/>
    <rect x="66" y="110" width="20" height="20" fill="#44ff66" rx="2"/>
    <rect x="88" y="110" width="20" height="20" fill="#44aaff" rx="2"/>
    <rect x="110" y="110" width="20" height="20" fill="#44aaff" rx="2"/>
    <rect x="132" y="110" width="20" height="20" fill="#ff8844" rx="2"/>
    <rect x="154" y="110" width="20" height="20" fill="#ff8844" rx="2"/>

    <rect x="0" y="132" width="20" height="20" fill="#ffd700" rx="2"/>
    <rect x="22" y="132" width="20" height="20" fill="#ff8844" rx="2"/>
    <rect x="44" y="132" width="20" height="20" fill="#ff8844" rx="2"/>
    <rect x="66" y="132" width="20" height="20" fill="#c084fc" rx="2"/>
    <rect x="88" y="132" width="20" height="20" fill="#c084fc" rx="2"/>
    <rect x="110" y="132" width="20" height="20" fill="#44ff66" rx="2"/>
    <rect x="132" y="132" width="20" height="20" fill="#44ff66" rx="2"/>
    <rect x="154" y="132" width="20" height="20" fill="#ff4444" rx="2"/>
  </g>

  <!-- Territory highlight border on top-left cluster -->
  <rect x="29" y="19" width="86" height="86" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="4,3" rx="3" opacity="0.5"/>

  <!-- Pixel icon -->
  <g transform="translate(240, 30)" shape-rendering="crispEdges">
    <rect x="0" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="1.5" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="3" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="4.5" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="6" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="7.5" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="9" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="10.5" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="12" y="0" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="13.5" y="0" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="15" y="0" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="16.5" y="0" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="18" y="0" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="19.5" y="0" width="1.5" height="1.5" fill="#44ff66"/>
  </g>

  <!-- Title -->
  <text class="title" x="310" y="90">COLOR FLOOD</text>
  <text class="sub" x="310" y="118">Pick · Flood · Conquer</text>

  <!-- HUD mock -->
  <g transform="translate(310, 135)">
    <rect width="300" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">MOVES</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="60" y="19">8/25</text>
    <text font-family="monospace" font-size="9" fill="#666" x="110" y="19">CELLS</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="155" y="19">87/196</text>
    <text font-family="monospace" font-size="9" fill="#666" x="220" y="19">STREAK</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="275" y="19">3</text>
  </g>

  <!-- Color picker mock -->
  <g transform="translate(310, 172)">
    <rect x="0" y="0" width="22" height="22" fill="#ff4444" rx="4"/>
    <rect x="28" y="0" width="22" height="22" fill="#ff8844" rx="4" opacity="0.3"/>
    <rect x="56" y="0" width="22" height="22" fill="#ffd700" rx="4"/>
    <rect x="84" y="0" width="22" height="22" fill="#44ff66" rx="4"/>
    <rect x="112" y="0" width="22" height="22" fill="#44aaff" rx="4"/>
    <rect x="140" y="0" width="22" height="22" fill="#c084fc" rx="4"/>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
