<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 100" width="600" height="100">
  <rect width="600" height="100" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;}</style></defs>

  <!-- Desktop section -->
  <text fill="#888" font-size="10" x="30" y="18">DESKTOP</text>

  <!-- Arrow keys -->
  <g transform="translate(50, 25)">
    <!-- Up -->
    <rect x="30" y="0" width="26" height="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="12" x="38" y="17">▲</text>
    <!-- Left -->
    <rect x="0" y="28" width="26" height="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="12" x="7" y="45">◄</text>
    <!-- Down -->
    <rect x="30" y="28" width="26" height="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="12" x="38" y="45">▼</text>
    <!-- Right -->
    <rect x="60" y="28" width="26" height="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="12" x="67" y="45">►</text>
  </g>

  <text fill="#666" font-size="8" x="55" y="85">Slide tiles</text>

  <!-- Divider -->
  <line x1="200" y1="10" x2="200" y2="90" stroke="#2a2a40" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Mobile section -->
  <text fill="#888" font-size="10" x="230" y="18">MOBILE</text>

  <!-- Swipe gesture -->
  <g transform="translate(260, 28)">
    <circle cx="25" cy="25" r="22" fill="none" stroke="#2a2a40" stroke-width="1.5"/>
    <!-- Swipe arrows -->
    <text fill="#ffd700" font-size="10" x="21" y="-2">↑</text>
    <text fill="#ffd700" font-size="10" x="21" y="60">↓</text>
    <text fill="#ffd700" font-size="10" x="-6" y="29">←</text>
    <text fill="#ffd700" font-size="10" x="48" y="29">→</text>
    <text fill="#888" font-size="9" x="8" y="70">Swipe</text>
  </g>

  <!-- Swipe direction labels -->
  <g transform="translate(380, 25)">
    <!-- Up arrow -->
    <line x1="40" y1="50" x2="40" y2="10" stroke="#ffd700" stroke-width="2"/>
    <polygon points="34,16 40,4 46,16" fill="#ffd700"/>
    <text fill="#888" font-size="8" x="55" y="14">Up</text>

    <!-- Down arrow -->
    <line x1="80" y1="10" x2="80" y2="50" stroke="#ffd700" stroke-width="2"/>
    <polygon points="74,44 80,56 86,44" fill="#ffd700"/>
    <text fill="#888" font-size="8" x="95" y="54">Down</text>

    <!-- Left arrow -->
    <line x1="140" y1="30" x2="100" y2="30" stroke="#ffd700" stroke-width="2"/>
    <polygon points="106,24 94,30 106,36" fill="#ffd700"/>
    <text fill="#888" font-size="8" x="145" y="34">Left / Right</text>
  </g>

  <rect width="600" height="100" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
