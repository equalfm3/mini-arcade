<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" width="500" height="250">
  <rect width="500" height="250" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>

  <!-- IDLE box -->
  <rect x="20" y="90" width="80" height="40" fill="#12121f" stroke="#44aaff" stroke-width="2" rx="4"/>
  <text fill="#44aaff" font-size="11" x="36" y="115" font-weight="bold">IDLE</text>

  <!-- PLAYING box -->
  <rect x="160" y="90" width="100" height="40" fill="#12121f" stroke="#44ff66" stroke-width="2" rx="4"/>
  <text fill="#44ff66" font-size="11" x="172" y="115" font-weight="bold">PLAYING</text>

  <!-- WON box (continue playing) -->
  <rect x="160" y="20" width="100" height="40" fill="#12121f" stroke="#ffd700" stroke-width="2" rx="4"/>
  <text fill="#ffd700" font-size="11" x="185" y="45" font-weight="bold">WON</text>
  <text fill="#888" font-size="7" x="170" y="55">(keep playing)</text>

  <!-- GAME OVER box -->
  <rect x="340" y="90" width="130" height="40" fill="#12121f" stroke="#ff4444" stroke-width="2" rx="4"/>
  <text fill="#ff4444" font-size="11" x="360" y="115" font-weight="bold">GAME OVER</text>

  <!-- Arrows -->
  <!-- idle → playing -->
  <line x1="100" y1="110" x2="158" y2="110" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="108" y="105">Start</text>

  <!-- playing → won -->
  <line x1="200" y1="90" x2="200" y2="62" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="206" y="80">≥2048</text>

  <!-- won → playing (continue) -->
  <line x1="240" y1="60" x2="240" y2="88" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="246" y="80">Continue</text>

  <!-- playing → game over -->
  <line x1="260" y1="110" x2="338" y2="110" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="272" y="105">No moves</text>

  <!-- game over → idle (play again) -->
  <path d="M 405 130 Q 405 200 210 200 Q 60 200 60 132" fill="none" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="190" y="215">Try Again</text>

  <rect width="500" height="250" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
