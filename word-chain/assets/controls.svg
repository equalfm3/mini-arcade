<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>

  <!-- Desktop section -->
  <text fill="#ff8844" font-size="14" font-weight="bold" x="100" y="30" text-anchor="middle">Desktop</text>

  <!-- Keyboard keys -->
  <!-- Letter keys -->
  <rect x="30" y="45" width="140" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
  <text fill="#ffffff" font-size="11" x="55" y="66">A - Z</text>
  <text fill="#666" font-size="9" x="180" y="66">Type letters</text>

  <!-- Enter key -->
  <rect x="30" y="85" width="140" height="32" fill="#12121f" stroke="#ff8844" stroke-width="1.5" rx="4"/>
  <text fill="#ff8844" font-size="11" x="55" y="106">Enter ↵</text>
  <text fill="#666" font-size="9" x="180" y="106">Submit word</text>

  <!-- Backspace key -->
  <rect x="30" y="125" width="140" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
  <text fill="#ffffff" font-size="11" x="42" y="146">Backspace ←</text>
  <text fill="#666" font-size="9" x="180" y="146">Delete letter</text>

  <!-- Esc key -->
  <rect x="30" y="160" width="60" height="26" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
  <text fill="#ffffff" font-size="10" x="45" y="177">Esc</text>
  <text fill="#666" font-size="9" x="100" y="177">Pause</text>

  <!-- Divider -->
  <line x1="300" y1="20" x2="300" y2="185" stroke="#2a2a40" stroke-width="1"/>

  <!-- Mobile section -->
  <text fill="#ff8844" font-size="14" font-weight="bold" x="450" y="30" text-anchor="middle">Mobile</text>

  <!-- Phone outline -->
  <rect x="400" y="45" width="100" height="140" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="8"/>

  <!-- Input field on phone -->
  <rect x="412" y="80" width="76" height="20" fill="#0e0e1a" stroke="#ff8844" stroke-width="1" rx="2"/>
  <text fill="#666" font-size="7" x="420" y="94">type here...</text>

  <!-- Keyboard hint -->
  <rect x="412" y="110" width="76" height="50" fill="#1a1a2e" rx="2"/>
  <text fill="#555" font-size="6" x="425" y="125">q w e r t y</text>
  <text fill="#555" font-size="6" x="428" y="137">a s d f g h</text>
  <text fill="#555" font-size="6" x="431" y="149">z x c v b n</text>

  <!-- Labels -->
  <text fill="#666" font-size="9" x="330" y="80">Tap input to</text>
  <text fill="#666" font-size="9" x="330" y="92">show keyboard</text>
  <text fill="#666" font-size="9" x="330" y="130">On-screen</text>
  <text fill="#666" font-size="9" x="330" y="142">keyboard</text>

  <!-- Border -->
  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
