<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 120" width="680" height="120">
  <rect width="680" height="120" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>

  <!-- Color swatches -->
  <!-- Player / Accent -->
  <rect x="20" y="20" width="55" height="40" fill="#ff8844" rx="4"/>
  <text fill="#ffffff" font-size="8" x="23" y="78">Player</text>
  <text fill="#888" font-size="7" x="23" y="90">#ff8844</text>

  <!-- AI -->
  <rect x="90" y="20" width="55" height="40" fill="#44aaff" rx="4"/>
  <text fill="#ffffff" font-size="8" x="93" y="78">AI</text>
  <text fill="#888" font-size="7" x="93" y="90">#44aaff</text>

  <!-- Success -->
  <rect x="160" y="20" width="55" height="40" fill="#44ff66" rx="4"/>
  <text fill="#ffffff" font-size="8" x="163" y="78">Success</text>
  <text fill="#888" font-size="7" x="163" y="90">#44ff66</text>

  <!-- Error -->
  <rect x="230" y="20" width="55" height="40" fill="#ff4444" rx="4"/>
  <text fill="#ffffff" font-size="8" x="233" y="78">Error</text>
  <text fill="#888" font-size="7" x="233" y="90">#ff4444</text>

  <!-- Background -->
  <rect x="300" y="20" width="55" height="40" fill="#0e0e1a" stroke="#2a2a40" stroke-width="1" rx="4"/>
  <text fill="#ffffff" font-size="8" x="303" y="78">BG Dark</text>
  <text fill="#888" font-size="7" x="303" y="90">#0e0e1a</text>

  <!-- Panel -->
  <rect x="370" y="20" width="55" height="40" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="4"/>
  <text fill="#ffffff" font-size="8" x="373" y="78">Panel</text>
  <text fill="#888" font-size="7" x="373" y="90">#12121f</text>

  <!-- Text -->
  <rect x="440" y="20" width="55" height="40" fill="#cccccc" rx="4"/>
  <text fill="#ffffff" font-size="8" x="443" y="78">Text</text>
  <text fill="#888" font-size="7" x="443" y="90">#cccccc</text>

  <!-- Dim -->
  <rect x="510" y="20" width="55" height="40" fill="#666666" rx="4"/>
  <text fill="#ffffff" font-size="8" x="513" y="78">Dim</text>
  <text fill="#888" font-size="7" x="513" y="90">#666666</text>

  <!-- Gold -->
  <rect x="580" y="20" width="55" height="40" fill="#ffd700" rx="4"/>
  <text fill="#ffffff" font-size="8" x="583" y="78">Best</text>
  <text fill="#888" font-size="7" x="583" y="90">#ffd700</text>

  <!-- Border -->
  <rect width="680" height="120" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
