<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #ff8844; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>
  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Word chain illustration on the left -->
  <g font-family="monospace" shape-rendering="crispEdges">
    <!-- "apple" — player word -->
    <rect x="30" y="20" width="80" height="26" fill="#12121f" stroke="#ff8844" stroke-width="1.5" rx="3"/>
    <text fill="#ff8844" font-size="12" x="42" y="38">apple</text>
    <text fill="#44ff66" font-size="8" x="115" y="38">+5</text>

    <!-- arrow -->
    <line x1="65" y1="46" x2="65" y2="56" stroke="#555" stroke-width="1"/>
    <polygon points="65,60 61,54 69,54" fill="#555"/>

    <!-- "elephant" — AI word (blue) -->
    <rect x="20" y="62" width="100" height="26" fill="#12121f" stroke="#44aaff" stroke-width="1.5" rx="3"/>
    <text fill="#44aaff" font-size="12" x="32" y="80">elephant</text>
    <text fill="#44ff66" font-size="8" x="125" y="80">+8</text>

    <!-- arrow -->
    <line x1="65" y1="88" x2="65" y2="98" stroke="#555" stroke-width="1"/>
    <polygon points="65,102 61,96 69,96" fill="#555"/>

    <!-- "tiger" — player word -->
    <rect x="30" y="104" width="70" height="26" fill="#12121f" stroke="#ff8844" stroke-width="1.5" rx="3"/>
    <text fill="#ff8844" font-size="12" x="42" y="122">tiger</text>
    <text fill="#44ff66" font-size="8" x="105" y="122">+5</text>

    <!-- arrow -->
    <line x1="65" y1="130" x2="65" y2="140" stroke="#555" stroke-width="1"/>
    <polygon points="65,144 61,138 69,138" fill="#555"/>

    <!-- "rabbit" — AI word (blue) -->
    <rect x="25" y="146" width="80" height="26" fill="#12121f" stroke="#44aaff" stroke-width="1.5" rx="3"/>
    <text fill="#44aaff" font-size="12" x="35" y="164">rabbit</text>
    <text fill="#44ff66" font-size="8" x="110" y="164">+6</text>

    <!-- Chain link letters -->
    <circle cx="102" cy="38" r="8" fill="#ff8844" opacity="0.3"/>
    <text fill="#ffffff" font-size="9" font-weight="bold" x="99" y="41">e</text>
    <circle cx="112" cy="80" r="8" fill="#44aaff" opacity="0.3"/>
    <text fill="#ffffff" font-size="9" font-weight="bold" x="109" y="83">t</text>
    <circle cx="92" cy="122" r="8" fill="#ff8844" opacity="0.3"/>
    <text fill="#ffffff" font-size="9" font-weight="bold" x="89" y="125">r</text>
  </g>

  <!-- Mode selector mock -->
  <g transform="translate(155, 30)">
    <!-- Player icon (pixel) -->
    <rect x="0" y="0" width="50" height="50" fill="#12121f" stroke="#ff8844" stroke-width="1.5" rx="6"/>
    <g transform="translate(13, 8)" shape-rendering="crispEdges">
      <rect x="6" y="0" width="3" height="3" fill="#fff"/><rect x="9" y="0" width="3" height="3" fill="#fff"/>
      <rect x="3" y="3" width="3" height="3" fill="#fff"/><rect x="6" y="3" width="3" height="3" fill="#fff"/><rect x="9" y="3" width="3" height="3" fill="#fff"/><rect x="12" y="3" width="3" height="3" fill="#fff"/>
      <rect x="3" y="6" width="3" height="3" fill="#fff"/><rect x="6" y="6" width="3" height="3" fill="#222"/><rect x="9" y="6" width="3" height="3" fill="#222"/><rect x="12" y="6" width="3" height="3" fill="#fff"/>
      <rect x="6" y="9" width="3" height="3" fill="#ff8844"/><rect x="9" y="9" width="3" height="3" fill="#ff8844"/>
      <rect x="3" y="12" width="3" height="3" fill="#ff8844"/><rect x="6" y="12" width="3" height="3" fill="#ff8844"/><rect x="9" y="12" width="3" height="3" fill="#ff8844"/><rect x="12" y="12" width="3" height="3" fill="#ff8844"/>
    </g>
    <text fill="#ff8844" font-family="monospace" font-size="8" text-anchor="middle" x="25" y="62">Solo</text>

    <!-- AI icon (pixel) -->
    <rect x="65" y="0" width="50" height="50" fill="#12121f" stroke="#44aaff" stroke-width="1.5" rx="6"/>
    <g transform="translate(78, 8)" shape-rendering="crispEdges">
      <rect x="3" y="0" width="3" height="3" fill="#44aaff"/><rect x="6" y="0" width="3" height="3" fill="#44aaff"/><rect x="9" y="0" width="3" height="3" fill="#44aaff"/><rect x="12" y="0" width="3" height="3" fill="#44aaff"/><rect x="15" y="0" width="3" height="3" fill="#44aaff"/>
      <rect x="0" y="3" width="3" height="3" fill="#44aaff"/><rect x="3" y="3" width="3" height="3" fill="#44aaff"/><rect x="6" y="3" width="3" height="3" fill="#44aaff"/><rect x="9" y="3" width="3" height="3" fill="#44aaff"/><rect x="12" y="3" width="3" height="3" fill="#44aaff"/><rect x="15" y="3" width="3" height="3" fill="#44aaff"/><rect x="18" y="3" width="3" height="3" fill="#44aaff"/>
      <rect x="0" y="6" width="3" height="3" fill="#44aaff"/><rect x="3" y="6" width="3" height="3" fill="#44aaff"/><rect x="6" y="6" width="3" height="3" fill="#222"/><rect x="9" y="6" width="3" height="3" fill="#44aaff"/><rect x="12" y="6" width="3" height="3" fill="#222"/><rect x="15" y="6" width="3" height="3" fill="#44aaff"/><rect x="18" y="6" width="3" height="3" fill="#44aaff"/>
      <rect x="0" y="9" width="3" height="3" fill="#44aaff"/><rect x="3" y="9" width="3" height="3" fill="#44aaff"/><rect x="6" y="9" width="3" height="3" fill="#44aaff"/><rect x="9" y="9" width="3" height="3" fill="#44aaff"/><rect x="12" y="9" width="3" height="3" fill="#44aaff"/><rect x="15" y="9" width="3" height="3" fill="#44aaff"/><rect x="18" y="9" width="3" height="3" fill="#44aaff"/>
      <rect x="6" y="12" width="3" height="3" fill="#44aaff"/><rect x="12" y="12" width="3" height="3" fill="#44aaff"/>
    </g>
    <text fill="#44aaff" font-family="monospace" font-size="8" text-anchor="middle" x="90" y="62">vs AI</text>
  </g>

  <!-- Title -->
  <text class="title" x="320" y="95">WORD CHAIN</text>
  <text class="sub" x="320" y="125">Solo or vs AI · 370k words · Score by length</text>

  <!-- Score HUD mock -->
  <g transform="translate(320, 145)">
    <rect width="300" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ff8844" x="55" y="19">42</text>
    <text font-family="monospace" font-size="9" fill="#666" x="90" y="19">CHAIN</text>
    <text font-family="monospace" font-size="9" fill="#ff8844" x="135" y="19">7</text>
    <text font-family="monospace" font-size="9" fill="#666" x="170" y="19">TIME</text>
    <text font-family="monospace" font-size="9" fill="#ff8844" x="210" y="19">47</text>
    <text font-family="monospace" font-size="9" fill="#666" x="245" y="19">BEST</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="280" y="19">86</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
