<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 520" width="380" height="520">
  <rect width="380" height="520" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>

  <!-- HUD bar -->
  <rect x="10" y="10" width="360" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
  <text fill="#666" font-size="9" x="20" y="29">SCORE</text>
  <text fill="#ff8844" font-size="11" font-weight="bold" x="65" y="29">42</text>
  <text fill="#666" font-size="9" x="110" y="29">CHAIN</text>
  <text fill="#ff8844" font-size="11" font-weight="bold" x="160" y="29">7</text>
  <text fill="#666" font-size="9" x="290" y="29">TIME</text>
  <text fill="#ff8844" font-size="11" font-weight="bold" x="325" y="29">42</text>

  <!-- Turn indicator (vs AI mode) -->
  <rect x="120" y="50" width="140" height="24" fill="rgba(255,136,68,0.1)" stroke="rgba(255,136,68,0.3)" stroke-width="1" rx="4"/>
  <text fill="#ff8844" font-size="10" font-weight="bold" text-anchor="middle" x="190" y="66">Your turn</text>

  <!-- Required letter label -->
  <text fill="#666" font-size="10" text-anchor="middle" x="190" y="95">NEXT WORD STARTS WITH:</text>

  <!-- Big required letter -->
  <rect x="155" y="102" width="70" height="70" fill="#ff8844" rx="10"/>
  <text fill="#0a0a16" font-size="44" font-weight="bold" text-anchor="middle" x="190" y="154">E</text>

  <!-- Message area (success) -->
  <text fill="#44ff66" font-size="10" text-anchor="middle" x="190" y="192">+8pts Amazing!</text>

  <!-- Input field -->
  <rect x="30" y="200" width="320" height="40" fill="#12121f" stroke="#ff8844" stroke-width="2" rx="4"/>
  <text fill="#ffffff" font-size="16" text-anchor="middle" x="190" y="226" letter-spacing="2">eagle</text>
  <rect x="222" y="213" width="2" height="18" fill="#ff8844" opacity="0.8"/>

  <!-- Word history -->
  <rect x="30" y="255" width="320" height="220" fill="#0e0e1a" stroke="#2a2a40" stroke-width="1.5" rx="4"/>

  <!-- History items with player tags and scores -->
  <!-- 7. turtle (player, newest) -->
  <text x="45" y="280" font-size="12">
    <tspan fill="#555" font-size="10">7.</tspan>
    <tspan fill="#ff8844" font-size="9" dx="4">P</tspan>
    <tspan fill="#ff8844" font-weight="bold" dx="4">turtle</tspan>
    <tspan fill="#44ff66" font-size="9" dx="8">+6</tspan>
    <tspan fill="#555" font-size="9" dx="8">&#x2192; E</tspan>
  </text>

  <!-- 6. rabbit (AI) -->
  <line x1="45" y1="290" x2="325" y2="290" stroke="#1a1a2e" stroke-width="1"/>
  <text x="45" y="308" font-size="12">
    <tspan fill="#555" font-size="10">6.</tspan>
    <tspan fill="#44aaff" font-size="9" dx="4">AI</tspan>
    <tspan fill="#44aaff" dx="4">rabbit</tspan>
    <tspan fill="#44aaff" font-size="9" dx="8">+6</tspan>
    <tspan fill="#555" font-size="9" dx="8">&#x2192; T</tspan>
  </text>

  <!-- 5. tiger (player) -->
  <line x1="45" y1="318" x2="325" y2="318" stroke="#1a1a2e" stroke-width="1"/>
  <text x="45" y="336" font-size="12">
    <tspan fill="#555" font-size="10">5.</tspan>
    <tspan fill="#ff8844" font-size="9" dx="4">P</tspan>
    <tspan fill="#ccc" dx="4">tiger</tspan>
    <tspan fill="#44ff66" font-size="9" dx="8">+5</tspan>
    <tspan fill="#555" font-size="9" dx="8">&#x2192; R</tspan>
  </text>

  <!-- 4. elephant (AI) -->
  <line x1="45" y1="346" x2="325" y2="346" stroke="#1a1a2e" stroke-width="1"/>
  <text x="45" y="364" font-size="12">
    <tspan fill="#555" font-size="10">4.</tspan>
    <tspan fill="#44aaff" font-size="9" dx="4">AI</tspan>
    <tspan fill="#44aaff" dx="4">elephant</tspan>
    <tspan fill="#44aaff" font-size="9" dx="8">+8</tspan>
    <tspan fill="#555" font-size="9" dx="8">&#x2192; T</tspan>
  </text>

  <!-- 3. apple (player) -->
  <line x1="45" y1="374" x2="325" y2="374" stroke="#1a1a2e" stroke-width="1"/>
  <text x="45" y="392" font-size="12">
    <tspan fill="#555" font-size="10">3.</tspan>
    <tspan fill="#ff8844" font-size="9" dx="4">P</tspan>
    <tspan fill="#ccc" dx="4">apple</tspan>
    <tspan fill="#44ff66" font-size="9" dx="8">+5</tspan>
    <tspan fill="#555" font-size="9" dx="8">&#x2192; E</tspan>
  </text>

  <!-- 2. mesa (AI) -->
  <line x1="45" y1="402" x2="325" y2="402" stroke="#1a1a2e" stroke-width="1"/>
  <text x="45" y="420" font-size="12">
    <tspan fill="#555" font-size="10">2.</tspan>
    <tspan fill="#44aaff" font-size="9" dx="4">AI</tspan>
    <tspan fill="#44aaff" dx="4">mesa</tspan>
    <tspan fill="#44aaff" font-size="9" dx="8">+4</tspan>
    <tspan fill="#555" font-size="9" dx="8">&#x2192; A</tspan>
  </text>

  <!-- 1. dream (player) -->
  <line x1="45" y1="430" x2="325" y2="430" stroke="#1a1a2e" stroke-width="1"/>
  <text x="45" y="448" font-size="12">
    <tspan fill="#555" font-size="10">1.</tspan>
    <tspan fill="#ff8844" font-size="9" dx="4">P</tspan>
    <tspan fill="#ccc" dx="4">dream</tspan>
    <tspan fill="#44ff66" font-size="9" dx="8">+5</tspan>
    <tspan fill="#555" font-size="9" dx="8">&#x2192; M</tspan>
  </text>

  <!-- Timer bar -->
  <rect x="30" y="488" width="320" height="8" fill="#1a1a2e" rx="4"/>
  <rect x="30" y="488" width="224" height="8" fill="#ff8844" rx="4"/>

  <!-- Border -->
  <rect width="380" height="520" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
