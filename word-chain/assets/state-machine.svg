<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" width="560" height="280">
  <rect width="560" height="280" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>

  <!-- MODE SELECT box -->
  <rect x="20" y="100" width="100" height="40" fill="#12121f" stroke="#c084fc" stroke-width="2" rx="4"/>
  <text fill="#c084fc" font-size="10" x="28" y="124" font-weight="bold">MODE SEL</text>

  <!-- IDLE box -->
  <rect x="160" y="100" width="80" height="40" fill="#12121f" stroke="#44aaff" stroke-width="2" rx="4"/>
  <text fill="#44aaff" font-size="11" x="178" y="125" font-weight="bold">IDLE</text>

  <!-- PLAYING box -->
  <rect x="280" y="100" width="110" height="40" fill="#12121f" stroke="#44ff66" stroke-width="2" rx="4"/>
  <text fill="#44ff66" font-size="11" x="295" y="125" font-weight="bold">PLAYING</text>

  <!-- PAUSED box -->
  <rect x="280" y="20" width="110" height="40" fill="#12121f" stroke="#ffd700" stroke-width="2" rx="4"/>
  <text fill="#ffd700" font-size="11" x="297" y="45" font-weight="bold">PAUSED</text>

  <!-- OVER box -->
  <rect x="440" y="100" width="100" height="40" fill="#12121f" stroke="#ff4444" stroke-width="2" rx="4"/>
  <text fill="#ff4444" font-size="11" x="465" y="125" font-weight="bold">OVER</text>

  <!-- Arrows -->
  <!-- mode select -> idle -->
  <line x1="120" y1="120" x2="158" y2="120" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="122" y="115">Pick</text>

  <!-- idle -> playing -->
  <line x1="240" y1="120" x2="278" y2="120" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="244" y="115">Start</text>

  <!-- playing -> paused -->
  <line x1="320" y1="100" x2="320" y2="62" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="326" y="85">Esc</text>

  <!-- paused -> playing -->
  <line x1="360" y1="60" x2="360" y2="98" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="366" y="85">Resume</text>

  <!-- playing -> over -->
  <line x1="390" y1="120" x2="438" y2="120" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="392" y="115">Time up</text>

  <!-- paused -> mode select (restart) -->
  <path d="M 280 40 Q 70 10 70 98" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="140" y="20">Restart</text>

  <!-- over -> mode select (play again) -->
  <path d="M 490 140 Q 490 230 280 230 Q 70 230 70 142" fill="none" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="240" y="248">Play Again</text>

  <!-- AI turn note -->
  <rect x="280" y="155" width="110" height="22" fill="rgba(68,170,255,0.1)" stroke="rgba(68,170,255,0.3)" stroke-width="1" rx="3"/>
  <text fill="#44aaff" font-size="8" text-anchor="middle" x="335" y="170">AI turn (vs mode)</text>

  <rect width="560" height="280" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
