<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 500" width="420" height="500">
  <defs>
    <style>
      text { font-family: monospace; }
    </style>
  </defs>
  <rect width="420" height="500" fill="#0a0a16" rx="6"/>

  <!-- HUD bar -->
  <g transform="translate(20, 15)">
    <rect width="380" height="28" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
    <text font-size="10" fill="#666" x="10" y="18">Time</text>
    <text font-size="10" fill="#ffd700" x="45" y="18">3:47</text>
    <text font-size="10" fill="#666" x="310" y="18">Errors</text>
    <text font-size="10" fill="#ffd700" x="360" y="18">1</text>
  </g>

  <!-- Difficulty buttons -->
  <g transform="translate(110, 52)">
    <rect width="50" height="20" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
    <text font-size="8" fill="#888" x="12" y="14">Easy</text>
    <rect x="58" width="60" height="20" fill="#44aaff" rx="3"/>
    <text font-size="8" fill="#0a0a16" x="68" y="14" font-weight="bold">Medium</text>
    <rect x="126" width="50" height="20" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
    <text font-size="8" fill="#888" x="140" y="14">Hard</text>
  </g>

  <!-- 9×9 Sudoku grid -->
  <g transform="translate(30, 82)">
    <!-- Grid background -->
    <rect width="360" height="360" fill="#12121f"/>

    <!-- Thin cell borders -->
    <g stroke="#2a2a40" stroke-width="0.5" fill="none">
      <!-- Vertical thin lines -->
      <line x1="40" y1="0" x2="40" y2="360"/>
      <line x1="80" y1="0" x2="80" y2="360"/>
      <line x1="160" y1="0" x2="160" y2="360"/>
      <line x1="200" y1="0" x2="200" y2="360"/>
      <line x1="280" y1="0" x2="280" y2="360"/>
      <line x1="320" y1="0" x2="320" y2="360"/>
      <!-- Horizontal thin lines -->
      <line x1="0" y1="40" x2="360" y2="40"/>
      <line x1="0" y1="80" x2="360" y2="80"/>
      <line x1="0" y1="160" x2="360" y2="160"/>
      <line x1="0" y1="200" x2="360" y2="200"/>
      <line x1="0" y1="280" x2="360" y2="280"/>
      <line x1="0" y1="320" x2="360" y2="320"/>
    </g>

    <!-- Thick 3×3 box borders -->
    <g stroke="#4a4a60" stroke-width="2.5" fill="none">
      <rect x="0" y="0" width="120" height="120"/>
      <rect x="120" y="0" width="120" height="120"/>
      <rect x="240" y="0" width="120" height="120"/>
      <rect x="0" y="120" width="120" height="120"/>
      <rect x="120" y="120" width="120" height="120"/>
      <rect x="240" y="120" width="120" height="120"/>
      <rect x="0" y="240" width="120" height="120"/>
      <rect x="120" y="240" width="120" height="120"/>
      <rect x="240" y="240" width="120" height="120"/>
    </g>

    <!-- Same-group highlight (row 3, col 4 selected → highlight row 3 and col 4 and box) -->
    <rect x="0" y="120" width="360" height="40" fill="#141422" opacity="0.6"/>
    <rect x="160" y="0" width="40" height="360" fill="#141422" opacity="0.6"/>
    <rect x="120" y="120" width="120" height="120" fill="#141422" opacity="0.3"/>

    <!-- Selected cell highlight -->
    <rect x="160" y="120" width="40" height="40" fill="#1a2a3a" stroke="#ffd700" stroke-width="2"/>

    <!-- Same-number highlight (all 6s glow) -->
    <rect x="0" y="120" width="40" height="40" fill="#1a1a30" opacity="0.7"/>
    <rect x="200" y="120" width="40" height="40" fill="#1a1a30" opacity="0.7"/>

    <!-- Given numbers (bold white) — a realistic mid-game board -->
    <g font-size="18" font-weight="bold" fill="#e0e0e0" text-anchor="middle" dominant-baseline="central">
      <!-- Row 0 -->
      <text x="20" y="20">5</text>
      <text x="60" y="20">3</text>
      <text x="180" y="20">7</text>
      <!-- Row 1 -->
      <text x="20" y="60">6</text>
      <text x="140" y="60">1</text>
      <text x="180" y="60">9</text>
      <text x="220" y="60">5</text>
      <!-- Row 2 -->
      <text x="60" y="100">9</text>
      <text x="100" y="100">8</text>
      <text x="300" y="100">6</text>
      <!-- Row 3 -->
      <text x="20" y="140">8</text>
      <text x="200" y="140">6</text>
      <text x="300" y="140">3</text>
      <!-- Row 4 -->
      <text x="20" y="180">4</text>
      <text x="140" y="180">8</text>
      <text x="300" y="180">1</text>
      <!-- Row 5 -->
      <text x="20" y="220">7</text>
      <text x="140" y="220">2</text>
      <text x="300" y="220">6</text>
      <!-- Row 6 -->
      <text x="60" y="260">6</text>
      <text x="220" y="260">2</text>
      <text x="260" y="260">8</text>
      <!-- Row 7 -->
      <text x="120" y="300">4</text>
      <text x="160" y="300">1</text>
      <text x="220" y="300">9</text>
      <text x="300" y="300">5</text>
      <!-- Row 8 -->
      <text x="260" y="340">8</text>
      <text x="300" y="340">7</text>
      <text x="340" y="340">9</text>
    </g>

    <!-- Player-entered numbers (accent blue) -->
    <g font-size="18" fill="#44aaff" text-anchor="middle" dominant-baseline="central">
      <text x="100" y="20">4</text>
      <text x="220" y="20">8</text>
      <text x="340" y="60">2</text>
      <text x="160" y="140">6</text>
      <!-- Error number (red) -->
    </g>

    <!-- Error cell example: wrong number in red -->
    <rect x="280" y="200" width="40" height="40" fill="#3a1010"/>
    <text font-family="monospace" font-size="18" fill="#ff4444" text-anchor="middle" dominant-baseline="central" x="300" y="220">5</text>

    <!-- Pencil marks example in an empty cell -->
    <g transform="translate(240, 0)" font-size="7" fill="#666688" text-anchor="middle" dominant-baseline="central">
      <text x="7" y="8">1</text>
      <text x="20" y="8">2</text>
      <text x="20" y="27">6</text>
      <text x="33" y="27">9</text>
    </g>
  </g>

  <!-- Number pad -->
  <g transform="translate(30, 455)">
    <g font-size="14" font-weight="bold" text-anchor="middle" dominant-baseline="central">
      <rect x="0" y="0" width="36" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
      <text fill="#e0e0e0" x="18" y="16">1</text>
      <rect x="40" y="0" width="36" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
      <text fill="#e0e0e0" x="58" y="16">2</text>
      <rect x="80" y="0" width="36" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
      <text fill="#e0e0e0" x="98" y="16">3</text>
      <rect x="120" y="0" width="36" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
      <text fill="#e0e0e0" x="138" y="16">4</text>
      <rect x="160" y="0" width="36" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
      <text fill="#e0e0e0" x="178" y="16">5</text>
      <rect x="200" y="0" width="36" height="32" fill="#44aaff" rx="3"/>
      <text fill="#0a0a16" x="218" y="16">6</text>
      <rect x="240" y="0" width="36" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
      <text fill="#e0e0e0" x="258" y="16">7</text>
      <rect x="280" y="0" width="36" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
      <text fill="#e0e0e0" x="298" y="16">8</text>
      <rect x="320" y="0" width="36" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
      <text fill="#e0e0e0" x="338" y="16">9</text>
    </g>
  </g>

  <rect width="420" height="500" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
