<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #44aaff; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Mini Sudoku grid on the left (9×9, 16px cells) -->
  <g transform="translate(30, 20)" shape-rendering="crispEdges">
    <!-- Grid background -->
    <rect width="144" height="144" fill="#12121f" rx="2"/>
    <!-- Thin grid lines -->
    <g stroke="#2a2a40" stroke-width="0.5">
      <line x1="16" y1="0" x2="16" y2="144"/>
      <line x1="32" y1="0" x2="32" y2="144"/>
      <line x1="64" y1="0" x2="64" y2="144"/>
      <line x1="80" y1="0" x2="80" y2="144"/>
      <line x1="112" y1="0" x2="112" y2="144"/>
      <line x1="128" y1="0" x2="128" y2="144"/>
      <line x1="0" y1="16" x2="144" y2="16"/>
      <line x1="0" y1="32" x2="144" y2="32"/>
      <line x1="0" y1="64" x2="144" y2="64"/>
      <line x1="0" y1="80" x2="144" y2="80"/>
      <line x1="0" y1="112" x2="144" y2="112"/>
      <line x1="0" y1="128" x2="144" y2="128"/>
    </g>
    <!-- Thick box borders -->
    <g stroke="#4a4a60" stroke-width="2" fill="none">
      <rect x="0" y="0" width="48" height="48"/>
      <rect x="48" y="0" width="48" height="48"/>
      <rect x="96" y="0" width="48" height="48"/>
      <rect x="0" y="48" width="48" height="48"/>
      <rect x="48" y="48" width="48" height="48"/>
      <rect x="96" y="48" width="48" height="48"/>
      <rect x="0" y="96" width="48" height="48"/>
      <rect x="48" y="96" width="48" height="48"/>
      <rect x="96" y="96" width="48" height="48"/>
    </g>
    <!-- Given numbers (bold white) -->
    <g font-family="monospace" font-size="11" font-weight="bold" fill="#e0e0e0" text-anchor="middle" dominant-baseline="central">
      <text x="8" y="8">5</text>
      <text x="24" y="8">3</text>
      <text x="64" y="8">7</text>
      <text x="8" y="24">6</text>
      <text x="56" y="24">1</text>
      <text x="72" y="24">9</text>
      <text x="80" y="24">5</text>
      <text x="24" y="40">9</text>
      <text x="40" y="40">8</text>
      <text x="96" y="40">6</text>
      <text x="8" y="56">8</text>
      <text x="56" y="56">6</text>
      <text x="96" y="56">3</text>
      <text x="8" y="72">4</text>
      <text x="56" y="72">8</text>
      <text x="96" y="72">1</text>
      <text x="8" y="88">7</text>
      <text x="56" y="88">2</text>
      <text x="96" y="88">6</text>
      <text x="24" y="104">6</text>
      <text x="72" y="104">2</text>
      <text x="80" y="104">8</text>
      <text x="40" y="120">4</text>
      <text x="48" y="120">1</text>
      <text x="72" y="120">9</text>
      <text x="96" y="120">5</text>
      <text x="104" y="136">8</text>
      <text x="120" y="136">7</text>
      <text x="136" y="136">9</text>
    </g>
    <!-- Player numbers (accent blue) -->
    <g font-family="monospace" font-size="11" fill="#44aaff" text-anchor="middle" dominant-baseline="central">
      <text x="48" y="8">4</text>
      <text x="80" y="8">8</text>
      <text x="120" y="56">2</text>
      <text x="136" y="72">7</text>
    </g>
    <!-- Selected cell highlight -->
    <rect x="112" y="48" width="16" height="16" fill="none" stroke="#ffd700" stroke-width="2"/>
  </g>

  <!-- Pixel icon -->
  <g transform="translate(210, 70)" shape-rendering="crispEdges">
    <rect x="1.5" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="3" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="4.5" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="6" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="7.5" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="9" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="10.5" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="12" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="13.5" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="15" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="16.5" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="18" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="19.5" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="3" y="3" width="1.5" height="1.5" fill="#44aaff"/>
    <rect x="7.5" y="3" width="1.5" height="1.5" fill="#44aaff"/>
    <rect x="13.5" y="4.5" width="1.5" height="1.5" fill="#44aaff"/>
    <rect x="4.5" y="7.5" width="1.5" height="1.5" fill="#44aaff"/>
    <rect x="16.5" y="9" width="1.5" height="1.5" fill="#44aaff"/>
    <rect x="10.5" y="10.5" width="1.5" height="1.5" fill="#44aaff"/>
  </g>

  <!-- Title -->
  <text class="title" x="320" y="95">SUDOKU</text>
  <text class="sub" x="320" y="125">Fill · Solve · Think</text>

  <!-- HUD mock -->
  <g transform="translate(320, 145)">
    <rect width="260" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">TIME</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="50" y="19">4:32</text>
    <text font-family="monospace" font-size="9" fill="#666" x="100" y="19">ERRORS</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="155" y="19">1</text>
    <text font-family="monospace" font-size="9" fill="#666" x="190" y="19">DIFF</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="220" y="19">Medium</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
