<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 420" width="320" height="420">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="320" height="420" fill="#0a0a16" rx="6"/>

  <!-- HUD bar -->
  <g transform="translate(20, 15)">
    <rect width="280" height="28" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
    <text font-size="9" fill="#666" x="10" y="18">ROUND</text>
    <text font-size="9" fill="#c084fc" x="55" y="18">4</text>
    <text font-size="9" fill="#666" x="200" y="18">BEST</text>
    <text font-size="9" fill="#c084fc" x="240" y="18">7</text>
  </g>

  <!-- Phase status -->
  <text font-size="13" fill="#44ff66" x="160" y="75" text-anchor="middle">Your turn!</text>

  <!-- 6 identical circular buttons (2×3 grid) -->
  <g transform="translate(80, 95)">
    <!-- Row 1 -->
    <circle cx="40" cy="40" r="34" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <circle cx="120" cy="40" r="34" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <!-- Row 2 — left button is being pressed (glowing) -->
    <circle cx="40" cy="120" r="34" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
    <circle cx="40" cy="120" r="40" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <circle cx="120" cy="120" r="34" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <!-- Row 3 -->
    <circle cx="40" cy="200" r="34" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <circle cx="120" cy="200" r="34" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
  </g>

  <!-- Waveform display -->
  <g transform="translate(70, 340)">
    <rect width="180" height="50" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="4"/>
    <rect x="6" y="20" width="4" height="10" fill="#c084fc" opacity="0.3"/>
    <rect x="13" y="15" width="4" height="20" fill="#c084fc" opacity="0.5"/>
    <rect x="20" y="8" width="4" height="34" fill="#c084fc" opacity="0.9"/>
    <rect x="27" y="12" width="4" height="26" fill="#c084fc" opacity="0.7"/>
    <rect x="34" y="18" width="4" height="14" fill="#c084fc" opacity="0.4"/>
    <rect x="41" y="6" width="4" height="38" fill="#c084fc"/>
    <rect x="48" y="10" width="4" height="30" fill="#c084fc" opacity="0.8"/>
    <rect x="55" y="16" width="4" height="18" fill="#c084fc" opacity="0.5"/>
    <rect x="62" y="20" width="4" height="10" fill="#c084fc" opacity="0.3"/>
    <rect x="69" y="14" width="4" height="22" fill="#c084fc" opacity="0.6"/>
    <rect x="76" y="8" width="4" height="34" fill="#c084fc" opacity="0.85"/>
    <rect x="83" y="12" width="4" height="26" fill="#c084fc" opacity="0.7"/>
    <rect x="90" y="18" width="4" height="14" fill="#c084fc" opacity="0.4"/>
    <rect x="97" y="10" width="4" height="30" fill="#c084fc" opacity="0.8"/>
    <rect x="104" y="5" width="4" height="40" fill="#c084fc"/>
    <rect x="111" y="14" width="4" height="22" fill="#c084fc" opacity="0.6"/>
    <rect x="118" y="20" width="4" height="10" fill="#c084fc" opacity="0.3"/>
    <rect x="125" y="16" width="4" height="18" fill="#c084fc" opacity="0.5"/>
    <rect x="132" y="8" width="4" height="34" fill="#c084fc" opacity="0.9"/>
    <rect x="139" y="12" width="4" height="26" fill="#c084fc" opacity="0.7"/>
    <rect x="146" y="18" width="4" height="14" fill="#c084fc" opacity="0.4"/>
    <rect x="153" y="10" width="4" height="30" fill="#c084fc" opacity="0.8"/>
    <rect x="160" y="6" width="4" height="38" fill="#c084fc" opacity="0.95"/>
    <rect x="167" y="16" width="4" height="18" fill="#c084fc" opacity="0.5"/>
  </g>

  <!-- Border -->
  <rect width="320" height="420" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
