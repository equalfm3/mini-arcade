<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>

  <!-- Desktop section -->
  <text fill="#c084fc" font-size="13" font-weight="bold" x="30" y="28">DESKTOP</text>

  <!-- Click on buttons -->
  <g transform="translate(30, 45)">
    <circle cx="20" cy="20" r="16" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <circle cx="55" cy="20" r="16" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <!-- Cursor arrow -->
    <polygon points="48,8 48,28 55,22" fill="#ffffff" opacity="0.8"/>
    <text fill="#888" font-size="9" x="80" y="24">Click buttons to play tones</text>
  </g>

  <!-- Esc key -->
  <g transform="translate(30, 100)">
    <rect width="36" height="22" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text fill="#e0e0e0" font-size="9" x="5" y="15">ESC</text>
    <text fill="#888" font-size="9" x="50" y="15">Pause / Resume</text>
  </g>

  <!-- P key -->
  <g transform="translate(30, 132)">
    <rect width="24" height="22" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text fill="#e0e0e0" font-size="9" x="7" y="15">P</text>
    <text fill="#888" font-size="9" x="50" y="15">Pause / Resume</text>
  </g>

  <!-- Divider -->
  <line x1="300" y1="15" x2="300" y2="185" stroke="#2a2a40" stroke-width="1"/>

  <!-- Mobile section -->
  <text fill="#c084fc" font-size="13" font-weight="bold" x="330" y="28">MOBILE</text>

  <!-- Tap buttons -->
  <g transform="translate(330, 45)">
    <circle cx="20" cy="20" r="16" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
    <circle cx="20" cy="20" r="22" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <circle cx="55" cy="20" r="16" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <!-- Finger tap indicator -->
    <circle cx="20" cy="20" r="6" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.6"/>
    <text fill="#888" font-size="9" x="80" y="24">Tap buttons directly</text>
  </g>

  <!-- Listen instruction -->
  <g transform="translate(330, 100)">
    <!-- Speaker icon -->
    <rect x="0" y="2" width="10" height="16" fill="#c084fc" rx="2"/>
    <polygon points="10,2 22,-4 22,24 10,18" fill="#c084fc" opacity="0.6"/>
    <!-- Sound waves -->
    <path d="M 26 4 Q 32 10 26 16" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.5"/>
    <path d="M 30 0 Q 38 10 30 20" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.3"/>
    <text fill="#888" font-size="9" x="50" y="15">Listen carefully to tones</text>
  </g>

  <!-- No visual cues note -->
  <g transform="translate(330, 140)">
    <text fill="#ffd700" font-size="9" x="0" y="10">⚠ Buttons look identical!</text>
    <text fill="#888" font-size="9" x="0" y="26">You must listen to identify them</text>
  </g>

  <!-- Border -->
  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
