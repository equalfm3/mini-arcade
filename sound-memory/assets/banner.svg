<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 44px; font-weight: bold; fill: #c084fc; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- 6 identical circular buttons (2×3 grid) -->
  <g>
    <!-- Row 1 -->
    <circle cx="65" cy="50" r="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <circle cx="125" cy="50" r="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <!-- Row 2 -->
    <circle cx="65" cy="105" r="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <!-- Active/glowing button -->
    <circle cx="125" cy="105" r="24" fill="#ffffff" stroke="#ffffff" stroke-width="2"/>
    <circle cx="125" cy="105" r="30" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <circle cx="125" cy="105" r="36" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
    <!-- Row 3 -->
    <circle cx="65" cy="160" r="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <circle cx="125" cy="160" r="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
  </g>

  <!-- Waveform visualization -->
  <g transform="translate(170, 80)">
    <rect width="80" height="40" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="4"/>
    <rect x="4" y="14" width="3" height="12" fill="#c084fc" opacity="0.3"/>
    <rect x="9" y="10" width="3" height="20" fill="#c084fc" opacity="0.5"/>
    <rect x="14" y="6" width="3" height="28" fill="#c084fc" opacity="0.8"/>
    <rect x="19" y="3" width="3" height="34" fill="#c084fc"/>
    <rect x="24" y="8" width="3" height="24" fill="#c084fc" opacity="0.7"/>
    <rect x="29" y="12" width="3" height="16" fill="#c084fc" opacity="0.5"/>
    <rect x="34" y="5" width="3" height="30" fill="#c084fc" opacity="0.9"/>
    <rect x="39" y="10" width="3" height="20" fill="#c084fc" opacity="0.6"/>
    <rect x="44" y="14" width="3" height="12" fill="#c084fc" opacity="0.4"/>
    <rect x="49" y="8" width="3" height="24" fill="#c084fc" opacity="0.7"/>
    <rect x="54" y="4" width="3" height="32" fill="#c084fc" opacity="0.85"/>
    <rect x="59" y="11" width="3" height="18" fill="#c084fc" opacity="0.5"/>
    <rect x="64" y="15" width="3" height="10" fill="#c084fc" opacity="0.3"/>
    <rect x="69" y="13" width="3" height="14" fill="#c084fc" opacity="0.4"/>
  </g>

  <!-- Pixel icon (sound-memory from icons.js) -->
  <g transform="translate(290, 30)" shape-rendering="crispEdges">
    <rect x="6" y="1.5" width="9" height="1.5" fill="#e0e0e0"/>
    <rect x="4.5" y="3" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="15" y="3" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="3" y="4.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="6" y="4.5" width="6" height="1.5" fill="#e0e0e0"/>
    <rect x="16.5" y="4.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="3" y="6" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="4.5" y="6" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="10.5" y="6" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="15" y="6" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="16.5" y="6" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="1.5" y="7.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="4.5" y="7.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="7.5" y="7.5" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="13.5" y="7.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="18" y="7.5" width="1.5" height="1.5" fill="#e0e0e0"/>
  </g>

  <!-- Title -->
  <text class="title" x="330" y="85">SOUND MEMORY</text>
  <text class="sub" x="330" y="113">Listen · Remember · Repeat</text>

  <!-- Score HUD mock -->
  <g transform="translate(330, 135)">
    <rect width="240" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">ROUND</text>
    <text font-family="monospace" font-size="9" fill="#c084fc" x="55" y="19">5</text>
    <text font-family="monospace" font-size="9" fill="#666" x="110" y="19">BEST</text>
    <text font-family="monospace" font-size="9" fill="#c084fc" x="150" y="19">9</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
