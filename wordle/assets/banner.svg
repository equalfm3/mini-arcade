<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #538d4e; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Wordle tiles on the left: "CRANE" with results -->
  <g shape-rendering="crispEdges">
    <!-- Row 1: C(absent) R(present) A(present) N(absent) E(correct) -->
    <rect x="30" y="25" width="40" height="40" fill="#3a3a4c" rx="3"/>
    <rect x="75" y="25" width="40" height="40" fill="#b59f3b" rx="3"/>
    <rect x="120" y="25" width="40" height="40" fill="#b59f3b" rx="3"/>
    <rect x="165" y="25" width="40" height="40" fill="#3a3a4c" rx="3"/>
    <rect x="210" y="25" width="40" height="40" fill="#538d4e" rx="3"/>

    <!-- Row 2: S(absent) T(absent) A(correct) R(absent) E(correct) -->
    <rect x="30" y="70" width="40" height="40" fill="#3a3a4c" rx="3"/>
    <rect x="75" y="70" width="40" height="40" fill="#3a3a4c" rx="3"/>
    <rect x="120" y="70" width="40" height="40" fill="#538d4e" rx="3"/>
    <rect x="165" y="70" width="40" height="40" fill="#3a3a4c" rx="3"/>
    <rect x="210" y="70" width="40" height="40" fill="#538d4e" rx="3"/>

    <!-- Row 3: G(correct) R(correct) A(correct) P(correct) E(correct) — WIN -->
    <rect x="30" y="115" width="40" height="40" fill="#538d4e" rx="3"/>
    <rect x="75" y="115" width="40" height="40" fill="#538d4e" rx="3"/>
    <rect x="120" y="115" width="40" height="40" fill="#538d4e" rx="3"/>
    <rect x="165" y="115" width="40" height="40" fill="#538d4e" rx="3"/>
    <rect x="210" y="115" width="40" height="40" fill="#538d4e" rx="3"/>

    <!-- Letters -->
    <text font-family="monospace" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">
      <tspan x="50" y="52">C</tspan><tspan x="95" y="52">R</tspan><tspan x="140" y="52">A</tspan><tspan x="185" y="52">N</tspan><tspan x="230" y="52">E</tspan>
      <tspan x="50" y="97">S</tspan><tspan x="95" y="97">T</tspan><tspan x="140" y="97">A</tspan><tspan x="185" y="97">R</tspan><tspan x="230" y="97">E</tspan>
      <tspan x="50" y="142">G</tspan><tspan x="95" y="142">R</tspan><tspan x="140" y="142">A</tspan><tspan x="185" y="142">P</tspan><tspan x="230" y="142">E</tspan>
    </text>

    <!-- Empty rows (3 more) -->
    <rect x="30" y="160" width="40" height="12" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="2"/>
    <rect x="75" y="160" width="40" height="12" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="2"/>
    <rect x="120" y="160" width="40" height="12" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="2"/>
    <rect x="165" y="160" width="40" height="12" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="2"/>
    <rect x="210" y="160" width="40" height="12" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="2"/>
  </g>

  <!-- Pixel icon (wordle icon from icons.js) -->
  <g transform="translate(310, 30)" shape-rendering="crispEdges">
    <rect x="3" y="0" width="3" height="3" fill="#44ff66"/>
    <rect x="6" y="0" width="3" height="3" fill="#44ff66"/>
    <rect x="9" y="0" width="3" height="3" fill="#ffd700"/>
    <rect x="12" y="0" width="3" height="3" fill="#ffd700"/>
    <rect x="15" y="0" width="3" height="3" fill="#666"/>
    <rect x="18" y="0" width="3" height="3" fill="#666"/>
    <rect x="21" y="0" width="3" height="3" fill="#666"/>
    <rect x="24" y="0" width="3" height="3" fill="#666"/>
    <rect x="27" y="0" width="3" height="3" fill="#666"/>
    <rect x="30" y="0" width="3" height="3" fill="#666"/>
    <rect x="3" y="3" width="3" height="3" fill="#44ff66"/>
    <rect x="6" y="3" width="3" height="3" fill="#44ff66"/>
    <rect x="9" y="3" width="3" height="3" fill="#ffd700"/>
    <rect x="12" y="3" width="3" height="3" fill="#ffd700"/>
    <rect x="15" y="3" width="3" height="3" fill="#666"/>
    <rect x="18" y="3" width="3" height="3" fill="#666"/>
    <rect x="21" y="3" width="3" height="3" fill="#666"/>
    <rect x="24" y="3" width="3" height="3" fill="#666"/>
    <rect x="27" y="3" width="3" height="3" fill="#666"/>
    <rect x="30" y="3" width="3" height="3" fill="#666"/>
  </g>

  <!-- Title -->
  <text class="title" x="370" y="90">WORDLE</text>
  <text class="sub" x="370" y="118">Guess · Flip · Solve</text>

  <!-- HUD mock -->
  <g transform="translate(370, 140)">
    <rect width="240" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">GUESS</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">3/6</text>
    <text font-family="monospace" font-size="9" fill="#666" x="110" y="19">STREAK</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="165" y="19">5</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
