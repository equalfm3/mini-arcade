<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <rect width="600" height="340" fill="#0a0a16" rx="6"/>

  <text font-family="monospace" font-size="13" fill="#538d4e" font-weight="bold" x="20" y="25">EVALUATION ALGORITHM — Duplicate Handling</text>

  <!-- Example: target "APPLE", guess "PAPAL" -->
  <text font-family="monospace" font-size="11" fill="#888" x="20" y="50">Example: target = APPLE, guess = PAPAL</text>

  <!-- Pass 1: Exact matches -->
  <text font-family="monospace" font-size="11" fill="#b59f3b" font-weight="bold" x="20" y="80">Pass 1: Mark exact matches</text>

  <!-- Target letters -->
  <text font-family="monospace" font-size="9" fill="#666" x="20" y="100">Target:</text>
  <rect x="90" y="88" width="36" height="24" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="2"/>
  <rect x="130" y="88" width="36" height="24" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="2"/>
  <rect x="170" y="88" width="36" height="24" fill="#538d4e" stroke="#538d4e" stroke-width="1" rx="2"/>
  <rect x="210" y="88" width="36" height="24" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="2"/>
  <rect x="250" y="88" width="36" height="24" fill="#538d4e" stroke="#538d4e" stroke-width="1" rx="2"/>
  <text font-family="monospace" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">
    <tspan x="108" y="105">A</tspan><tspan x="148" y="105">P</tspan><tspan x="188" y="105">P</tspan><tspan x="228" y="105">L</tspan><tspan x="268" y="105">E</tspan>
  </text>

  <!-- Guess letters -->
  <text font-family="monospace" font-size="9" fill="#666" x="20" y="130">Guess:</text>
  <rect x="90" y="118" width="36" height="24" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="2"/>
  <rect x="130" y="118" width="36" height="24" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="2"/>
  <rect x="170" y="118" width="36" height="24" fill="#538d4e" stroke="#538d4e" stroke-width="1" rx="2"/>
  <rect x="210" y="118" width="36" height="24" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="2"/>
  <rect x="250" y="118" width="36" height="24" fill="#538d4e" stroke="#538d4e" stroke-width="1" rx="2"/>
  <text font-family="monospace" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">
    <tspan x="108" y="135">P</tspan><tspan x="148" y="135">A</tspan><tspan x="188" y="135">P</tspan><tspan x="228" y="135">A</tspan><tspan x="268" y="135">L</tspan>
  </text>

  <!-- Check marks for matches -->
  <text font-family="monospace" font-size="9" fill="#538d4e" text-anchor="middle">
    <tspan x="108" y="155">—</tspan><tspan x="148" y="155">—</tspan><tspan x="188" y="155">✓</tspan><tspan x="228" y="155">—</tspan><tspan x="268" y="155">✓</tspan>
  </text>

  <text font-family="monospace" font-size="9" fill="#666" x="310" y="105">Remaining target: A, P, E</text>
  <text font-family="monospace" font-size="9" fill="#666" x="310" y="120">(P at [2] and L at [4] matched)</text>

  <!-- Pass 2: Present / Absent -->
  <text font-family="monospace" font-size="11" fill="#b59f3b" font-weight="bold" x="20" y="185">Pass 2: Check remaining letters</text>

  <text font-family="monospace" font-size="9" fill="#666" x="20" y="205">P[0]: P in remaining {A,P,E}?</text>
  <text font-family="monospace" font-size="9" fill="#b59f3b" x="280" y="205">→ PRESENT (consume P)</text>

  <text font-family="monospace" font-size="9" fill="#666" x="20" y="222">A[1]: A in remaining {A,E}?</text>
  <text font-family="monospace" font-size="9" fill="#b59f3b" x="280" y="222">→ PRESENT (consume A)</text>

  <text font-family="monospace" font-size="9" fill="#666" x="20" y="239">A[3]: A in remaining {E}?</text>
  <text font-family="monospace" font-size="9" fill="#3a3a4c" x="280" y="239">→ ABSENT (no A left)</text>

  <!-- Final result -->
  <text font-family="monospace" font-size="11" fill="#538d4e" font-weight="bold" x="20" y="270">Result:</text>
  <rect x="90" y="258" width="36" height="28" fill="#b59f3b" rx="3"/>
  <rect x="130" y="258" width="36" height="28" fill="#b59f3b" rx="3"/>
  <rect x="170" y="258" width="36" height="28" fill="#538d4e" rx="3"/>
  <rect x="210" y="258" width="36" height="28" fill="#3a3a4c" rx="3"/>
  <rect x="250" y="258" width="36" height="28" fill="#538d4e" rx="3"/>
  <text font-family="monospace" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">
    <tspan x="108" y="278">P</tspan><tspan x="148" y="278">A</tspan><tspan x="188" y="278">P</tspan><tspan x="228" y="278">A</tspan><tspan x="268" y="278">L</tspan>
  </text>

  <text font-family="monospace" font-size="9" fill="#666" x="310" y="275">present · present · correct · absent · correct</text>

  <!-- Key insight -->
  <rect x="20" y="300" width="560" height="24" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
  <text font-family="monospace" font-size="9" fill="#b59f3b" x="30" y="316">Key: Each target letter can only be "consumed" once. Correct matches take priority.</text>

  <!-- Border -->
  <rect width="600" height="340" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
