<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <rect width="800" height="120" fill="#0a0a16" rx="8"/>
  <rect x="2" y="2" width="796" height="116" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>

  <text x="400" y="25" fill="#ffd700" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">CONTROLS</text>

  <!-- Click diagram -->
  <g transform="translate(200,65)">
    <!-- Center cell -->
    <rect x="-15" y="-15" width="30" height="30" fill="#ffd700" rx="4" stroke="#2a2a40" stroke-width="1"/>
    <!-- Neighbors -->
    <rect x="-15" y="-50" width="30" height="30" fill="#ffd700" rx="4" opacity="0.6"/>
    <rect x="-15" y="20" width="30" height="30" fill="#ffd700" rx="4" opacity="0.6"/>
    <rect x="-50" y="-15" width="30" height="30" fill="#ffd700" rx="4" opacity="0.6"/>
    <rect x="20" y="-15" width="30" height="30" fill="#ffd700" rx="4" opacity="0.6"/>

    <text x="0" y="4" fill="#0a0a16" font-family="monospace" font-weight="bold" font-size="10" text-anchor="middle">TAP</text>
  </g>

  <text x="320" y="55" fill="#888" font-family="monospace" font-size="10">Click a cell to toggle</text>
  <text x="320" y="70" fill="#888" font-family="monospace" font-size="10">it + 4 neighbors</text>

  <!-- Goal -->
  <g transform="translate(580,65)">
    <rect x="-40" y="-20" width="80" height="40" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="4"/>
    <text x="0" y="4" fill="#888" font-family="monospace" font-size="10" text-anchor="middle">ALL OFF</text>
  </g>
  <text x="580" y="95" fill="#666" font-family="monospace" font-size="9" text-anchor="middle">Goal: turn all lights off</text>

  <text x="400" y="108" fill="#666" font-family="monospace" font-size="10" text-anchor="middle">ESC = Pause</text>
</svg>
