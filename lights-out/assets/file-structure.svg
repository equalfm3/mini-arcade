  <rect width="680" height="200" fill="#0a0a16" rx="8"/>
  <rect x="2" y="2" width="676" height="196" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>

  <text x="20" y="30" fill="#ffd700" font-family="monospace" font-weight="bold" font-size="13">lights-out/</text>

  <text x="30" y="55" fill="#888" font-family="monospace" font-size="11">index.html</text>
  <text x="250" y="55" fill="#555" font-family="monospace" font-size="10">Entry point — GAME config + arcade.js loader</text>

  <text x="30" y="75" fill="#888" font-family="monospace" font-size="11">style.css</text>
