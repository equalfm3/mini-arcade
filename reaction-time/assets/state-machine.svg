<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" width="500" height="250">
  <rect width="500" height="250" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>

  <!-- IDLE box -->
  <rect x="20" y="90" width="80" height="40" fill="#12121f" stroke="#44aaff" stroke-width="2" rx="4"/>
  <text fill="#44aaff" font-size="11" x="37" y="115" font-weight="bold">IDLE</text>

  <!-- PLAYING box -->
  <rect x="170" y="90" width="110" height="40" fill="#12121f" stroke="#44ff66" stroke-width="2" rx="4"/>
  <text fill="#44ff66" font-size="11" x="185" y="115" font-weight="bold">PLAYING</text>

  <!-- PAUSED box -->
  <rect x="170" y="20" width="110" height="40" fill="#12121f" stroke="#ffd700" stroke-width="2" rx="4"/>
  <text fill="#ffd700" font-size="11" x="187" y="45" font-weight="bold">PAUSED</text>

  <!-- OVER box -->
  <rect x="370" y="90" width="100" height="40" fill="#12121f" stroke="#ff4444" stroke-width="2" rx="4"/>
  <text fill="#ff4444" font-size="11" x="393" y="115" font-weight="bold">OVER</text>

  <!-- Arrows -->
  <!-- idle → playing -->
  <line x1="100" y1="110" x2="168" y2="110" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="110" y="105">Start</text>

  <!-- playing → paused -->
  <line x1="210" y1="90" x2="210" y2="62" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="216" y="80">Esc</text>

  <!-- paused → playing -->
  <line x1="250" y1="60" x2="250" y2="88" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="256" y="80">Resume</text>

  <!-- playing → over (not used in reaction time, but Engine supports it) -->
  <line x1="280" y1="110" x2="368" y2="110" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text fill="#888" font-size="8" x="300" y="105">Game Over</text>

  <!-- paused → idle (restart) -->
  <path d="M 170 40 Q 60 40 60 88" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="80" y="35">Restart</text>

  <!-- over → idle (play again) -->
  <path d="M 420 130 Q 420 200 225 200 Q 60 200 60 132" fill="none" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="190" y="215">Play Again</text>

  <!-- Inner state note -->
  <text fill="#555" font-size="8" x="140" y="170">Playing state cycles: wait → ready → go → result</text>

  <rect width="500" height="250" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
