<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #22cc44; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>
  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Left side: Red/Green zones illustration -->
  <g>
    <!-- Red zone (waiting) -->
    <rect x="30" y="20" width="100" height="70" fill="#cc2222" rx="6"/>
    <text font-family="monospace" font-size="10" fill="#fff" x="45" y="50" opacity="0.9">Wait…</text>
    <text font-family="monospace" font-size="8" fill="#fff" x="50" y="70" opacity="0.5">●●●</text>

    <!-- Arrow -->
    <line x1="140" y1="55" x2="160" y2="55" stroke="#ffd700" stroke-width="2"/>
    <polygon points="160,50 170,55 160,60" fill="#ffd700"/>

    <!-- Green zone (go!) -->
    <rect x="175" y="20" width="100" height="70" fill="#22cc44" rx="6"/>
    <text font-family="monospace" font-size="14" fill="#fff" x="200" y="55" font-weight="bold">TAP!</text>
    <text font-family="monospace" font-size="8" fill="#fff" x="195" y="72" opacity="0.7">⚡ 187ms</text>

    <!-- Timer/stopwatch icon -->
    <g transform="translate(60, 105)">
      <!-- Clock circle -->
      <circle cx="40" cy="40" r="35" fill="none" stroke="#ffd700" stroke-width="2"/>
      <circle cx="40" cy="40" r="32" fill="#12121f"/>
      <!-- Clock hand -->
      <line x1="40" y1="40" x2="40" y2="15" stroke="#22cc44" stroke-width="2" stroke-linecap="round"/>
      <line x1="40" y1="40" x2="55" y2="40" stroke="#ffd700" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Center dot -->
      <circle cx="40" cy="40" r="3" fill="#ffd700"/>
      <!-- Top button -->
      <rect x="35" y="0" width="10" height="6" fill="#ffd700" rx="1"/>
    </g>

    <!-- Rating labels -->
    <g transform="translate(160, 105)">
      <text font-family="monospace" font-size="9" fill="#ffd700" x="0" y="12">⚡ Lightning!</text>
      <text font-family="monospace" font-size="9" fill="#ff8844" x="0" y="28">🔥 Blazing!</text>
      <text font-family="monospace" font-size="9" fill="#44ff66" x="0" y="44">✓ Fast!</text>
      <text font-family="monospace" font-size="9" fill="#44aaff" x="0" y="60">● Good</text>
      <text font-family="monospace" font-size="9" fill="#888" x="0" y="76">○ Average</text>
    </g>
  </g>

  <!-- Pixel icon (reaction-time from icons.js) -->
  <g transform="translate(310, 30)" shape-rendering="crispEdges">
    <!-- Clock face from icon -->
    <rect x="6" y="1.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="7.5" y="1.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="9" y="1.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="10.5" y="1.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="12" y="1.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="13.5" y="1.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="4.5" y="3" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="6" y="3" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="15" y="3" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="16.5" y="3" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="3" y="4.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="4.5" y="4.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="16.5" y="4.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="18" y="4.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="3" y="6" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="9" y="6" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="10.5" y="6" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="18" y="6" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="3" y="7.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="9" y="7.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="10.5" y="7.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="18" y="7.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="3" y="9" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="9" y="9" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="10.5" y="9" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="18" y="9" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="3" y="10.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="10.5" y="10.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="18" y="10.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="3" y="12" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="18" y="12" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="3" y="13.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="4.5" y="13.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="16.5" y="13.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="18" y="13.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="4.5" y="15" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="6" y="15" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="15" y="15" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="16.5" y="15" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="6" y="16.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="7.5" y="16.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="9" y="16.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="10.5" y="16.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="12" y="16.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="13.5" y="16.5" width="1.5" height="1.5" fill="#ffd700"/>
    <!-- Button on top -->
    <rect x="10.5" y="19.5" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="9" y="21" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="10.5" y="21" width="1.5" height="1.5" fill="#ffd700"/>
    <rect x="12" y="21" width="1.5" height="1.5" fill="#ffd700"/>
  </g>

  <!-- Title -->
  <text class="title" x="370" y="90">REACTION TIME</text>
  <text class="sub" x="370" y="118">Wait · Tap · Measure</text>

  <!-- Score HUD mock -->
  <g transform="translate(370, 140)">
    <rect width="280" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">LAST</text>
    <text font-family="monospace" font-size="9" fill="#22cc44" x="50" y="19">187ms</text>
    <text font-family="monospace" font-size="9" fill="#666" x="120" y="19">BEST</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="160" y="19">152ms</text>
    <text font-family="monospace" font-size="9" fill="#666" x="220" y="19">⚡</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
