<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 540" width="360" height="540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0e1a"/>
      <stop offset="100%" stop-color="#1a1028"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="360" height="540" fill="url(#bg)" rx="6"/>

  <!-- Active fruits in the air (mid-arc) -->

  <!-- Watermelon at peak of arc -->
  <g transform="translate(90, 180) rotate(25)">
    <circle cx="0" cy="0" r="26" fill="#44ff66"/>
    <circle cx="0" cy="0" r="26" fill="#22aa44" clip-path="inset(50% 0 0 0)"/>
    <circle cx="-6" cy="-6" r="11" fill="#88ffaa" opacity="0.5"/>
    <circle cx="-8" cy="-9" r="4" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- Orange rising -->
  <g transform="translate(250, 220) rotate(-15)">
    <circle cx="0" cy="0" r="22" fill="#ff8844"/>
    <circle cx="-5" cy="-5" r="9" fill="#ffaa77" opacity="0.5"/>
    <circle cx="-6" cy="-7" r="3" fill="rgba(255,255,255,0.4)"/>
    <rect x="-2" y="-28" width="4" height="8" fill="#44aa44"/>
  </g>

  <!-- Apple at peak -->
  <g transform="translate(170, 150) rotate(40)">
    <circle cx="0" cy="0" r="22" fill="#ff4444"/>
    <circle cx="-5" cy="-5" r="9" fill="#ff7777" opacity="0.5"/>
    <circle cx="-6" cy="-7" r="3" fill="rgba(255,255,255,0.4)"/>
    <rect x="-2" y="-28" width="4" height="8" fill="#44aa44"/>
    <ellipse cx="5" cy="-25" rx="5" ry="3" fill="#44aa44" transform="rotate(20 5 -25)"/>
  </g>

  <!-- Grape descending -->
  <g transform="translate(300, 300) rotate(60)">
    <circle cx="0" cy="0" r="18" fill="#c084fc"/>
    <circle cx="-4" cy="-4" r="7" fill="#d4aaff" opacity="0.5"/>
    <circle cx="-5" cy="-6" r="3" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- Banana rising -->
  <g transform="translate(60, 280) rotate(-30)">
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="#ffd700"/>
    <ellipse cx="-4" cy="-3" rx="9" ry="5" fill="#ffee66" opacity="0.5"/>
  </g>

  <!-- Bomb -->
  <g transform="translate(200, 350) rotate(10)">
    <circle cx="0" cy="0" r="22" fill="#333333"/>
    <circle cx="-4" cy="-4" r="8" fill="#555555"/>
    <line x1="0" y1="-22" x2="4" y2="-34" stroke="#888" stroke-width="2"/>
    <circle cx="4" cy="-36" r="3" fill="#ff4444"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#ff4444" stroke-width="2"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#ff4444" stroke-width="2"/>
  </g>

  <!-- Sliced halves (previously sliced fruit falling) -->
  <g transform="translate(120, 380) rotate(-25)" opacity="0.7">
    <path d="M 0 -16 A 16 16 0 0 0 0 16 Z" fill="#ffcccc"/>
    <path d="M 0 -16 A 16 16 0 0 0 0 16" fill="none" stroke="#ff4444" stroke-width="3"/>
  </g>
  <g transform="translate(155, 370) rotate(20)" opacity="0.7">
    <path d="M 0 -16 A 16 16 0 0 1 0 16 Z" fill="#ffcccc"/>
    <path d="M 0 -16 A 16 16 0 0 1 0 16" fill="none" stroke="#ff4444" stroke-width="3"/>
  </g>

  <!-- Juice particles -->
  <g opacity="0.8">
    <rect x="130" y="360" width="4" height="4" fill="#ff4444"/>
    <rect x="140" y="355" width="3" height="3" fill="#ff7777"/>
    <rect x="148" y="365" width="4" height="4" fill="#cc2222"/>
    <rect x="125" y="370" width="3" height="3" fill="#ff4444"/>
    <rect x="155" y="375" width="3" height="3" fill="#ff7777"/>
    <rect x="135" y="380" width="4" height="4" fill="#cc2222"/>
  </g>

  <!-- Blade trail (white fading line) -->
  <g>
    <line x1="40" y1="400" x2="80" y2="320" stroke="white" stroke-width="1" opacity="0.15"/>
    <line x1="80" y1="320" x2="140" y2="250" stroke="white" stroke-width="1.5" opacity="0.25"/>
    <line x1="140" y1="250" x2="200" y2="200" stroke="white" stroke-width="2" opacity="0.4"/>
    <line x1="200" y1="200" x2="260" y2="170" stroke="white" stroke-width="3" opacity="0.6"/>
    <line x1="260" y1="170" x2="310" y2="160" stroke="white" stroke-width="3.5" opacity="0.8"/>
    <circle cx="310" cy="160" r="2.5" fill="white" opacity="0.9"/>
  </g>

  <!-- Lives (hearts) top-right -->
  <g transform="translate(280, 12)">
    <text font-family="monospace" font-size="16" fill="#ff4444" x="0" y="14">♥</text>
    <text font-family="monospace" font-size="16" fill="#ff4444" x="20" y="14">♥</text>
    <text font-family="monospace" font-size="16" fill="#333333" x="40" y="14">♥</text>
  </g>

  <!-- Combo text -->
  <text font-family="monospace" font-size="24" font-weight="bold" fill="#ffd700" text-anchor="middle" x="180" y="80" opacity="0.8">3x COMBO!</text>

  <!-- Border -->
  <rect width="360" height="540" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
