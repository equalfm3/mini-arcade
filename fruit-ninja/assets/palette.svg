<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <rect width="600" height="180" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>

  <!-- Title -->
  <text fill="#888" font-size="12" x="300" y="22" text-anchor="middle">COLOR PALETTE</text>

  <!-- Fruit colors row -->
  <text fill="#666" font-size="10" x="20" y="52">Fruits</text>

  <!-- Watermelon -->
  <rect x="80" y="38" width="40" height="28" fill="#44ff66" rx="3"/>
  <text fill="#0a0a16" font-size="8" x="100" y="56" text-anchor="middle">#44ff66</text>
  <text fill="#888" font-size="8" x="100" y="78" text-anchor="middle">Melon</text>

  <!-- Orange -->
  <rect x="135" y="38" width="40" height="28" fill="#ff8844" rx="3"/>
  <text fill="#0a0a16" font-size="8" x="155" y="56" text-anchor="middle">#ff8844</text>
  <text fill="#888" font-size="8" x="155" y="78" text-anchor="middle">Orange</text>

  <!-- Apple -->
  <rect x="190" y="38" width="40" height="28" fill="#ff4444" rx="3"/>
  <text fill="#fff" font-size="8" x="210" y="56" text-anchor="middle">#ff4444</text>
  <text fill="#888" font-size="8" x="210" y="78" text-anchor="middle">Apple</text>

  <!-- Banana -->
  <rect x="245" y="38" width="40" height="28" fill="#ffd700" rx="3"/>
  <text fill="#0a0a16" font-size="8" x="265" y="56" text-anchor="middle">#ffd700</text>
  <text fill="#888" font-size="8" x="265" y="78" text-anchor="middle">Banana</text>

  <!-- Grape -->
  <rect x="300" y="38" width="40" height="28" fill="#c084fc" rx="3"/>
  <text fill="#0a0a16" font-size="8" x="320" y="56" text-anchor="middle">#c084fc</text>
  <text fill="#888" font-size="8" x="320" y="78" text-anchor="middle">Grape</text>

  <!-- Bomb -->
  <rect x="370" y="38" width="40" height="28" fill="#333333" rx="3"/>
  <text fill="#888" font-size="8" x="390" y="56" text-anchor="middle">#333333</text>
  <text fill="#888" font-size="8" x="390" y="78" text-anchor="middle">Bomb</text>

  <!-- Fuse -->
  <rect x="425" y="38" width="40" height="28" fill="#ff4444" rx="3"/>
  <text fill="#fff" font-size="8" x="445" y="56" text-anchor="middle">#ff4444</text>
  <text fill="#888" font-size="8" x="445" y="78" text-anchor="middle">Fuse</text>

  <!-- UI colors row -->
  <text fill="#666" font-size="10" x="20" y="110">UI</text>

  <!-- Background -->
  <rect x="80" y="96" width="40" height="28" fill="#0e0e1a" stroke="#2a2a40" stroke-width="1" rx="3"/>
  <text fill="#888" font-size="8" x="100" y="114" text-anchor="middle">#0e0e1a</text>
  <text fill="#888" font-size="8" x="100" y="136" text-anchor="middle">BG Top</text>

  <!-- BG Bottom -->
  <rect x="135" y="96" width="40" height="28" fill="#1a1028" stroke="#2a2a40" stroke-width="1" rx="3"/>
  <text fill="#888" font-size="8" x="155" y="114" text-anchor="middle">#1a1028</text>
  <text fill="#888" font-size="8" x="155" y="136" text-anchor="middle">BG Bot</text>

  <!-- Blade -->
  <rect x="190" y="96" width="40" height="28" fill="#ffffff" rx="3"/>
  <text fill="#0a0a16" font-size="8" x="210" y="114" text-anchor="middle">#ffffff</text>
  <text fill="#888" font-size="8" x="210" y="136" text-anchor="middle">Blade</text>

  <!-- Heart -->
  <rect x="245" y="96" width="40" height="28" fill="#ff4444" rx="3"/>
  <text fill="#fff" font-size="8" x="265" y="114" text-anchor="middle">#ff4444</text>
  <text fill="#888" font-size="8" x="265" y="136" text-anchor="middle">Heart</text>

  <!-- Combo -->
  <rect x="300" y="96" width="40" height="28" fill="#ffd700" rx="3"/>
  <text fill="#0a0a16" font-size="8" x="320" y="114" text-anchor="middle">#ffd700</text>
  <text fill="#888" font-size="8" x="320" y="136" text-anchor="middle">Combo</text>

  <!-- Text -->
  <rect x="355" y="96" width="40" height="28" fill="#e0e0e0" rx="3"/>
  <text fill="#0a0a16" font-size="8" x="375" y="114" text-anchor="middle">#e0e0e0</text>
  <text fill="#888" font-size="8" x="375" y="136" text-anchor="middle">Text</text>

  <!-- Border -->
  <rect width="600" height="180" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
