<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <rect width="500" height="200" fill="#0a0a16" rx="6"/>

  <!-- Desktop section -->
  <text font-family="monospace" font-size="13" fill="#e0e0e0" font-weight="bold" x="120" y="30" text-anchor="middle">Desktop</text>

  <!-- Letter keys -->
  <g transform="translate(20, 45)">
    <rect width="200" height="55" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <!-- Key row -->
    <rect x="15" y="8" width="24" height="20" fill="#1a1a2e" stroke="#3a3a50" stroke-width="1" rx="3"/>
    <text font-family="monospace" font-size="10" fill="#e0e0e0" x="27" y="22" text-anchor="middle">A</text>
    <rect x="43" y="8" width="24" height="20" fill="#1a1a2e" stroke="#3a3a50" stroke-width="1" rx="3"/>
    <text font-family="monospace" font-size="10" fill="#e0e0e0" x="55" y="22" text-anchor="middle">B</text>
    <text font-family="monospace" font-size="12" fill="#888" x="75" y="22">...</text>
    <rect x="95" y="8" width="24" height="20" fill="#1a1a2e" stroke="#3a3a50" stroke-width="1" rx="3"/>
    <text font-family="monospace" font-size="10" fill="#e0e0e0" x="107" y="22" text-anchor="middle">Y</text>
    <rect x="123" y="8" width="24" height="20" fill="#1a1a2e" stroke="#3a3a50" stroke-width="1" rx="3"/>
    <text font-family="monospace" font-size="10" fill="#e0e0e0" x="135" y="22" text-anchor="middle">Z</text>
    <text font-family="monospace" font-size="8" fill="#888" x="100" y="45" text-anchor="middle">Press A–Z to guess a letter</text>
  </g>

  <!-- Esc key -->
  <g transform="translate(20, 115)">
    <rect width="200" height="55" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <rect x="70" y="8" width="60" height="20" fill="#1a1a2e" stroke="#3a3a50" stroke-width="1" rx="3"/>
    <text font-family="monospace" font-size="10" fill="#e0e0e0" x="100" y="22" text-anchor="middle">Escape</text>
    <text font-family="monospace" font-size="8" fill="#888" x="100" y="45" text-anchor="middle">Pause / Resume</text>
  </g>

  <!-- Divider -->
  <line x1="250" y1="20" x2="250" y2="180" stroke="#2a2a40" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Mobile section -->
  <text font-family="monospace" font-size="13" fill="#e0e0e0" font-weight="bold" x="375" y="30" text-anchor="middle">Mobile</text>

  <!-- Tap letter -->
  <g transform="translate(280, 45)">
    <rect width="190" height="55" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <!-- Mini keyboard keys -->
    <rect x="30" y="8" width="24" height="20" fill="#1e1e30" stroke="#2a2a40" stroke-width="1" rx="4"/>
    <text font-family="monospace" font-size="10" fill="#cccccc" x="42" y="22" text-anchor="middle">A</text>
    <rect x="58" y="8" width="24" height="20" fill="#1e1e30" stroke="#2a2a40" stroke-width="1" rx="4"/>
    <text font-family="monospace" font-size="10" fill="#cccccc" x="70" y="22" text-anchor="middle">B</text>
    <rect x="86" y="8" width="24" height="20" fill="#1e1e30" stroke="#2a2a40" stroke-width="1" rx="4"/>
    <text font-family="monospace" font-size="10" fill="#cccccc" x="98" y="22" text-anchor="middle">C</text>
    <!-- Tap finger -->
    <circle cx="70" cy="18" r="8" fill="none" stroke="#c084fc" stroke-width="1.5"/>
    <circle cx="70" cy="18" r="3" fill="#c084fc"/>
    <text font-family="monospace" font-size="8" fill="#888" x="95" y="45" text-anchor="middle">Tap on-screen letter buttons</text>
  </g>

  <!-- Note about P key -->
  <g transform="translate(280, 115)">
    <rect width="190" height="55" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="95" y="20" text-anchor="middle">⚠ P is a letter key</text>
    <text font-family="monospace" font-size="8" fill="#888" x="95" y="38" text-anchor="middle">Use Esc to pause</text>
    <text font-family="monospace" font-size="8" fill="#888" x="95" y="48" text-anchor="middle">(not P like other games)</text>
  </g>

  <!-- Border -->
  <rect width="500" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
