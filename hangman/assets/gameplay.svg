<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 520" width="480" height="520">
  <rect width="480" height="520" fill="#0a0a16" rx="6"/>

  <!-- Category label -->
  <text font-family="monospace" font-size="13" fill="#c084fc" text-anchor="middle" x="240" y="30">Category: Animals</text>

  <!-- Gallows (stage 3 — head, body, left arm) -->
  <g transform="translate(20, 20)">
    <!-- Base -->
    <line x1="20" y1="240" x2="140" y2="240" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <!-- Vertical pole -->
    <line x1="50" y1="240" x2="50" y2="30" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <!-- Horizontal beam -->
    <line x1="50" y1="30" x2="130" y2="30" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <!-- Support brace -->
    <line x1="50" y1="60" x2="80" y2="30" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
    <!-- Rope -->
    <line x1="130" y1="30" x2="130" y2="60" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="130" cy="80" r="20" fill="none" stroke="#e0e0e0" stroke-width="3"/>
    <circle cx="124" cy="76" r="2" fill="#e0e0e0"/>
    <circle cx="136" cy="76" r="2" fill="#e0e0e0"/>
    <!-- Body -->
    <line x1="130" y1="100" x2="130" y2="160" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
    <!-- Left arm -->
    <line x1="130" y1="115" x2="100" y2="145" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Word: _ A _ _ O _ (PARROT with P, R, T missing) -->
  <g>
    <text font-family="monospace" font-size="11" fill="#888888" text-anchor="center" x="240" y="295">3 wrong guesses</text>
    <!-- Blanks for PARROT -->
    <!-- P (hidden) -->
    <line x1="140" y1="320" x2="168" y2="320" stroke="#444466" stroke-width="2"/>
    <!-- A (revealed) -->
    <text font-family="monospace" font-size="32" fill="#44ff66" font-weight="bold" text-anchor="middle" x="194" y="315">A</text>
    <line x1="180" y1="320" x2="208" y2="320" stroke="#444466" stroke-width="2"/>
    <!-- R (hidden) -->
    <line x1="220" y1="320" x2="248" y2="320" stroke="#444466" stroke-width="2"/>
    <!-- R (hidden) -->
    <line x1="260" y1="320" x2="288" y2="320" stroke="#444466" stroke-width="2"/>
    <!-- O (revealed) -->
    <text font-family="monospace" font-size="32" fill="#44ff66" font-weight="bold" text-anchor="middle" x="314" y="315">O</text>
    <line x1="300" y1="320" x2="328" y2="320" stroke="#444466" stroke-width="2"/>
    <!-- T (hidden) -->
    <line x1="340" y1="320" x2="368" y2="320" stroke="#444466" stroke-width="2"/>
  </g>

  <!-- On-screen keyboard (A-Z grid) -->
  <g transform="translate(0, 0)">
    <!-- Row 1: A B C D E F G H I -->
    <!-- A (used correct - green) -->
    <rect x="42" y="380" width="38" height="38" fill="#2a6e2a" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#666666" font-weight="bold" text-anchor="middle" x="61" y="404">A</text>
    <!-- B -->
    <rect x="86" y="380" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="105" y="404">B</text>
    <!-- C -->
    <rect x="130" y="380" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="149" y="404">C</text>
    <!-- D -->
    <rect x="174" y="380" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="193" y="404">D</text>
    <!-- E (used wrong - red) -->
    <rect x="218" y="380" width="38" height="38" fill="#6e2a2a" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#666666" font-weight="bold" text-anchor="middle" x="237" y="404">E</text>
    <!-- F -->
    <rect x="262" y="380" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="281" y="404">F</text>
    <!-- G -->
    <rect x="306" y="380" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="325" y="404">G</text>
    <!-- H -->
    <rect x="350" y="380" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="369" y="404">H</text>
    <!-- I (used wrong - red) -->
    <rect x="394" y="380" width="38" height="38" fill="#6e2a2a" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#666666" font-weight="bold" text-anchor="middle" x="413" y="404">I</text>

    <!-- Row 2: J K L M N O P Q R -->
    <rect x="42" y="424" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="61" y="448">J</text>
    <rect x="86" y="424" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="105" y="448">K</text>
    <rect x="130" y="424" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="149" y="448">L</text>
    <rect x="174" y="424" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="193" y="448">M</text>
    <rect x="218" y="424" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="237" y="448">N</text>
    <!-- O (used correct - green) -->
    <rect x="262" y="424" width="38" height="38" fill="#2a6e2a" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#666666" font-weight="bold" text-anchor="middle" x="281" y="448">O</text>
    <rect x="306" y="424" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="325" y="448">P</text>
    <rect x="350" y="424" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="369" y="448">Q</text>
    <rect x="394" y="424" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="413" y="448">R</text>

    <!-- Row 3: S T U V W X Y Z -->
    <rect x="64" y="468" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="83" y="492">S</text>
    <rect x="108" y="468" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="127" y="492">T</text>
    <!-- U (used wrong - red) -->
    <rect x="152" y="468" width="38" height="38" fill="#6e2a2a" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#666666" font-weight="bold" text-anchor="middle" x="171" y="492">U</text>
    <rect x="196" y="468" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="215" y="492">V</text>
    <rect x="240" y="468" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="259" y="492">W</text>
    <rect x="284" y="468" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="303" y="492">X</text>
    <rect x="328" y="468" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="347" y="492">Y</text>
    <rect x="372" y="468" width="38" height="38" fill="#1e1e30" stroke="#2a2a40" rx="6"/>
    <text font-family="monospace" font-size="16" fill="#cccccc" font-weight="bold" text-anchor="middle" x="391" y="492">Z</text>
  </g>

  <!-- Border -->
  <rect width="480" height="520" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
