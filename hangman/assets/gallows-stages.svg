    <line x1="25" y1="40" x2="60" y2="40" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="60" x2="40" y2="40" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="40" x2="60" y2="55" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
