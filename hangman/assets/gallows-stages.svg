    <line x1="58" y1="64" x2="53" y2="69" stroke="#ff4444" stroke-width="2"/>
    <line x1="62" y1="64" x2="67" y2="69" stroke="#ff4444" stroke-width="2"/>
    <line x1="67" y1="64" x2="62" y2="69" stroke="#ff4444" stroke-width="2"/>
    <line x1="60" y1="85" x2="60" y2="125" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="95" x2="42" y2="115" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="95" x2="78" y2="115" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="125" x2="42" y2="155" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="125" x2="78" y2="155" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
