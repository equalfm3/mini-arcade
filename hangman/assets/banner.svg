<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #c084fc; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>
  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Gallows pixel art -->
  <g transform="translate(40, 15)">
    <!-- Base -->
    <line x1="20" y1="170" x2="130" y2="170" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <!-- Vertical pole -->
    <line x1="45" y1="170" x2="45" y2="30" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <!-- Horizontal beam -->
    <line x1="45" y1="30" x2="120" y2="30" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <!-- Support brace -->
    <line x1="45" y1="55" x2="72" y2="30" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
    <!-- Rope -->
    <line x1="120" y1="30" x2="120" y2="50" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="120" cy="66" r="16" fill="none" stroke="#e0e0e0" stroke-width="2.5"/>
    <!-- Eyes -->
    <circle cx="114" cy="63" r="2" fill="#e0e0e0"/>
    <circle cx="126" cy="63" r="2" fill="#e0e0e0"/>
    <!-- Body -->
    <line x1="120" y1="82" x2="120" y2="125" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left arm -->
    <line x1="120" y1="92" x2="98" y2="112" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="120" y1="92" x2="142" y2="112" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left leg -->
    <line x1="120" y1="125" x2="100" y2="155" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="120" y1="125" x2="140" y2="155" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Word blanks with some revealed letters -->
  <g transform="translate(200, 155)">
    <!-- H -->
    <text font-family="monospace" font-size="22" fill="#44ff66" x="0" y="0" font-weight="bold">H</text>
    <line x1="0" y1="5" x2="16" y2="5" stroke="#444466" stroke-width="2"/>
    <!-- _ -->
    <line x1="24" y1="5" x2="40" y2="5" stroke="#444466" stroke-width="2"/>
    <!-- N -->
    <text font-family="monospace" font-size="22" fill="#44ff66" x="48" y="0" font-weight="bold">N</text>
    <line x1="48" y1="5" x2="64" y2="5" stroke="#444466" stroke-width="2"/>
    <!-- G -->
    <text font-family="monospace" font-size="22" fill="#44ff66" x="72" y="0" font-weight="bold">G</text>
    <line x1="72" y1="5" x2="88" y2="5" stroke="#444466" stroke-width="2"/>
    <!-- _ -->
    <line x1="96" y1="5" x2="112" y2="5" stroke="#444466" stroke-width="2"/>
    <!-- _ -->
    <line x1="120" y1="5" x2="136" y2="5" stroke="#444466" stroke-width="2"/>
    <!-- N -->
    <text font-family="monospace" font-size="22" fill="#44ff66" x="144" y="0" font-weight="bold">N</text>
    <line x1="144" y1="5" x2="160" y2="5" stroke="#444466" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text class="title" x="380" y="85">HANGMAN</text>
  <text class="sub" x="380" y="112">Guess · Reveal · Survive</text>

  <!-- Score HUD mock -->
  <g transform="translate(380, 130)">
    <rect width="220" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">WINS</text>
    <text font-family="monospace" font-size="9" fill="#c084fc" x="50" y="19">12</text>
    <text font-family="monospace" font-size="9" fill="#666" x="90" y="19">STREAK</text>
    <text font-family="monospace" font-size="9" fill="#c084fc" x="145" y="19">5</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
