<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" width="500" height="250">
  <rect width="500" height="250" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>

  <!-- IDLE box -->
  <rect x="30" y="90" width="90" height="40" fill="#12121f" stroke="#44aaff" stroke-width="2" rx="4"/>
  <text fill="#44aaff" font-size="11" x="50" y="115" font-weight="bold">IDLE</text>

  <!-- PLAYING box -->
  <rect x="190" y="90" width="110" height="40" fill="#12121f" stroke="#44ff66" stroke-width="2" rx="4"/>
  <text fill="#44ff66" font-size="11" x="205" y="115" font-weight="bold">PLAYING</text>

  <!-- WON box -->
  <rect x="370" y="50" width="100" height="40" fill="#12121f" stroke="#ffd700" stroke-width="2" rx="4"/>
  <text fill="#ffd700" font-size="11" x="398" y="75" font-weight="bold">WON</text>

  <!-- LOST box -->
  <rect x="370" y="130" width="100" height="40" fill="#12121f" stroke="#ff4444" stroke-width="2" rx="4"/>
  <text fill="#ff4444" font-size="11" x="398" y="155" font-weight="bold">LOST</text>

  <!-- Arrows -->
  <!-- idle → playing -->
  <line x1="120" y1="110" x2="188" y2="110" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="130" y="105">Start</text>

  <!-- playing → won -->
  <line x1="300" y1="100" x2="368" y2="75" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="310" y="80">All safe</text>
  <text fill="#888" font-size="8" x="310" y="90">revealed</text>

  <!-- playing → lost -->
  <line x1="300" y1="120" x2="368" y2="145" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="310" y="140">Hit mine</text>

  <!-- won → idle (play again) -->
  <path d="M 420 50 Q 420 15 245 15 Q 75 15 75 88" fill="none" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="200" y="12">Play Again</text>

  <!-- lost → idle (try again) -->
  <path d="M 420 170 Q 420 220 245 220 Q 75 220 75 132" fill="none" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="200" y="232">Try Again</text>

  <!-- First click note -->
  <g transform="translate(170, 170)">
    <rect x="0" y="0" width="160" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
    <text fill="#888" font-size="8" x="8" y="12">First click in PLAYING</text>
    <text fill="#ffd700" font-size="8" x="8" y="24">→ places mines (always safe)</text>
  </g>

  <rect width="500" height="250" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
