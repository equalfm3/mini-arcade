  <rect x="340" y="88" width="28" height="22" fill="#0e0e1a" stroke="#2a2a40" stroke-width="1" rx="2"/>
  <text fill="#aaa" x="340" y="120">Board</text>

  <rect x="390" y="88" width="28" height="22" fill="#ffd700" rx="2"/>
  <text fill="#aaa" x="388" y="120">Accent</text>

  <rect width="500" height="135" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
