<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 135" width="500" height="135">
  <rect width="500" height="135" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;font-size:8px;}</style></defs>

  <!-- Number colors row -->
  <text fill="#888" font-size="9" x="15" y="16">Number Colors</text>

  <rect x="15" y="22" width="28" height="28" fill="#44aaff" rx="2"/>
  <text fill="#fff" font-size="14" x="24" y="42" font-weight="bold">1</text>
  <text fill="#555" x="15" y="62">#44aaff</text>

  <rect x="50" y="22" width="28" height="28" fill="#44ff66" rx="2"/>
