    <rect x="117" y="126" width="36" height="29" fill="#0e0e1a"/><!-- (3,4) = 0 -->
    <rect x="155" y="126" width="36" height="29" fill="#0e0e1a"/><!-- (4,4) = 0 -->
    <rect x="193" y="126" width="36" height="29" fill="#0e0e1a"/><!-- (5,4) = 1 -->
    <text font-size="14" fill="#44aaff" x="207" y="145">1</text>
    <rect x="231" y="126" width="36" height="29" fill="#1e2a3a"/><!-- (6,4) hidden (mine) -->
    <rect x="269" y="126" width="36" height="29" fill="#0e0e1a"/><!-- (7,4) = 1 -->
    <text font-size="14" fill="#44aaff" x="283" y="145">1</text>
