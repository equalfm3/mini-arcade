    <!-- Row 6 -->
    <rect x="3" y="188" width="36" height="29" fill="#1e2a3a"/><!-- (0,6) hidden -->
    <rect x="41" y="188" width="36" height="29" fill="#1e2a3a"/><!-- (1,6) hidden -->
    <rect x="79" y="188" width="36" height="29" fill="#1e2a3a"/><!-- (2,6) hidden -->
