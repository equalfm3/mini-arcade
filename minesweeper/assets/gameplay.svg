    <!-- Row 4 -->
    <rect x="3" y="126" width="36" height="29" fill="#0e0e1a"/><!-- (0,4) = 1 -->
    <text font-size="14" fill="#44aaff" x="17" y="145">1</text>
    <rect x="41" y="126" width="36" height="29" fill="#0e0e1a"/><!-- (1,4) = 1 -->
