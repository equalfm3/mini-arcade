<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 36px; font-weight: bold; fill: #ffd700; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>
  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Minesweeper grid illustration (left side) -->
  <g transform="translate(40, 30)" shape-rendering="crispEdges">
    <!-- 5x5 mini grid -->
    <rect x="0" y="0" width="140" height="140" fill="#2a2a40" rx="3"/>
    <!-- Row 0: revealed numbers and hidden -->
    <rect x="3" y="3" width="24" height="24" fill="#0e0e1a"/>
    <text font-family="monospace" font-size="14" fill="#44aaff" x="11" y="21">1</text>
    <rect x="30" y="3" width="24" height="24" fill="#0e0e1a"/>
    <text font-family="monospace" font-size="14" fill="#44aaff" x="38" y="21">1</text>
    <rect x="57" y="3" width="24" height="24" fill="#0e0e1a"/>
    <text font-family="monospace" font-size="14" fill="#44ff66" x="65" y="21">2</text>
    <rect x="84" y="3" width="24" height="24" fill="#1e2a3a"/>
    <text font-family="monospace" font-size="12" x="89" y="21">🚩</text>
    <rect x="111" y="3" width="24" height="24" fill="#1e2a3a"/>

    <!-- Row 1 -->
    <rect x="3" y="30" width="24" height="24" fill="#0e0e1a"/>
    <rect x="30" y="30" width="24" height="24" fill="#0e0e1a"/>
    <rect x="57" y="30" width="24" height="24" fill="#0e0e1a"/>
    <text font-family="monospace" font-size="14" fill="#44ff66" x="65" y="48">2</text>
    <rect x="84" y="30" width="24" height="24" fill="#1e2a3a"/>
    <rect x="111" y="30" width="24" height="24" fill="#1e2a3a"/>

    <!-- Row 2 -->
    <rect x="3" y="57" width="24" height="24" fill="#0e0e1a"/>
    <text font-family="monospace" font-size="14" fill="#44aaff" x="11" y="75">1</text>
    <rect x="30" y="57" width="24" height="24" fill="#0e0e1a"/>
    <text font-family="monospace" font-size="14" fill="#44aaff" x="38" y="75">1</text>
    <rect x="57" y="57" width="24" height="24" fill="#0e0e1a"/>
    <text font-family="monospace" font-size="14" fill="#ff4444" x="65" y="75">3</text>
    <rect x="84" y="57" width="24" height="24" fill="#1e2a3a"/>
    <text font-family="monospace" font-size="12" x="89" y="75">🚩</text>
    <rect x="111" y="57" width="24" height="24" fill="#1e2a3a"/>

    <!-- Row 3 -->
    <rect x="3" y="84" width="24" height="24" fill="#0e0e1a"/>
    <rect x="30" y="84" width="24" height="24" fill="#0e0e1a"/>
    <text font-family="monospace" font-size="14" fill="#44aaff" x="38" y="102">1</text>
    <rect x="57" y="84" width="24" height="24" fill="#0e0e1a"/>
    <text font-family="monospace" font-size="14" fill="#44aaff" x="65" y="102">1</text>
    <rect x="84" y="84" width="24" height="24" fill="#1e2a3a"/>
    <rect x="111" y="84" width="24" height="24" fill="#1e2a3a"/>

    <!-- Row 4 -->
    <rect x="3" y="111" width="24" height="24" fill="#0e0e1a"/>
    <rect x="30" y="111" width="24" height="24" fill="#0e0e1a"/>
    <rect x="57" y="111" width="24" height="24" fill="#0e0e1a"/>
    <rect x="84" y="111" width="24" height="24" fill="#1e2a3a"/>
    <rect x="111" y="111" width="24" height="24" fill="#1e2a3a"/>
  </g>

  <!-- Pixel icon (minesweeper from icons.js) -->
  <g transform="translate(210, 60)" shape-rendering="crispEdges">
    <!-- Row 1 -->
    <rect x="1.5" y="1.5" width="19.5" height="1.5" fill="#666"/>
    <!-- Row 2 -->
    <rect x="1.5" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="3" y="3" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="6" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="7.5" y="3" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="10.5" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="12" y="3" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="15" y="3" width="1.5" height="1.5" fill="#666"/>
    <rect x="16.5" y="3" width="3" height="1.5" fill="#e0e0e0"/>
    <!-- Simplified icon representation -->
    <rect x="1.5" y="7.5" width="1.5" height="1.5" fill="#666"/>
    <rect x="3" y="7.5" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="6" y="7.5" width="3" height="3" fill="#ff4444"/>
    <rect x="9" y="7.5" width="1.5" height="1.5" fill="#666"/>
    <rect x="10.5" y="7.5" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="13.5" y="7.5" width="1.5" height="1.5" fill="#666"/>
    <rect x="15" y="7.5" width="1.5" height="1.5" fill="#44aaff"/>
    <rect x="16.5" y="7.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <!-- More rows -->
    <rect x="1.5" y="12" width="1.5" height="1.5" fill="#666"/>
    <rect x="3" y="12" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="4.5" y="12" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="6" y="12" width="1.5" height="1.5" fill="#666"/>
    <rect x="7.5" y="12" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="10.5" y="12" width="3" height="3" fill="#ff4444"/>
    <rect x="13.5" y="12" width="1.5" height="1.5" fill="#666"/>
    <rect x="15" y="12" width="3" height="1.5" fill="#e0e0e0"/>
  </g>

  <!-- Title -->
  <text class="title" x="340" y="90">MINESWEEPER</text>
  <text class="sub" x="340" y="118">Reveal · Flag · Survive</text>

  <!-- HUD mockup -->
  <g transform="translate(340, 135)">
    <rect width="240" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">MINES</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">7</text>
    <text font-family="monospace" font-size="9" fill="#666" x="100" y="19">TIME</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="140" y="19">42</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
