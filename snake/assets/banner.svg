<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #44ff66; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>
  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
  </g>
  <!-- Snake body -->
  <g shape-rendering="crispEdges">
    <!-- Tail segments (darker) -->
    <rect x="40" y="100" width="18" height="18" fill="#1a5528" rx="1"/>
    <rect x="60" y="100" width="18" height="18" fill="#1d6630" rx="1"/>
    <rect x="80" y="100" width="18" height="18" fill="#208838" rx="1"/>
    <rect x="100" y="100" width="18" height="18" fill="#22aa44" rx="1"/>
    <rect x="120" y="100" width="18" height="18" fill="#28bb48" rx="1"/>
    <rect x="140" y="100" width="18" height="18" fill="#30cc50" rx="1"/>
    <rect x="160" y="100" width="18" height="18" fill="#38dd58" rx="1"/>
    <!-- Turn up -->
    <rect x="160" y="80" width="18" height="18" fill="#3aee5e" rx="1"/>
    <rect x="160" y="60" width="18" height="18" fill="#40ff64" rx="1"/>
    <!-- Head -->
    <rect x="160" y="40" width="18" height="18" fill="#44ff66" rx="1"/>
    <!-- Eyes -->
    <circle cx="165" cy="46" r="3" fill="white"/>
    <circle cx="173" cy="46" r="3" fill="white"/>
    <circle cx="165" cy="45" r="1.5" fill="#0a0a16"/>
    <circle cx="173" cy="45" r="1.5" fill="#0a0a16"/>
  </g>
  <!-- Food -->
  <circle cx="300" cy="109" r="14" fill="#ff4444" opacity="0.2"/>
  <circle cx="300" cy="109" r="10" fill="#ff4444" opacity="0.3"/>
  <rect x="293" y="102" width="14" height="14" fill="#ff4444" rx="1"/>
  <rect x="295" y="104" width="3" height="3" fill="#ff8888"/>
  <!-- Title -->
  <text class="title" x="420" y="95">SNAKE</text>
  <text class="sub" x="420" y="125">Eat · Grow · Survive</text>
  <!-- Score HUD mock -->
  <g transform="translate(420, 145)">
    <rect width="200" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">140</text>
    <text font-family="monospace" font-size="9" fill="#666" x="100" y="19">BEST</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="140" y="19">280</text>
  </g>
  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
