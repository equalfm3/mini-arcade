<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 480" width="440" height="480">
  <defs>
    <style>text { font-family: monospace; }</style>
  </defs>
  <!-- Outer frame -->
  <rect width="440" height="480" fill="#0a0a16" rx="8"/>
  
  <!-- HUD bar -->
  <rect x="20" y="15" width="400" height="35" fill="#12121f" stroke="#2a2a40" stroke-width="2"/>
  
  <!-- Pixel icon in HUD (16x16 snake icon at 1.2px per pixel = ~19px) -->
  <g transform="translate(28, 19)" shape-rendering="crispEdges">
    <rect x="4.8" y="0" width="7.2" height="1.2" fill="#44ff66"/>
    <rect x="3.6" y="1.2" width="1.2" height="1.2" fill="#44ff66"/>
    <rect x="4.8" y="1.2" width="7.2" height="1.2" fill="#22aa44"/>
    <rect x="12" y="1.2" width="1.2" height="1.2" fill="#44ff66"/>
    <rect x="2.4" y="2.4" width="1.2" height="1.2" fill="#44ff66"/>
    <rect x="3.6" y="2.4" width="1.2" height="1.2" fill="#22aa44"/>
    <rect x="4.8" y="2.4" width="1.2" height="1.2" fill="#ffffff"/>
    <rect x="6" y="2.4" width="1.2" height="1.2" fill="#222222"/>
    <rect x="7.2" y="2.4" width="2.4" height="1.2" fill="#22aa44"/>
    <rect x="9.6" y="2.4" width="1.2" height="1.2" fill="#ffffff"/>
    <rect x="10.8" y="2.4" width="1.2" height="1.2" fill="#222222"/>
    <rect x="12" y="2.4" width="1.2" height="1.2" fill="#22aa44"/>
    <rect x="13.2" y="2.4" width="1.2" height="1.2" fill="#44ff66"/>
    <rect x="2.4" y="3.6" width="1.2" height="1.2" fill="#44ff66"/>
    <rect x="3.6" y="3.6" width="8.4" height="1.2" fill="#22aa44"/>
    <rect x="13.2" y="3.6" width="1.2" height="1.2" fill="#44ff66"/>
    <rect x="2.4" y="4.8" width="1.2" height="1.2" fill="#44ff66"/>
    <rect x="3.6" y="4.8" width="1.2" height="1.2" fill="#22aa44"/>
    <rect x="4.8" y="4.8" width="1.2" height="1.2" fill="#22aa44"/>
    <rect x="6" y="4.8" width="2.4" height="1.2" fill="#ff4444"/>
    <rect x="8.4" y="4.8" width="3.6" height="1.2" fill="#22aa44"/>
    <rect x="13.2" y="4.8" width="1.2" height="1.2" fill="#44ff66"/>
    <rect x="3.6" y="6" width="1.2" height="1.2" fill="#44ff66"/>
    <rect x="4.8" y="6" width="7.2" height="1.2" fill="#22aa44"/>
    <rect x="12" y="6" width="1.2" height="1.2" fill="#44ff66"/>
    <rect x="4.8" y="7.2" width="7.2" height="1.2" fill="#44ff66"/>
    <!-- Smaller body below -->
    <rect x="7.2" y="8.4" width="2.4" height="1.2" fill="#44ff66"/>
    <rect x="6" y="9.6" width="2.4" height="1.2" fill="#44ff66"/>
  </g>
  
  <text font-size="11" fill="#e0e0e0" x="52" y="38" font-weight="bold">Snake</text>
  <text font-size="8" fill="#666" x="280" y="35">Score</text>
  <text font-size="10" fill="#ffd700" x="315" y="35">70</text>
  <text font-size="8" fill="#666" x="355" y="35">Best</text>
  <text font-size="10" fill="#ffd700" x="385" y="35">280</text>

  <!-- Game board -->
  <rect x="20" y="60" width="400" height="400" fill="#0e0e1a" stroke="#2a2a40" stroke-width="2"/>
  
  <!-- Grid lines -->
  <g stroke="#161625" stroke-width="0.5" fill="none">
    <line x1="40" y1="60" x2="40" y2="460"/><line x1="60" y1="60" x2="60" y2="460"/>
    <line x1="80" y1="60" x2="80" y2="460"/><line x1="100" y1="60" x2="100" y2="460"/>
    <line x1="120" y1="60" x2="120" y2="460"/><line x1="140" y1="60" x2="140" y2="460"/>
    <line x1="160" y1="60" x2="160" y2="460"/><line x1="180" y1="60" x2="180" y2="460"/>
    <line x1="200" y1="60" x2="200" y2="460"/><line x1="220" y1="60" x2="220" y2="460"/>
    <line x1="240" y1="60" x2="240" y2="460"/><line x1="260" y1="60" x2="260" y2="460"/>
    <line x1="280" y1="60" x2="280" y2="460"/><line x1="300" y1="60" x2="300" y2="460"/>
    <line x1="320" y1="60" x2="320" y2="460"/><line x1="340" y1="60" x2="340" y2="460"/>
    <line x1="360" y1="60" x2="360" y2="460"/><line x1="380" y1="60" x2="380" y2="460"/>
    <line x1="400" y1="60" x2="400" y2="460"/>
    <line x1="20" y1="80" x2="420" y2="80"/><line x1="20" y1="100" x2="420" y2="100"/>
    <line x1="20" y1="120" x2="420" y2="120"/><line x1="20" y1="140" x2="420" y2="140"/>
    <line x1="20" y1="160" x2="420" y2="160"/><line x1="20" y1="180" x2="420" y2="180"/>
    <line x1="20" y1="200" x2="420" y2="200"/><line x1="20" y1="220" x2="420" y2="220"/>
    <line x1="20" y1="240" x2="420" y2="240"/><line x1="20" y1="260" x2="420" y2="260"/>
    <line x1="20" y1="280" x2="420" y2="280"/><line x1="20" y1="300" x2="420" y2="300"/>
    <line x1="20" y1="320" x2="420" y2="320"/><line x1="20" y1="340" x2="420" y2="340"/>
    <line x1="20" y1="360" x2="420" y2="360"/><line x1="20" y1="380" x2="420" y2="380"/>
    <line x1="20" y1="400" x2="420" y2="400"/><line x1="20" y1="420" x2="420" y2="420"/>
    <line x1="20" y1="440" x2="420" y2="440"/>
  </g>

  <!-- Snake body (L-shape going right then up) -->
  <g shape-rendering="crispEdges">
    <rect x="101" y="281" width="18" height="18" fill="#14401a"/>
    <rect x="121" y="281" width="18" height="18" fill="#185520"/>
    <rect x="141" y="281" width="18" height="18" fill="#1c6628"/>
    <rect x="161" y="281" width="18" height="18" fill="#1e7730"/>
    <rect x="181" y="281" width="18" height="18" fill="#208838"/>
    <rect x="201" y="281" width="18" height="18" fill="#22aa44"/>
    <rect x="221" y="281" width="18" height="18" fill="#28bb48"/>
    <!-- Turn up -->
    <rect x="221" y="261" width="18" height="18" fill="#30cc50"/>
    <rect x="221" y="241" width="18" height="18" fill="#38dd58"/>
    <rect x="221" y="221" width="18" height="18" fill="#3aee5e"/>
    <!-- Head (going up) -->
    <rect x="221" y="201" width="18" height="18" fill="#44ff66"/>
    <!-- Eyes (looking up) -->
    <circle cx="227" cy="207" r="2.5" fill="white"/>
    <circle cx="235" cy="207" r="2.5" fill="white"/>
    <circle cx="227" cy="206" r="1.2" fill="#0a0a16"/>
    <circle cx="235" cy="206" r="1.2" fill="#0a0a16"/>
  </g>

  <!-- Food with glow -->
  <circle cx="310" cy="170" r="14" fill="#ff4444" opacity="0.15"/>
  <circle cx="310" cy="170" r="10" fill="#ff4444" opacity="0.25"/>
  <rect x="303" y="163" width="14" height="14" fill="#ff4444"/>
  <rect x="305" y="165" width="3" height="3" fill="#ff8888"/>

  <!-- Eat particles (scattered small squares) -->
  <rect x="155" y="345" width="3" height="3" fill="#ff4444" opacity="0.7"/>
  <rect x="170" y="338" width="2" height="2" fill="#ff4444" opacity="0.5"/>
  <rect x="148" y="352" width="3" height="3" fill="#ff6666" opacity="0.4"/>
  <rect x="162" y="358" width="2" height="2" fill="#ff4444" opacity="0.3"/>

  <!-- Border -->
  <rect width="440" height="480" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
