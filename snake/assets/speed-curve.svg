<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <rect width="500" height="200" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;}</style></defs>

  <!-- Axes -->
  <line x1="60" y1="20" x2="60" y2="160" stroke="#2a2a40" stroke-width="1"/>
  <line x1="60" y1="160" x2="460" y2="160" stroke="#2a2a40" stroke-width="1"/>

  <!-- Y axis labels (speed) -->
  <text fill="#666" font-size="8" x="10" y="158">6</text>
  <text fill="#666" font-size="8" x="10" y="120">10</text>
  <text fill="#666" font-size="8" x="10" y="82">14</text>
  <text fill="#666" font-size="8" x="10" y="44">18</text>
  <text fill="#888" font-size="8" x="5" y="15" transform="rotate(-90, 15, 90)">cells/sec</text>

  <!-- Y grid lines -->
  <line x1="60" y1="118" x2="460" y2="118" stroke="#161625" stroke-width="0.5"/>
  <line x1="60" y1="80" x2="460" y2="80" stroke="#161625" stroke-width="0.5"/>
  <line x1="60" y1="42" x2="460" y2="42" stroke="#161625" stroke-width="0.5"/>

  <!-- X axis labels (food eaten) -->
  <text fill="#666" font-size="8" x="58" y="175">0</text>
  <text fill="#666" font-size="8" x="118" y="175">5</text>
  <text fill="#666" font-size="8" x="178" y="175">10</text>
  <text fill="#666" font-size="8" x="238" y="175">15</text>
  <text fill="#666" font-size="8" x="298" y="175">20</text>
  <text fill="#666" font-size="8" x="358" y="175">30</text>
  <text fill="#666" font-size="8" x="418" y="175">40</text>
  <text fill="#888" font-size="8" x="220" y="192">food eaten</text>

  <!-- Speed curve: speed = min(6 + food*0.3, 18) -->
  <!-- Points: (0,6) (5,7.5) (10,9) (15,10.5) (20,12) (30,15) (40,18) -->
  <!-- Y mapping: y = 160 - (speed-6) * (120/12) = 160 - (speed-6)*10 -->
  <!-- (0,160) (5,145) (10,130) (15,115) (20,100) (30,70) (40,40) then flat -->
  <polyline fill="none" stroke="#44ff66" stroke-width="2"
    points="60,160 120,145 180,130 240,115 300,100 360,70 420,40 460,40"/>

  <!-- Max speed line -->
  <line x1="60" y1="40" x2="460" y2="40" stroke="#ff4444" stroke-width="1" stroke-dasharray="4,4"/>
  <text fill="#ff4444" font-size="8" x="462" y="43">max: 18</text>

  <!-- Dot markers -->
  <circle cx="60" cy="160" r="3" fill="#44ff66"/>
  <circle cx="120" cy="145" r="3" fill="#44ff66"/>
  <circle cx="180" cy="130" r="3" fill="#44ff66"/>
  <circle cx="240" cy="115" r="3" fill="#44ff66"/>
  <circle cx="300" cy="100" r="3" fill="#44ff66"/>
  <circle cx="360" cy="70" r="3" fill="#44ff66"/>
  <circle cx="420" cy="40" r="3" fill="#ffd700"/>

  <!-- Formula -->
  <text fill="#ffd700" font-size="9" x="100" y="45">speed = min(6 + food × 0.3, 18)</text>

  <rect width="500" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
