<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 500" width="380" height="500">
  <rect width="380" height="500" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;}</style></defs>

  <!-- HUD bar -->
  <rect x="10" y="10" width="360" height="28" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
  <text font-size="9" fill="#666" x="20" y="28">🍪 Cookie Clicker</text>
  <text font-size="9" fill="#666" x="200" y="28">Cookies</text>
  <text font-size="9" fill="#ffd700" x="250" y="28">1.2M</text>
  <text font-size="9" fill="#666" x="290" y="28">CPS</text>
  <text font-size="9" fill="#ffd700" x="315" y="28">8,547</text>

  <!-- Cookie counter -->
  <text font-size="24" fill="#ffd700" text-anchor="middle" x="190" y="75" font-weight="bold">1,247,832 cookies</text>
  <text font-size="11" fill="#888" text-anchor="middle" x="190" y="92">per second: 8,547</text>

  <!-- Big cookie -->
  <circle cx="190" cy="170" r="60" fill="#c87533"/>
  <circle cx="190" cy="170" r="55" fill="#e8a050"/>
  <!-- Chocolate chips -->
  <circle cx="172" cy="152" r="6" fill="#8b5a2b"/>
  <circle cx="200" cy="160" r="5" fill="#8b5a2b"/>
  <circle cx="180" cy="180" r="7" fill="#8b5a2b"/>
  <circle cx="210" cy="178" r="4" fill="#8b5a2b"/>
  <circle cx="175" cy="195" r="5" fill="#8b5a2b"/>
  <circle cx="198" cy="148" r="4" fill="#8b5a2b"/>
  <!-- Highlight -->
  <ellipse cx="178" cy="155" rx="18" ry="12" fill="#fff" opacity="0.08"/>

  <!-- Floating +10 text -->
  <text font-size="18" fill="#ffd700" opacity="0.9" x="220" y="130" font-weight="bold">+10</text>
  <text font-size="14" fill="#ffd700" opacity="0.5" x="155" y="118">+10</text>
  <text font-size="12" fill="#ffd700" opacity="0.3" x="200" y="108">+10</text>

  <!-- Click info -->
  <text font-size="10" fill="#aaa" text-anchor="middle" x="190" y="248">+10 per click</text>

  <!-- Shop section -->
  <text font-size="13" fill="#f0e0c0" text-anchor="middle" x="190" y="275" font-weight="bold">Upgrades</text>

  <!-- Shop items -->
  <!-- Cursor (affordable, owned 24) -->
  <rect x="20" y="285" width="340" height="36" fill="#1a1a30" stroke="#f4a460" stroke-width="1" rx="3"/>
  <text font-size="18" x="30" y="310">👆</text>
  <text font-size="11" fill="#f0e0c0" x="55" y="300" font-weight="bold">Cursor</text>
  <text font-size="9" fill="#f4a460" x="55" y="312">427</text>
  <text font-size="8" fill="#888" x="100" y="312">+0.1 CPS</text>
  <text font-size="14" fill="#ffd700" x="330" y="308" text-anchor="end" font-weight="bold">24</text>

  <!-- Grandma (affordable, owned 12) -->
  <rect x="20" y="325" width="340" height="36" fill="#1a1a30" stroke="#f4a460" stroke-width="1" rx="3"/>
  <text font-size="18" x="30" y="350">👵</text>
  <text font-size="11" fill="#f0e0c0" x="55" y="340" font-weight="bold">Grandma</text>
  <text font-size="9" fill="#f4a460" x="55" y="352">535</text>
  <text font-size="8" fill="#888" x="100" y="352">+1 CPS</text>
  <text font-size="14" fill="#ffd700" x="330" y="348" text-anchor="end" font-weight="bold">12</text>

  <!-- Farm (affordable, owned 8) -->
  <rect x="20" y="365" width="340" height="36" fill="#1a1a30" stroke="#f4a460" stroke-width="1" rx="3"/>
  <text font-size="18" x="30" y="390">🌾</text>
  <text font-size="11" fill="#f0e0c0" x="55" y="380" font-weight="bold">Farm</text>
  <text font-size="9" fill="#f4a460" x="55" y="392">3,352</text>
  <text font-size="8" fill="#888" x="110" y="392">+8 CPS</text>
  <text font-size="14" fill="#ffd700" x="330" y="388" text-anchor="end" font-weight="bold">8</text>

  <!-- Mine (dimmed, owned 3) -->
  <rect x="20" y="405" width="340" height="36" fill="#0e0e18" stroke="#2a2a40" stroke-width="1" rx="3" opacity="0.6"/>
  <text font-size="18" x="30" y="430" opacity="0.5">⛏️</text>
  <text font-size="11" fill="#666" x="55" y="420">Mine</text>
  <text font-size="9" fill="#555" x="55" y="432">18.3K</text>
  <text font-size="8" fill="#555" x="105" y="432">+47 CPS</text>
  <text font-size="14" fill="#888" x="330" y="428" text-anchor="end">3</text>

  <!-- Factory (dimmed, owned 0) -->
  <rect x="20" y="445" width="340" height="36" fill="#0e0e18" stroke="#2a2a40" stroke-width="1" rx="3" opacity="0.35"/>
  <text font-size="18" x="30" y="470" opacity="0.35">🏭</text>
  <text font-size="11" fill="#444" x="55" y="460">Factory</text>
  <text font-size="9" fill="#444" x="55" y="472">130K</text>
  <text font-size="8" fill="#444" x="100" y="472">+260 CPS</text>
  <text font-size="14" fill="#555" x="330" y="468" text-anchor="end">0</text>

  <rect width="380" height="500" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
