<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <rect width="600" height="180" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;}</style></defs>

  <!-- Desktop -->
  <text font-size="13" fill="#f4a460" x="80" y="25" text-anchor="middle" font-weight="bold">Desktop</text>

  <!-- Mouse click -->
  <rect x="40" y="40" width="80" height="50" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="20"/>
  <line x1="80" y1="40" x2="80" y2="70" stroke="#2a2a40" stroke-width="1"/>
  <rect x="50" y="45" width="25" height="20" fill="#f4a460" rx="3" opacity="0.6"/>
  <text font-size="8" fill="#888" x="80" y="108" text-anchor="middle">Click cookie</text>

  <!-- Esc key -->
  <rect x="160" y="45" width="50" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
  <text font-size="10" fill="#f0e0c0" x="185" y="65" text-anchor="middle">Esc</text>
  <text font-size="8" fill="#888" x="185" y="108" text-anchor="middle">Pause</text>

  <!-- Scroll -->
  <rect x="250" y="40" width="80" height="50" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="20"/>
  <rect x="283" y="48" width="14" height="20" fill="none" stroke="#f4a460" stroke-width="1" rx="7"/>
  <circle cx="290" cy="55" r="2" fill="#f4a460"/>
  <text font-size="8" fill="#888" x="290" y="108" text-anchor="middle">Scroll shop</text>

  <!-- Divider -->
  <line x1="0" y1="125" x2="600" y2="125" stroke="#2a2a40" stroke-width="1"/>

  <!-- Mobile -->
  <text font-size="13" fill="#f4a460" x="80" y="148" text-anchor="middle" font-weight="bold">Mobile</text>

  <text font-size="9" fill="#f0e0c0" x="180" y="148">Tap cookie</text>
  <text font-size="9" fill="#888" x="180" y="163">Scroll upgrade list</text>

  <!-- Phone outline -->
  <rect x="400" y="20" width="160" height="140" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="12"/>
  <!-- Cookie circle -->
  <circle cx="480" cy="70" r="25" fill="#c87533"/>
  <circle cx="480" cy="70" r="22" fill="#e8a050"/>
  <circle cx="474" cy="64" r="3" fill="#8b5a2b"/>
  <circle cx="486" cy="72" r="3" fill="#8b5a2b"/>
  <!-- Tap indicator -->
  <circle cx="480" cy="70" r="8" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
  <circle cx="480" cy="70" r="14" fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <text font-size="7" fill="#ffd700" x="500" y="55">+1</text>
  <!-- Shop items -->
  <rect x="410" y="105" width="140" height="10" fill="#1a1a30" rx="2"/>
  <rect x="410" y="118" width="140" height="10" fill="#1a1a30" rx="2"/>
  <rect x="410" y="131" width="140" height="10" fill="#0e0e18" rx="2" opacity="0.5"/>
  <!-- Scroll arrow -->
  <text font-size="8" fill="#888" x="480" y="152" text-anchor="middle">↕ scroll</text>

  <rect width="600" height="180" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
