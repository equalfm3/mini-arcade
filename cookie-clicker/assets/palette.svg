<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <rect width="600" height="120" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;}</style></defs>

  <!-- Cookie Brown -->
  <rect x="20" y="20" width="60" height="60" fill="#c87533" rx="4"/>
  <text font-size="8" fill="#f0e0c0" x="50" y="100" text-anchor="middle">Cookie</text>
  <text font-size="7" fill="#888" x="50" y="110" text-anchor="middle">#c87533</text>

  <!-- Cookie Highlight -->
  <rect x="95" y="20" width="60" height="60" fill="#e8a050" rx="4"/>
  <text font-size="8" fill="#f0e0c0" x="125" y="100" text-anchor="middle">Highlight</text>
  <text font-size="7" fill="#888" x="125" y="110" text-anchor="middle">#e8a050</text>

  <!-- Chocolate Chip -->
  <rect x="170" y="20" width="60" height="60" fill="#8b5a2b" rx="4"/>
  <text font-size="8" fill="#f0e0c0" x="200" y="100" text-anchor="middle">Chip</text>
  <text font-size="7" fill="#888" x="200" y="110" text-anchor="middle">#8b5a2b</text>

  <!-- Accent -->
  <rect x="245" y="20" width="60" height="60" fill="#f4a460" rx="4"/>
  <text font-size="8" fill="#f0e0c0" x="275" y="100" text-anchor="middle">Accent</text>
  <text font-size="7" fill="#888" x="275" y="110" text-anchor="middle">#f4a460</text>

  <!-- Gold -->
  <rect x="320" y="20" width="60" height="60" fill="#ffd700" rx="4"/>
  <text font-size="8" fill="#f0e0c0" x="350" y="100" text-anchor="middle">Gold</text>
  <text font-size="7" fill="#888" x="350" y="110" text-anchor="middle">#ffd700</text>

  <!-- Shop BG -->
  <rect x="395" y="20" width="60" height="60" fill="#12121f" rx="4" stroke="#2a2a40" stroke-width="1"/>
  <text font-size="8" fill="#f0e0c0" x="425" y="100" text-anchor="middle">Shop BG</text>
  <text font-size="7" fill="#888" x="425" y="110" text-anchor="middle">#12121f</text>

  <!-- Text -->
  <rect x="470" y="20" width="60" height="60" fill="#f0e0c0" rx="4"/>
  <text font-size="8" fill="#0a0a16" x="500" y="100" text-anchor="middle">Text</text>
  <text font-size="7" fill="#888" x="500" y="110" text-anchor="middle">#f0e0c0</text>

  <!-- Background -->
  <rect x="545" y="20" width="40" height="60" fill="#0a0a16" rx="4" stroke="#2a2a40" stroke-width="1"/>
  <text font-size="7" fill="#888" x="565" y="100" text-anchor="middle">BG</text>
  <text font-size="6" fill="#888" x="565" y="110" text-anchor="middle">#0a0a16</text>

  <rect width="600" height="120" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
