<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #ff8844; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Pixel art: Brick rows (6 rows, rainbow) -->
  <g shape-rendering="crispEdges">
    <!-- Row 1: Red -->
    <rect x="30" y="25" width="35" height="12" fill="#ff4444"/>
    <rect x="68" y="25" width="35" height="12" fill="#ff4444"/>
    <rect x="106" y="25" width="35" height="12" fill="#ff4444"/>
    <rect x="144" y="25" width="35" height="12" fill="#ff4444"/>
    <rect x="182" y="25" width="35" height="12" fill="#ff4444"/>
    <rect x="220" y="25" width="35" height="12" fill="#ff4444"/>
    <!-- Row 2: Orange -->
    <rect x="30" y="40" width="35" height="12" fill="#ff8844"/>
    <rect x="68" y="40" width="35" height="12" fill="#ff8844"/>
    <rect x="106" y="40" width="35" height="12" fill="#ff8844"/>
    <rect x="144" y="40" width="35" height="12" fill="#ff8844"/>
    <rect x="182" y="40" width="35" height="12" fill="#ff8844"/>
    <rect x="220" y="40" width="35" height="12" fill="#ff8844"/>
    <!-- Row 3: Gold -->
    <rect x="30" y="55" width="35" height="12" fill="#ffd700"/>
    <rect x="68" y="55" width="35" height="12" fill="#ffd700"/>
    <rect x="106" y="55" width="35" height="12" fill="#ffd700"/>
    <rect x="144" y="55" width="35" height="12" fill="#ffd700"/>
    <rect x="182" y="55" width="35" height="12" fill="#ffd700"/>
    <rect x="220" y="55" width="35" height="12" fill="#ffd700"/>
    <!-- Row 4: Green -->
    <rect x="30" y="70" width="35" height="12" fill="#44ff66"/>
    <rect x="68" y="70" width="35" height="12" fill="#44ff66"/>
    <rect x="106" y="70" width="35" height="12" fill="#44ff66"/>
    <rect x="144" y="70" width="35" height="12" fill="#44ff66"/>
    <rect x="182" y="70" width="35" height="12" fill="#44ff66"/>
    <rect x="220" y="70" width="35" height="12" fill="#44ff66"/>
    <!-- Row 5: Blue -->
    <rect x="30" y="85" width="35" height="12" fill="#44aaff"/>
    <rect x="68" y="85" width="35" height="12" fill="#44aaff"/>
    <rect x="106" y="85" width="35" height="12" fill="#44aaff"/>
    <rect x="144" y="85" width="35" height="12" fill="#44aaff"/>
    <rect x="182" y="85" width="35" height="12" fill="#44aaff"/>
    <rect x="220" y="85" width="35" height="12" fill="#44aaff"/>
    <!-- Row 6: Purple -->
    <rect x="30" y="100" width="35" height="12" fill="#c084fc"/>
    <rect x="68" y="100" width="35" height="12" fill="#c084fc"/>
    <rect x="106" y="100" width="35" height="12" fill="#c084fc"/>
    <rect x="144" y="100" width="35" height="12" fill="#c084fc"/>
    <rect x="182" y="100" width="35" height="12" fill="#c084fc"/>
    <rect x="220" y="100" width="35" height="12" fill="#c084fc"/>

    <!-- Ball trajectory -->
    <circle cx="180" cy="140" r="5" fill="#ffffff"/>
    <!-- Trajectory line (dotted) -->
    <line x1="180" y1="140" x2="130" y2="112" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

    <!-- Paddle -->
    <rect x="110" y="160" width="80" height="12" fill="#e0e0e0" rx="1"/>
    <rect x="110" y="160" width="80" height="2" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text class="title" x="380" y="90">BREAKOUT</text>
  <text class="sub" x="380" y="118">Smash · Bounce · Clear</text>

  <!-- Score HUD mock -->
  <g transform="translate(380, 140)">
    <rect width="240" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <!-- Pixel icon (breakout icon from icons.js) -->
    <g transform="translate(6, 3)" shape-rendering="crispEdges">
      <rect x="1.5" y="1.5" width="21" height="1.5" fill="#ff4444"/>
      <rect x="1.5" y="3" width="21" height="1.5" fill="#ff8844"/>
      <rect x="1.5" y="4.5" width="21" height="1.5" fill="#ffd700"/>
      <rect x="1.5" y="6" width="21" height="1.5" fill="#44ff66"/>
      <rect x="12" y="12" width="1.5" height="1.5" fill="#e0e0e0"/>
      <rect x="10.5" y="13.5" width="1.5" height="1.5" fill="#e0e0e0"/>
      <rect x="9" y="15" width="1.5" height="1.5" fill="#e0e0e0"/>
      <rect x="6" y="21" width="9" height="1.5" fill="#e0e0e0"/>
    </g>
    <text font-family="monospace" font-size="9" fill="#666" x="35" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="75" y="19">1280</text>
    <text font-family="monospace" font-size="9" fill="#666" x="130" y="19">LIVES</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="170" y="19">3</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
