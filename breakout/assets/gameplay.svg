<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 540" width="440" height="540">
  <defs><style>text{font-family:monospace;}</style></defs>
  <rect width="440" height="540" fill="#0a0a16" rx="8"/>

  <!-- HUD bar -->
  <rect x="20" y="10" width="400" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="2"/>
  <!-- Breakout pixel icon (simplified from icons.js) -->
  <g transform="translate(28, 14)" shape-rendering="crispEdges">
    <!-- Brick rows (top of icon) -->
    <rect x="1.2" y="1.2" width="16.8" height="1.2" fill="#ff4444"/>
    <rect x="1.2" y="2.4" width="16.8" height="1.2" fill="#cc2222"/>
    <rect x="1.2" y="3.6" width="16.8" height="1.2" fill="#ff8844"/>
    <rect x="1.2" y="4.8" width="16.8" height="1.2" fill="#cc6622"/>
    <rect x="1.2" y="6" width="16.8" height="1.2" fill="#ffd700"/>
    <rect x="1.2" y="7.2" width="16.8" height="1.2" fill="#b89a00"/>
    <rect x="1.2" y="8.4" width="16.8" height="1.2" fill="#44ff66"/>
    <!-- Ball trajectory -->
    <rect x="9.6" y="13.2" width="1.2" height="1.2" fill="#e0e0e0"/>
    <rect x="8.4" y="14.4" width="1.2" height="1.2" fill="#e0e0e0"/>
    <rect x="7.2" y="15.6" width="1.2" height="1.2" fill="#e0e0e0"/>
    <!-- Paddle -->
    <rect x="4.8" y="16.8" width="7.2" height="1.2" fill="#e0e0e0"/>
  </g>
  <text font-size="11" fill="#e0e0e0" x="52" y="32" font-weight="bold">Breakout</text>
  <text font-size="8" fill="#666" x="260" y="30">Score</text>
  <text font-size="10" fill="#ffd700" x="295" y="30">340</text>
  <text font-size="8" fill="#666" x="350" y="30">Lives</text>
  <text font-size="10" fill="#ffd700" x="385" y="30">3</text>

  <!-- Game area -->
  <rect x="20" y="50" width="400" height="480" fill="#0e0e1a" stroke="#2a2a40" stroke-width="1"/>

  <!--
    Brick layout: 6 rows × 8 cols
    brickW ≈ 45.5, brickH=16, gap=4, topOffset=50
    Scaled for SVG: each brick ~45×16 with 4px gaps
    x starts at 24 (20 + gap), y starts at 100 (50 + topOffset)
    
    Realistic state: Score 340 = about 14 bricks destroyed
    Ball bounces from below, so damage is bottom-up:
    - Row 6 (purple, bottom): 6 of 8 destroyed (only cols 0,7 remain)
    - Row 5 (blue): 5 of 8 destroyed (cols 1,4,6 remain)  
    - Row 4 (green): 3 of 8 destroyed (cols 2,5,7 gone)
    - Row 3 (gold): all 8 intact
    - Row 2 (orange): all 8 intact
    - Row 1 (red, top): all 8 intact
  -->

  <!-- Row 1: Red — ALL INTACT -->
  <g shape-rendering="crispEdges">
    <rect x="24" y="100" width="45" height="16" fill="#ff4444"/>
    <rect x="73" y="100" width="45" height="16" fill="#ff4444"/>
    <rect x="122" y="100" width="45" height="16" fill="#ff4444"/>
    <rect x="171" y="100" width="45" height="16" fill="#ff4444"/>
    <rect x="220" y="100" width="45" height="16" fill="#ff4444"/>
    <rect x="269" y="100" width="45" height="16" fill="#ff4444"/>
    <rect x="318" y="100" width="45" height="16" fill="#ff4444"/>
    <rect x="367" y="100" width="45" height="16" fill="#ff4444"/>
    <!-- Highlights -->
    <rect x="24" y="100" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="73" y="100" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="122" y="100" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="171" y="100" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="220" y="100" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="269" y="100" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="318" y="100" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="367" y="100" width="45" height="3" fill="#fff" opacity="0.2"/>
  </g>

  <!-- Row 2: Orange — ALL INTACT -->
  <g shape-rendering="crispEdges">
    <rect x="24" y="120" width="45" height="16" fill="#ff8844"/>
    <rect x="73" y="120" width="45" height="16" fill="#ff8844"/>
    <rect x="122" y="120" width="45" height="16" fill="#ff8844"/>
    <rect x="171" y="120" width="45" height="16" fill="#ff8844"/>
    <rect x="220" y="120" width="45" height="16" fill="#ff8844"/>
    <rect x="269" y="120" width="45" height="16" fill="#ff8844"/>
    <rect x="318" y="120" width="45" height="16" fill="#ff8844"/>
    <rect x="367" y="120" width="45" height="16" fill="#ff8844"/>
    <rect x="24" y="120" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="73" y="120" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="122" y="120" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="171" y="120" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="220" y="120" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="269" y="120" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="318" y="120" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="367" y="120" width="45" height="3" fill="#fff" opacity="0.2"/>
  </g>

  <!-- Row 3: Gold — ALL INTACT -->
  <g shape-rendering="crispEdges">
    <rect x="24" y="140" width="45" height="16" fill="#ffd700"/>
    <rect x="73" y="140" width="45" height="16" fill="#ffd700"/>
    <rect x="122" y="140" width="45" height="16" fill="#ffd700"/>
    <rect x="171" y="140" width="45" height="16" fill="#ffd700"/>
    <rect x="220" y="140" width="45" height="16" fill="#ffd700"/>
    <rect x="269" y="140" width="45" height="16" fill="#ffd700"/>
    <rect x="318" y="140" width="45" height="16" fill="#ffd700"/>
    <rect x="367" y="140" width="45" height="16" fill="#ffd700"/>
    <rect x="24" y="140" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="73" y="140" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="122" y="140" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="171" y="140" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="220" y="140" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="269" y="140" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="318" y="140" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="367" y="140" width="45" height="3" fill="#fff" opacity="0.2"/>
  </g>

  <!-- Row 4: Green — 5 of 8 remain (cols 2,5,7 destroyed) -->
  <g shape-rendering="crispEdges">
    <rect x="24" y="160" width="45" height="16" fill="#44ff66"/>
    <rect x="73" y="160" width="45" height="16" fill="#44ff66"/>
    <!-- col 2 destroyed -->
    <rect x="171" y="160" width="45" height="16" fill="#44ff66"/>
    <rect x="220" y="160" width="45" height="16" fill="#44ff66"/>
    <!-- col 5 destroyed -->
    <rect x="318" y="160" width="45" height="16" fill="#44ff66"/>
    <!-- col 7 destroyed -->
    <rect x="24" y="160" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="73" y="160" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="171" y="160" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="220" y="160" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="318" y="160" width="45" height="3" fill="#fff" opacity="0.2"/>
  </g>

  <!-- Row 5: Blue — 3 of 8 remain (cols 1,4,6) -->
  <g shape-rendering="crispEdges">
    <!-- col 0 destroyed -->
    <rect x="73" y="180" width="45" height="16" fill="#44aaff"/>
    <!-- cols 2,3 destroyed -->
    <rect x="220" y="180" width="45" height="16" fill="#44aaff"/>
    <!-- col 5 destroyed -->
    <rect x="318" y="180" width="45" height="16" fill="#44aaff"/>
    <!-- col 7 destroyed -->
    <rect x="73" y="180" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="220" y="180" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="318" y="180" width="45" height="3" fill="#fff" opacity="0.2"/>
  </g>

  <!-- Row 6: Purple (bottom) — 2 of 8 remain (cols 0,7 only) -->
  <g shape-rendering="crispEdges">
    <rect x="24" y="200" width="45" height="16" fill="#c084fc"/>
    <!-- cols 1-6 destroyed -->
    <rect x="367" y="200" width="45" height="16" fill="#c084fc"/>
    <rect x="24" y="200" width="45" height="3" fill="#fff" opacity="0.2"/>
    <rect x="367" y="200" width="45" height="3" fill="#fff" opacity="0.2"/>
  </g>

  <!-- Ball (mid-flight, heading up-right after paddle bounce) -->
  <circle cx="250" cy="320" r="5" fill="#ffffff"/>

  <!-- Paddle -->
  <rect x="180" y="470" width="80" height="12" fill="#e0e0e0"/>
  <rect x="180" y="470" width="80" height="3" fill="#fff" opacity="0.3"/>

  <!-- Particles from recent brick hit (near row 5 area) -->
  <rect x="140" y="185" width="3" height="3" fill="#44aaff" opacity="0.7"/>
  <rect x="155" y="178" width="2" height="2" fill="#44aaff" opacity="0.5"/>
  <rect x="130" y="192" width="3" height="3" fill="#44aaff" opacity="0.4"/>
  <rect x="148" y="195" width="2" height="2" fill="#44aaff" opacity="0.3"/>
  <rect x="160" y="188" width="2" height="2" fill="#44aaff" opacity="0.5"/>

  <rect width="440" height="540" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
