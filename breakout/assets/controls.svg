<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <rect width="600" height="120" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;}</style></defs>

  <!-- Desktop section -->
  <text fill="#888" font-size="10" x="30" y="18">DESKTOP</text>

  <!-- Arrow keys (left/right only) -->
  <g transform="translate(40, 28)">
    <!-- Left -->
    <rect x="0" y="0" width="30" height="28" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="14" x="8" y="20">◄</text>
    <!-- Right -->
    <rect x="35" y="0" width="30" height="28" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="14" x="43" y="20">►</text>
    <text fill="#666" font-size="8" x="5" y="42">Move paddle</text>
  </g>

  <!-- Mouse -->
  <g transform="translate(130, 28)">
    <rect x="0" y="0" width="30" height="28" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="10" x="3" y="18">🖱</text>
    <text fill="#666" font-size="8" x="35" y="12">Mouse tracks</text>
    <text fill="#666" font-size="8" x="35" y="22">paddle position</text>
  </g>

  <!-- Space / Click to launch -->
  <g transform="translate(40, 75)">
    <rect x="0" y="0" width="70" height="22" fill="#1a1a2e" stroke="#ff8844" stroke-width="1.5" rx="3"/>
    <text fill="#ff8844" font-size="8" x="10" y="15">SPACE</text>
    <text fill="#666" font-size="8" x="80" y="15">Launch ball / Click</text>
  </g>

  <!-- Divider -->
  <line x1="250" y1="12" x2="250" y2="108" stroke="#2a2a40" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Mobile section -->
  <text fill="#888" font-size="10" x="275" y="18">MOBILE</text>

  <!-- Touch to move -->
  <g transform="translate(290, 30)">
    <circle cx="20" cy="18" r="16" fill="none" stroke="#2a2a40" stroke-width="1.5"/>
    <line x1="5" y1="18" x2="35" y2="18" stroke="#ff8844" stroke-width="2"/>
    <text fill="#ff8844" font-size="8" x="0" y="0">←</text>
    <text fill="#ff8844" font-size="8" x="34" y="0">→</text>
    <text fill="#666" font-size="8" x="45" y="14">Touch &amp; drag</text>
    <text fill="#666" font-size="8" x="45" y="24">to move paddle</text>
  </g>

  <!-- Tap to launch -->
  <g transform="translate(290, 75)">
    <rect x="0" y="0" width="60" height="22" fill="#1a1a2e" stroke="#ff8844" stroke-width="1.5" rx="3"/>
    <text fill="#ff8844" font-size="8" x="12" y="15">TAP</text>
    <text fill="#666" font-size="8" x="70" y="15">Launch ball</text>
  </g>

  <!-- Pause key -->
  <g transform="translate(470, 75)">
    <rect x="0" y="0" width="50" height="22" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#ffd700" font-size="8" x="10" y="15">ESC</text>
    <text fill="#666" font-size="8" x="58" y="15">Pause</text>
  </g>

  <rect width="600" height="120" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
