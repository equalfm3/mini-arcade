<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <rect width="500" height="200" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff8844"/>
    </marker>
  </defs>

  <text fill="#888" font-size="11" x="20" y="20">BALL REFLECTION ANGLE</text>

  <!-- Paddle (wide, centered) -->
  <rect x="100" y="140" width="200" height="12" fill="#e0e0e0" rx="1"/>
  <rect x="100" y="140" width="200" height="2" fill="#ffffff" opacity="0.3"/>

  <!-- Position labels -->
  <text fill="#ff4444" font-size="8" x="95" y="165">0.0</text>
  <text fill="#ffd700" font-size="8" x="192" y="165">0.5</text>
  <text fill="#44aaff" font-size="8" x="290" y="165">1.0</text>

  <!-- Left edge: 150° angle -->
  <line x1="120" y1="140" x2="70" y2="70" stroke="#ff4444" stroke-width="2" marker-end="url(#arrowR)"/>
  <circle cx="120" cy="140" r="4" fill="#ffffff"/>
  <text fill="#ff4444" font-size="9" x="50" y="65">150°</text>
  <text fill="#666" font-size="8" x="40" y="80">Sharp left</text>

  <!-- Center: 90° angle (straight up) -->
  <line x1="200" y1="140" x2="200" y2="60" stroke="#ffd700" stroke-width="2" marker-end="url(#arrowR)"/>
  <circle cx="200" cy="140" r="4" fill="#ffffff"/>
  <text fill="#ffd700" font-size="9" x="207" y="58">90°</text>
  <text fill="#666" font-size="8" x="207" y="72">Straight up</text>

  <!-- Right edge: 30° angle -->
  <line x1="280" y1="140" x2="330" y2="70" stroke="#44aaff" stroke-width="2" marker-end="url(#arrowR)"/>
  <circle cx="280" cy="140" r="4" fill="#ffffff"/>
  <text fill="#44aaff" font-size="9" x="332" y="65">30°</text>
  <text fill="#666" font-size="8" x="332" y="80">Sharp right</text>

  <!-- Angle arc indicators -->
  <path d="M 120 120 A 20 20 0 0 0 105 130" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.5"/>
  <path d="M 200 120 L 200 130" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
  <path d="M 280 120 A 20 20 0 0 1 295 130" fill="none" stroke="#44aaff" stroke-width="1" opacity="0.5"/>

  <!-- Formula box -->
  <rect x="350" y="95" width="140" height="80" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
  <text fill="#888" font-size="8" x="360" y="112">Formula:</text>
  <text fill="#ff8844" font-size="8" x="360" y="128">hitPos = (ballX - padX)</text>
  <text fill="#ff8844" font-size="8" x="380" y="140">/ paddleWidth</text>
  <text fill="#ff8844" font-size="8" x="360" y="156">angle = 150° -</text>
  <text fill="#ff8844" font-size="8" x="380" y="168">hitPos × 120°</text>

  <!-- Incoming ball arrows (showing ball coming down) -->
  <line x1="120" y1="100" x2="120" y2="132" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="200" y1="100" x2="200" y2="132" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="280" y1="100" x2="280" y2="132" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <rect width="500" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
