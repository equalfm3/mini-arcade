<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 280" width="540" height="280">
  <rect width="540" height="280" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>

  <!-- DIFFICULTY SELECT box -->
  <rect x="15" y="100" width="110" height="40" fill="#12121f" stroke="#c084fc" stroke-width="2" rx="4"/>
  <text fill="#c084fc" font-size="9" x="25" y="118" font-weight="bold">DIFFICULTY</text>
  <text fill="#c084fc" font-size="9" x="35" y="130">SELECT</text>

  <!-- PLAYING box -->
  <rect x="180" y="100" width="100" height="40" fill="#12121f" stroke="#44ff66" stroke-width="2" rx="4"/>
  <text fill="#44ff66" font-size="10" x="193" y="125" font-weight="bold">PLAYING</text>

  <!-- PAUSED box -->
  <rect x="180" y="20" width="100" height="40" fill="#12121f" stroke="#ffd700" stroke-width="2" rx="4"/>
  <text fill="#ffd700" font-size="10" x="195" y="45" font-weight="bold">PAUSED</text>

  <!-- WIN box -->
  <rect x="370" y="70" width="90" height="40" fill="#12121f" stroke="#44ff66" stroke-width="2" rx="4"/>
  <text fill="#44ff66" font-size="10" x="395" y="95" font-weight="bold">WIN</text>

  <!-- LOSE box -->
  <rect x="370" y="150" width="90" height="40" fill="#12121f" stroke="#ff4444" stroke-width="2" rx="4"/>
  <text fill="#ff4444" font-size="10" x="393" y="175" font-weight="bold">LOSE</text>

  <!-- Arrows -->
  <!-- select → playing -->
  <line x1="125" y1="120" x2="178" y2="120" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="133" y="114">Start</text>

  <!-- playing → paused -->
  <line x1="220" y1="100" x2="220" y2="62" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="226" y="85">Esc</text>

  <!-- paused → playing (resume) -->
  <line x1="250" y1="60" x2="250" y2="98" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="256" y="82">Resume</text>

  <!-- paused → select (restart) -->
  <path d="M 180 40 Q 100 40 70 98" fill="none" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="100" y="55">Restart</text>

  <!-- playing → win -->
  <line x1="280" y1="110" x2="368" y2="92" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="300" y="95">P1 = 7</text>

  <!-- playing → lose -->
  <line x1="280" y1="130" x2="368" y2="165" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="300" y="155">P2 = 7</text>

  <!-- win/lose → select (play again) -->
  <path d="M 415 110 Q 415 240 230 240 Q 70 240 70 142" fill="none" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="200" y="255">Play Again</text>

  <path d="M 415 190 Q 415 240 230 240" fill="none" stroke="#ffd700" stroke-width="1" stroke-dasharray="3,3"/>

  <rect width="540" height="280" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
