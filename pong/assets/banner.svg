<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #e0e0e0; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Dashed center line -->
  <line x1="200" y1="0" x2="200" y2="200" stroke="#2a2a40" stroke-width="2" stroke-dasharray="8,8"/>

  <!-- Left paddle -->
  <rect x="30" y="50" width="10" height="70" fill="#e0e0e0" rx="1"/>

  <!-- Right paddle -->
  <rect x="360" y="80" width="10" height="70" fill="#e0e0e0" rx="1"/>

  <!-- Ball with trail -->
  <rect x="140" y="68" width="6" height="6" fill="#ffffff" opacity="0.15"/>
  <rect x="160" y="72" width="6" height="6" fill="#ffffff" opacity="0.25"/>
  <rect x="180" y="76" width="8" height="8" fill="#ffffff" opacity="0.4"/>
  <rect x="205" y="80" width="10" height="10" fill="#ffffff" opacity="0.6"/>
  <rect x="235" y="84" width="12" height="12" fill="#ffffff" opacity="0.8"/>
  <rect x="268" y="88" width="14" height="14" fill="#ffffff"/>

  <!-- Pixel icon (pong from icons.js) -->
  <g transform="translate(30, 10)" shape-rendering="crispEdges">
    <rect x="1.5" y="1.5" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="16.5" y="1.5" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="1.5" y="3" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="16.5" y="3" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="1.5" y="4.5" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="9" y="4.5" width="3" height="1.5" fill="#e0e0e0"/>
    <rect x="16.5" y="4.5" width="3" height="1.5" fill="#e0e0e0"/>
  </g>

  <!-- Title -->
  <text class="title" x="440" y="95">PONG</text>
  <text class="sub" x="440" y="125">Bounce · Score · Win</text>

  <!-- Score HUD mock -->
  <g transform="translate(440, 145)">
    <rect width="200" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">P1</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="35" y="19">3</text>
    <text font-family="monospace" font-size="9" fill="#666" x="100" y="19">P2</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="125" y="19">2</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
