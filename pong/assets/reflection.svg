<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="500" height="180">
  <rect width="500" height="180" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrowW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff"/>
    </marker>
    <marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>

  <text fill="#888" font-size="11" x="20" y="20">Ball Reflection Angles</text>

  <!-- Paddle (tall rectangle) -->
  <rect x="140" y="30" width="12" height="120" fill="#e0e0e0" rx="1"/>

  <!-- Hit position labels -->
  <text fill="#44aaff" font-size="8" x="100" y="40">hitPos = 0</text>
  <text fill="#44aaff" font-size="8" x="100" y="93">hitPos = 0.5</text>
  <text fill="#44aaff" font-size="8" x="100" y="152">hitPos = 1</text>

  <!-- Dashed lines showing hit zones -->
  <line x1="135" y1="35" x2="155" y2="35" stroke="#44aaff" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="135" y1="90" x2="155" y2="90" stroke="#44aaff" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="135" y1="145" x2="155" y2="145" stroke="#44aaff" stroke-width="0.5" stroke-dasharray="2,2"/>

  <!-- Top hit: steep upward (-60°) -->
  <line x1="155" y1="40" x2="260" y2="10" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arrowW)"/>
  <rect x="155" y="36" width="10" height="10" fill="#ffffff"/>
  <text fill="#ff6666" font-size="9" x="265" y="15">-60°</text>

  <!-- Upper hit: moderate upward (-30°) -->
  <line x1="155" y1="60" x2="260" y2="40" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arrowW)" opacity="0.7"/>
  <rect x="155" y="56" width="10" height="10" fill="#ffffff" opacity="0.7"/>
  <text fill="#ff6666" font-size="9" x="265" y="45" opacity="0.7">-30°</text>

  <!-- Center hit: flat (0°) -->
  <line x1="155" y1="90" x2="280" y2="90" stroke="#ffd700" stroke-width="2" marker-end="url(#arrowY)"/>
  <rect x="155" y="86" width="10" height="10" fill="#ffffff"/>
  <text fill="#ffd700" font-size="9" x="285" y="94">0° (flat)</text>

  <!-- Lower hit: moderate downward (+30°) -->
  <line x1="155" y1="120" x2="260" y2="140" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arrowW)" opacity="0.7"/>
  <rect x="155" y="116" width="10" height="10" fill="#ffffff" opacity="0.7"/>
  <text fill="#ff6666" font-size="9" x="265" y="145" opacity="0.7">+30°</text>

  <!-- Bottom hit: steep downward (+60°) -->
  <line x1="155" y1="140" x2="260" y2="170" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arrowW)"/>
  <rect x="155" y="136" width="10" height="10" fill="#ffffff"/>
  <text fill="#ff6666" font-size="9" x="265" y="172">+60°</text>

  <!-- Formula -->
  <text fill="#888" font-size="9" x="330" y="70">angle = (hitPos - 0.5) × 2 × 60°</text>
  <text fill="#666" font-size="8" x="330" y="90">hitPos = (ballY - paddleY) / paddleH</text>
  <text fill="#666" font-size="8" x="330" y="105">Range: -60° to +60°</text>
  <text fill="#666" font-size="8" x="330" y="125">Speed increases each hit</text>
  <text fill="#555" font-size="8" x="330" y="145">+15 px/s per bounce</text>
  <text fill="#555" font-size="8" x="330" y="160">max 500 px/s</text>

  <rect width="500" height="180" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
