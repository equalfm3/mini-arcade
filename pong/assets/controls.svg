<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <rect width="600" height="120" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;}</style></defs>

  <!-- Desktop section -->
  <text fill="#888" font-size="10" x="30" y="18">DESKTOP — PLAYER 1</text>

  <!-- W key -->
  <g transform="translate(50, 28)">
    <rect x="0" y="0" width="30" height="28" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="13" x="9" y="19">W</text>
  </g>
  <!-- S key -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="30" height="28" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="13" x="10" y="19">S</text>
  </g>
  <text fill="#666" font-size="9" x="90" y="50">Move</text>
  <text fill="#666" font-size="9" x="90" y="62">P1 paddle</text>

  <!-- Arrow keys (also work) -->
  <g transform="translate(160, 28)">
    <rect x="0" y="0" width="30" height="28" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="14" x="8" y="20">▲</text>
  </g>
  <g transform="translate(160, 60)">
    <rect x="0" y="0" width="30" height="28" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="14" x="8" y="20">▼</text>
  </g>
  <text fill="#666" font-size="9" x="200" y="50">Also</text>
  <text fill="#666" font-size="9" x="200" y="62">works</text>

  <!-- AI label -->
  <g transform="translate(50, 95)">
    <rect x="0" y="0" width="60" height="18" fill="#12121f" stroke="#e0e0e0" stroke-width="1" rx="2"/>
    <text fill="#e0e0e0" font-size="8" x="14" y="13">P2 = AI</text>
  </g>

  <!-- Pause key -->
  <g transform="translate(160, 95)">
    <rect x="0" y="0" width="50" height="18" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#ffd700" font-size="8" x="10" y="13">ESC</text>
    <text fill="#666" font-size="8" x="60" y="13">Pause / Restart</text>
  </g>

  <!-- Divider -->
  <line x1="280" y1="10" x2="280" y2="110" stroke="#2a2a40" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Mobile section -->
  <text fill="#888" font-size="10" x="310" y="18">MOBILE</text>

  <!-- Touch drag gesture -->
  <g transform="translate(330, 30)">
    <!-- Phone outline -->
    <rect x="0" y="0" width="50" height="70" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <!-- Paddle on left side -->
    <rect x="8" y="20" width="4" height="25" fill="#e0e0e0"/>
    <!-- Finger drag arrow -->
    <line x1="20" y1="55" x2="20" y2="20" stroke="#e0e0e0" stroke-width="1.5"/>
    <polygon points="16,22 20,14 24,22" fill="#e0e0e0"/>
    <line x1="20" y1="55" x2="20" y2="60" stroke="#e0e0e0" stroke-width="1.5"/>
    <polygon points="16,58 20,66 24,58" fill="#e0e0e0"/>
    <!-- Touch circle -->
    <circle cx="20" cy="40" r="6" fill="#e0e0e0" opacity="0.2"/>
    <circle cx="20" cy="40" r="3" fill="#e0e0e0" opacity="0.4"/>
  </g>

  <text fill="#888" font-size="9" x="400" y="55">Touch &amp; drag</text>
  <text fill="#888" font-size="9" x="400" y="68">to move P1</text>
  <text fill="#666" font-size="8" x="400" y="85">AI controls P2</text>

  <rect width="600" height="120" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
