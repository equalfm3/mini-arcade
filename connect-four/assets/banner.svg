<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 42px; font-weight: bold; fill: #1a5fb4; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>
  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Connect Four board pixel art -->
  <g transform="translate(30, 15)">
    <!-- Blue board -->
    <rect x="10" y="10" width="210" height="170" fill="#1a5fb4" rx="6"/>

    <!-- Row 0 (top) — empty holes -->
    <circle cx="40" cy="35" r="12" fill="#0e0e1a"/>
    <circle cx="75" cy="35" r="12" fill="#0e0e1a"/>
    <circle cx="110" cy="35" r="12" fill="#0e0e1a"/>
    <circle cx="145" cy="35" r="12" fill="#0e0e1a"/>
    <circle cx="180" cy="35" r="12" fill="#0e0e1a"/>

    <!-- Row 1 — some discs -->
    <circle cx="40" cy="70" r="12" fill="#0e0e1a"/>
    <circle cx="75" cy="70" r="12" fill="#0e0e1a"/>
    <circle cx="110" cy="70" r="12" fill="#0e0e1a"/>
    <circle cx="145" cy="70" r="12" fill="#ffd700"/>
    <circle cx="180" cy="70" r="12" fill="#0e0e1a"/>

    <!-- Row 2 -->
    <circle cx="40" cy="105" r="12" fill="#0e0e1a"/>
    <circle cx="75" cy="105" r="12" fill="#ff4444"/>
    <circle cx="110" cy="105" r="12" fill="#ffd700"/>
    <circle cx="145" cy="105" r="12" fill="#ff4444"/>
    <circle cx="180" cy="105" r="12" fill="#0e0e1a"/>

    <!-- Row 3 -->
    <circle cx="40" cy="140" r="12" fill="#ffd700"/>
    <circle cx="75" cy="140" r="12" fill="#ff4444"/>
    <circle cx="110" cy="140" r="12" fill="#ff4444"/>
    <circle cx="145" cy="140" r="12" fill="#ffd700"/>
    <circle cx="180" cy="140" r="12" fill="#ff4444"/>

    <!-- Row 4 (bottom) -->
    <circle cx="40" cy="165" r="12" fill="#ff4444"/>
    <circle cx="75" cy="165" r="12" fill="#ffd700"/>
    <circle cx="110" cy="165" r="12" fill="#ffd700"/>
    <circle cx="145" cy="165" r="12" fill="#ff4444"/>
    <circle cx="180" cy="165" r="12" fill="#ffd700"/>

    <!-- Disc highlights -->
    <circle cx="73" cy="103" r="5" fill="#ff6666" opacity="0.3"/>
    <circle cx="108" cy="103" r="5" fill="#ffeb3b" opacity="0.3"/>
    <circle cx="73" cy="138" r="5" fill="#ff6666" opacity="0.3"/>
    <circle cx="108" cy="138" r="5" fill="#ff6666" opacity="0.3"/>
  </g>

  <!-- Pixel icon -->
  <g transform="translate(280, 30)" shape-rendering="crispEdges">
    <rect x="1.5" y="1.5" width="21" height="19.5" fill="#44aaff" rx="1"/>
    <circle cx="5.25" cy="5.25" r="2.25" fill="#ff4444"/>
    <circle cx="12" cy="5.25" r="2.25" fill="#ffd700"/>
    <circle cx="18.75" cy="5.25" r="2.25" fill="#ff4444"/>
    <circle cx="5.25" cy="11.25" r="2.25" fill="#ffd700"/>
    <circle cx="12" cy="11.25" r="2.25" fill="#ff4444"/>
    <circle cx="18.75" cy="11.25" r="2.25" fill="#ffd700"/>
    <circle cx="5.25" cy="17.25" r="2.25" fill="#0e0e1a"/>
    <circle cx="12" cy="17.25" r="2.25" fill="#ff4444"/>
    <circle cx="18.75" cy="17.25" r="2.25" fill="#0e0e1a"/>
  </g>

  <!-- Title -->
  <text class="title" x="330" y="90">CONNECT FOUR</text>
  <text class="sub" x="330" y="118">Drop · Connect · Win</text>

  <!-- Score HUD mock -->
  <g transform="translate(330, 140)">
    <rect width="260" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">WINS</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="50" y="19">5</text>
    <text font-family="monospace" font-size="9" fill="#666" x="90" y="19">DRAWS</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="140" y="19">2</text>
    <text font-family="monospace" font-size="9" fill="#666" x="180" y="19">DIFF</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="215" y="19">Hard</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
