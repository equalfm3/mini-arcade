<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 42px; font-weight: bold; fill: #44ff66; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.3">
    <rect x="50" y="20" width="2" height="2"/><rect x="120" y="45" width="2" height="2"/>
    <rect x="200" y="15" width="2" height="2"/><rect x="280" y="55" width="2" height="2"/>
    <rect x="350" y="25" width="2" height="2"/><rect x="500" y="35" width="2" height="2"/>
    <rect x="600" y="18" width="2" height="2"/><rect x="700" y="50" width="2" height="2"/>
    <rect x="750" y="22" width="2" height="2"/><rect x="450" y="12" width="2" height="2"/>
  </g>

  <!-- Mountains (far background) -->
  <g fill="#161625">
    <polygon points="20,160 70,110 120,160"/>
    <polygon points="90,160 150,100 210,160"/>
    <polygon points="170,160 220,120 270,160"/>
  </g>

  <!-- Hills (mid background) -->
  <g fill="#1a1a2e">
    <polygon points="0,160 40,135 80,160"/>
    <polygon points="60,160 110,130 160,160"/>
    <polygon points="140,160 180,140 220,160"/>
    <polygon points="200,160 240,135 280,160"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="160" width="800" height="40" fill="#2a2a40"/>
  <rect x="0" y="160" width="800" height="2" fill="#3a3a55"/>
  <!-- Ground texture -->
  <g fill="#333350">
    <rect x="10" y="168" width="8" height="2"/><rect x="40" y="175" width="6" height="2"/>
    <rect x="80" y="168" width="8" height="2"/><rect x="120" y="175" width="6" height="2"/>
    <rect x="160" y="168" width="8" height="2"/><rect x="200" y="175" width="6" height="2"/>
    <rect x="240" y="168" width="8" height="2"/><rect x="280" y="175" width="6" height="2"/>
  </g>

  <!-- Player (running pixel art) -->
  <g shape-rendering="crispEdges">
    <!-- Head -->
    <rect x="58" y="112" width="32" height="12" fill="#e0e0e0"/>
    <!-- Body -->
    <rect x="60" y="124" width="28" height="28" fill="#e0e0e0"/>
    <!-- Eye -->
    <rect x="82" y="115" width="4" height="4" fill="#ff4444"/>
    <!-- Dark stripe -->
    <rect x="60" y="146" width="28" height="6" fill="#aaaaaa"/>
    <!-- Arm -->
    <rect x="88" y="132" width="6" height="3" fill="#e0e0e0"/>
    <!-- Legs (running) -->
    <rect x="62" y="152" width="4" height="8" fill="#e0e0e0"/>
    <rect x="80" y="152" width="4" height="4" fill="#e0e0e0"/>
  </g>

  <!-- Small cactus -->
  <g shape-rendering="crispEdges">
    <rect x="160" y="132" width="8" height="28" fill="#44ff66"/>
    <rect x="154" y="140" width="6" height="10" fill="#44ff66"/>
    <rect x="168" y="144" width="6" height="8" fill="#44ff66"/>
    <rect x="160" y="132" width="2" height="28" fill="#22aa44"/>
  </g>

  <!-- Large cactus -->
  <g shape-rendering="crispEdges">
    <rect x="210" y="120" width="10" height="40" fill="#44ff66"/>
    <rect x="204" y="130" width="7" height="14" fill="#44ff66"/>
    <rect x="220" y="136" width="7" height="12" fill="#44ff66"/>
    <rect x="210" y="120" width="2" height="40" fill="#22aa44"/>
  </g>

  <!-- Bird -->
  <g shape-rendering="crispEdges">
    <rect x="254" y="116" width="22" height="10" fill="#c084fc"/>
    <rect x="268" y="114" width="8" height="10" fill="#c084fc"/>
    <rect x="276" y="117" width="4" height="3" fill="#ffd700"/>
    <rect x="270" y="115" width="3" height="3" fill="#ffffff"/>
    <rect x="256" y="110" width="14" height="6" fill="#8844cc"/>
    <rect x="250" y="116" width="6" height="4" fill="#c084fc"/>
  </g>

  <!-- Pixel icon (endless-runner from icons.js) -->
  <g transform="translate(320, 30)" shape-rendering="crispEdges">
    <rect x="9" y="0" width="3" height="3" fill="#e0e0e0"/>
    <rect x="7.5" y="3" width="6" height="3" fill="#e0e0e0"/>
    <rect x="7.5" y="6" width="6" height="3" fill="#e0e0e0"/>
    <rect x="9" y="9" width="3" height="3" fill="#e0e0e0"/>
    <rect x="7.5" y="12" width="6" height="3" fill="#e0e0e0"/>
    <rect x="6" y="15" width="3" height="3" fill="#e0e0e0"/>
    <rect x="12" y="15" width="3" height="3" fill="#e0e0e0"/>
    <rect x="4.5" y="18" width="3" height="3" fill="#e0e0e0"/>
    <rect x="12" y="18" width="3" height="3" fill="#e0e0e0"/>
    <rect x="3" y="21" width="3" height="3" fill="#e0e0e0"/>
    <rect x="12" y="21" width="3" height="3" fill="#e0e0e0"/>
    <rect x="0" y="30" width="48" height="3" fill="#88cc44"/>
    <rect x="0" y="33" width="48" height="3" fill="#668833"/>
  </g>

  <!-- Title -->
  <text class="title" x="390" y="85">ENDLESS RUNNER</text>
  <text class="sub" x="390" y="112">Run · Jump · Duck · Survive</text>

  <!-- Score HUD mock -->
  <g transform="translate(390, 130)">
    <rect width="280" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">1450</text>
    <text font-family="monospace" font-size="9" fill="#666" x="120" y="19">BEST</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="155" y="19">3200</text>
    <text font-family="monospace" font-size="9" fill="#666" x="210" y="19">SPEED</text>
    <text font-family="monospace" font-size="9" fill="#44ff66" x="250" y="19">1.8x</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
