<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="600" height="180" fill="#0a0a16" rx="6"/>

  <!-- Desktop section -->
  <text fill="#44aaff" font-size="13" font-weight="bold" x="100" y="28" text-anchor="middle">DESKTOP</text>

  <!-- Space bar key -->
  <rect x="40" y="50" width="120" height="36" fill="#12121f" stroke="#44aaff" stroke-width="2" rx="4"/>
  <text fill="#44aaff" font-size="11" x="100" y="73" text-anchor="middle">SPACE / TAP</text>
  <text fill="#888" font-size="9" x="100" y="105" text-anchor="middle">Reverse direction</text>

  <!-- Esc key -->
  <rect x="40" y="120" width="50" height="30" fill="#12121f" stroke="#ffd700" stroke-width="2" rx="4"/>
  <text fill="#ffd700" font-size="10" x="65" y="140" text-anchor="middle">ESC</text>
  <!-- P key -->
  <rect x="100" y="120" width="30" height="30" fill="#12121f" stroke="#ffd700" stroke-width="2" rx="4"/>
  <text fill="#ffd700" font-size="10" x="115" y="140" text-anchor="middle">P</text>
  <text fill="#888" font-size="9" x="100" y="165" text-anchor="middle">Pause</text>

  <!-- Divider -->
  <line x1="300" y1="20" x2="300" y2="160" stroke="#2a2a40" stroke-width="1"/>

  <!-- Mobile section -->
  <text fill="#44aaff" font-size="13" font-weight="bold" x="450" y="28" text-anchor="middle">MOBILE</text>

  <!-- FLIP button -->
  <rect x="400" y="50" width="100" height="50" fill="#12121f" stroke="#44aaff" stroke-width="2" rx="8"/>
  <text fill="#44aaff" font-size="14" font-weight="bold" x="450" y="80" text-anchor="middle">FLIP</text>
  <text fill="#888" font-size="9" x="450" y="120" text-anchor="middle">Tap to reverse</text>
  <text fill="#888" font-size="9" x="450" y="135" text-anchor="middle">orbit direction</text>

  <!-- Border -->
  <rect width="600" height="180" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
