<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 380" width="380" height="380">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="380" height="380" fill="#0a0a16" rx="6"/>

  <!-- Background stars -->
  <g fill="#ffffff" opacity="0.25">
    <rect x="30" y="20" width="2" height="2"/><rect x="90" y="50" width="1" height="1"/>
    <rect x="150" y="30" width="2" height="2"/><rect x="250" y="60" width="1" height="1"/>
    <rect x="320" y="40" width="2" height="2"/><rect x="350" y="100" width="1" height="1"/>
    <rect x="40" y="300" width="2" height="2"/><rect x="100" y="340" width="1" height="1"/>
    <rect x="280" y="320" width="2" height="2"/><rect x="340" y="280" width="1" height="1"/>
    <rect x="60" y="180" width="1" height="1"/><rect x="330" y="200" width="2" height="2"/>
    <rect x="20" y="120" width="1" height="1"/><rect x="360" y="150" width="1" height="1"/>
  </g>

  <!-- Score watermark in center -->
  <text fill="#ffffff" opacity="0.12" font-size="56" font-weight="bold" text-anchor="middle" dominant-baseline="middle" x="190" y="190">1250</text>

  <!-- Orbit ring -->
  <circle cx="190" cy="190" r="100" fill="none" stroke="rgba(68,170,255,0.25)" stroke-width="2"/>
  <circle cx="190" cy="190" r="100" fill="none" stroke="rgba(68,170,255,0.08)" stroke-width="8"/>

  <!-- Center dot -->
  <circle cx="190" cy="190" r="3" fill="#2a2a40"/>

  <!-- Player dot at ~45 degrees (top-right of orbit) -->
  <!-- angle ≈ -0.8 rad → x=190+100*cos(-0.8)=190+70=260, y=190+100*sin(-0.8)=190-72=118 -->
  <!-- Trail dots (going clockwise from player position) -->
  <circle cx="270" cy="130" r="3.5" fill="#44aaff" opacity="0.15"/>
  <circle cx="275" cy="140" r="4" fill="#44aaff" opacity="0.2"/>
  <circle cx="278" cy="152" r="4.5" fill="#44aaff" opacity="0.28"/>
  <circle cx="280" cy="165" r="5" fill="#44aaff" opacity="0.35"/>
  <!-- Player -->
  <circle cx="262" cy="120" r="6" fill="#44aaff"/>
  <circle cx="262" cy="120" r="2.5" fill="#ffffff"/>

  <!-- Direction arrow (curved, showing clockwise motion) -->
  <path d="M 252,112 A 12,12 0 0,1 272,112" fill="none" stroke="#44aaff" stroke-width="1" opacity="0.4"/>

  <!-- Projectile obstacles -->
  <!-- One coming from top-left toward orbit -->
  <circle cx="110" cy="80" r="5" fill="#ff4444"/>
  <circle cx="110" cy="80" r="2" fill="#ffcccc"/>
  <!-- One coming from bottom-right -->
  <circle cx="310" cy="290" r="5" fill="#ff4444"/>
  <circle cx="310" cy="290" r="2" fill="#ffcccc"/>
  <!-- One near the orbit ring -->
  <circle cx="145" cy="275" r="5" fill="#ff4444"/>
  <circle cx="145" cy="275" r="2" fill="#ffcccc"/>

  <!-- Arc obstacle on orbit (bottom-left section) -->
  <path d="M 120,240 A 100,100 0 0,1 150,270" fill="none" stroke="#ff8844" stroke-width="8" stroke-linecap="round" transform="rotate(0,190,190)"/>
  <path d="M 120,240 A 100,100 0 0,1 150,270" fill="none" stroke="rgba(255,200,100,0.6)" stroke-width="2" stroke-linecap="round" transform="rotate(0,190,190)"/>

  <!-- Gold star on orbit (right side) -->
  <polygon points="290,190 292,195 297,195 293,198 294,203 290,200 286,203 287,198 283,195 288,195" fill="#ffd700"/>
  <circle cx="290" cy="197" r="1.5" fill="#ffffff" opacity="0.8"/>

  <!-- Another star (top) -->
  <polygon points="190,90 192,95 197,95 193,98 194,103 190,100 186,103 187,98 183,95 188,95" fill="#ffd700" opacity="0.6"/>
  <circle cx="190" cy="97" r="1.5" fill="#ffffff" opacity="0.5"/>

  <!-- Border -->
  <rect width="380" height="380" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
