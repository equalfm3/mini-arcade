<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0a0a16; }
      .title { font-family: monospace; font-size: 44px; font-weight: bold; fill: #44aaff; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Background stars -->
  <g fill="#ffffff" opacity="0.25">
    <rect x="50" y="30" width="2" height="2"/><rect x="120" y="80" width="1" height="1"/>
    <rect x="200" y="15" width="2" height="2"/><rect x="350" y="45" width="1" height="1"/>
    <rect x="500" y="25" width="2" height="2"/><rect x="620" y="70" width="1" height="1"/>
    <rect x="700" y="35" width="2" height="2"/><rect x="750" y="120" width="1" height="1"/>
    <rect x="80" y="150" width="1" height="1"/><rect x="180" y="170" width="2" height="2"/>
    <rect x="650" y="160" width="2" height="2"/><rect x="550" y="140" width="1" height="1"/>
  </g>

  <!-- Arena scene on left -->
  <g transform="translate(140, 100)">
    <!-- Arena ring glow -->
    <circle cx="0" cy="0" r="72" fill="none" stroke="rgba(68,170,255,0.08)" stroke-width="8"/>
    <circle cx="0" cy="0" r="72" fill="none" stroke="rgba(68,170,255,0.35)" stroke-width="2"/>

    <!-- Arena fill -->
    <circle cx="0" cy="0" r="72" fill="rgba(20,20,40,0.3)"/>

    <!-- Player dot (bright blue, center-ish) -->
    <circle cx="-10" cy="-5" r="7" fill="#44aaff"/>
    <circle cx="-12" cy="-7" r="2.5" fill="#ffffff" opacity="0.3"/>
    <!-- Player trail -->
    <circle cx="-18" cy="-2" r="5" fill="#44aaff" opacity="0.3"/>
    <circle cx="-25" cy="2" r="4" fill="#44aaff" opacity="0.2"/>
    <circle cx="-31" cy="5" r="3" fill="#44aaff" opacity="0.1"/>

    <!-- Enemy dots scattered -->
    <circle cx="30" cy="-25" r="5" fill="#ff4444"/>
    <circle cx="-40" cy="30" r="5" fill="#ff8844"/>
    <circle cx="50" cy="15" r="5" fill="#44ff66"/>
    <circle cx="-15" cy="45" r="5" fill="#c084fc"/>
    <circle cx="20" cy="50" r="5" fill="#ffcc44"/>
    <circle cx="-50" cy="-20" r="5" fill="#ff66aa"/>
    <circle cx="45" cy="-45" r="5" fill="#44ffdd"/>

    <!-- Elimination burst (enemy being pushed out) -->
    <circle cx="65" cy="-30" r="5" fill="#88cc44" opacity="0.5"/>
    <g fill="#88cc44" opacity="0.6">
      <rect x="68" y="-35" width="2" height="2"/>
      <rect x="72" y="-28" width="2" height="2"/>
      <rect x="60" y="-38" width="2" height="2"/>
      <rect x="70" y="-22" width="2" height="2"/>
    </g>
  </g>

  <!-- Pixel icon (shrinking-arena from icons.js) -->
  <g transform="translate(270, 30)" shape-rendering="crispEdges">
    <!-- Row 0: rrrrrrrrrrrrrrrr (red border) -->
    <rect x="0" y="0" width="24" height="1.5" fill="#ff4444"/>
    <!-- Row 1-2: r..............r -->
    <rect x="0" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="22.5" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="0" y="3" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="22.5" y="3" width="1.5" height="1.5" fill="#ff4444"/>
    <!-- Row 3: r...dddddddd..r -->
    <rect x="0" y="4.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="6" y="4.5" width="12" height="1.5" fill="#666666"/>
    <rect x="22.5" y="4.5" width="1.5" height="1.5" fill="#ff4444"/>
    <!-- Row 4: r...d......d..r -->
    <rect x="0" y="6" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="6" y="6" width="1.5" height="1.5" fill="#666666"/>
    <rect x="16.5" y="6" width="1.5" height="1.5" fill="#666666"/>
    <rect x="22.5" y="6" width="1.5" height="1.5" fill="#ff4444"/>
    <!-- Row 5: r...d.dddd.d..r -->
    <rect x="0" y="7.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="6" y="7.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="9" y="7.5" width="6" height="1.5" fill="#666666"/>
    <rect x="16.5" y="7.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="22.5" y="7.5" width="1.5" height="1.5" fill="#ff4444"/>
    <!-- Row 7: r...d.d.gd.d..r (green player dot) -->
    <rect x="0" y="10.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="6" y="10.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="9" y="10.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="12" y="10.5" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="13.5" y="10.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="16.5" y="10.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="22.5" y="10.5" width="1.5" height="1.5" fill="#ff4444"/>
    <!-- Row 13: rrrrrrrrrrrrrrrr -->
    <rect x="0" y="19.5" width="24" height="1.5" fill="#ff4444"/>
    <!-- Side borders rows 10-12 -->
    <rect x="0" y="15" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="22.5" y="15" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="0" y="16.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="22.5" y="16.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="0" y="18" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="22.5" y="18" width="1.5" height="1.5" fill="#ff4444"/>
  </g>

  <!-- Title -->
  <text class="title" x="320" y="95">SHRINKING ARENA</text>
  <text class="sub" x="320" y="125">Push · Survive · Last Dot Standing</text>

  <!-- HUD mock -->
  <g transform="translate(320, 145)">
    <rect width="240" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">ALIVE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">6</text>
    <text font-family="monospace" font-size="9" fill="#666" x="120" y="19">WINS</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="160" y="19">3</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
