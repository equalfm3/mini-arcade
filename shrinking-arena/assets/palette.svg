<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="600" height="180" fill="#0a0a16" rx="6"/>

  <!-- Player Blue -->
  <rect x="20" y="25" width="45" height="45" fill="#44aaff" rx="4"/>
  <text fill="#e0e0e0" font-size="8" x="42" y="88" text-anchor="middle">Player</text>
  <text fill="#888" font-size="7" x="42" y="100" text-anchor="middle">#44aaff</text>

  <!-- Enemy Red -->
  <rect x="80" y="25" width="45" height="45" fill="#ff4444" rx="4"/>
  <text fill="#e0e0e0" font-size="8" x="102" y="88" text-anchor="middle">Enemy 1</text>
  <text fill="#888" font-size="7" x="102" y="100" text-anchor="middle">#ff4444</text>

  <!-- Enemy Orange -->
  <rect x="140" y="25" width="45" height="45" fill="#ff8844" rx="4"/>
  <text fill="#e0e0e0" font-size="8" x="162" y="88" text-anchor="middle">Enemy 2</text>
  <text fill="#888" font-size="7" x="162" y="100" text-anchor="middle">#ff8844</text>

  <!-- Enemy Yellow -->
  <rect x="200" y="25" width="45" height="45" fill="#ffcc44" rx="4"/>
  <text fill="#e0e0e0" font-size="8" x="222" y="88" text-anchor="middle">Enemy 3</text>
  <text fill="#888" font-size="7" x="222" y="100" text-anchor="middle">#ffcc44</text>

  <!-- Enemy Green -->
  <rect x="260" y="25" width="45" height="45" fill="#44ff66" rx="4"/>
  <text fill="#e0e0e0" font-size="8" x="282" y="88" text-anchor="middle">Enemy 4</text>
  <text fill="#888" font-size="7" x="282" y="100" text-anchor="middle">#44ff66</text>

  <!-- Enemy Cyan -->
  <rect x="320" y="25" width="45" height="45" fill="#44ffdd" rx="4"/>
  <text fill="#e0e0e0" font-size="8" x="342" y="88" text-anchor="middle">Enemy 5</text>
  <text fill="#888" font-size="7" x="342" y="100" text-anchor="middle">#44ffdd</text>

  <!-- Enemy Purple -->
  <rect x="380" y="25" width="45" height="45" fill="#c084fc" rx="4"/>
  <text fill="#e0e0e0" font-size="8" x="402" y="88" text-anchor="middle">Enemy 6</text>
  <text fill="#888" font-size="7" x="402" y="100" text-anchor="middle">#c084fc</text>

  <!-- Arena Glow -->
  <rect x="440" y="25" width="45" height="45" fill="#44aaff" opacity="0.25" rx="4"/>
  <rect x="440" y="25" width="45" height="45" fill="none" stroke="#44aaff" stroke-width="1" rx="4" opacity="0.5"/>
  <text fill="#e0e0e0" font-size="8" x="462" y="88" text-anchor="middle">Arena</text>
  <text fill="#888" font-size="7" x="462" y="100" text-anchor="middle">glow</text>

  <!-- Warning Red -->
  <rect x="500" y="25" width="45" height="45" fill="#ff4444" opacity="0.6" rx="4"/>
  <rect x="500" y="25" width="45" height="45" fill="none" stroke="#ff4444" stroke-width="1" rx="4"/>
  <text fill="#e0e0e0" font-size="8" x="522" y="88" text-anchor="middle">Warning</text>
  <text fill="#888" font-size="7" x="522" y="100" text-anchor="middle">#ff4444</text>

  <!-- Second row -->
  <!-- Enemy Pink -->
  <rect x="20" y="115" width="45" height="45" fill="#ff66aa" rx="4"/>
  <text fill="#888" font-size="7" x="42" y="175" text-anchor="middle">#ff66aa</text>

  <!-- Enemy Lime -->
  <rect x="80" y="115" width="45" height="45" fill="#88cc44" rx="4"/>
  <text fill="#888" font-size="7" x="102" y="175" text-anchor="middle">#88cc44</text>

  <!-- Background -->
  <rect x="140" y="115" width="45" height="45" fill="#0a0a16" rx="4" stroke="#2a2a40" stroke-width="1"/>
  <text fill="#888" font-size="7" x="162" y="175" text-anchor="middle">#0a0a16</text>

  <!-- Border -->
  <rect width="600" height="180" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
