<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #000000; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #ffffff; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <rect x="45" y="25" width="1.5" height="1.5" opacity="0.4"/>
    <rect x="120" y="60" width="1" height="1" opacity="0.3"/>
    <rect x="200" y="15" width="1.5" height="1.5" opacity="0.5"/>
    <rect x="350" y="45" width="1" height="1" opacity="0.25"/>
    <rect x="500" y="30" width="1.5" height="1.5" opacity="0.4"/>
    <rect x="620" y="55" width="1" height="1" opacity="0.3"/>
    <rect x="700" y="20" width="1.5" height="1.5" opacity="0.35"/>
    <rect x="750" y="70" width="1" height="1" opacity="0.4"/>
    <rect x="80" y="150" width="1" height="1" opacity="0.3"/>
    <rect x="180" y="170" width="1.5" height="1.5" opacity="0.4"/>
    <rect x="400" y="160" width="1" height="1" opacity="0.25"/>
    <rect x="550" y="175" width="1.5" height="1.5" opacity="0.35"/>
    <rect x="680" y="140" width="1" height="1" opacity="0.3"/>
    <rect x="30" y="100" width="1" height="1" opacity="0.4"/>
    <rect x="760" y="110" width="1.5" height="1.5" opacity="0.3"/>
  </g>

  <!-- Large asteroid (left) -->
  <g fill="none" stroke="#aaaaaa" stroke-width="2">
    <polygon points="60,60 90,45 120,55 130,80 120,110 95,120 65,115 50,90"/>
  </g>

  <!-- Medium asteroid -->
  <g fill="none" stroke="#aaaaaa" stroke-width="1.5">
    <polygon points="160,130 180,120 195,135 185,155 165,155"/>
  </g>

  <!-- Small asteroid -->
  <g fill="none" stroke="#aaaaaa" stroke-width="1.5">
    <polygon points="140,70 150,65 158,72 152,82 142,78"/>
  </g>

  <!-- Ship (vector triangle) -->
  <g fill="none" stroke="#ffffff" stroke-width="2">
    <polygon points="220,95 200,110 200,80"/>
    <!-- Thrust flame -->
    <polyline points="200,85 190,95 200,105" stroke="#ff6600" stroke-width="1.5"/>
  </g>

  <!-- Bullets -->
  <g fill="#ffffff">
    <circle cx="230" cy="95" r="2"/>
    <circle cx="245" cy="95" r="2"/>
  </g>

  <!-- Pixel icon -->
  <g transform="translate(290, 30)" shape-rendering="crispEdges">
    <rect x="9" y="1.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="10.5" y="1.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="7.5" y="3" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="12" y="3" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="6" y="4.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="13.5" y="4.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="7.5" y="6" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="9" y="6" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="10.5" y="6" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="12" y="6" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="3" y="9" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="4.5" y="9" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="6" y="9" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="1.5" y="10.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="7.5" y="10.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="15" y="10.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="16.5" y="10.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="1.5" y="12" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="7.5" y="12" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="13.5" y="12" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="16.5" y="12" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="3" y="13.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="4.5" y="13.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="6" y="13.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="15" y="13.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="16.5" y="13.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="10.5" y="16.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="12" y="16.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="9" y="18" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="13.5" y="18" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="10.5" y="19.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="12" y="19.5" width="1.5" height="1.5" fill="#e0e0e0"/>
    <rect x="12" y="21" width="1.5" height="1.5" fill="#ffffff"/>
    <rect x="10.5" y="22.5" width="1.5" height="1.5" fill="#ffffff"/>
    <rect x="12" y="22.5" width="1.5" height="1.5" fill="#ffffff"/>
    <rect x="13.5" y="22.5" width="1.5" height="1.5" fill="#ffffff"/>
  </g>

  <!-- Title -->
  <text class="title" x="340" y="95">ASTEROIDS</text>
  <text class="sub" x="340" y="125">Rotate · Thrust · Shoot · Survive</text>

  <!-- Score HUD mock -->
  <g transform="translate(340, 145)">
    <rect width="240" height="30" fill="#0a0a16" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">1280</text>
    <text font-family="monospace" font-size="9" fill="#666" x="110" y="19">LIVES</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="155" y="19">3</text>
    <text font-family="monospace" font-size="9" fill="#666" x="185" y="19">WAVE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="220" y="19">2</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
