<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#000000" rx="6"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <rect x="30" y="20" width="1" height="1" opacity="0.3"/>
    <rect x="85" y="55" width="1.5" height="1.5" opacity="0.4"/>
    <rect x="150" y="30" width="1" height="1" opacity="0.25"/>
    <rect x="220" y="70" width="1" height="1" opacity="0.35"/>
    <rect x="310" y="25" width="1.5" height="1.5" opacity="0.3"/>
    <rect x="370" y="60" width="1" height="1" opacity="0.4"/>
    <rect x="50" y="130" width="1" height="1" opacity="0.3"/>
    <rect x="180" y="160" width="1.5" height="1.5" opacity="0.25"/>
    <rect x="340" y="150" width="1" height="1" opacity="0.35"/>
    <rect x="70" y="250" width="1" height="1" opacity="0.4"/>
    <rect x="260" y="280" width="1.5" height="1.5" opacity="0.3"/>
    <rect x="380" y="300" width="1" height="1" opacity="0.25"/>
    <rect x="120" y="340" width="1" height="1" opacity="0.35"/>
    <rect x="290" y="360" width="1.5" height="1.5" opacity="0.3"/>
    <rect x="20" y="370" width="1" height="1" opacity="0.4"/>
    <rect x="200" y="220" width="1" height="1" opacity="0.3"/>
    <rect x="350" y="200" width="1.5" height="1.5" opacity="0.25"/>
  </g>

  <!-- Large asteroid top-left -->
  <polygon points="60,80 90,55 125,65 140,95 130,130 100,140 65,130 45,105" fill="none" stroke="#aaaaaa" stroke-width="1.5"/>

  <!-- Large asteroid right side -->
  <polygon points="300,180 335,160 365,175 375,210 360,240 330,250 305,235 290,210" fill="none" stroke="#aaaaaa" stroke-width="1.5"/>

  <!-- Medium asteroid center-left -->
  <polygon points="140,250 165,235 185,248 178,272 155,278 135,265" fill="none" stroke="#aaaaaa" stroke-width="1.5"/>

  <!-- Medium asteroid top-right -->
  <polygon points="280,60 305,48 320,62 315,82 295,88 275,78" fill="none" stroke="#aaaaaa" stroke-width="1.5"/>

  <!-- Small asteroid bottom-right -->
  <polygon points="340,330 352,322 362,332 355,345 342,342" fill="none" stroke="#aaaaaa" stroke-width="1.5"/>

  <!-- Small asteroid center -->
  <polygon points="220,150 232,143 240,152 234,162 222,160" fill="none" stroke="#aaaaaa" stroke-width="1.5"/>

  <!-- Ship (center-ish, pointing upper-right) -->
  <g fill="none" stroke="#ffffff" stroke-width="1.5">
    <polygon points="215,310 195,325 195,295"/>
    <!-- Thrust flame -->
    <polyline points="195,300 185,310 195,320" stroke="#ff6600" stroke-width="1"/>
  </g>

  <!-- Bullets -->
  <g fill="#ffffff">
    <circle cx="225" cy="305" r="2"/>
    <circle cx="240" cy="298" r="2"/>
  </g>

  <!-- Explosion particles (from destroyed small asteroid) -->
  <g fill="#ffffff" opacity="0.7">
    <rect x="248" cy="148" width="2" height="2"/>
    <rect x="252" y="140" width="2" height="2"/>
    <rect x="244" y="155" width="2" height="2"/>
    <rect x="256" y="150" width="2" height="2"/>
  </g>

  <!-- Lives indicator bottom-left -->
  <g fill="none" stroke="#ffffff" stroke-width="1">
    <polygon points="18,380 12,388 12,372" transform="scale(0.8) translate(5,10)"/>
    <polygon points="38,380 32,388 32,372" transform="scale(0.8) translate(5,10)"/>
  </g>

  <!-- Wave text bottom-right -->
  <text font-family="monospace" font-size="10" fill="#666666" text-anchor="end" x="390" y="392">WAVE 2</text>

  <!-- Border -->
  <rect width="400" height="400" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
