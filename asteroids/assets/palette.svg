<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 100" width="600" height="100">
  <rect width="600" height="100" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;}</style></defs>

  <!-- Background -->
  <rect x="20" y="15" width="50" height="50" fill="#000000" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
  <text fill="#888" font-size="8" x="45" y="80" text-anchor="middle">Background</text>
  <text fill="#666" font-size="7" x="45" y="90" text-anchor="middle">#000000</text>

  <!-- Ship -->
  <rect x="100" y="15" width="50" height="50" fill="#ffffff" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
  <text fill="#888" font-size="8" x="125" y="80" text-anchor="middle">Ship</text>
  <text fill="#666" font-size="7" x="125" y="90" text-anchor="middle">#ffffff</text>

  <!-- Thrust -->
  <rect x="180" y="15" width="50" height="50" fill="#ff6600" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
  <text fill="#888" font-size="8" x="205" y="80" text-anchor="middle">Thrust</text>
  <text fill="#666" font-size="7" x="205" y="90" text-anchor="middle">#ff6600</text>

  <!-- Asteroid -->
  <rect x="260" y="15" width="50" height="50" fill="#aaaaaa" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
  <text fill="#888" font-size="8" x="285" y="80" text-anchor="middle">Asteroid</text>
  <text fill="#666" font-size="7" x="285" y="90" text-anchor="middle">#aaaaaa</text>

  <!-- Bullet -->
  <rect x="340" y="15" width="50" height="50" fill="#ffffff" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
  <text fill="#888" font-size="8" x="365" y="80" text-anchor="middle">Bullet</text>
  <text fill="#666" font-size="7" x="365" y="90" text-anchor="middle">#ffffff</text>

  <!-- HUD -->
  <rect x="420" y="15" width="50" height="50" fill="#ffd700" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
  <text fill="#888" font-size="8" x="445" y="80" text-anchor="middle">HUD</text>
  <text fill="#666" font-size="7" x="445" y="90" text-anchor="middle">#ffd700</text>

  <!-- UI Dim -->
  <rect x="500" y="15" width="50" height="50" fill="#666666" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
  <text fill="#888" font-size="8" x="525" y="80" text-anchor="middle">UI Dim</text>
  <text fill="#666" font-size="7" x="525" y="90" text-anchor="middle">#666666</text>

  <rect width="600" height="100" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
