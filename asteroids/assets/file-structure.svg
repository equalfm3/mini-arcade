<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260" width="620" height="260">
  <rect width="620" height="260" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;font-size:12px;}</style></defs>

  <!-- File tree -->
  <text fill="#ffd700" x="20" y="30">asteroids/</text>
  <text fill="#888" x="40" y="50">├── index.html</text>
  <text fill="#555" x="250" y="50">Entry point + module loader</text>
  <text fill="#888" x="40" y="70">├── style.css</text>
  <text fill="#555" x="250" y="70">Accent color override</text>
  <text fill="#888" x="40" y="90">├── game.js</text>
  <text fill="#555" x="250" y="90">Orchestrator — wires modules + Engine</text>
  <text fill="#ffd700" x="40" y="115">├── src/</text>
  <text fill="#888" x="60" y="135">├── config.js</text>
  <text fill="#555" x="250" y="135">All tunable constants</text>
  <text fill="#888" x="60" y="155">├── ship.js</text>
  <text fill="#555" x="250" y="155">Ship rotation, thrust, wrapping</text>
  <text fill="#888" x="60" y="175">├── asteroids.js</text>
  <text fill="#555" x="250" y="175">Asteroid field, splitting, collision</text>
  <text fill="#888" x="60" y="195">├── bullets.js</text>
