<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <rect width="600" height="280" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#44ff66"/>
    </marker>
    <marker id="arw2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6600"/>
    </marker>
  </defs>

  <text fill="#ffffff" font-size="14" font-weight="bold" x="20" y="25">Ship Physics</text>

  <!-- Ship diagram -->
  <g transform="translate(100, 120)">
    <!-- Ship triangle -->
    <polygon points="40,0 0,30 0,-30" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- Angle arc -->
    <path d="M 60,0 A 60,60 0 0,0 52,30" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
    <text fill="#666" font-size="10" x="55" y="22">θ</text>
    <!-- Thrust vector -->
    <line x1="40" y1="0" x2="100" y2="0" stroke="#44ff66" stroke-width="1.5" marker-end="url(#arw)"/>
    <text fill="#44ff66" font-size="9" x="60" y="-8">thrust</text>
    <!-- Velocity vector -->
    <line x1="0" y1="0" x2="50" y2="-40" stroke="#ff6600" stroke-width="1.5" marker-end="url(#arw2)"/>
    <text fill="#ff6600" font-size="9" x="25" y="-45">velocity</text>
    <!-- Flame -->
    <polyline points="0,-15 -15,0 0,15" fill="none" stroke="#ff6600" stroke-width="1"/>
  </g>

  <!-- Formulas -->
  <g transform="translate(300, 50)">
    <text fill="#aaaaaa" font-size="11" x="0" y="0">Rotation:</text>
    <text fill="#ffffff" font-size="10" x="0" y="18">θ += rotSpeed × dt</text>

    <text fill="#aaaaaa" font-size="11" x="0" y="48">Thrust acceleration:</text>
    <text fill="#ffffff" font-size="10" x="0" y="66">vx += cos(θ) × thrust × dt</text>
    <text fill="#ffffff" font-size="10" x="0" y="82">vy += sin(θ) × thrust × dt</text>

    <text fill="#aaaaaa" font-size="11" x="0" y="112">Speed cap:</text>
    <text fill="#ffffff" font-size="10" x="0" y="130">speed = √(vx² + vy²)</text>
    <text fill="#ffffff" font-size="10" x="0" y="146">if speed > max: normalize</text>

    <text fill="#aaaaaa" font-size="11" x="0" y="176">No friction (space!):</text>
    <text fill="#ffffff" font-size="10" x="0" y="194">drag = 0</text>
  </g>

  <!-- Splitting diagram -->
  <text fill="#ffffff" font-size="14" font-weight="bold" x="20" y="230">Asteroid Splitting</text>
  <g transform="translate(30, 240)">
    <!-- Large -->
    <circle cx="30" cy="15" r="14" fill="none" stroke="#aaaaaa" stroke-width="1.5"/>
    <text fill="#aaaaaa" font-size="8" x="30" y="18" text-anchor="middle">L</text>
    <text fill="#666" font-size="7" x="30" y="38" text-anchor="middle">20 pts</text>
    <!-- Arrow -->
    <text fill="#ffd700" font-size="14" x="55" y="20">→</text>
    <!-- 2x Medium -->
    <circle cx="90" cy="8" r="9" fill="none" stroke="#aaaaaa" stroke-width="1.5"/>
    <text fill="#aaaaaa" font-size="7" x="90" y="11" text-anchor="middle">M</text>
    <circle cx="90" cy="28" r="9" fill="none" stroke="#aaaaaa" stroke-width="1.5"/>
    <text fill="#aaaaaa" font-size="7" x="90" y="31" text-anchor="middle">M</text>
    <text fill="#666" font-size="7" x="90" y="46" text-anchor="middle">50 pts</text>
    <!-- Arrow -->
    <text fill="#ffd700" font-size="14" x="110" y="20">→</text>
    <!-- 2x Small -->
    <circle cx="145" cy="8" r="5" fill="none" stroke="#aaaaaa" stroke-width="1.5"/>
    <text fill="#aaaaaa" font-size="6" x="145" y="10" text-anchor="middle">S</text>
    <circle cx="145" cy="28" r="5" fill="none" stroke="#aaaaaa" stroke-width="1.5"/>
    <text fill="#aaaaaa" font-size="6" x="145" y="30" text-anchor="middle">S</text>
    <text fill="#666" font-size="7" x="145" y="46" text-anchor="middle">100 pts</text>
    <!-- Arrow -->
    <text fill="#ffd700" font-size="14" x="162" y="20">→</text>
    <!-- Destroyed -->
    <text fill="#ff4444" font-size="10" x="185" y="20">✕</text>
  </g>

  <rect width="600" height="280" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
