<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 240" width="620" height="240">
  <rect width="620" height="240" fill="#0a0a16" rx="6"/>

  <g font-family="monospace" font-size="11">
    <!-- Folder: typing-speed/ -->
    <text fill="#ffd700" x="30" y="30">typing-speed/</text>

    <text fill="#44aaff" x="50" y="52">index.html</text>
    <text fill="#666" x="220" y="52">— Entry point (GAME config + arcade.js loader)</text>

    <text fill="#44aaff" x="50" y="74">style.css</text>
    <text fill="#666" x="220" y="74">— Game-specific styles (word display, coloring)</text>

    <text fill="#44aaff" x="50" y="96">game.js</text>
    <text fill="#666" x="220" y="96">— Orchestrator (keyboard input, WPM calc, timer)</text>

    <!-- Folder: src/ -->
    <text fill="#ffd700" x="50" y="122">src/</text>

    <text fill="#44ff66" x="70" y="144">config.js</text>
    <text fill="#666" x="220" y="144">— Duration, colors, WPM rating thresholds</text>

    <text fill="#44ff66" x="70" y="166">words.js</text>
    <text fill="#666" x="220" y="166">— Word pool, passage generation, line wrapping</text>

    <text fill="#44ff66" x="70" y="188">renderer.js</text>
    <text fill="#666" x="220" y="188">— DOM word display, character coloring, stats</text>

    <!-- Folder: assets/ -->
    <text fill="#ffd700" x="50" y="214">assets/</text>
    <text fill="#666" x="130" y="214">— SVG images for README documentation</text>
  </g>

  <!-- Border -->
  <rect width="620" height="240" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
