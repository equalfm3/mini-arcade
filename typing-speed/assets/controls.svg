<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>

  <!-- Desktop section -->
  <text font-family="monospace" font-size="13" fill="#44aaff" x="30" y="30" font-weight="bold">Desktop</text>

  <!-- Keyboard illustration -->
  <g transform="translate(30, 45)">
    <!-- Letter keys row -->
    <rect x="0" y="0" width="24" height="22" fill="#2a2a40" rx="3"/>
    <text font-family="monospace" font-size="10" fill="#888" x="7" y="15">A</text>
    <rect x="28" y="0" width="24" height="22" fill="#2a2a40" rx="3"/>
    <text font-family="monospace" font-size="10" fill="#888" x="35" y="15">S</text>
    <rect x="56" y="0" width="24" height="22" fill="#2a2a40" rx="3"/>
    <text font-family="monospace" font-size="10" fill="#888" x="63" y="15">D</text>
    <rect x="84" y="0" width="24" height="22" fill="#2a2a40" rx="3"/>
    <text font-family="monospace" font-size="10" fill="#888" x="91" y="15">F</text>
    <text font-family="monospace" font-size="9" fill="#666" x="120" y="15">…type letters</text>

    <!-- Space bar -->
    <rect x="0" y="30" width="108" height="22" fill="#44aaff" rx="3"/>
    <text font-family="monospace" font-size="10" fill="#fff" x="28" y="45">Space</text>
    <text font-family="monospace" font-size="9" fill="#666" x="120" y="45">next word</text>

    <!-- Backspace -->
    <rect x="0" y="60" width="80" height="22" fill="#2a2a40" rx="3"/>
    <text font-family="monospace" font-size="10" fill="#888" x="8" y="75">Backspace</text>
    <text font-family="monospace" font-size="9" fill="#666" x="120" y="75">delete letter</text>

    <!-- Esc -->
    <rect x="0" y="90" width="40" height="22" fill="#ffd700" rx="3"/>
    <text font-family="monospace" font-size="10" fill="#0a0a16" x="6" y="105">Esc</text>
    <text font-family="monospace" font-size="9" fill="#666" x="120" y="105">pause / resume</text>
  </g>

  <!-- Mobile section -->
  <text font-family="monospace" font-size="13" fill="#44aaff" x="330" y="30" font-weight="bold">Mobile</text>

  <g transform="translate(330, 45)">
    <!-- Phone outline -->
    <rect x="20" y="0" width="100" height="120" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
    <!-- Screen -->
    <rect x="28" y="12" width="84" height="80" fill="#12121f" rx="2"/>
    <!-- Text on screen -->
    <text font-family="monospace" font-size="7" fill="#888" x="34" y="35">the quick</text>
    <text font-family="monospace" font-size="7" fill="#44ff66" x="34" y="50">bro</text>
    <text font-family="monospace" font-size="7" fill="#888" x="55" y="50">wn fox</text>
    <!-- On-screen keyboard hint -->
    <rect x="28" y="68" width="84" height="20" fill="#2a2a40" rx="2"/>
    <text font-family="monospace" font-size="6" fill="#888" x="38" y="81">on-screen kb</text>
    <!-- Home indicator -->
    <rect x="55" y="106" width="30" height="3" fill="#2a2a40" rx="1.5"/>

    <text font-family="monospace" font-size="9" fill="#666" x="140" y="30">Tap game area</text>
    <text font-family="monospace" font-size="9" fill="#666" x="140" y="45">to open keyboard</text>
    <text font-family="monospace" font-size="9" fill="#ff8844" x="140" y="75">⚠ Best on desktop</text>
    <text font-family="monospace" font-size="9" fill="#666" x="140" y="90">with physical</text>
    <text font-family="monospace" font-size="9" fill="#666" x="140" y="105">keyboard</text>
  </g>

  <!-- Border -->
  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
