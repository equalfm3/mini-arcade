<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 44px; font-weight: bold; fill: #ff4444; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>
  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Tic-Tac-Toe board pixel art -->
  <g transform="translate(40, 20)" shape-rendering="crispEdges">
    <!-- Grid lines -->
    <rect x="60" y="10" width="4" height="160" fill="#2a2a40"/>
    <rect x="120" y="10" width="4" height="160" fill="#2a2a40"/>
    <rect x="10" y="60" width="170" height="4" fill="#2a2a40"/>
    <rect x="10" y="120" width="170" height="4" fill="#2a2a40"/>

    <!-- X in top-left -->
    <line x1="20" y1="20" x2="50" y2="50" stroke="#ff4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="50" y1="20" x2="20" y2="50" stroke="#ff4444" stroke-width="4" stroke-linecap="round"/>

    <!-- O in top-center -->
    <circle cx="92" cy="35" r="16" fill="none" stroke="#44aaff" stroke-width="4"/>

    <!-- X in center -->
    <line x1="78" y1="78" x2="108" y2="108" stroke="#ff4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="108" y1="78" x2="78" y2="108" stroke="#ff4444" stroke-width="4" stroke-linecap="round"/>

    <!-- O in center-right -->
    <circle cx="152" cy="93" r="16" fill="none" stroke="#44aaff" stroke-width="4"/>

    <!-- X in bottom-right — winning diagonal -->
    <line x1="136" y1="136" x2="166" y2="166" stroke="#ff4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="166" y1="136" x2="136" y2="166" stroke="#ff4444" stroke-width="4" stroke-linecap="round"/>

    <!-- O in bottom-left -->
    <circle cx="35" cy="151" r="16" fill="none" stroke="#44aaff" stroke-width="4"/>

    <!-- Win line (diagonal) -->
    <line x1="35" y1="35" x2="151" y2="151" stroke="#ffd700" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Pixel icon (tic-tac-toe from icons.js) -->
  <g transform="translate(260, 30)" shape-rendering="crispEdges">
    <!-- Row 1: ..rr..d..bb..... -->
    <rect x="3" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="4.5" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="9" y="1.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="12" y="1.5" width="1.5" height="1.5" fill="#44aaff"/>
    <rect x="13.5" y="1.5" width="1.5" height="1.5" fill="#44aaff"/>
    <!-- Row 2: ...rr.d.bb...... -->
    <rect x="4.5" y="3" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="6" y="3" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="9" y="3" width="1.5" height="1.5" fill="#666666"/>
    <rect x="10.5" y="3" width="1.5" height="1.5" fill="#44aaff"/>
    <rect x="12" y="3" width="1.5" height="1.5" fill="#44aaff"/>
    <!-- Row 3: ....r.d.b....... -->
    <rect x="6" y="4.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="9" y="4.5" width="1.5" height="1.5" fill="#666666"/>
    <rect x="10.5" y="4.5" width="1.5" height="1.5" fill="#44aaff"/>
    <!-- Row 4: ..ddddddddd..... -->
    <rect x="3" y="6" width="1.5" height="1.5" fill="#666666"/>
    <rect x="4.5" y="6" width="1.5" height="1.5" fill="#666666"/>
    <rect x="6" y="6" width="1.5" height="1.5" fill="#666666"/>
    <rect x="7.5" y="6" width="1.5" height="1.5" fill="#666666"/>
    <rect x="9" y="6" width="1.5" height="1.5" fill="#666666"/>
    <rect x="10.5" y="6" width="1.5" height="1.5" fill="#666666"/>
    <rect x="12" y="6" width="1.5" height="1.5" fill="#666666"/>
    <rect x="13.5" y="6" width="1.5" height="1.5" fill="#666666"/>
    <rect x="15" y="6" width="1.5" height="1.5" fill="#666666"/>
    <rect x="16.5" y="6" width="1.5" height="1.5" fill="#666666"/>
    <rect x="18" y="6" width="1.5" height="1.5" fill="#666666"/>
  </g>

  <!-- Title -->
  <text class="title" x="320" y="90">TIC-TAC-TOE</text>
  <text class="sub" x="320" y="118">Play · Think · Win</text>

  <!-- Score HUD mock -->
  <g transform="translate(320, 140)">
    <rect width="280" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">WINS</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="50" y="19">7</text>
    <text font-family="monospace" font-size="9" fill="#666" x="80" y="19">DRAWS</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="130" y="19">3</text>
    <text font-family="monospace" font-size="9" fill="#666" x="170" y="19">STREAK</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="225" y="19">4</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
