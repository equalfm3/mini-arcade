<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <rect width="600" height="320" fill="#0a0a16" rx="6"/>
  <defs>
    <style>
      text { font-family: monospace; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>

  <text font-size="13" fill="#e0e0e0" font-weight="bold" x="300" y="25" text-anchor="middle">Minimax Decision Tree</text>

  <!-- Root node (MAX — AI's turn) -->
  <rect x="255" y="40" width="90" height="30" fill="#12121f" stroke="#44aaff" stroke-width="2" rx="4"/>
  <text font-size="10" fill="#44aaff" x="300" y="60" text-anchor="middle">MAX (AI)</text>

  <!-- Level 1 branches -->
  <line x1="275" y1="70" x2="130" y2="110" stroke="#ffd700" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="300" y1="70" x2="300" y2="110" stroke="#ffd700" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="325" y1="70" x2="470" y2="110" stroke="#ffd700" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Level 1 nodes (MIN — Player's turn) -->
  <rect x="85" y="110" width="90" height="30" fill="#12121f" stroke="#ff4444" stroke-width="2" rx="4"/>
  <text font-size="10" fill="#ff4444" x="130" y="130" text-anchor="middle">MIN (You)</text>

  <rect x="255" y="110" width="90" height="30" fill="#12121f" stroke="#ff4444" stroke-width="2" rx="4"/>
  <text font-size="10" fill="#ff4444" x="300" y="130" text-anchor="middle">MIN (You)</text>

  <rect x="425" y="110" width="90" height="30" fill="#12121f" stroke="#ff4444" stroke-width="2" rx="4"/>
  <text font-size="10" fill="#ff4444" x="470" y="130" text-anchor="middle">MIN (You)</text>

  <!-- Level 2 branches from left MIN -->
  <line x1="110" y1="140" x2="60" y2="180" stroke="#ffd700" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="150" y1="140" x2="200" y2="180" stroke="#ffd700" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Level 2 branches from center MIN -->
  <line x1="280" y1="140" x2="260" y2="180" stroke="#ffd700" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="320" y1="140" x2="340" y2="180" stroke="#ffd700" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Level 2 branches from right MIN -->
  <line x1="450" y1="140" x2="430" y2="180" stroke="#ffd700" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="490" y1="140" x2="540" y2="180" stroke="#ffd700" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Terminal nodes (scores) -->
  <!-- Left subtree -->
  <rect x="35" y="180" width="50" height="26" fill="#12121f" stroke="#44ff66" stroke-width="1.5" rx="3"/>
  <text font-size="10" fill="#44ff66" x="60" y="198" text-anchor="middle">+10</text>
  <text font-size="8" fill="#666" x="60" y="220" text-anchor="middle">AI wins</text>

  <rect x="175" y="180" width="50" height="26" fill="#12121f" stroke="#888" stroke-width="1.5" rx="3"/>
  <text font-size="10" fill="#888" x="200" y="198" text-anchor="middle">0</text>
  <text font-size="8" fill="#666" x="200" y="220" text-anchor="middle">Draw</text>

  <!-- Center subtree -->
  <rect x="235" y="180" width="50" height="26" fill="#12121f" stroke="#ff4444" stroke-width="1.5" rx="3"/>
  <text font-size="10" fill="#ff4444" x="260" y="198" text-anchor="middle">-10</text>
  <text font-size="8" fill="#666" x="260" y="220" text-anchor="middle">You win</text>

  <rect x="315" y="180" width="50" height="26" fill="#12121f" stroke="#44ff66" stroke-width="1.5" rx="3"/>
  <text font-size="10" fill="#44ff66" x="340" y="198" text-anchor="middle">+10</text>
  <text font-size="8" fill="#666" x="340" y="220" text-anchor="middle">AI wins</text>

  <!-- Right subtree -->
  <rect x="405" y="180" width="50" height="26" fill="#12121f" stroke="#888" stroke-width="1.5" rx="3"/>
  <text font-size="10" fill="#888" x="430" y="198" text-anchor="middle">0</text>
  <text font-size="8" fill="#666" x="430" y="220" text-anchor="middle">Draw</text>

  <rect x="515" y="180" width="50" height="26" fill="#12121f" stroke="#ff4444" stroke-width="1.5" rx="3"/>
  <text font-size="10" fill="#ff4444" x="540" y="198" text-anchor="middle">-10</text>
  <text font-size="8" fill="#666" x="540" y="220" text-anchor="middle">You win</text>

  <!-- Explanation -->
  <text font-size="9" fill="#888" x="300" y="255" text-anchor="middle">MAX picks highest score · MIN picks lowest score</text>
  <text font-size="9" fill="#888" x="300" y="270" text-anchor="middle">Alpha-beta pruning skips branches that can't affect the outcome</text>

  <!-- Legend -->
  <rect x="160" y="285" width="10" height="10" fill="#44ff66" rx="1"/>
  <text font-size="9" fill="#666" x="175" y="294">AI wins (+10)</text>
  <rect x="270" y="285" width="10" height="10" fill="#888" rx="1"/>
  <text font-size="9" fill="#666" x="285" y="294">Draw (0)</text>
  <rect x="350" y="285" width="10" height="10" fill="#ff4444" rx="1"/>
  <text font-size="9" fill="#666" x="365" y="294">You win (-10)</text>

  <!-- Border -->
  <rect width="600" height="320" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
