<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" width="500" height="250">
  <rect width="500" height="250" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff66aa"/>
    </marker>
  </defs>

  <!-- SIZE SELECT box -->
  <rect x="10" y="90" width="90" height="36" fill="#12121f" stroke="#c084fc" stroke-width="2" rx="4"/>
  <text fill="#c084fc" font-size="9" x="16" y="112" font-weight="bold">SIZE SELECT</text>

  <!-- PLAYING box -->
  <rect x="140" y="90" width="80" height="36" fill="#12121f" stroke="#44ff66" stroke-width="2" rx="4"/>
  <text fill="#44ff66" font-size="10" x="148" y="113" font-weight="bold">PLAYING</text>

  <!-- CHECKING box -->
  <rect x="260" y="90" width="90" height="36" fill="#12121f" stroke="#ffeb3b" stroke-width="2" rx="4"/>
  <text fill="#ffeb3b" font-size="10" x="268" y="113" font-weight="bold">CHECKING</text>

  <!-- WON box -->
  <rect x="400" y="90" width="70" height="36" fill="#12121f" stroke="#ffd700" stroke-width="2" rx="4"/>
  <text fill="#ffd700" font-size="10" x="418" y="113" font-weight="bold">WON</text>

  <!-- Arrows -->
  <!-- size select → playing -->
  <line x1="100" y1="108" x2="138" y2="108" stroke="#ff66aa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="102" y="103">Pick size</text>

  <!-- playing → checking (second card flipped) -->
  <line x1="220" y1="108" x2="258" y2="108" stroke="#ff66aa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="222" y="103">2nd card</text>

  <!-- checking → playing (match or mismatch, not all matched) -->
  <path d="M 305 126 Q 305 165 180 165 Q 180 165 180 128" fill="none" stroke="#ff66aa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="200" y="175">Match / Mismatch</text>
  <text fill="#888" font-size="7" x="205" y="185">(pairs remaining)</text>

  <!-- checking → won (all matched) -->
  <line x1="350" y1="108" x2="398" y2="108" stroke="#ff66aa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="355" y="103">All</text>
  <text fill="#888" font-size="7" x="350" y="88">matched</text>

  <!-- won → size select (play again) -->
  <path d="M 435 90 Q 435 30 240 30 Q 55 30 55 88" fill="none" stroke="#ff66aa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="7" x="210" y="26">Play Again → Size Select</text>

  <!-- Notes -->
  <g transform="translate(100, 205)">
    <rect x="0" y="0" width="300" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="3"/>
    <text fill="#888" font-size="8" x="8" y="12">In PLAYING: first card flip stays face-up</text>
    <text fill="#ff66aa" font-size="8" x="8" y="24">In CHECKING: locked until match/mismatch resolves</text>
  </g>

  <rect width="500" height="250" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>