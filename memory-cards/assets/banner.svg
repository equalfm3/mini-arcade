<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 44px; font-weight: bold; fill: #ff66aa; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>
  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- 4x4 card grid on the left -->
  <g transform="translate(30, 20)" shape-rendering="crispEdges">
    <!-- Row 1 -->
    <!-- Card: Star (face up) -->
    <rect x="0" y="0" width="38" height="38" fill="#ffd70022" stroke="#ffd700" stroke-width="1.5" rx="3"/>
    <!-- Simplified star pixel art -->
    <g transform="translate(3, 3)">
      <rect x="14" y="0" width="4" height="4" fill="#ffd700"/>
      <rect x="10" y="4" width="12" height="4" fill="#ffd700"/>
      <rect x="2" y="8" width="28" height="4" fill="#ffd700"/>
      <rect x="6" y="12" width="20" height="4" fill="#ffd700"/>
      <rect x="4" y="16" width="8" height="4" fill="#ffd700"/>
      <rect x="20" y="16" width="8" height="4" fill="#ffd700"/>
      <rect x="2" y="20" width="6" height="4" fill="#ffd700"/>
      <rect x="24" y="20" width="6" height="4" fill="#ffd700"/>
    </g>

    <!-- Card: face-down ? -->
    <rect x="42" y="0" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="55" y="26" text-anchor="middle">?</text>

    <!-- Card: Heart (face up) -->
    <rect x="84" y="0" width="38" height="38" fill="#ff444422" stroke="#ff4444" stroke-width="1.5" rx="3"/>
    <g transform="translate(87, 5)">
      <rect x="4" y="0" width="8" height="4" fill="#ff4444"/>
      <rect x="18" y="0" width="8" height="4" fill="#ff4444"/>
      <rect x="2" y="4" width="26" height="4" fill="#ff4444"/>
      <rect x="4" y="8" width="22" height="4" fill="#ff4444"/>
      <rect x="6" y="12" width="18" height="4" fill="#ff4444"/>
      <rect x="8" y="16" width="14" height="4" fill="#ff4444"/>
      <rect x="10" y="20" width="10" height="4" fill="#ff4444"/>
      <rect x="12" y="24" width="6" height="4" fill="#ff4444"/>
    </g>

    <!-- Card: face-down ? -->
    <rect x="126" y="0" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="139" y="26" text-anchor="middle">?</text>

    <!-- Row 2 -->
    <!-- Card: face-down ? -->
    <rect x="0" y="42" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="13" y="68" text-anchor="middle">?</text>

    <!-- Card: Diamond (face up) -->
    <rect x="42" y="42" width="38" height="38" fill="#44ffdd22" stroke="#44ffdd" stroke-width="1.5" rx="3"/>
    <g transform="translate(47, 46)">
      <rect x="12" y="0" width="4" height="4" fill="#44ffdd"/>
      <rect x="8" y="4" width="12" height="4" fill="#44ffdd"/>
      <rect x="4" y="8" width="20" height="4" fill="#44ffdd"/>
      <rect x="8" y="12" width="12" height="4" fill="#44ffdd"/>
      <rect x="12" y="16" width="4" height="4" fill="#44ffdd"/>
    </g>

    <!-- Card: face-down ? -->
    <rect x="84" y="42" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="97" y="68" text-anchor="middle">?</text>

    <!-- Card: face-down ? -->
    <rect x="126" y="42" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="139" y="68" text-anchor="middle">?</text>

    <!-- Row 3 -->
    <rect x="0" y="84" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="13" y="110" text-anchor="middle">?</text>
    <rect x="42" y="84" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="55" y="110" text-anchor="middle">?</text>
    <rect x="84" y="84" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="97" y="110" text-anchor="middle">?</text>
    <rect x="126" y="84" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="139" y="110" text-anchor="middle">?</text>

    <!-- Row 4 -->
    <rect x="0" y="126" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="13" y="152" text-anchor="middle">?</text>
    <rect x="42" y="126" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="55" y="152" text-anchor="middle">?</text>
    <rect x="84" y="126" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="97" y="152" text-anchor="middle">?</text>
    <rect x="126" y="126" width="38" height="38" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-family="monospace" font-size="16" fill="#555" x="139" y="152" text-anchor="middle">?</text>
  </g>

  <!-- Title -->
  <text class="title" x="260" y="85">MEMORY CARDS</text>
  <text class="sub" x="260" y="112">Flip · Match · Remember</text>

  <!-- HUD mockup -->
  <g transform="translate(260, 130)">
    <rect width="320" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <!-- Memory-cards pixel icon in HUD (16x16 at 1.2px per pixel) -->
    <g transform="translate(6, 6)" shape-rendering="crispEdges">
      <rect x="2.4" y="0" width="4.8" height="2.4" fill="#ff4444"/>
      <rect x="2.4" y="2.4" width="1.2" height="4.8" fill="#ff4444"/>
      <rect x="6" y="2.4" width="1.2" height="4.8" fill="#ff4444"/>
      <rect x="3.6" y="2.4" width="2.4" height="4.8" fill="#ff4444" opacity="0.5"/>
      <rect x="2.4" y="7.2" width="4.8" height="2.4" fill="#ff4444"/>
      <rect x="9.6" y="0" width="4.8" height="2.4" fill="#44aaff"/>
      <rect x="9.6" y="2.4" width="1.2" height="4.8" fill="#44aaff"/>
      <rect x="13.2" y="2.4" width="1.2" height="4.8" fill="#44aaff"/>
      <rect x="10.8" y="2.4" width="2.4" height="4.8" fill="#44aaff" opacity="0.5"/>
      <rect x="9.6" y="7.2" width="4.8" height="2.4" fill="#44aaff"/>
      <rect x="2.4" y="9.6" width="4.8" height="2.4" fill="#44ff66"/>
      <rect x="2.4" y="12" width="1.2" height="4.8" fill="#44ff66"/>
      <rect x="6" y="12" width="1.2" height="4.8" fill="#44ff66"/>
      <rect x="3.6" y="12" width="2.4" height="4.8" fill="#44ff66" opacity="0.5"/>
      <rect x="2.4" y="16.8" width="4.8" height="2.4" fill="#44ff66"/>
      <rect x="9.6" y="9.6" width="4.8" height="2.4" fill="#ffd700"/>
      <rect x="9.6" y="12" width="1.2" height="4.8" fill="#ffd700"/>
      <rect x="13.2" y="12" width="1.2" height="4.8" fill="#ffd700"/>
      <rect x="10.8" y="12" width="2.4" height="4.8" fill="#ffd700" opacity="0.5"/>
      <rect x="9.6" y="16.8" width="4.8" height="2.4" fill="#ffd700"/>
    </g>
    <text font-family="monospace" font-size="10" fill="#e0e0e0" x="30" y="21" font-weight="bold">Memory Cards</text>
    <text font-family="monospace" font-size="9" fill="#666" x="150" y="21">Moves</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="195" y="21">0</text>
    <text font-family="monospace" font-size="9" fill="#666" x="225" y="21">Pairs</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="268" y="21">0/8</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>