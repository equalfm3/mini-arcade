<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 420" width="380" height="420">
  <defs>
    <style>text { font-family: monospace; }</style>
  </defs>
  <!-- Outer frame -->
  <rect width="380" height="420" fill="#0a0a16" rx="8"/>

  <!-- HUD bar -->
  <rect x="15" y="12" width="350" height="32" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
  <!-- Memory-cards pixel icon in HUD -->
  <g transform="translate(22, 16)" shape-rendering="crispEdges">
    <rect x="2.4" y="0" width="4.8" height="2.4" fill="#ff4444"/>
    <rect x="2.4" y="2.4" width="1.2" height="4.8" fill="#ff4444"/>
    <rect x="6" y="2.4" width="1.2" height="4.8" fill="#ff4444"/>
    <rect x="3.6" y="2.4" width="2.4" height="4.8" fill="#ff4444" opacity="0.5"/>
    <rect x="2.4" y="7.2" width="4.8" height="2.4" fill="#ff4444"/>
    <rect x="9.6" y="0" width="4.8" height="2.4" fill="#44aaff"/>
    <rect x="9.6" y="2.4" width="1.2" height="4.8" fill="#44aaff"/>
    <rect x="13.2" y="2.4" width="1.2" height="4.8" fill="#44aaff"/>
    <rect x="10.8" y="2.4" width="2.4" height="4.8" fill="#44aaff" opacity="0.5"/>
    <rect x="9.6" y="7.2" width="4.8" height="2.4" fill="#44aaff"/>
    <rect x="2.4" y="9.6" width="4.8" height="2.4" fill="#44ff66"/>
    <rect x="2.4" y="12" width="1.2" height="4.8" fill="#44ff66"/>
    <rect x="6" y="12" width="1.2" height="4.8" fill="#44ff66"/>
    <rect x="3.6" y="12" width="2.4" height="4.8" fill="#44ff66" opacity="0.5"/>
    <rect x="2.4" y="16.8" width="4.8" height="2.4" fill="#44ff66"/>
    <rect x="9.6" y="9.6" width="4.8" height="2.4" fill="#ffd700"/>
    <rect x="9.6" y="12" width="1.2" height="4.8" fill="#ffd700"/>
    <rect x="13.2" y="12" width="1.2" height="4.8" fill="#ffd700"/>
    <rect x="10.8" y="12" width="2.4" height="4.8" fill="#ffd700" opacity="0.5"/>
    <rect x="9.6" y="16.8" width="4.8" height="2.4" fill="#ffd700"/>
  </g>
  <text font-size="10" fill="#e0e0e0" x="46" y="33" font-weight="bold">Memory Cards</text>
  <text font-size="8" fill="#666" x="200" y="31">Moves</text>
  <text font-size="9" fill="#ffd700" x="240" y="31">10</text>
  <text font-size="8" fill="#666" x="275" y="31">Pairs</text>
  <text font-size="9" fill="#ffd700" x="310" y="31">3/8</text>

  <!-- 4x4 Card Grid (medium) — 16 cards total -->
  <!-- Card size: 76x76, gap: 8, grid starts at x=15, y=54 -->
  <!-- Layout: 4 cols x 4 rows -->
  <!-- 3 matched pairs (star-star, heart-heart, diamond-diamond) = 6 cards matched -->
  <!-- 2 flipped showing mismatch (bolt, flame) = 2 cards flipped -->
  <!-- 8 face-down = 8 cards hidden -->
  <!-- Total: 6 + 2 + 8 = 16 ✓ -->

  <g shape-rendering="crispEdges">
    <!-- Row 1 -->
    <!-- [0,0] Matched: Star (dimmed) -->
    <rect x="15" y="54" width="76" height="76" fill="#ffd70015" stroke="#ffd700" stroke-width="1.5" rx="4" opacity="0.55"/>
    <g transform="translate(27, 62)" opacity="0.6">
      <rect x="16" y="0" width="8" height="4" fill="#ffd700"/>
      <rect x="12" y="4" width="16" height="4" fill="#ffd700"/>
      <rect x="4" y="8" width="32" height="4" fill="#ffd700"/>
      <rect x="8" y="12" width="24" height="4" fill="#ffd700"/>
      <rect x="6" y="16" width="10" height="4" fill="#ffd700"/>
      <rect x="24" y="16" width="10" height="4" fill="#ffd700"/>
      <rect x="4" y="20" width="8" height="4" fill="#ffd700"/>
      <rect x="28" y="20" width="8" height="4" fill="#ffd700"/>
    </g>

    <!-- [1,0] Face-down -->
    <rect x="99" y="54" width="76" height="76" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <text font-size="22" fill="#555" x="131" y="100" text-anchor="middle">?</text>

    <!-- [2,0] Flipped: Bolt (mismatch — highlighted) -->
    <rect x="183" y="54" width="76" height="76" fill="#ffeb3b18" stroke="#ffeb3b" stroke-width="2" rx="4"/>
    <g transform="translate(199, 62)">
      <rect x="28" y="0" width="8" height="4" fill="#ffeb3b"/>
      <rect x="24" y="4" width="8" height="4" fill="#ffeb3b"/>
      <rect x="20" y="8" width="8" height="4" fill="#ffeb3b"/>
      <rect x="16" y="12" width="8" height="4" fill="#ffeb3b"/>
      <rect x="8" y="16" width="24" height="4" fill="#ffeb3b"/>
      <rect x="20" y="20" width="8" height="4" fill="#ffeb3b"/>
      <rect x="16" y="24" width="8" height="4" fill="#ffeb3b"/>
      <rect x="12" y="28" width="8" height="4" fill="#ffeb3b"/>
      <rect x="8" y="32" width="8" height="4" fill="#ffeb3b"/>
    </g>

    <!-- [3,0] Face-down -->
    <rect x="267" y="54" width="76" height="76" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <text font-size="22" fill="#555" x="299" y="100" text-anchor="middle">?</text>

    <!-- Row 2 -->
    <!-- [0,1] Matched: Heart (dimmed) -->
    <rect x="15" y="138" width="76" height="76" fill="#ff444415" stroke="#ff4444" stroke-width="1.5" rx="4" opacity="0.55"/>
    <g transform="translate(24, 148)" opacity="0.6">
      <rect x="6" y="0" width="12" height="4" fill="#ff4444"/>
      <rect x="24" y="0" width="12" height="4" fill="#ff4444"/>
      <rect x="4" y="4" width="34" height="4" fill="#ff4444"/>
      <rect x="6" y="8" width="30" height="4" fill="#ff4444"/>
      <rect x="8" y="12" width="26" height="4" fill="#ff4444"/>
      <rect x="10" y="16" width="22" height="4" fill="#ff4444"/>
      <rect x="14" y="20" width="14" height="4" fill="#ff4444"/>
      <rect x="18" y="24" width="6" height="4" fill="#ff4444"/>
    </g>

    <!-- [1,1] Face-down -->
    <rect x="99" y="138" width="76" height="76" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <text font-size="22" fill="#555" x="131" y="184" text-anchor="middle">?</text>

    <!-- [2,1] Face-down -->
    <rect x="183" y="138" width="76" height="76" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <text font-size="22" fill="#555" x="215" y="184" text-anchor="middle">?</text>

    <!-- [3,1] Matched: Star (dimmed) — pair of [0,0] -->
    <rect x="267" y="138" width="76" height="76" fill="#ffd70015" stroke="#ffd700" stroke-width="1.5" rx="4" opacity="0.55"/>
    <g transform="translate(279, 146)" opacity="0.6">
      <rect x="16" y="0" width="8" height="4" fill="#ffd700"/>
      <rect x="12" y="4" width="16" height="4" fill="#ffd700"/>
      <rect x="4" y="8" width="32" height="4" fill="#ffd700"/>
      <rect x="8" y="12" width="24" height="4" fill="#ffd700"/>
      <rect x="6" y="16" width="10" height="4" fill="#ffd700"/>
      <rect x="24" y="16" width="10" height="4" fill="#ffd700"/>
      <rect x="4" y="20" width="8" height="4" fill="#ffd700"/>
      <rect x="28" y="20" width="8" height="4" fill="#ffd700"/>
    </g>

    <!-- Row 3 -->
    <!-- [0,2] Face-down -->
    <rect x="15" y="222" width="76" height="76" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <text font-size="22" fill="#555" x="47" y="268" text-anchor="middle">?</text>

    <!-- [1,2] Matched: Diamond (dimmed) -->
    <rect x="99" y="222" width="76" height="76" fill="#44ffdd15" stroke="#44ffdd" stroke-width="1.5" rx="4" opacity="0.55"/>
    <g transform="translate(112, 230)" opacity="0.6">
      <rect x="18" y="0" width="6" height="4" fill="#44ffdd"/>
      <rect x="14" y="4" width="14" height="4" fill="#44ffdd"/>
      <rect x="10" y="8" width="22" height="4" fill="#44ffdd"/>
      <rect x="6" y="12" width="30" height="4" fill="#44ffdd"/>
      <rect x="10" y="16" width="22" height="4" fill="#44ffdd"/>
      <rect x="14" y="20" width="14" height="4" fill="#44ffdd"/>
      <rect x="18" y="24" width="6" height="4" fill="#44ffdd"/>
    </g>

    <!-- [2,2] Face-down -->
    <rect x="183" y="222" width="76" height="76" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <text font-size="22" fill="#555" x="215" y="268" text-anchor="middle">?</text>

    <!-- [3,2] Matched: Heart (dimmed) — pair of [0,1] -->
    <rect x="267" y="222" width="76" height="76" fill="#ff444415" stroke="#ff4444" stroke-width="1.5" rx="4" opacity="0.55"/>
    <g transform="translate(276, 232)" opacity="0.6">
      <rect x="6" y="0" width="12" height="4" fill="#ff4444"/>
      <rect x="24" y="0" width="12" height="4" fill="#ff4444"/>
      <rect x="4" y="4" width="34" height="4" fill="#ff4444"/>
      <rect x="6" y="8" width="30" height="4" fill="#ff4444"/>
      <rect x="8" y="12" width="26" height="4" fill="#ff4444"/>
      <rect x="10" y="16" width="22" height="4" fill="#ff4444"/>
      <rect x="14" y="20" width="14" height="4" fill="#ff4444"/>
      <rect x="18" y="24" width="6" height="4" fill="#ff4444"/>
    </g>

    <!-- Row 4 -->
    <!-- [0,3] Face-down -->
    <rect x="15" y="306" width="76" height="76" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <text font-size="22" fill="#555" x="47" y="352" text-anchor="middle">?</text>

    <!-- [1,3] Flipped: Flame (mismatch — highlighted) -->
    <rect x="99" y="306" width="76" height="76" fill="#ff884418" stroke="#ff8844" stroke-width="2" rx="4"/>
    <g transform="translate(115, 312)">
      <rect x="16" y="0" width="8" height="4" fill="#ff8844"/>
      <rect x="12" y="4" width="12" height="4" fill="#ff8844"/>
      <rect x="8" y="8" width="16" height="4" fill="#ff8844"/>
      <rect x="4" y="12" width="24" height="4" fill="#ff8844"/>
      <rect x="4" y="16" width="24" height="4" fill="#ff8844"/>
      <rect x="12" y="16" width="8" height="4" fill="#ffd700"/>
      <rect x="4" y="20" width="24" height="4" fill="#ff8844"/>
      <rect x="12" y="20" width="8" height="4" fill="#ffd700"/>
      <rect x="4" y="24" width="24" height="4" fill="#ff8844"/>
      <rect x="8" y="28" width="16" height="4" fill="#ff8844"/>
      <rect x="12" y="32" width="8" height="4" fill="#ff8844"/>
    </g>

    <!-- [2,3] Matched: Diamond (dimmed) — pair of [1,2] -->
    <rect x="183" y="306" width="76" height="76" fill="#44ffdd15" stroke="#44ffdd" stroke-width="1.5" rx="4" opacity="0.55"/>
    <g transform="translate(196, 314)" opacity="0.6">
      <rect x="18" y="0" width="6" height="4" fill="#44ffdd"/>
      <rect x="14" y="4" width="14" height="4" fill="#44ffdd"/>
      <rect x="10" y="8" width="22" height="4" fill="#44ffdd"/>
      <rect x="6" y="12" width="30" height="4" fill="#44ffdd"/>
      <rect x="10" y="16" width="22" height="4" fill="#44ffdd"/>
      <rect x="14" y="20" width="14" height="4" fill="#44ffdd"/>
      <rect x="18" y="24" width="6" height="4" fill="#44ffdd"/>
    </g>

    <!-- [3,3] Face-down -->
    <rect x="267" y="306" width="76" height="76" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1.5" rx="4"/>
    <text font-size="22" fill="#555" x="299" y="352" text-anchor="middle">?</text>
  </g>

  <!-- Size selector buttons below grid -->
  <g transform="translate(60, 392)">
    <rect x="0" y="0" width="60" height="20" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-size="9" fill="#888" x="14" y="14">4×3</text>

    <rect x="70" y="0" width="60" height="20" fill="#12121f" stroke="#ff66aa" stroke-width="2" rx="3"/>
    <text font-size="9" fill="#ff66aa" x="84" y="14" font-weight="bold">4×4</text>

    <rect x="140" y="0" width="60" height="20" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
    <text font-size="9" fill="#888" x="154" y="14">6×4</text>
  </g>

  <!-- Border -->
  <rect width="380" height="420" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>