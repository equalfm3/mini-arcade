<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrowC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
    <radialGradient id="clickGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8844" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff8844" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Desktop section -->
  <text fill="#44aaff" font-size="14" font-weight="bold" x="120" y="30" text-anchor="middle">DESKTOP</text>

  <!-- Mouse with click indicator -->
  <g transform="translate(60, 50)">
    <!-- Mouse body -->
    <rect x="15" y="10" width="50" height="70" fill="#1a1a2e" stroke="#44aaff" stroke-width="2" rx="10"/>
    <!-- Mouse buttons -->
    <line x1="40" y1="10" x2="40" y2="40" stroke="#44aaff" stroke-width="1"/>
    <!-- Left button highlighted -->
    <rect x="15" y="10" width="25" height="30" fill="#ff8844" opacity="0.3" rx="10"/>
    <!-- Click ripple -->
    <circle cx="28" cy="25" r="8" fill="none" stroke="#ff8844" stroke-width="1.5" opacity="0.6"/>
    <!-- Arrow pointing to click -->
    <text fill="#ff8844" font-size="9" x="75" y="30">Click</text>
    <text fill="#888" font-size="9" x="75" y="42">to place</text>
    <text fill="#888" font-size="9" x="75" y="54">explosion</text>
  </g>

  <!-- Explosion result -->
  <g transform="translate(80, 120)">
    <circle cx="30" cy="20" r="18" fill="url(#clickGlow)"/>
    <circle cx="30" cy="20" r="18" fill="none" stroke="#ff8844" stroke-width="2" opacity="0.5"/>
    <circle cx="30" cy="20" r="16" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Pause keys -->
  <g transform="translate(30, 150)">
    <rect x="0" y="0" width="36" height="24" fill="#1a1a2e" stroke="#44aaff" stroke-width="1.5" rx="3"/>
    <text fill="#44aaff" font-size="10" x="18" y="16" text-anchor="middle">Esc</text>
    <text fill="#888" font-size="9" x="44" y="10">or</text>
    <rect x="58" y="0" width="24" height="24" fill="#1a1a2e" stroke="#44aaff" stroke-width="1.5" rx="3"/>
    <text fill="#44aaff" font-size="10" x="70" y="16" text-anchor="middle">P</text>
    <text fill="#888" font-size="9" x="90" y="16">Pause</text>
  </g>

  <!-- Divider -->
  <line x1="300" y1="15" x2="300" y2="185" stroke="#2a2a40" stroke-width="1"/>

  <!-- Mobile section -->
  <text fill="#44ff66" font-size="14" font-weight="bold" x="450" y="30" text-anchor="middle">MOBILE</text>

  <!-- Phone outline with tap -->
  <g transform="translate(380, 45)">
    <rect x="0" y="0" width="80" height="120" fill="#1a1a2e" stroke="#44ff66" stroke-width="2" rx="8"/>
    <!-- Screen -->
    <rect x="5" y="10" width="70" height="95" fill="#0a0a16" rx="2"/>

    <!-- Tap indicator (finger) -->
    <circle cx="40" cy="55" r="10" fill="#44ff66" opacity="0.3"/>
    <circle cx="40" cy="55" r="5" fill="#44ff66" opacity="0.5"/>

    <!-- Explosion ripple from tap -->
    <circle cx="40" cy="55" r="18" fill="none" stroke="#ff8844" stroke-width="1.5" opacity="0.4"/>
    <circle cx="40" cy="55" r="25" fill="none" stroke="#ff8844" stroke-width="1" opacity="0.2"/>

    <!-- Small dots on screen -->
    <circle cx="20" cy="30" r="4" fill="#ff4444" opacity="0.6"/>
    <circle cx="60" cy="40" r="4" fill="#44aaff" opacity="0.6"/>
    <circle cx="25" cy="80" r="4" fill="#44ff66" opacity="0.6"/>
    <circle cx="55" cy="75" r="4" fill="#ffd700" opacity="0.6"/>

    <text fill="#888" font-size="9" x="90" y="45">Tap to</text>
    <text fill="#888" font-size="9" x="90" y="57">place</text>
    <text fill="#888" font-size="9" x="90" y="69">explosion</text>
  </g>

  <!-- Border -->
  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
