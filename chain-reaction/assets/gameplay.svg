<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 504" width="360" height="504">
  <defs>
    <radialGradient id="gRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44aaff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#44aaff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44ff66" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#44ff66" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff66aa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff66aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44ffdd" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#44ffdd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8844" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff8844" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="360" height="504" fill="#0a0a16" rx="6"/>

  <!-- Subtle grid -->
  <g stroke="#161625" stroke-width="0.5">
    <line x1="30" y1="0" x2="30" y2="504"/><line x1="60" y1="0" x2="60" y2="504"/>
    <line x1="90" y1="0" x2="90" y2="504"/><line x1="120" y1="0" x2="120" y2="504"/>
    <line x1="150" y1="0" x2="150" y2="504"/><line x1="180" y1="0" x2="180" y2="504"/>
    <line x1="210" y1="0" x2="210" y2="504"/><line x1="240" y1="0" x2="240" y2="504"/>
    <line x1="270" y1="0" x2="270" y2="504"/><line x1="300" y1="0" x2="300" y2="504"/>
    <line x1="330" y1="0" x2="330" y2="504"/>
    <line x1="0" y1="30" x2="360" y2="30"/><line x1="0" y1="60" x2="360" y2="60"/>
    <line x1="0" y1="90" x2="360" y2="90"/><line x1="0" y1="120" x2="360" y2="120"/>
    <line x1="0" y1="150" x2="360" y2="150"/><line x1="0" y1="180" x2="360" y2="180"/>
    <line x1="0" y1="210" x2="360" y2="210"/><line x1="0" y1="240" x2="360" y2="240"/>
    <line x1="0" y1="270" x2="360" y2="270"/><line x1="0" y1="300" x2="360" y2="300"/>
    <line x1="0" y1="330" x2="360" y2="330"/><line x1="0" y1="360" x2="360" y2="360"/>
    <line x1="0" y1="390" x2="360" y2="390"/><line x1="0" y1="420" x2="360" y2="420"/>
    <line x1="0" y1="450" x2="360" y2="450"/><line x1="0" y1="480" x2="360" y2="480"/>
  </g>

  <!-- Level info at top -->
  <text font-family="monospace" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle" x="180" y="22" opacity="0.6">Click to start a chain reaction!</text>
  <text font-family="monospace" font-size="11" fill="#ffffff" text-anchor="middle" x="180" y="40" opacity="0.5">Pop 8 dots to pass</text>

  <!-- === ACTIVE CHAIN REACTION SCENE === -->
  <!-- Player's initial click explosion (white, expanding) -->
  <circle cx="180" cy="260" r="45" fill="#ffffff" opacity="0.08"/>
  <circle cx="180" cy="260" r="45" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <circle cx="180" cy="260" r="43" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

  <!-- Chain explosion 1: red dot popped at (130, 220) -->
  <circle cx="130" cy="220" r="35" fill="#ff4444" opacity="0.08"/>
  <circle cx="130" cy="220" r="35" fill="none" stroke="#ff4444" stroke-width="2.5" opacity="0.6"/>
  <circle cx="130" cy="220" r="33" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

  <!-- Chain explosion 2: blue dot popped at (220, 230) -->
  <circle cx="220" cy="230" r="30" fill="#44aaff" opacity="0.07"/>
  <circle cx="220" cy="230" r="30" fill="none" stroke="#44aaff" stroke-width="2.5" opacity="0.55"/>
  <circle cx="220" cy="230" r="28" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25"/>

  <!-- Chain explosion 3: gold dot popped at (160, 300) -->
  <circle cx="160" cy="300" r="22" fill="#ffd700" opacity="0.06"/>
  <circle cx="160" cy="300" r="22" fill="none" stroke="#ffd700" stroke-width="2.5" opacity="0.5"/>
  <circle cx="160" cy="300" r="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>

  <!-- Particle bursts from popped dots -->
  <g opacity="0.8" shape-rendering="crispEdges">
    <!-- Red burst -->
    <rect x="115" y="205" width="3" height="3" fill="#ff4444"/>
    <rect x="145" y="210" width="3" height="3" fill="#ff7777"/>
    <rect x="120" y="235" width="3" height="3" fill="#ff4444"/>
    <rect x="140" y="200" width="3" height="3" fill="#cc2222"/>
    <!-- Blue burst -->
    <rect x="235" y="218" width="3" height="3" fill="#44aaff"/>
    <rect x="205" y="240" width="3" height="3" fill="#88ccff"/>
    <rect x="230" y="245" width="3" height="3" fill="#44aaff"/>
    <!-- Gold burst -->
    <rect x="148" y="288" width="3" height="3" fill="#ffd700"/>
    <rect x="172" y="310" width="3" height="3" fill="#ffee66"/>
    <rect x="150" y="315" width="3" height="3" fill="#ffd700"/>
  </g>

  <!-- Score popups floating up -->
  <text font-family="monospace" font-size="14" font-weight="bold" fill="#ff4444" text-anchor="middle" x="130" y="195" opacity="0.7">+1</text>
  <text font-family="monospace" font-size="14" font-weight="bold" fill="#44aaff" text-anchor="middle" x="220" y="210" opacity="0.6">+1</text>
  <text font-family="monospace" font-size="14" font-weight="bold" fill="#ffd700" text-anchor="middle" x="160" y="280" opacity="0.8">+1</text>

  <!-- Chain counter in center -->
  <text font-family="monospace" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle" x="180" y="265" opacity="0.7">3</text>
  <text font-family="monospace" font-size="12" fill="#ffffff" text-anchor="middle" x="180" y="285" opacity="0.4">CHAIN</text>

  <!-- Alive dots still bouncing -->
  <!-- Green dot -->
  <circle cx="60" cy="100" r="16" fill="url(#gGreen)"/>
  <circle cx="60" cy="100" r="10" fill="#44ff66"/>
  <circle cx="57" cy="96" r="4" fill="rgba(255,255,255,0.35)"/>

  <!-- Purple dot -->
  <circle cx="300" cy="130" r="16" fill="url(#gPurple)"/>
  <circle cx="300" cy="130" r="10" fill="#c084fc"/>
  <circle cx="297" cy="126" r="4" fill="rgba(255,255,255,0.35)"/>

  <!-- Pink dot -->
  <circle cx="80" cy="380" r="16" fill="url(#gPink)"/>
  <circle cx="80" cy="380" r="10" fill="#ff66aa"/>
  <circle cx="77" cy="376" r="4" fill="rgba(255,255,255,0.35)"/>

  <!-- Cyan dot -->
  <circle cx="290" cy="350" r="16" fill="url(#gCyan)"/>
  <circle cx="290" cy="350" r="10" fill="#44ffdd"/>
  <circle cx="287" cy="346" r="4" fill="rgba(255,255,255,0.35)"/>

  <!-- Orange dot -->
  <circle cx="50" cy="450" r="16" fill="url(#gOrange)"/>
  <circle cx="50" cy="450" r="10" fill="#ff8844"/>
  <circle cx="47" cy="446" r="4" fill="rgba(255,255,255,0.35)"/>

  <!-- Another green dot -->
  <circle cx="310" cy="440" r="16" fill="url(#gGreen)"/>
  <circle cx="310" cy="440" r="10" fill="#44ff66"/>
  <circle cx="307" cy="436" r="4" fill="rgba(255,255,255,0.35)"/>

  <!-- Red dot near bottom -->
  <circle cx="180" cy="420" r="16" fill="url(#gRed)"/>
  <circle cx="180" cy="420" r="10" fill="#ff4444"/>
  <circle cx="177" cy="416" r="4" fill="rgba(255,255,255,0.35)"/>

  <!-- Gold dot top right -->
  <circle cx="280" cy="70" r="16" fill="url(#gGold)"/>
  <circle cx="280" cy="70" r="10" fill="#ffd700"/>
  <circle cx="277" cy="66" r="4" fill="rgba(255,255,255,0.35)"/>

  <!-- Blue dot bottom left -->
  <circle cx="120" cy="460" r="16" fill="url(#gBlue)"/>
  <circle cx="120" cy="460" r="10" fill="#44aaff"/>
  <circle cx="117" cy="456" r="4" fill="rgba(255,255,255,0.35)"/>

  <!-- Dot trails (subtle) -->
  <circle cx="58" cy="104" r="5" fill="#44ff66" opacity="0.08"/>
  <circle cx="56" cy="108" r="4" fill="#44ff66" opacity="0.05"/>
  <circle cx="302" cy="134" r="5" fill="#c084fc" opacity="0.08"/>
  <circle cx="304" cy="138" r="4" fill="#c084fc" opacity="0.05"/>

  <!-- Border -->
  <rect width="360" height="504" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
