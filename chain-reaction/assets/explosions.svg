<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrowE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>

  <!-- Title -->
  <text fill="#888" font-size="12" x="300" y="22" text-anchor="middle">EXPLOSION LIFECYCLE</text>

  <!-- Phase 1: Expand -->
  <g transform="translate(60, 60)">
    <!-- Growing rings -->
    <circle cx="40" cy="50" r="10" fill="none" stroke="#ff8844" stroke-width="1" opacity="0.3"/>
    <circle cx="40" cy="50" r="20" fill="none" stroke="#ff8844" stroke-width="1.5" opacity="0.5"/>
    <circle cx="40" cy="50" r="32" fill="none" stroke="#ff8844" stroke-width="2" opacity="0.7"/>
    <circle cx="40" cy="50" r="32" fill="#ff8844" opacity="0.06"/>
    <!-- Arrow showing growth -->
    <line x1="40" y1="50" x2="40" y2="20" stroke="#ffd700" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <text fill="#ff8844" font-size="12" font-weight="bold" x="40" y="100" text-anchor="middle">EXPAND</text>
    <text fill="#666" font-size="9" x="40" y="115" text-anchor="middle">0.8s</text>
    <text fill="#555" font-size="8" x="40" y="128" text-anchor="middle">0 → maxR</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="155" y1="110" x2="195" y2="110" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrowE)"/>

  <!-- Phase 2: Hold -->
  <g transform="translate(200, 60)">
    <!-- Full size ring -->
    <circle cx="40" cy="50" r="35" fill="#44aaff" opacity="0.08"/>
    <circle cx="40" cy="50" r="35" fill="none" stroke="#44aaff" stroke-width="2.5" opacity="0.7"/>
    <circle cx="40" cy="50" r="33" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <!-- Dot touching explosion -->
    <circle cx="72" cy="40" r="6" fill="#44ff66"/>
    <circle cx="70" cy="38" r="2" fill="rgba(255,255,255,0.35)"/>
    <!-- Chain arrow -->
    <path d="M 72 46 Q 75 55 70 60" fill="none" stroke="#ffd700" stroke-width="1" marker-end="url(#arrowE)" opacity="0.6"/>
    <text fill="#44aaff" font-size="12" font-weight="bold" x="40" y="100" text-anchor="middle">HOLD</text>
    <text fill="#666" font-size="9" x="40" y="115" text-anchor="middle">0.6s</text>
    <text fill="#555" font-size="8" x="40" y="128" text-anchor="middle">chains active</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="295" y1="110" x2="335" y2="110" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrowE)"/>

  <!-- Phase 3: Fade -->
  <g transform="translate(340, 60)">
    <!-- Fading ring -->
    <circle cx="40" cy="50" r="38" fill="#c084fc" opacity="0.03"/>
    <circle cx="40" cy="50" r="38" fill="none" stroke="#c084fc" stroke-width="2" opacity="0.3"/>
    <circle cx="40" cy="50" r="36" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    <!-- Fade indicator -->
    <text fill="#c084fc" font-size="12" font-weight="bold" x="40" y="100" text-anchor="middle">FADE</text>
    <text fill="#666" font-size="9" x="40" y="115" text-anchor="middle">0.4s</text>
    <text fill="#555" font-size="8" x="40" y="128" text-anchor="middle">α → 0</text>
  </g>

  <!-- Arrow 3→removed -->
  <line x1="435" y1="110" x2="475" y2="110" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrowE)"/>

  <!-- Removed -->
  <g transform="translate(480, 60)">
    <text fill="#666" font-size="11" x="40" y="54" text-anchor="middle">✕</text>
    <text fill="#666" font-size="10" x="40" y="100" text-anchor="middle">GONE</text>
  </g>

  <!-- Total time bar -->
  <g transform="translate(60, 165)">
    <rect x="0" y="0" width="180" height="6" fill="#ff8844" opacity="0.3" rx="2"/>
    <rect x="180" y="0" width="135" height="6" fill="#44aaff" opacity="0.3" rx="2"/>
    <rect x="315" y="0" width="90" height="6" fill="#c084fc" opacity="0.3" rx="2"/>
    <text fill="#666" font-size="8" x="203" y="20" text-anchor="middle">Total: 1.8s</text>
  </g>

  <!-- Border -->
  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
