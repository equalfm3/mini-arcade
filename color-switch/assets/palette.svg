<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="600" height="160" fill="#0a0a16" rx="6"/>

  <!-- Red -->
  <rect x="40" y="30" width="80" height="60" fill="#ff4444" rx="6"/>
  <text fill="#e0e0e0" font-size="10" x="50" y="115">Red</text>
  <text fill="#888" font-size="9" x="42" y="130">#ff4444</text>

  <!-- Yellow -->
  <rect x="160" y="30" width="80" height="60" fill="#ffd700" rx="6"/>
  <text fill="#e0e0e0" font-size="10" x="168" y="115">Yellow</text>
  <text fill="#888" font-size="9" x="162" y="130">#ffd700</text>

  <!-- Green -->
  <rect x="280" y="30" width="80" height="60" fill="#44ff66" rx="6"/>
  <text fill="#e0e0e0" font-size="10" x="290" y="115">Green</text>
  <text fill="#888" font-size="9" x="282" y="130">#44ff66</text>

  <!-- Purple -->
  <rect x="400" y="30" width="80" height="60" fill="#c084fc" rx="6"/>
  <text fill="#e0e0e0" font-size="10" x="408" y="115">Purple</text>
  <text fill="#888" font-size="9" x="402" y="130">#c084fc</text>

  <!-- Background swatch -->
  <rect x="520" y="30" width="50" height="60" fill="#0a0a16" stroke="#2a2a40" stroke-width="1" rx="6"/>
  <text fill="#e0e0e0" font-size="10" x="525" y="115">BG</text>
  <text fill="#888" font-size="9" x="520" y="130">#0a0a16</text>

  <!-- Border -->
  <rect width="600" height="160" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
