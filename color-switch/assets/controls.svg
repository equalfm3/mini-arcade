<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>

  <!-- Desktop section -->
  <text fill="#c084fc" font-size="14" font-weight="bold" x="80" y="30">DESKTOP</text>

  <!-- Space bar -->
  <rect x="40" y="50" width="120" height="36" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="4"/>
  <text fill="#e0e0e0" font-size="11" x="72" y="73">SPACE</text>
  <text fill="#888" font-size="10" x="175" y="73">Jump</text>

  <!-- Esc key -->
  <rect x="40" y="100" width="50" height="36" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="4"/>
  <text fill="#e0e0e0" font-size="11" x="48" y="123">ESC</text>
  <text fill="#888" font-size="10" x="105" y="123">Pause</text>

  <!-- P key -->
  <rect x="40" y="150" width="36" height="36" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="4"/>
  <text fill="#e0e0e0" font-size="11" x="52" y="173">P</text>
  <text fill="#888" font-size="10" x="90" y="173">Pause</text>

  <!-- Divider -->
  <line x1="300" y1="20" x2="300" y2="180" stroke="#2a2a40" stroke-width="1"/>

  <!-- Mobile section -->
  <text fill="#c084fc" font-size="14" font-weight="bold" x="400" y="30">MOBILE</text>

  <!-- Tap button -->
  <rect x="360" y="50" width="100" height="50" fill="#12121f" stroke="#c084fc" stroke-width="2" rx="8"/>
  <text fill="#c084fc" font-size="14" font-weight="bold" x="387" y="81">TAP</text>
  <text fill="#888" font-size="10" x="475" y="81">Jump</text>

  <!-- Tap anywhere -->
  <rect x="360" y="120" width="160" height="40" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="4"/>
  <text fill="#888" font-size="10" x="380" y="145">Tap screen to jump</text>

  <!-- Border -->
  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
