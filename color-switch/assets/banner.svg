<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0a0a16; }
      .title { font-family: monospace; font-size: 48px; font-weight: bold; fill: #c084fc; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="20" x2="800" y2="20"/><line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Rotating ring obstacle (left side) -->
  <g transform="translate(140, 100)">
    <!-- Ring arcs -->
    <path d="M 0,-55 A 55,55 0 0,1 55,0" stroke="#ff4444" stroke-width="14" fill="none" stroke-linecap="butt"/>
    <path d="M 55,0 A 55,55 0 0,1 0,55" stroke="#ffd700" stroke-width="14" fill="none" stroke-linecap="butt"/>
    <path d="M 0,55 A 55,55 0 0,1 -55,0" stroke="#44ff66" stroke-width="14" fill="none" stroke-linecap="butt"/>
    <path d="M -55,0 A 55,55 0 0,1 0,-55" stroke="#c084fc" stroke-width="14" fill="none" stroke-linecap="butt"/>
    <!-- Ball inside ring -->
    <circle cx="0" cy="20" r="10" fill="#44ff66"/>
    <circle cx="-2" cy="18" r="4" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Color switch star (between obstacles) -->
  <g transform="translate(140, 10)">
    <polygon points="140,0 145,10 155,10 147,17 150,27 140,21 130,27 133,17 125,10 135,10" fill="#ff4444"/>
    <polygon points="140,0 145,10 155,10 147,17" fill="#ffd700"/>
    <polygon points="150,27 140,21 147,17" fill="#44ff66"/>
    <polygon points="130,27 133,17 140,21" fill="#c084fc"/>
    <circle cx="140" cy="14" r="3" fill="#ffffff"/>
  </g>

  <!-- Pixel icon (color-switch from icons.js) -->
  <g transform="translate(50, 20)" shape-rendering="crispEdges">
    <rect x="6" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="7.5" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="9" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="10.5" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="12" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="13.5" y="0" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="4.5" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="6" y="1.5" width="1.5" height="1.5" fill="#ff4444"/>
    <rect x="13.5" y="1.5" width="1.5" height="1.5" fill="#44ff66"/>
    <rect x="15" y="1.5" width="1.5" height="1.5" fill="#44ff66"/>
  </g>

  <!-- Title -->
  <text class="title" x="360" y="90">COLOR SWITCH</text>
  <text class="sub" x="360" y="118">Jump · Match · Survive</text>

  <!-- Score HUD mock -->
  <g transform="translate(360, 140)">
    <rect width="240" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <text font-family="monospace" font-size="9" fill="#666" x="10" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="55" y="19">12</text>
    <text font-family="monospace" font-size="9" fill="#666" x="110" y="19">BEST</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="150" y="19">24</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
