<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" width="620" height="280">
  <defs>
    <style>text{font-family:monospace;font-size:12px;}</style>
  </defs>
  <rect width="620" height="280" fill="#0a0a16" rx="6"/>

  <text fill="#c084fc" font-size="14" font-weight="bold" x="20" y="30">color-switch/</text>

  <text fill="#ffd700" x="30" y="55">├── index.html</text>
  <text fill="#666" x="250" y="55">Entry point — GAME config + arcade.js loader</text>

  <text fill="#ffd700" x="30" y="78">├── style.css</text>
  <text fill="#666" x="250" y="78">Accent color override (--c-game: #c084fc)</text>

  <text fill="#ffd700" x="30" y="101">├── game.js</text>
  <text fill="#666" x="250" y="101">Orchestrator — wires modules, runs Engine</text>

  <text fill="#c084fc" x="30" y="124">├── src/</text>

  <text fill="#44ff66" x="50" y="147">├── config.js</text>
  <text fill="#666" x="250" y="147">Colors, physics, obstacle spacing, sizes</text>

  <text fill="#44ff66" x="50" y="170">├── ball.js</text>
  <text fill="#666" x="250" y="170">Ball physics, gravity, jump, color state</text>

  <text fill="#44ff66" x="50" y="193">├── obstacles.js</text>
  <text fill="#666" x="250" y="193">Rings, crosses, bars, stars, collision</text>

  <text fill="#44ff66" x="50" y="216">└── renderer.js</text>
  <text fill="#666" x="250" y="216">Canvas drawing — arcs, ball, background</text>

  <text fill="#c084fc" x="30" y="239">├── assets/</text>
  <text fill="#666" x="250" y="239">SVG images for README documentation</text>

  <text fill="#ffd700" x="30" y="262">└── README.md</text>
  <text fill="#666" x="250" y="262">Full documentation with embedded SVGs</text>

  <!-- Border -->
  <rect width="620" height="280" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
