<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <rect width="800" height="200" fill="#0a0a16" rx="8"/>
  <rect x="2" y="2" width="796" height="196" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>

  <!-- Desktop controls -->
  <text x="200" y="30" fill="#edc22e" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">DESKTOP</text>

  <!-- Key layout: Q W E / A S D -->
  <g transform="translate(140,60)">
    <rect x="0" y="0" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="4"/>
    <text x="18" y="23" fill="#edc22e" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">Q</text>
    <text x="18" y="50" fill="#666" font-family="monospace" font-size="8" text-anchor="middle">NW</text>

    <rect x="42" y="0" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="4"/>
    <text x="60" y="23" fill="#edc22e" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">W</text>
    <text x="60" y="50" fill="#666" font-family="monospace" font-size="8" text-anchor="middle">NE</text>

    <rect x="84" y="0" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="4"/>
    <text x="102" y="23" fill="#edc22e" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">E</text>
    <text x="102" y="50" fill="#666" font-family="monospace" font-size="8" text-anchor="middle">E</text>

    <rect x="0" y="60" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="4"/>
    <text x="18" y="83" fill="#edc22e" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">A</text>
    <text x="18" y="110" fill="#666" font-family="monospace" font-size="8" text-anchor="middle">W</text>

    <rect x="42" y="60" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="4"/>
    <text x="60" y="83" fill="#edc22e" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">S</text>
    <text x="60" y="110" fill="#666" font-family="monospace" font-size="8" text-anchor="middle">SW</text>

    <rect x="84" y="60" width="36" height="36" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="4"/>
    <text x="102" y="83" fill="#edc22e" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">D</text>
    <text x="102" y="110" fill="#666" font-family="monospace" font-size="8" text-anchor="middle">SE</text>
  </g>

  <!-- Mobile controls -->
  <text x="560" y="30" fill="#edc22e" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">MOBILE</text>

  <!-- Swipe diagram -->
  <g transform="translate(560,110)">
    <circle cx="0" cy="0" r="50" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <text x="0" y="4" fill="#666" font-family="monospace" font-size="10" text-anchor="middle">SWIPE</text>

    <!-- 6 direction arrows -->
    <line x1="20" y1="0" x2="55" y2="0" stroke="#edc22e" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="10" y1="-17" x2="40" y2="-47" stroke="#edc22e" stroke-width="2"/>
    <line x1="-10" y1="-17" x2="-40" y2="-47" stroke="#edc22e" stroke-width="2"/>
    <line x1="-20" y1="0" x2="-55" y2="0" stroke="#edc22e" stroke-width="2"/>
    <line x1="-10" y1="17" x2="-40" y2="47" stroke="#edc22e" stroke-width="2"/>
    <line x1="10" y1="17" x2="40" y2="47" stroke="#edc22e" stroke-width="2"/>

    <text x="65" y="4" fill="#666" font-family="monospace" font-size="8" text-anchor="start">E</text>
    <text x="45" y="-50" fill="#666" font-family="monospace" font-size="8" text-anchor="start">NE</text>
    <text x="-60" y="-50" fill="#666" font-family="monospace" font-size="8" text-anchor="end">NW</text>
    <text x="-65" y="4" fill="#666" font-family="monospace" font-size="8" text-anchor="end">W</text>
    <text x="-60" y="55" fill="#666" font-family="monospace" font-size="8" text-anchor="end">SW</text>
    <text x="45" y="55" fill="#666" font-family="monospace" font-size="8" text-anchor="start">SE</text>
  </g>

  <!-- ESC -->
  <text x="400" y="185" fill="#666" font-family="monospace" font-size="10" text-anchor="middle">ESC = Pause</text>
</svg>
