<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" width="680" height="220">
  <rect width="680" height="220" fill="#0a0a16" rx="8"/>
  <rect x="2" y="2" width="676" height="216" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>

  <text x="20" y="30" fill="#edc22e" font-family="monospace" font-weight="bold" font-size="13">hex-merge/</text>

  <text x="30" y="55" fill="#888" font-family="monospace" font-size="11">index.html</text>
  <text x="250" y="55" fill="#555" font-family="monospace" font-size="10">Entry point — GAME config + arcade.js loader</text>

  <text x="30" y="75" fill="#888" font-family="monospace" font-size="11">style.css</text>
  <text x="250" y="75" fill="#555" font-family="monospace" font-size="10">Accent color (#edc22e)</text>

  <text x="30" y="95" fill="#888" font-family="monospace" font-size="11">game.js</text>
  <text x="250" y="95" fill="#555" font-family="monospace" font-size="10">Orchestrator — input, state, Engine loop</text>

  <text x="30" y="120" fill="#edc22e" font-family="monospace" font-size="11">src/</text>

  <text x="50" y="140" fill="#888" font-family="monospace" font-size="11">config.js</text>
  <text x="250" y="140" fill="#555" font-family="monospace" font-size="10">Grid radius, hex size, tile colors, directions</text>

  <text x="50" y="160" fill="#888" font-family="monospace" font-size="11">hexgrid.js</text>
  <text x="250" y="160" fill="#555" font-family="monospace" font-size="10">Axial hex grid, slide/merge in 6 dirs, win/lose</text>

  <text x="50" y="180" fill="#888" font-family="monospace" font-size="11">tiles.js</text>
  <text x="250" y="180" fill="#555" font-family="monospace" font-size="10">Spawn + merge pop animations</text>

  <text x="50" y="200" fill="#888" font-family="monospace" font-size="11">renderer.js</text>
  <text x="250" y="200" fill="#555" font-family="monospace" font-size="10">Canvas hex drawing, tile values, direction hints</text>
