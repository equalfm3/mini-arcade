<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" width="700" height="180">
  <rect width="700" height="180" fill="#0a0a16" rx="8"/>
  <rect x="2" y="2" width="696" height="176" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>

  <!-- States -->
  <rect x="30" y="70" width="100" height="40" fill="#1a1a2e" stroke="#edc22e" stroke-width="2" rx="6"/>
  <text x="80" y="95" fill="#edc22e" font-family="monospace" font-weight="bold" font-size="11" text-anchor="middle">IDLE</text>

  <rect x="190" y="70" width="100" height="40" fill="#1a1a2e" stroke="#44ff66" stroke-width="2" rx="6"/>
  <text x="240" y="95" fill="#44ff66" font-family="monospace" font-weight="bold" font-size="11" text-anchor="middle">PLAYING</text>

  <rect x="350" y="70" width="100" height="40" fill="#1a1a2e" stroke="#ff8844" stroke-width="2" rx="6"/>
  <text x="400" y="95" fill="#ff8844" font-family="monospace" font-weight="bold" font-size="11" text-anchor="middle">PAUSED</text>

  <rect x="510" y="70" width="120" height="40" fill="#1a1a2e" stroke="#ff4444" stroke-width="2" rx="6"/>
  <text x="570" y="95" fill="#ff4444" font-family="monospace" font-weight="bold" font-size="11" text-anchor="middle">GAME OVER</text>

  <!-- Arrows -->
  <line x1="130" y1="90" x2="185" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="157" y="82" fill="#888" font-family="monospace" font-size="8" text-anchor="middle">Start</text>

  <line x1="290" y1="80" x2="345" y2="80" stroke="#666" stroke-width="1.5"/>
  <text x="317" y="72" fill="#888" font-family="monospace" font-size="8" text-anchor="middle">Esc</text>

  <line x1="345" y1="100" x2="290" y2="100" stroke="#666" stroke-width="1.5"/>
  <text x="317" y="118" fill="#888" font-family="monospace" font-size="8" text-anchor="middle">Resume</text>

  <line x1="290" y1="90" x2="505" y2="90" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="400" y="55" fill="#888" font-family="monospace" font-size="8" text-anchor="middle">No moves left</text>

  <path d="M570,110 Q570,155 240,155 Q130,155 130,115" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="350" y="150" fill="#888" font-family="monospace" font-size="8" text-anchor="middle">Play Again</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
</svg>
