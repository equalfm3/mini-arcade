<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>

  <!-- Desktop section -->
  <text font-family="monospace" font-size="14" fill="#44ff66" font-weight="bold" x="80" y="30">DESKTOP</text>

  <!-- Arrow keys -->
  <rect x="40" y="50" width="40" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
  <text font-family="monospace" font-size="10" fill="#e0e0e0" text-anchor="middle" x="60" y="70">←</text>
  <rect x="85" y="50" width="40" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
  <text font-family="monospace" font-size="10" fill="#e0e0e0" text-anchor="middle" x="105" y="70">→</text>
  <text font-family="monospace" font-size="9" fill="#666" x="135" y="70">Move</text>

  <!-- Space bar -->
  <rect x="40" y="95" width="85" height="30" fill="#12121f" stroke="#44ff66" stroke-width="1.5" rx="3"/>
  <text font-family="monospace" font-size="10" fill="#44ff66" text-anchor="middle" x="82" y="115">SPACE</text>
  <text font-family="monospace" font-size="9" fill="#666" x="135" y="115">Shoot</text>

  <!-- Esc/P -->
  <rect x="40" y="140" width="35" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
  <text font-family="monospace" font-size="9" fill="#e0e0e0" text-anchor="middle" x="57" y="160">Esc</text>
  <text font-family="monospace" font-size="10" fill="#666" x="80" y="160">/</text>
  <rect x="90" y="140" width="30" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
  <text font-family="monospace" font-size="10" fill="#e0e0e0" text-anchor="middle" x="105" y="160">P</text>
  <text font-family="monospace" font-size="9" fill="#666" x="135" y="160">Pause</text>

  <!-- Divider -->
  <line x1="300" y1="20" x2="300" y2="180" stroke="#2a2a40" stroke-width="1"/>

  <!-- Mobile section -->
  <text font-family="monospace" font-size="14" fill="#44ff66" font-weight="bold" x="400" y="30">MOBILE</text>

  <!-- D-pad -->
  <rect x="340" y="55" width="30" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
  <text font-family="monospace" font-size="12" fill="#e0e0e0" text-anchor="middle" x="355" y="75">◄</text>
  <rect x="375" y="55" width="30" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="1.5" rx="3"/>
  <text font-family="monospace" font-size="12" fill="#e0e0e0" text-anchor="middle" x="390" y="75">►</text>
  <text font-family="monospace" font-size="9" fill="#666" x="415" y="75">D-pad</text>

  <!-- Fire button -->
  <rect x="340" y="100" width="65" height="35" fill="#12121f" stroke="#44ff66" stroke-width="1.5" rx="3"/>
  <text font-family="monospace" font-size="11" fill="#44ff66" text-anchor="middle" x="372" y="123">FIRE</text>
  <text font-family="monospace" font-size="9" fill="#666" x="415" y="123">Shoot</text>

  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
