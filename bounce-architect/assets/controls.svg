<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>text { font-family: monospace; }</style>
  </defs>
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>

  <!-- Desktop section -->
  <text fill="#44ff66" font-size="14" font-weight="bold" x="150" y="24" text-anchor="middle">Desktop</text>

  <!-- Mouse click -->
  <rect x="30" y="40" width="80" height="28" fill="#12121f" stroke="#44ff66" stroke-width="1.5" rx="4"/>
  <text fill="#44ff66" font-size="10" x="70" y="58" text-anchor="middle">Click</text>
  <text fill="#888" font-size="9" x="130" y="58">Place pad</text>

  <!-- Drag -->
  <rect x="30" y="76" width="80" height="28" fill="#12121f" stroke="#44ff66" stroke-width="1.5" rx="4"/>
  <text fill="#44ff66" font-size="10" x="70" y="94" text-anchor="middle">Drag</text>
  <text fill="#888" font-size="9" x="130" y="94">Set angle</text>

  <!-- Arrow keys -->
  <rect x="30" y="112" width="80" height="28" fill="#12121f" stroke="#44aaff" stroke-width="1.5" rx="4"/>
  <text fill="#44aaff" font-size="10" x="70" y="130" text-anchor="middle">← →</text>
  <text fill="#888" font-size="9" x="130" y="130">Rotate pad</text>

  <!-- Space -->
  <rect x="30" y="148" width="80" height="28" fill="#12121f" stroke="#ffd700" stroke-width="1.5" rx="4"/>
  <text fill="#ffd700" font-size="10" x="70" y="166" text-anchor="middle">Space</text>
  <text fill="#888" font-size="9" x="130" y="166">Launch ball</text>

  <!-- Divider -->
  <line x1="300" y1="20" x2="300" y2="185" stroke="#2a2a40" stroke-width="1"/>

  <!-- Mobile section -->
  <text fill="#44ff66" font-size="14" font-weight="bold" x="450" y="24" text-anchor="middle">Mobile</text>

  <!-- Tap -->
  <rect x="330" y="40" width="80" height="28" fill="#12121f" stroke="#44ff66" stroke-width="1.5" rx="4"/>
  <text fill="#44ff66" font-size="10" x="370" y="58" text-anchor="middle">Tap</text>
  <text fill="#888" font-size="9" x="430" y="58">Place pad</text>

  <!-- Drag -->
  <rect x="330" y="76" width="80" height="28" fill="#12121f" stroke="#44ff66" stroke-width="1.5" rx="4"/>
  <text fill="#44ff66" font-size="10" x="370" y="94" text-anchor="middle">Drag</text>
  <text fill="#888" font-size="9" x="430" y="94">Set angle</text>

  <!-- Tap pad -->
  <rect x="330" y="112" width="80" height="28" fill="#12121f" stroke="#ff4444" stroke-width="1.5" rx="4"/>
  <text fill="#ff4444" font-size="10" x="370" y="130" text-anchor="middle">Tap pad</text>
  <text fill="#888" font-size="9" x="430" y="130">Remove pad</text>

  <!-- Launch button -->
  <rect x="330" y="148" width="80" height="28" fill="#12121f" stroke="#ffd700" stroke-width="1.5" rx="4"/>
  <text fill="#ffd700" font-size="10" x="370" y="166" text-anchor="middle">LAUNCH</text>
  <text fill="#888" font-size="9" x="430" y="166">Launch ball</text>

  <!-- Esc/P -->
  <text fill="#666" font-size="9" x="300" y="196" text-anchor="middle">Esc / P — Pause</text>

  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
