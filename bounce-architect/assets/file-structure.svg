<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260" width="620" height="260">
  <defs>
    <style>text { font-family: monospace; font-size: 11px; }</style>
  </defs>
  <rect width="620" height="260" fill="#0a0a16" rx="6"/>

  <text fill="#44ff66" x="20" y="28" font-weight="bold" font-size="13">bounce-architect/</text>

  <text fill="#888" x="30" y="52">├── index.html</text>
  <text fill="#555" x="250" y="52">Entry point — GAME config + loader</text>

  <text fill="#888" x="30" y="72">├── style.css</text>
  <text fill="#555" x="250" y="72">Accent color override</text>

  <text fill="#888" x="30" y="92">├── game.js</text>
  <text fill="#555" x="250" y="92">Orchestrator — phases, input, Engine</text>

  <text fill="#44aaff" x="30" y="116">├── src/</text>

  <text fill="#888" x="50" y="136">├── config.js</text>
  <text fill="#555" x="250" y="136">All tunable constants</text>

  <text fill="#888" x="50" y="156">├── levels.js</text>
  <text fill="#555" x="250" y="156">12 pre-designed level layouts</text>

  <text fill="#888" x="50" y="176">├── ball.js</text>
  <text fill="#555" x="250" y="176">Ball physics, collision, trajectory</text>

  <text fill="#888" x="50" y="196">├── pads.js</text>
  <text fill="#555" x="250" y="196">Pad placement, rotation, removal</text>

  <text fill="#888" x="50" y="216">└── renderer.js</text>
  <text fill="#555" x="250" y="216">Drawing: ball, pads, goal, obstacles</text>

  <text fill="#44aaff" x="30" y="240">├── assets/</text>
  <text fill="#555" x="250" y="240">SVG images for README</text>

  <rect width="620" height="260" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
