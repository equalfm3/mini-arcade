<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 500" width="380" height="500">
  <defs>
    <style>text { font-family: monospace; }</style>
  </defs>
  <!-- Background -->
  <rect width="380" height="500" fill="#0a0a16" rx="6"/>

  <!-- Grid -->
  <g stroke="#161625" stroke-width="0.5" fill="none">
    <line x1="0" y1="30" x2="380" y2="30"/><line x1="0" y1="60" x2="380" y2="60"/>
    <line x1="0" y1="90" x2="380" y2="90"/><line x1="0" y1="120" x2="380" y2="120"/>
    <line x1="0" y1="150" x2="380" y2="150"/><line x1="0" y1="180" x2="380" y2="180"/>
    <line x1="0" y1="210" x2="380" y2="210"/><line x1="0" y1="240" x2="380" y2="240"/>
    <line x1="0" y1="270" x2="380" y2="270"/><line x1="0" y1="300" x2="380" y2="300"/>
    <line x1="0" y1="330" x2="380" y2="330"/><line x1="0" y1="360" x2="380" y2="360"/>
    <line x1="0" y1="390" x2="380" y2="390"/><line x1="0" y1="420" x2="380" y2="420"/>
    <line x1="0" y1="450" x2="380" y2="450"/><line x1="0" y1="480" x2="380" y2="480"/>
    <line x1="30" y1="0" x2="30" y2="500"/><line x1="60" y1="0" x2="60" y2="500"/>
    <line x1="90" y1="0" x2="90" y2="500"/><line x1="120" y1="0" x2="120" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/><line x1="180" y1="0" x2="180" y2="500"/>
    <line x1="210" y1="0" x2="210" y2="500"/><line x1="240" y1="0" x2="240" y2="500"/>
    <line x1="270" y1="0" x2="270" y2="500"/><line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="330" y1="0" x2="330" y2="500"/><line x1="360" y1="0" x2="360" y2="500"/>
  </g>

  <!-- Phase text -->
  <text fill="#44ff66" font-size="11" x="190" y="22" text-anchor="middle">Click to place pads (1/2)</text>

  <!-- Ball start position (Level 5 scenario) -->
  <circle cx="60" cy="55" r="8" fill="#44aaff" opacity="0.5"/>
  <circle cx="60" cy="55" r="12" fill="none" stroke="#44aaff" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Obstacle 1: horizontal wall -->
  <rect x="0" y="180" width="190" height="14" fill="#444466" stroke="#555588" stroke-width="1"/>

  <!-- Obstacle 2: horizontal wall -->
  <rect x="190" y="320" width="190" height="14" fill="#444466" stroke="#555588" stroke-width="1"/>

  <!-- Placed pad 1 (angled, bouncing ball right) -->
  <line x1="80" y1="140" x2="140" y2="120" stroke="#44ff66" stroke-width="5" stroke-linecap="round"/>
  <circle cx="80" cy="140" r="3" fill="#44ff66"/>
  <circle cx="140" cy="120" r="3" fill="#44ff66"/>

  <!-- Ghost pad being placed -->
  <line x1="220" y1="280" x2="280" y2="260" stroke="#44ff66" stroke-width="5" stroke-linecap="round" opacity="0.4"/>

  <!-- Trajectory preview dots -->
  <circle cx="63" cy="70" r="2" fill="#44aaff" opacity="0.2"/>
  <circle cx="67" cy="84" r="2" fill="#44aaff" opacity="0.2"/>
  <circle cx="72" cy="96" r="2" fill="#44aaff" opacity="0.2"/>
  <circle cx="78" cy="107" r="2" fill="#44aaff" opacity="0.2"/>
  <circle cx="86" cy="116" r="2" fill="#44aaff" opacity="0.2"/>
  <circle cx="95" cy="123" r="2" fill="#44aaff" opacity="0.15"/>
  <!-- After bounce off pad 1 -->
  <circle cx="148" cy="125" r="2" fill="#44aaff" opacity="0.15"/>
  <circle cx="160" cy="135" r="2" fill="#44aaff" opacity="0.15"/>
  <circle cx="172" cy="148" r="2" fill="#44aaff" opacity="0.12"/>
  <circle cx="183" cy="164" r="2" fill="#44aaff" opacity="0.12"/>
  <circle cx="192" cy="182" r="2" fill="#44aaff" opacity="0.1"/>

  <!-- Goal (pulsing golden circle) -->
  <circle cx="60" cy="440" r="24" fill="#ffd700" opacity="0.2"/>
  <circle cx="60" cy="440" r="18" fill="#ffd700"/>
  <circle cx="55" cy="435" r="5" fill="#fff" opacity="0.4"/>
  <line x1="52" y1="440" x2="68" y2="440" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="432" x2="60" y2="448" stroke="#fff" stroke-width="1.5" opacity="0.4"/>

  <!-- HUD hint -->
  <text fill="#888" font-size="9" x="190" y="38" text-anchor="middle">Drag to angle · Click pad to remove · Space to launch</text>

  <!-- Border -->
  <rect width="380" height="500" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
