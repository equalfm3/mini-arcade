<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <style>text { font-family: monospace; }</style>
  </defs>
  <rect width="600" height="120" fill="#0a0a16" rx="6"/>

  <!-- Ball -->
  <rect x="30" y="20" width="50" height="50" fill="#44aaff" rx="4"/>
  <text fill="#44aaff" font-size="9" x="55" y="88" text-anchor="middle">Ball</text>
  <text fill="#666" font-size="8" x="55" y="100" text-anchor="middle">#44aaff</text>

  <!-- Pad -->
  <rect x="110" y="20" width="50" height="50" fill="#44ff66" rx="4"/>
  <text fill="#44ff66" font-size="9" x="135" y="88" text-anchor="middle">Pad</text>
  <text fill="#666" font-size="8" x="135" y="100" text-anchor="middle">#44ff66</text>

  <!-- Goal -->
  <rect x="190" y="20" width="50" height="50" fill="#ffd700" rx="4"/>
  <text fill="#ffd700" font-size="9" x="215" y="88" text-anchor="middle">Goal</text>
  <text fill="#666" font-size="8" x="215" y="100" text-anchor="middle">#ffd700</text>

  <!-- Obstacle -->
  <rect x="270" y="20" width="50" height="50" fill="#444466" rx="4"/>
  <text fill="#888" font-size="9" x="295" y="88" text-anchor="middle">Obstacle</text>
  <text fill="#666" font-size="8" x="295" y="100" text-anchor="middle">#444466</text>

  <!-- Background -->
  <rect x="350" y="20" width="50" height="50" fill="#0a0a16" stroke="#2a2a40" stroke-width="1" rx="4"/>
  <text fill="#888" font-size="9" x="375" y="88" text-anchor="middle">BG</text>
  <text fill="#666" font-size="8" x="375" y="100" text-anchor="middle">#0a0a16</text>

  <!-- Trail -->
  <rect x="430" y="20" width="50" height="50" fill="#2266cc" rx="4"/>
  <text fill="#2266cc" font-size="9" x="455" y="88" text-anchor="middle">Trail</text>
  <text fill="#666" font-size="8" x="455" y="100" text-anchor="middle">#2266cc</text>

  <!-- Pad glow -->
  <rect x="510" y="20" width="50" height="50" fill="#22aa44" rx="4"/>
  <text fill="#22aa44" font-size="9" x="535" y="88" text-anchor="middle">Glow</text>
  <text fill="#666" font-size="8" x="535" y="100" text-anchor="middle">#22aa44</text>

  <rect width="600" height="120" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
