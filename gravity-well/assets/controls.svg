<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="800" height="140">
  <rect width="800" height="140" fill="#0a0a16" rx="8"/>
  <rect x="2" y="2" width="796" height="136" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>

  <text x="400" y="25" fill="#44ffdd" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">CONTROLS</text>

  <!-- Launch -->
  <g transform="translate(150,70)">
    <circle cx="0" cy="0" r="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2"/>
    <text x="0" y="4" fill="#44ffdd" font-family="monospace" font-size="9" text-anchor="middle">DRAG</text>
    <text x="0" y="35" fill="#888" font-family="monospace" font-size="9" text-anchor="middle">Aim + Launch</text>
  </g>

  <!-- Thrust -->
  <g transform="translate(350,70)">
    <rect x="-30" y="-15" width="60" height="30" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="4"/>
    <text x="0" y="4" fill="#44ffdd" font-family="monospace" font-size="10" text-anchor="middle">SPACE</text>
    <text x="0" y="35" fill="#888" font-family="monospace" font-size="9" text-anchor="middle">Thrust (prograde)</text>
  </g>

  <!-- Retry -->
  <g transform="translate(550,70)">
    <rect x="-15" y="-15" width="30" height="30" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="4"/>
    <text x="0" y="4" fill="#44ffdd" font-family="monospace" font-size="12" text-anchor="middle">R</text>
    <text x="0" y="35" fill="#888" font-family="monospace" font-size="9" text-anchor="middle">Retry level</text>
  </g>

  <text x="400" y="125" fill="#666" font-family="monospace" font-size="10" text-anchor="middle">ESC = Pause | Mobile: drag to aim, THRUST button for boost</text>
</svg>
