<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <rect width="800" height="200" fill="#0a0a16" rx="8"/>
  <rect x="2" y="2" width="796" height="196" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>

  <!-- Stars -->
  <rect x="50" y="30" width="1.5" height="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="120" y="60" width="1" height="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="200" y="25" width="1.5" height="1.5" fill="rgba(255,255,255,0.6)"/>
  <rect x="680" y="40" width="1" height="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="720" y="150" width="1.5" height="1.5" fill="rgba(255,255,255,0.4)"/>
  <rect x="600" y="170" width="1" height="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Planet -->
  <circle cx="150" cy="100" r="30" fill="#ff8844"/>
  <circle cx="140" cy="90" r="10" fill="rgba(255,255,255,0.2)"/>

  <!-- Orbit ring (target) -->
  <circle cx="150" cy="100" r="70" fill="none" stroke="#ffd700" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Satellite on orbit -->
  <circle cx="220" cy="100" r="5" fill="#44ffdd"/>
  <!-- Trail -->
  <path d="M215,80 Q225,90 220,100" fill="none" stroke="rgba(68,255,221,0.4)" stroke-width="2"/>

  <!-- Title -->
  <text x="470" y="75" fill="#44ffdd" font-family="monospace" font-weight="bold" font-size="42" text-anchor="middle">GRAVITY WELL</text>
  <text x="470" y="105" fill="#888" font-family="monospace" font-size="14" text-anchor="middle">Launch satellites into planetary orbits</text>

  <!-- HUD -->
  <g transform="translate(470,140)">
    <rect x="-120" y="-12" width="80" height="30" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1" rx="4"/>
    <text x="-80" y="-1" fill="#888" font-family="monospace" font-size="8" text-anchor="middle">LEVEL</text>
    <text x="-80" y="12" fill="#44ffdd" font-family="monospace" font-weight="bold" font-size="12" text-anchor="middle">5</text>
    <rect x="40" y="-12" width="80" height="30" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1" rx="4"/>
    <text x="80" y="-1" fill="#888" font-family="monospace" font-size="8" text-anchor="middle">FUEL</text>
    <text x="80" y="12" fill="#44ffdd" font-family="monospace" font-weight="bold" font-size="12" text-anchor="middle">72</text>
  </g>
</svg>
