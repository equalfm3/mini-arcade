<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0a0a16" rx="8"/>

  <!-- Stars -->
  <rect x="30" y="50" width="1.5" height="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="350" y="30" width="1" height="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="80" y="350" width="1.5" height="1.5" fill="rgba(255,255,255,0.3)"/>
  <rect x="300" y="370" width="1" height="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="370" y="200" width="1.5" height="1.5" fill="rgba(255,255,255,0.4)"/>
  <rect x="20" y="180" width="1" height="1" fill="rgba(255,255,255,0.6)"/>

  <!-- Planet 1 -->
  <circle cx="140" cy="200" r="20" fill="#ff8844" opacity="0.15" stroke="none"/>
  <circle cx="140" cy="200" r="20" fill="#ff8844"/>
  <circle cx="134" cy="194" r="6" fill="rgba(255,255,255,0.2)"/>

  <!-- Planet 2 -->
  <circle cx="300" cy="200" r="20" fill="#44aaff" opacity="0.1" stroke="none"/>
  <circle cx="300" cy="200" r="20" fill="#44aaff"/>
  <circle cx="294" cy="194" r="6" fill="rgba(255,255,255,0.2)"/>

  <!-- Target orbit around planet 2 -->
  <circle cx="300" cy="200" r="70" fill="none" stroke="#ffd700" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Progress arc (partial) -->
  <path d="M300,130 A70,70 0 0,1 370,200" fill="none" stroke="#ffd700" stroke-width="3"/>

  <!-- Satellite -->
  <circle cx="370" cy="200" r="5" fill="#44ffdd"/>

  <!-- Trail -->
  <path d="M30,200 Q80,180 120,200 Q160,220 200,200 Q260,170 340,160 Q380,170 370,200" fill="none" stroke="rgba(68,255,221,0.4)" stroke-width="2"/>

  <!-- Start position marker -->
  <circle cx="30" cy="200" r="4" fill="none" stroke="#44ffdd" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Fuel bar -->
  <rect x="10" y="384" width="80" height="8" fill="#333"/>
  <rect x="10" y="384" width="50" height="8" fill="#44ffdd"/>

  <!-- Orbit text -->
  <text x="200" y="20" fill="#ffd700" font-family="monospace" font-size="10" text-anchor="middle">Orbiting... 65%</text>
</svg>
