<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <rect width="600" height="160" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;}</style></defs>

  <!-- Desktop section -->
  <text fill="#888" font-size="10" x="30" y="18">DESKTOP</text>

  <!-- Arrow keys -->
  <g transform="translate(30, 26)">
    <!-- Up -->
    <rect x="35" y="0" width="30" height="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="12" x="44" y="17">▲</text>
    <!-- Left -->
    <rect x="0" y="28" width="30" height="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="12" x="8" y="45">◄</text>
    <!-- Down -->
    <rect x="35" y="28" width="30" height="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="12" x="44" y="45">▼</text>
    <!-- Right -->
    <rect x="70" y="28" width="30" height="24" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#e0e0e0" font-size="12" x="78" y="45">►</text>
  </g>

  <!-- Arrow key labels -->
  <text fill="#666" font-size="7" x="30" y="86">←→ Move</text>
  <text fill="#666" font-size="7" x="30" y="95">↑ Rotate CW</text>
  <text fill="#666" font-size="7" x="30" y="104">↓ Soft drop</text>

  <!-- Space bar -->
  <g transform="translate(30, 110)">
    <rect x="0" y="0" width="100" height="22" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#ffd700" font-size="8" x="28" y="15">SPACE</text>
    <text fill="#666" font-size="7" x="110" y="15">Hard drop</text>
  </g>

  <!-- Z key -->
  <g transform="translate(30, 136)">
    <rect x="0" y="0" width="28" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#44aaff" font-size="9" x="8" y="14">Z</text>
    <text fill="#666" font-size="7" x="36" y="14">Rotate CCW</text>
  </g>

  <!-- Esc key -->
  <g transform="translate(120, 136)">
    <rect x="0" y="0" width="40" height="20" fill="#1a1a2e" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text fill="#ffd700" font-size="8" x="7" y="14">ESC</text>
    <text fill="#666" font-size="7" x="48" y="14">Pause</text>
  </g>

  <!-- Divider -->
  <line x1="230" y1="15" x2="230" y2="150" stroke="#2a2a40" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Mobile section -->
  <text fill="#888" font-size="10" x="260" y="18">MOBILE</text>

  <!-- D-pad -->
  <g transform="translate(270, 28)">
    <rect x="25" y="0" width="22" height="22" fill="#1a1a2e" stroke="#44aaff" stroke-width="1.5" rx="2"/>
    <text fill="#44aaff" font-size="11" x="31" y="16">▲</text>
    <rect x="0" y="25" width="22" height="22" fill="#1a1a2e" stroke="#44aaff" stroke-width="1.5" rx="2"/>
    <text fill="#44aaff" font-size="11" x="5" y="41">◄</text>
    <rect x="25" y="25" width="22" height="22" fill="#1a1a2e" stroke="#44aaff" stroke-width="1.5" rx="2"/>
    <text fill="#44aaff" font-size="11" x="31" y="41">▼</text>
    <rect x="50" y="25" width="22" height="22" fill="#1a1a2e" stroke="#44aaff" stroke-width="1.5" rx="2"/>
    <text fill="#44aaff" font-size="11" x="55" y="41">►</text>
    <text fill="#888" font-size="8" x="14" y="62">D-Pad</text>
  </g>

  <!-- Swipe gestures -->
  <g transform="translate(400, 30)">
    <circle cx="30" cy="25" r="22" fill="none" stroke="#2a2a40" stroke-width="1.5"/>
    <!-- Swipe arrows -->
    <line x1="30" y1="8" x2="30" y2="2" stroke="#44aaff" stroke-width="2"/>
    <text fill="#44aaff" font-size="7" x="26" y="0">↑</text>
    <line x1="30" y1="42" x2="30" y2="48" stroke="#44aaff" stroke-width="2"/>
    <text fill="#44aaff" font-size="7" x="26" y="58">↓</text>
    <text fill="#888" font-size="8" x="8" y="72">Swipe</text>
  </g>

  <!-- Mobile labels -->
  <text fill="#666" font-size="7" x="260" y="105">Swipe up = Rotate</text>
  <text fill="#666" font-size="7" x="260" y="115">Swipe down = Soft drop</text>
  <text fill="#666" font-size="7" x="260" y="125">Tap = Hard drop</text>
  <text fill="#666" font-size="7" x="260" y="135">D-pad = Movement</text>

  <rect width="600" height="160" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
