<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="600" height="140">
  <rect width="600" height="140" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;font-size:9px;}</style></defs>

  <!-- I-piece (cyan) -->
  <g transform="translate(12, 12)" shape-rendering="crispEdges">
    <rect width="36" height="36" fill="#0e0e1a" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <!-- I-piece: 4 horizontal -->
    <rect x="2" y="14" width="8" height="8" fill="#00e5ff"/>
    <rect x="10" y="14" width="8" height="8" fill="#00e5ff"/>
    <rect x="18" y="14" width="8" height="8" fill="#00e5ff"/>
    <rect x="26" y="14" width="8" height="8" fill="#00e5ff"/>
  </g>
  <text fill="#aaa" x="12" y="64">I</text>
  <text fill="#555" x="12" y="74">#00e5ff</text>

  <!-- O-piece (yellow) -->
  <g transform="translate(92, 12)" shape-rendering="crispEdges">
    <rect width="36" height="36" fill="#0e0e1a" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="10" y="10" width="8" height="8" fill="#ffeb3b"/>
    <rect x="18" y="10" width="8" height="8" fill="#ffeb3b"/>
    <rect x="10" y="18" width="8" height="8" fill="#ffeb3b"/>
    <rect x="18" y="18" width="8" height="8" fill="#ffeb3b"/>
  </g>
  <text fill="#aaa" x="92" y="64">O</text>
  <text fill="#555" x="92" y="74">#ffeb3b</text>

  <!-- T-piece (purple) -->
  <g transform="translate(172, 12)" shape-rendering="crispEdges">
    <rect width="36" height="36" fill="#0e0e1a" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="14" y="10" width="8" height="8" fill="#ab47bc"/>
    <rect x="6" y="18" width="8" height="8" fill="#ab47bc"/>
    <rect x="14" y="18" width="8" height="8" fill="#ab47bc"/>
    <rect x="22" y="18" width="8" height="8" fill="#ab47bc"/>
  </g>
  <text fill="#aaa" x="172" y="64">T</text>
  <text fill="#555" x="172" y="74">#ab47bc</text>

  <!-- S-piece (green) -->
  <g transform="translate(252, 12)" shape-rendering="crispEdges">
    <rect width="36" height="36" fill="#0e0e1a" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="14" y="10" width="8" height="8" fill="#66bb6a"/>
    <rect x="22" y="10" width="8" height="8" fill="#66bb6a"/>
    <rect x="6" y="18" width="8" height="8" fill="#66bb6a"/>
    <rect x="14" y="18" width="8" height="8" fill="#66bb6a"/>
  </g>
  <text fill="#aaa" x="252" y="64">S</text>
  <text fill="#555" x="252" y="74">#66bb6a</text>

  <!-- Z-piece (red) -->
  <g transform="translate(332, 12)" shape-rendering="crispEdges">
    <rect width="36" height="36" fill="#0e0e1a" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="6" y="10" width="8" height="8" fill="#ef5350"/>
    <rect x="14" y="10" width="8" height="8" fill="#ef5350"/>
    <rect x="14" y="18" width="8" height="8" fill="#ef5350"/>
    <rect x="22" y="18" width="8" height="8" fill="#ef5350"/>
  </g>
  <text fill="#aaa" x="332" y="64">Z</text>
  <text fill="#555" x="332" y="74">#ef5350</text>

  <!-- J-piece (blue) -->
  <g transform="translate(412, 12)" shape-rendering="crispEdges">
    <rect width="36" height="36" fill="#0e0e1a" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="6" y="10" width="8" height="8" fill="#42a5f5"/>
    <rect x="6" y="18" width="8" height="8" fill="#42a5f5"/>
    <rect x="14" y="18" width="8" height="8" fill="#42a5f5"/>
    <rect x="22" y="18" width="8" height="8" fill="#42a5f5"/>
  </g>
  <text fill="#aaa" x="412" y="64">J</text>
  <text fill="#555" x="412" y="74">#42a5f5</text>

  <!-- L-piece (orange) -->
  <g transform="translate(492, 12)" shape-rendering="crispEdges">
    <rect width="36" height="36" fill="#0e0e1a" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
    <rect x="22" y="10" width="8" height="8" fill="#ffa726"/>
    <rect x="6" y="18" width="8" height="8" fill="#ffa726"/>
    <rect x="14" y="18" width="8" height="8" fill="#ffa726"/>
    <rect x="22" y="18" width="8" height="8" fill="#ffa726"/>
  </g>
  <text fill="#aaa" x="492" y="64">L</text>
  <text fill="#555" x="492" y="74">#ffa726</text>

  <!-- Board colors row -->
  <rect x="12" y="90" width="36" height="28" fill="#0e0e1a" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
  <line x1="21" y1="90" x2="21" y2="118" stroke="#161625" stroke-width="0.5"/>
  <line x1="30" y1="90" x2="30" y2="118" stroke="#161625" stroke-width="0.5"/>
  <line x1="39" y1="90" x2="39" y2="118" stroke="#161625" stroke-width="0.5"/>
  <line x1="12" y1="99" x2="48" y2="99" stroke="#161625" stroke-width="0.5"/>
  <line x1="12" y1="108" x2="48" y2="108" stroke="#161625" stroke-width="0.5"/>
  <text fill="#aaa" x="12" y="132">Grid bg</text>
  <text fill="#555" x="60" y="108">#0e0e1a</text>

  <rect x="130" y="90" width="36" height="28" fill="#2a2a40" rx="2"/>
  <text fill="#aaa" x="130" y="132">Border</text>
  <text fill="#555" x="175" y="108">#2a2a40</text>

  <rect x="260" y="90" width="36" height="28" fill="#12121f" stroke="#2a2a40" stroke-width="0.5" rx="2"/>
  <text fill="#aaa" x="260" y="132">HUD bg</text>
  <text fill="#555" x="305" y="108">#12121f</text>

  <rect width="600" height="140" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
