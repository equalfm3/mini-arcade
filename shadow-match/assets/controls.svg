<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>

  <!-- Desktop section -->
  <text font-size="12" fill="#8866ee" x="150" y="25" text-anchor="middle" font-weight="bold">DESKTOP</text>

  <!-- Key 1 -->
  <rect x="40" y="40" width="40" height="36" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="4"/>
  <text font-size="16" fill="#e0e0e0" x="60" y="64" text-anchor="middle" font-weight="bold">1</text>
  <text font-size="8" fill="#666" x="60" y="90" text-anchor="middle">Top-left</text>

  <!-- Key 2 -->
  <rect x="95" y="40" width="40" height="36" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="4"/>
  <text font-size="16" fill="#e0e0e0" x="115" y="64" text-anchor="middle" font-weight="bold">2</text>
  <text font-size="8" fill="#666" x="115" y="90" text-anchor="middle">Top-right</text>

  <!-- Key 3 -->
  <rect x="150" y="40" width="40" height="36" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="4"/>
  <text font-size="16" fill="#e0e0e0" x="170" y="64" text-anchor="middle" font-weight="bold">3</text>
  <text font-size="8" fill="#666" x="170" y="90" text-anchor="middle">Bot-left</text>

  <!-- Key 4 -->
  <rect x="205" y="40" width="40" height="36" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="4"/>
  <text font-size="16" fill="#e0e0e0" x="225" y="64" text-anchor="middle" font-weight="bold">4</text>
  <text font-size="8" fill="#666" x="225" y="90" text-anchor="middle">Bot-right</text>

  <!-- Esc key -->
  <rect x="90" y="110" width="50" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="4"/>
  <text font-size="11" fill="#e0e0e0" x="115" y="130" text-anchor="middle">Esc</text>
  <text font-size="8" fill="#666" x="115" y="155" text-anchor="middle">Pause</text>

  <!-- P key -->
  <rect x="155" y="110" width="40" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="4"/>
  <text font-size="11" fill="#e0e0e0" x="175" y="130" text-anchor="middle">P</text>
  <text font-size="8" fill="#666" x="175" y="155" text-anchor="middle">Pause</text>

  <!-- Divider -->
  <line x1="300" y1="15" x2="300" y2="185" stroke="#2a2a40" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Mobile section -->
  <text font-size="12" fill="#8866ee" x="450" y="25" text-anchor="middle" font-weight="bold">MOBILE</text>

  <!-- Phone outline -->
  <rect x="380" y="40" width="140" height="140" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="8"/>

  <!-- 2x2 tap zones -->
  <rect x="390" y="50" width="58" height="55" fill="#1a1a2e" stroke="#44aaff" stroke-width="1" rx="3"/>
  <text font-size="9" fill="#44aaff" x="419" y="82" text-anchor="middle">TAP 1</text>

  <rect x="452" y="50" width="58" height="55" fill="#1a1a2e" stroke="#44ff66" stroke-width="1" rx="3"/>
  <text font-size="9" fill="#44ff66" x="481" y="82" text-anchor="middle">TAP 2</text>

  <rect x="390" y="110" width="58" height="55" fill="#1a1a2e" stroke="#ffd700" stroke-width="1" rx="3"/>
  <text font-size="9" fill="#ffd700" x="419" y="142" text-anchor="middle">TAP 3</text>

  <rect x="452" y="110" width="58" height="55" fill="#1a1a2e" stroke="#ff66aa" stroke-width="1" rx="3"/>
  <text font-size="9" fill="#ff66aa" x="481" y="142" text-anchor="middle">TAP 4</text>

  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
