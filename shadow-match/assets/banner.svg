<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 44px; font-weight: bold; fill: #8866ee; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
      .grid { stroke: #161625; stroke-width: 0.5; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Subtle grid -->
  <g class="grid" fill="none">
    <line x1="0" y1="30" x2="800" y2="30"/><line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="90" x2="800" y2="90"/><line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Shadow shape (dark silhouette with glow) — T-pentomino -->
  <g transform="translate(60, 30)">
    <!-- Glow backdrop -->
    <rect x="18" y="8" width="100" height="80" fill="#6644cc" opacity="0.08" rx="8"/>
    <!-- Cells -->
    <rect x="20" y="10" width="28" height="28" fill="#2a2a50" stroke="#6644cc" stroke-width="1.5" rx="2"/>
    <rect x="52" y="10" width="28" height="28" fill="#2a2a50" stroke="#6644cc" stroke-width="1.5" rx="2"/>
    <rect x="84" y="10" width="28" height="28" fill="#2a2a50" stroke="#6644cc" stroke-width="1.5" rx="2"/>
    <rect x="52" y="42" width="28" height="28" fill="#2a2a50" stroke="#6644cc" stroke-width="1.5" rx="2"/>
    <rect x="52" y="74" width="28" height="28" fill="#2a2a50" stroke="#6644cc" stroke-width="1.5" rx="2"/>
    <!-- "?" label -->
    <text font-family="monospace" font-size="10" fill="#666" x="68" y="125" text-anchor="middle">SHADOW</text>
  </g>

  <!-- Four option boxes -->
  <g transform="translate(200, 25)">
    <!-- Option 1 (correct — matches shadow) -->
    <rect x="0" y="0" width="70" height="70" fill="#12121f" stroke="#44ff66" stroke-width="2" rx="3"/>
    <text font-family="monospace" font-size="9" fill="#666" x="5" y="12">1</text>
    <rect x="12" y="14" width="16" height="16" fill="#44aaff" rx="1"/>
    <rect x="30" y="14" width="16" height="16" fill="#44aaff" rx="1"/>
    <rect x="48" y="14" width="16" height="16" fill="#44aaff" rx="1"/>
    <rect x="30" y="32" width="16" height="16" fill="#44aaff" rx="1"/>
    <rect x="30" y="50" width="16" height="16" fill="#44aaff" rx="1"/>

    <!-- Option 2 (rotated 90°) -->
    <rect x="80" y="0" width="70" height="70" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text font-family="monospace" font-size="9" fill="#666" x="85" y="12">2</text>
    <rect x="92" y="14" width="16" height="16" fill="#44ff66" rx="1"/>
    <rect x="92" y="32" width="16" height="16" fill="#44ff66" rx="1"/>
    <rect x="92" y="50" width="16" height="16" fill="#44ff66" rx="1"/>
    <rect x="110" y="32" width="16" height="16" fill="#44ff66" rx="1"/>
    <rect x="128" y="32" width="16" height="16" fill="#44ff66" rx="1"/>

    <!-- Option 3 (mirrored) -->
    <rect x="0" y="80" width="70" height="70" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text font-family="monospace" font-size="9" fill="#666" x="5" y="92">3</text>
    <rect x="12" y="94" width="16" height="16" fill="#ffd700" rx="1"/>
    <rect x="30" y="94" width="16" height="16" fill="#ffd700" rx="1"/>
    <rect x="48" y="94" width="16" height="16" fill="#ffd700" rx="1"/>
    <rect x="30" y="112" width="16" height="16" fill="#ffd700" rx="1"/>
    <rect x="12" y="130" width="16" height="16" fill="#ffd700" rx="1"/>

    <!-- Option 4 (cell removed) -->
    <rect x="80" y="80" width="70" height="70" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="3"/>
    <text font-family="monospace" font-size="9" fill="#666" x="85" y="92">4</text>
    <rect x="92" y="94" width="16" height="16" fill="#ff66aa" rx="1"/>
    <rect x="110" y="94" width="16" height="16" fill="#ff66aa" rx="1"/>
    <rect x="128" y="94" width="16" height="16" fill="#ff66aa" rx="1"/>
    <rect x="110" y="112" width="16" height="16" fill="#ff66aa" rx="1"/>
  </g>

  <!-- Title -->
  <text class="title" x="420" y="85">SHADOW</text>
  <text class="title" x="420" y="130">MATCH</text>
  <text class="sub" x="420" y="155">Memorize · Compare · Match</text>

  <!-- Score HUD mock -->
  <g transform="translate(420, 168)">
    <rect width="240" height="26" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <!-- Pixel icon -->
    <g transform="translate(6, 1)" shape-rendering="crispEdges">
      <rect x="3" y="1.5" width="10.5" height="1.5" fill="#666"/>
      <rect x="3" y="3" width="1.5" height="7.5" fill="#666"/>
      <rect x="13.5" y="3" width="1.5" height="7.5" fill="#666"/>
      <rect x="3" y="10.5" width="10.5" height="1.5" fill="#666"/>
      <rect x="6" y="4.5" width="4.5" height="1.5" fill="#666"/>
      <rect x="6" y="6" width="1.5" height="1.5" fill="#666"/>
      <rect x="9" y="6" width="1.5" height="1.5" fill="#666"/>
      <rect x="6" y="7.5" width="4.5" height="1.5" fill="#666"/>
      <rect x="1.5" y="15" width="4.5" height="4.5" fill="#e0e0e0"/>
      <rect x="7.5" y="15" width="4.5" height="4.5" fill="#666"/>
      <rect x="13.5" y="15" width="4.5" height="4.5" fill="#c084fc"/>
    </g>
    <text font-family="monospace" font-size="9" fill="#666" x="30" y="16">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="70" y="16">450</text>
    <text font-family="monospace" font-size="9" fill="#666" x="120" y="16">LEVEL</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="160" y="16">3</text>
    <!-- Hearts -->
    <text font-family="monospace" font-size="9" fill="#ff4444" x="200" y="16">♥♥♥</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
