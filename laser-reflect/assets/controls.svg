<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="800" height="140">
  <rect width="800" height="140" fill="#0a0a16" rx="8"/>
  <rect x="2" y="2" width="796" height="136" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>

  <text x="400" y="30" fill="#ff4444" font-family="monospace" font-weight="bold" font-size="14" text-anchor="middle">CONTROLS</text>

  <!-- Click actions -->
  <g transform="translate(100,55)">
    <circle cx="0" cy="0" r="15" fill="#1a1a2e" stroke="#44ff66" stroke-width="2"/>
    <text x="0" y="4" fill="#44ff66" font-family="monospace" font-size="8" text-anchor="middle">1st</text>
    <text x="0" y="30" fill="#888" font-family="monospace" font-size="9" text-anchor="middle">Place /</text>
  </g>

  <text x="160" y="58" fill="#666" font-family="monospace" font-size="16">→</text>

  <g transform="translate(220,55)">
    <circle cx="0" cy="0" r="15" fill="#1a1a2e" stroke="#44ff66" stroke-width="2"/>
    <text x="0" y="4" fill="#44ff66" font-family="monospace" font-size="8" text-anchor="middle">2nd</text>
    <text x="0" y="30" fill="#888" font-family="monospace" font-size="9" text-anchor="middle">Rotate \</text>
  </g>

  <text x="280" y="58" fill="#666" font-family="monospace" font-size="16">→</text>

  <g transform="translate(340,55)">
    <circle cx="0" cy="0" r="15" fill="#1a1a2e" stroke="#ff4444" stroke-width="2"/>
    <text x="0" y="4" fill="#ff4444" font-family="monospace" font-size="8" text-anchor="middle">3rd</text>
    <text x="0" y="30" fill="#888" font-family="monospace" font-size="9" text-anchor="middle">Remove</text>
  </g>

  <!-- Legend -->
  <g transform="translate(520,45)">
    <line x1="0" y1="0" x2="20" y2="-15" stroke="#44aaff" stroke-width="3" stroke-linecap="round"/>
    <text x="30" y="-4" fill="#888" font-family="monospace" font-size="10">Fixed mirror</text>

    <line x1="0" y1="25" x2="20" y2="10" stroke="#44ff66" stroke-width="3" stroke-linecap="round"/>
    <text x="30" y="21" fill="#888" font-family="monospace" font-size="10">Your mirror</text>

    <rect x="0" y="38" width="20" height="15" fill="#666" rx="2"/>
    <text x="30" y="50" fill="#888" font-family="monospace" font-size="10">Wall</text>
  </g>

  <text x="400" y="125" fill="#666" font-family="monospace" font-size="10" text-anchor="middle">ESC = Pause | Click empty cell to place mirror</text>
</svg>
