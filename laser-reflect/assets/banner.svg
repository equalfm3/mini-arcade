<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <rect width="800" height="200" fill="#0a0a16" rx="8"/>
  <rect x="2" y="2" width="796" height="196" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>

  <!-- Laser beam illustration -->
  <g transform="translate(80,100)">
    <!-- Emitter -->
    <circle cx="0" cy="0" r="12" fill="#ff4444"/>
    <!-- Laser path -->
    <line x1="12" y1="0" x2="80" y2="0" stroke="#ff4444" stroke-width="3"/>
    <!-- Mirror 1 -->
    <line x1="75" y1="10" x2="90" y2="-10" stroke="#44aaff" stroke-width="3" stroke-linecap="round"/>
    <!-- Reflected beam -->
    <line x1="82" y1="-2" x2="82" y2="-60" stroke="#ff4444" stroke-width="3"/>
    <!-- Mirror 2 -->
    <line x1="77" y1="-65" x2="92" y2="-55" stroke="#44ff66" stroke-width="3" stroke-linecap="round"/>
    <!-- Reflected beam 2 -->
    <line x1="87" y1="-62" x2="160" y2="-62" stroke="#ff4444" stroke-width="3"/>
    <!-- Target -->
    <circle cx="170" cy="-62" r="10" fill="none" stroke="#ffd700" stroke-width="3"/>
    <circle cx="170" cy="-62" r="4" fill="#ffd700"/>
  </g>

  <!-- Title -->
  <text x="450" y="75" fill="#ff4444" font-family="monospace" font-weight="bold" font-size="42" text-anchor="middle">LASER REFLECT</text>
  <text x="450" y="105" fill="#888" font-family="monospace" font-size="14" text-anchor="middle">Place mirrors to guide the laser to the target</text>

  <!-- Level indicator -->
  <g transform="translate(450,140)">
    <rect x="-60" y="-12" width="120" height="30" fill="#1a1a2e" stroke="#2a2a40" stroke-width="1" rx="4"/>
    <text x="0" y="-1" fill="#888" font-family="monospace" font-size="8" text-anchor="middle">LEVEL</text>
    <text x="0" y="12" fill="#ff4444" font-family="monospace" font-weight="bold" font-size="12" text-anchor="middle">7 / 10</text>
  </g>
</svg>
