<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 100" width="600" height="100">
  <rect width="600" height="100" fill="#0a0a16" rx="8"/>
  <rect x="2" y="2" width="596" height="96" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>

  <g transform="translate(30,25)">
