<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="500" height="220">
  <rect width="500" height="220" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4444"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#44ff66"/>
    </marker>
    <marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>

  <!-- Left section: Forces diagram -->
  <text fill="#888" font-size="10" x="20" y="20">FORCES</text>

  <!-- Bird circle -->
  <circle cx="80" cy="100" r="18" fill="#ffd700"/>
  <polygon points="65,98 55,108 68,108" fill="#ffaa00"/>
  <circle cx="87" cy="95" r="5" fill="#fff"/>
  <circle cx="89" cy="95" r="2.5" fill="#0a0a16"/>
  <polygon points="95,97 108,102 95,105" fill="#ff8844"/>

  <!-- Gravity arrow (down) -->
  <line x1="80" y1="122" x2="80" y2="165" stroke="#ff4444" stroke-width="2" marker-end="url(#arrowR)"/>
  <text fill="#ff4444" font-size="8" x="88" y="150">gravity</text>
  <text fill="#ff4444" font-size="8" x="88" y="162">1200 px/s²</text>

  <!-- Flap arrow (up) -->
  <line x1="80" y1="78" x2="80" y2="40" stroke="#44ff66" stroke-width="2" marker-end="url(#arrowG)"/>
  <text fill="#44ff66" font-size="8" x="88" y="50">flap</text>
  <text fill="#44ff66" font-size="8" x="88" y="62">-380 px/s</text>

  <text fill="#ffd700" font-size="9" x="30" y="55">TAP →</text>

  <!-- Divider -->
  <line x1="160" y1="15" x2="160" y2="205" stroke="#2a2a40" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right section: Trajectory with kill zones -->
  <text fill="#888" font-size="10" x="175" y="20">TRAJECTORY + KILL ZONES</text>

  <!-- Ceiling kill zone -->
  <rect x="175" y="30" width="300" height="14" fill="#ff4444" opacity="0.15"/>
  <line x1="175" y1="44" x2="475" y2="44" stroke="#ff4444" stroke-width="1" stroke-dasharray="3,3"/>
  <text fill="#ff4444" font-size="7" x="380" y="40">☠ CEILING</text>

  <!-- Ground kill zone -->
  <rect x="175" y="162" width="300" height="14" fill="#ff4444" opacity="0.15"/>
  <line x1="175" y1="162" x2="475" y2="162" stroke="#ff4444" stroke-width="1" stroke-dasharray="3,3"/>
  <text fill="#ff4444" font-size="7" x="380" y="173">☠ GROUND</text>

  <!-- Parabolic arc -->
  <polyline fill="none" stroke="#ffd700" stroke-width="2"
    points="185,70 195,80 205,90 215,102 225,116 235,135
            245,115 255,100 265,90 275,82 285,78
            295,82 305,90 315,100 325,115 335,135 345,155"/>

  <!-- Flap point -->
  <circle cx="235" cy="135" r="4" fill="#44ff66"/>
  <text fill="#44ff66" font-size="7" x="215" y="150">flap!</text>

  <!-- Peak -->
  <circle cx="285" cy="78" r="3" fill="#ffd700"/>
  <text fill="#ffd700" font-size="7" x="270" y="72">peak</text>

  <!-- Rotation: nose up at peak -->
  <g transform="translate(285, 78) rotate(-25)">
    <line x1="0" y1="0" x2="15" y2="0" stroke="#44aaff" stroke-width="1.5" marker-end="url(#arrowY)"/>
  </g>
  <text fill="#44aaff" font-size="7" x="305" y="72">-30°</text>

  <!-- Rotation: nose down when falling -->
  <g transform="translate(345, 155) rotate(60)">
    <line x1="0" y1="0" x2="15" y2="0" stroke="#44aaff" stroke-width="1.5" marker-end="url(#arrowY)"/>
  </g>
  <text fill="#44aaff" font-size="7" x="355" y="165">+90°</text>

  <!-- Rotation formula -->
  <rect x="175" y="185" width="300" height="22" fill="#12121f" stroke="#2a2a40" stroke-width="1" rx="2"/>
  <text fill="#ffd700" font-size="8" x="182" y="200">rotation = clamp(vy / maxFallSpeed × 90, -30, 90)°</text>

  <rect width="500" height="220" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
