<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .bg { fill: #0e0e1a; }
      .title { font-family: monospace; font-size: 42px; font-weight: bold; fill: #ffd700; }
      .sub { font-family: monospace; font-size: 14px; fill: #666666; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>

  <!-- Stars -->
  <rect x="30" y="25" width="2" height="2" fill="#fff" opacity="0.4"/>
  <rect x="95" y="50" width="1" height="1" fill="#fff" opacity="0.6"/>
  <rect x="150" y="15" width="2" height="2" fill="#fff" opacity="0.3"/>
  <rect x="210" y="70" width="1" height="1" fill="#fff" opacity="0.5"/>
  <rect x="280" y="30" width="2" height="2" fill="#fff" opacity="0.4"/>
  <rect x="350" y="55" width="1" height="1" fill="#fff" opacity="0.3"/>

  <!-- Pipe pair (left side) -->
  <!-- Top pipe -->
  <rect x="30" y="0" width="44" height="55" fill="#22aa44"/>
  <rect x="34" y="0" width="36" height="55" fill="#44ff66"/>
  <rect x="26" y="55" width="52" height="14" fill="#44ff66"/>
  <rect x="26" y="55" width="4" height="14" fill="#22aa44"/>
  <!-- Bottom pipe -->
  <rect x="26" y="130" width="52" height="14" fill="#44ff66"/>
  <rect x="26" y="130" width="4" height="14" fill="#22aa44"/>
  <rect x="30" y="144" width="44" height="56" fill="#22aa44"/>
  <rect x="34" y="144" width="36" height="56" fill="#44ff66"/>

  <!-- Bird (pixel art style, between pipes) -->
  <g transform="translate(100, 80)" shape-rendering="crispEdges">
    <!-- Body (yellow circle approximation with rects) -->
    <rect x="6" y="0" width="12" height="3" fill="#ffd700"/>
    <rect x="3" y="3" width="18" height="3" fill="#ffd700"/>
    <rect x="0" y="6" width="24" height="3" fill="#ffd700"/>
    <rect x="0" y="9" width="24" height="3" fill="#ffd700"/>
    <rect x="0" y="12" width="24" height="3" fill="#ffd700"/>
    <rect x="3" y="15" width="18" height="3" fill="#ffd700"/>
    <rect x="6" y="18" width="12" height="3" fill="#ffd700"/>
    <!-- Wing -->
    <rect x="-6" y="9" width="9" height="6" fill="#ffaa00"/>
    <rect x="-3" y="15" width="6" height="3" fill="#ffaa00"/>
    <!-- Eye -->
    <rect x="15" y="3" width="6" height="6" fill="#ffffff"/>
    <rect x="18" y="3" width="3" height="6" fill="#0a0a16"/>
    <!-- Beak -->
    <rect x="24" y="6" width="9" height="6" fill="#ff8844"/>
    <rect x="24" y="12" width="6" height="3" fill="#ff8844"/>
  </g>

  <!-- Second pipe pair -->
  <rect x="190" y="0" width="44" height="35" fill="#22aa44"/>
  <rect x="194" y="0" width="36" height="35" fill="#44ff66"/>
  <rect x="186" y="35" width="52" height="14" fill="#44ff66"/>
  <rect x="186" y="35" width="4" height="14" fill="#22aa44"/>
  <rect x="186" y="150" width="52" height="14" fill="#44ff66"/>
  <rect x="186" y="150" width="4" height="14" fill="#22aa44"/>
  <rect x="190" y="164" width="44" height="36" fill="#22aa44"/>
  <rect x="194" y="164" width="36" height="36" fill="#44ff66"/>

  <!-- Ground -->
  <rect x="0" y="170" width="300" height="30" fill="#2a2a40"/>
  <rect x="0" y="170" width="300" height="2" fill="#3a3a55"/>
  <rect x="10" y="178" width="12" height="2" fill="#3a3a55"/>
  <rect x="34" y="178" width="12" height="2" fill="#3a3a55"/>
  <rect x="58" y="178" width="12" height="2" fill="#3a3a55"/>
  <rect x="82" y="178" width="12" height="2" fill="#3a3a55"/>
  <rect x="106" y="178" width="12" height="2" fill="#3a3a55"/>
  <rect x="130" y="178" width="12" height="2" fill="#3a3a55"/>
  <rect x="154" y="178" width="12" height="2" fill="#3a3a55"/>
  <rect x="178" y="178" width="12" height="2" fill="#3a3a55"/>
  <rect x="202" y="178" width="12" height="2" fill="#3a3a55"/>
  <rect x="226" y="178" width="12" height="2" fill="#3a3a55"/>
  <rect x="250" y="178" width="12" height="2" fill="#3a3a55"/>
  <rect x="274" y="178" width="12" height="2" fill="#3a3a55"/>

  <!-- Title -->
  <text class="title" x="380" y="85">FLAPPY BIRD</text>
  <text class="sub" x="380" y="115">Tap · Flap · Survive</text>

  <!-- Score HUD mock -->
  <g transform="translate(380, 135)">
    <rect width="220" height="30" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="2"/>
    <!-- Pixel icon in HUD -->
    <g transform="translate(8, 5)" shape-rendering="crispEdges">
      <rect x="4.5" y="0" width="6" height="1.5" fill="#ffd700"/>
      <rect x="3" y="1.5" width="9" height="1.5" fill="#ffd700"/>
      <rect x="1.5" y="3" width="12" height="1.5" fill="#ffd700"/>
      <rect x="1.5" y="4.5" width="12" height="1.5" fill="#ffd700"/>
      <rect x="3" y="6" width="9" height="1.5" fill="#ffd700"/>
      <rect x="4.5" y="7.5" width="6" height="1.5" fill="#ffd700"/>
      <rect x="10.5" y="1.5" width="3" height="3" fill="#ffffff"/>
      <rect x="12" y="1.5" width="1.5" height="3" fill="#0a0a16"/>
      <rect x="13.5" y="3" width="4.5" height="3" fill="#ff8844"/>
    </g>
    <text font-family="monospace" font-size="9" fill="#666" x="80" y="19">SCORE</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="120" y="19">7</text>
    <text font-family="monospace" font-size="9" fill="#666" x="150" y="19">BEST</text>
    <text font-family="monospace" font-size="9" fill="#ffd700" x="185" y="19">12</text>
  </g>

  <!-- Border -->
  <rect width="800" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="8"/>
</svg>
