<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 250" width="560" height="250">
  <rect width="560" height="250" fill="#0a0a16" rx="6"/>
  <defs>
    <style>text{font-family:monospace;}</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd700"/>
    </marker>
  </defs>

  <!-- IDLE box -->
  <rect x="30" y="90" width="90" height="40" fill="#12121f" stroke="#44aaff" stroke-width="2" rx="4"/>
  <text fill="#44aaff" font-size="11" x="50" y="115" font-weight="bold">IDLE</text>

  <!-- PLAYING box -->
  <rect x="170" y="90" width="110" height="40" fill="#12121f" stroke="#44ff66" stroke-width="2" rx="4"/>
  <text fill="#44ff66" font-size="11" x="185" y="115" font-weight="bold">PLAYING</text>

  <!-- PAUSED box -->
  <rect x="30" y="20" width="90" height="40" fill="#12121f" stroke="#ffd700" stroke-width="2" rx="4"/>
  <text fill="#ffd700" font-size="11" x="40" y="45" font-weight="bold">PAUSED</text>

  <!-- DYING box -->
  <rect x="330" y="20" width="110" height="40" fill="#12121f" stroke="#ff8844" stroke-width="2" rx="4"/>
  <text fill="#ff8844" font-size="11" x="353" y="45" font-weight="bold">DYING</text>

  <!-- OVER box -->
  <rect x="430" y="90" width="100" height="40" fill="#12121f" stroke="#ff4444" stroke-width="2" rx="4"/>
  <text fill="#ff4444" font-size="11" x="453" y="115" font-weight="bold">OVER</text>

  <!-- Arrows -->
  <!-- idle → playing -->
  <line x1="120" y1="110" x2="168" y2="110" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="125" y="105">Start</text>

  <!-- playing → paused -->
  <line x1="190" y1="90" x2="105" y2="62" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="130" y="72">Esc</text>

  <!-- paused → playing -->
  <line x1="120" y1="52" x2="195" y2="88" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="145" y="82">Resume</text>

  <!-- paused → idle (restart) -->
  <line x1="75" y1="60" x2="75" y2="88" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="80" y="78">Restart</text>

  <!-- playing → dying (hit pipe) -->
  <line x1="270" y1="90" x2="340" y2="62" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="290" y="72">Hit</text>

  <!-- dying → over (bird lands) -->
  <line x1="440" y1="50" x2="470" y2="88" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="450" y="65">Land</text>

  <!-- over → idle (play again) -->
  <path d="M 480 130 Q 480 200 275 200 Q 75 200 75 132" fill="none" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text fill="#888" font-size="8" x="240" y="215">Play Again</text>

  <rect width="560" height="250" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
