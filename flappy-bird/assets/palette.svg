<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100" width="500" height="100">
  <rect width="500" height="100" fill="#0a0a16" rx="6"/>
  <defs><style>text{font-family:monospace;font-size:8px;}</style></defs>

  <!-- Bird body -->
  <rect x="15" y="15" width="35" height="35" fill="#ffd700" rx="2"/>
  <text fill="#aaa" x="15" y="65">Body</text>
  <text fill="#555" x="15" y="75">#ffd700</text>

  <!-- Bird wing -->
  <rect x="65" y="15" width="35" height="35" fill="#ffaa00" rx="2"/>
  <text fill="#aaa" x="65" y="65">Wing</text>
  <text fill="#555" x="65" y="75">#ffaa00</text>

  <!-- Bird beak -->
  <rect x="115" y="15" width="35" height="35" fill="#ff8844" rx="2"/>
  <text fill="#aaa" x="115" y="65">Beak</text>
  <text fill="#555" x="115" y="75">#ff8844</text>

  <!-- Bird eye -->
  <rect x="165" y="15" width="35" height="35" fill="#ffffff" rx="2"/>
  <circle cx="182" cy="32" r="5" fill="#0a0a16"/>
  <text fill="#aaa" x="165" y="65">Eye</text>
  <text fill="#555" x="165" y="75">#ffffff</text>

  <!-- Pipe -->
  <rect x="225" y="15" width="35" height="35" fill="#44ff66" rx="2"/>
  <text fill="#aaa" x="225" y="65">Pipe</text>
  <text fill="#555" x="225" y="75">#44ff66</text>

  <!-- Pipe cap -->
  <rect x="275" y="15" width="35" height="35" fill="#22aa44" rx="2"/>
  <text fill="#aaa" x="275" y="65">Cap</text>
  <text fill="#555" x="275" y="75">#22aa44</text>

  <!-- Ground -->
  <rect x="335" y="15" width="35" height="35" fill="#2a2a40" rx="2"/>
  <rect x="340" y="25" width="10" height="2" fill="#3a3a55"/>
  <rect x="340" y="35" width="10" height="2" fill="#3a3a55"/>
  <text fill="#aaa" x="335" y="65">Ground</text>
  <text fill="#555" x="335" y="75">#2a2a40</text>

  <!-- Sky -->
  <rect x="385" y="15" width="35" height="35" fill="#0e0e1a" rx="2" stroke="#2a2a40" stroke-width="1"/>
  <rect x="393" y="22" width="2" height="2" fill="#fff" opacity="0.5"/>
  <rect x="405" y="30" width="1" height="1" fill="#fff" opacity="0.4"/>
  <rect x="398" y="38" width="2" height="2" fill="#fff" opacity="0.3"/>
  <text fill="#aaa" x="385" y="65">Sky</text>
  <text fill="#555" x="385" y="75">#0e0e1a</text>

  <!-- Border line -->
  <rect x="445" y="15" width="35" height="35" fill="#3a3a55" rx="2"/>
  <text fill="#aaa" x="445" y="65">Line</text>
  <text fill="#555" x="445" y="75">#3a3a55</text>

  <rect width="500" height="100" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
