<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>text{font-family:monospace;}</style>
  </defs>
  <rect width="600" height="200" fill="#0a0a16" rx="6"/>

  <!-- Desktop section -->
  <text font-size="14" font-weight="bold" fill="#e0e0e0" x="30" y="30">DESKTOP</text>

  <!-- Lane keys -->
  <g transform="translate(30, 50)">
    <!-- D key -->
    <rect width="44" height="44" fill="#12121f" stroke="#ff66aa" stroke-width="2" rx="4"/>
    <text font-size="18" font-weight="bold" fill="#ff66aa" text-anchor="middle" x="22" y="28">D</text>
    <text font-size="8" fill="#666" text-anchor="middle" x="22" y="58">Lane 1</text>

    <!-- F key -->
    <g transform="translate(54, 0)">
      <rect width="44" height="44" fill="#12121f" stroke="#44ffdd" stroke-width="2" rx="4"/>
      <text font-size="18" font-weight="bold" fill="#44ffdd" text-anchor="middle" x="22" y="28">F</text>
      <text font-size="8" fill="#666" text-anchor="middle" x="22" y="58">Lane 2</text>
    </g>

    <!-- Gap indicator -->
    <text font-size="10" fill="#444" text-anchor="middle" x="131" y="28">···</text>

    <!-- J key -->
    <g transform="translate(140, 0)">
      <rect width="44" height="44" fill="#12121f" stroke="#ffd700" stroke-width="2" rx="4"/>
      <text font-size="18" font-weight="bold" fill="#ffd700" text-anchor="middle" x="22" y="28">J</text>
      <text font-size="8" fill="#666" text-anchor="middle" x="22" y="58">Lane 3</text>
    </g>

    <!-- K key -->
    <g transform="translate(194, 0)">
      <rect width="44" height="44" fill="#12121f" stroke="#44ff66" stroke-width="2" rx="4"/>
      <text font-size="18" font-weight="bold" fill="#44ff66" text-anchor="middle" x="22" y="28">K</text>
      <text font-size="8" fill="#666" text-anchor="middle" x="22" y="58">Lane 4</text>
    </g>
  </g>

  <!-- Pause key -->
  <g transform="translate(30, 130)">
    <rect width="60" height="30" fill="#12121f" stroke="#666" stroke-width="1.5" rx="3"/>
    <text font-size="10" font-weight="bold" fill="#888" text-anchor="middle" x="30" y="20">Esc</text>
    <text font-size="8" fill="#666" x="70" y="20">Pause</text>
  </g>

  <!-- Divider -->
  <line x1="300" y1="15" x2="300" y2="185" stroke="#2a2a40" stroke-width="1"/>

  <!-- Mobile section -->
  <text font-size="14" font-weight="bold" fill="#e0e0e0" x="330" y="30">MOBILE</text>

  <!-- Touch zones diagram -->
  <g transform="translate(330, 50)">
    <!-- Phone outline -->
    <rect width="220" height="120" fill="#12121f" stroke="#2a2a40" stroke-width="2" rx="8"/>

    <!-- 4 touch zones -->
    <rect x="8" y="70" width="47" height="40" fill="#ff66aa" opacity="0.2" rx="3"/>
    <rect x="61" y="70" width="47" height="40" fill="#44ffdd" opacity="0.2" rx="3"/>
    <rect x="114" y="70" width="47" height="40" fill="#ffd700" opacity="0.2" rx="3"/>
    <rect x="167" y="70" width="47" height="40" fill="#44ff66" opacity="0.2" rx="3"/>

    <!-- Touch zone labels -->
    <text font-size="10" font-weight="bold" fill="#ff66aa" text-anchor="middle" x="31" y="95" opacity="0.6">D</text>
    <text font-size="10" font-weight="bold" fill="#44ffdd" text-anchor="middle" x="84" y="95" opacity="0.6">F</text>
    <text font-size="10" font-weight="bold" fill="#ffd700" text-anchor="middle" x="137" y="95" opacity="0.6">J</text>
    <text font-size="10" font-weight="bold" fill="#44ff66" text-anchor="middle" x="190" y="95" opacity="0.6">K</text>

    <!-- Falling notes in mini view -->
    <rect x="15" y="15" width="34" height="10" fill="#ff66aa" rx="2"/>
    <rect x="68" y="30" width="34" height="10" fill="#44ffdd" rx="2"/>
    <rect x="121" y="20" width="34" height="10" fill="#ffd700" rx="2"/>
    <rect x="174" y="40" width="34" height="10" fill="#44ff66" rx="2"/>

    <!-- Hit zone line -->
    <rect x="8" y="65" width="204" height="2" fill="#ffd700" opacity="0.4"/>

    <!-- Finger tap indicators -->
    <circle cx="31" cy="90" r="12" fill="#ff66aa" opacity="0.1" stroke="#ff66aa" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="137" cy="90" r="12" fill="#ffd700" opacity="0.1" stroke="#ffd700" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <text font-size="9" fill="#666" x="330" y="190">Tap the lane when the note reaches the hit zone</text>

  <!-- Border -->
  <rect width="600" height="200" fill="none" stroke="#2a2a40" stroke-width="2" rx="6"/>
</svg>
